<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📚 Study Guide Game · 단원 학습 게임</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nanum+Gothic:wght@700;800&family=Luckiest+Guy&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Fredoka", "Nanum Gothic", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #fde68a 0%, #fbcfe8 50%, #c7d2fe 100%);
        color: #1e293b;
        -webkit-tap-highlight-color: transparent;
      }
      .app {
        max-width: 760px;
        margin: 0 auto;
        padding: 18px 16px 120px;
      }
      .page-title {
        text-align: center;
        font-family: "Luckiest Guy", "Fredoka", sans-serif;
        font-size: clamp(1.8rem, 6vw, 2.6rem);
        color: #1e293b;
        letter-spacing: 1px;
        margin: 6px 0 2px;
        text-shadow: 2px 2px 0 #fff, 4px 4px 0 rgba(0, 0, 0, 0.08);
      }
      .page-sub {
        text-align: center;
        color: #475569;
        font-weight: 700;
        margin: 0 0 18px;
        font-size: 0.95rem;
      }
      .hud {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        background: #fff;
        border-radius: 18px;
        padding: 10px 14px;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.1);
        margin-bottom: 14px;
      }
      .hud .hud-left {
        display: flex;
        gap: 10px;
        align-items: center;
        font-weight: 800;
        color: #334155;
      }
      .hud .hud-back {
        background: #e2e8f0;
        color: #334155;
        border: none;
        padding: 8px 14px;
        border-radius: 12px;
        font-weight: 800;
        cursor: pointer;
        font-family: inherit;
      }
      .hud .hud-back:hover {
        background: #cbd5e1;
      }
      .hud .score {
        background: linear-gradient(135deg, #fde047, #fb923c);
        padding: 6px 12px;
        border-radius: 999px;
        color: #7c2d12;
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      .hud .streak {
        background: linear-gradient(135deg, #fca5a5, #ef4444);
        padding: 6px 12px;
        border-radius: 999px;
        color: #fff;
        font-weight: 800;
      }
      .hud .progress {
        background: #e2e8f0;
        padding: 6px 12px;
        border-radius: 999px;
        color: #334155;
        font-weight: 800;
      }

      .menu {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }
      .menu-card {
        background: #fff;
        border-radius: 24px;
        padding: 22px 18px;
        border: 3px solid transparent;
        cursor: pointer;
        text-align: left;
        font-family: inherit;
        transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      }
      .menu-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.18);
      }
      .menu-card:active {
        transform: translateY(-1px);
      }
      .menu-card .ico {
        font-size: 2.4rem;
        line-height: 1;
        margin-bottom: 8px;
      }
      .menu-card h3 {
        margin: 4px 0 4px;
        font-size: 1.2rem;
        color: #1e293b;
      }
      .menu-card p {
        margin: 0;
        color: #64748b;
        font-size: 0.88rem;
        font-weight: 600;
      }
      .menu-card.m-vocab {
        border-color: #6366f1;
      }
      .menu-card.m-spell {
        border-color: #10b981;
      }
      .menu-card.m-sent {
        border-color: #f59e0b;
      }
      .menu-card.m-match {
        border-color: #ec4899;
      }

      .question-card {
        background: #fff;
        border-radius: 24px;
        padding: 26px 22px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.1);
        margin-bottom: 14px;
      }
      .question-card .prompt-small {
        font-size: 0.82rem;
        font-weight: 800;
        color: #6366f1;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .question-card .prompt-big {
        font-size: clamp(1.6rem, 6vw, 2.4rem);
        font-weight: 800;
        color: #0f172a;
        text-align: center;
        padding: 14px 10px;
        font-family: "Fredoka", sans-serif;
        letter-spacing: -0.01em;
        word-break: break-word;
      }
      .question-card .sentence-box {
        font-size: clamp(1.05rem, 3.6vw, 1.25rem);
        line-height: 1.5;
        background: #f8fafc;
        border-radius: 16px;
        padding: 16px 18px;
        color: #1e293b;
        font-weight: 600;
        border: 2px dashed #cbd5e1;
      }

      .choices {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
      }
      .choice-btn {
        background: #fff;
        border: 3px solid #e2e8f0;
        border-radius: 16px;
        padding: 14px 16px;
        text-align: left;
        font-family: inherit;
        font-weight: 700;
        font-size: 1rem;
        color: #1e293b;
        cursor: pointer;
        transition: transform 0.1s, background 0.15s, border-color 0.15s;
      }
      .choice-btn:hover:not(:disabled) {
        background: #eef2ff;
        border-color: #6366f1;
        transform: translateY(-2px);
      }
      .choice-btn:disabled {
        cursor: not-allowed;
      }
      .choice-btn.correct {
        background: #dcfce7;
        border-color: #10b981;
        color: #065f46;
      }
      .choice-btn.wrong {
        background: #fee2e2;
        border-color: #ef4444;
        color: #991b1b;
      }

      .scramble {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        padding: 14px 4px;
      }
      .letter-tile {
        background: linear-gradient(145deg, #fff, #f1f5f9);
        border: 3px solid #94a3b8;
        color: #1e293b;
        font-family: "Luckiest Guy", "Fredoka", sans-serif;
        font-size: 1.8rem;
        font-weight: 700;
        padding: 8px 14px;
        min-width: 48px;
        min-height: 54px;
        border-radius: 14px;
        cursor: pointer;
        text-align: center;
        line-height: 1.2;
        box-shadow: 0 4px 0 #64748b, 0 6px 10px rgba(15, 23, 42, 0.12);
        transition: transform 0.08s, box-shadow 0.08s;
        text-transform: lowercase;
        user-select: none;
      }
      .letter-tile:hover {
        transform: translateY(-2px);
      }
      .letter-tile:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 #64748b, 0 3px 6px rgba(15, 23, 42, 0.1);
      }
      .letter-tile.used {
        opacity: 0.2;
        pointer-events: none;
      }
      .scramble-target {
        min-height: 70px;
        background: #fff7ed;
        border: 3px dashed #fb923c;
        border-radius: 16px;
        padding: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        align-items: center;
      }
      .scramble-target .letter-tile {
        border-color: #f59e0b;
        box-shadow: 0 3px 0 #b45309;
      }
      .scramble-hint {
        text-align: center;
        color: #64748b;
        font-weight: 700;
        margin: 8px 0;
        font-size: 0.9rem;
      }

      .btn-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      .btn {
        font-family: inherit;
        font-weight: 800;
        font-size: 1rem;
        padding: 12px 22px;
        border-radius: 14px;
        border: none;
        cursor: pointer;
        transition: transform 0.1s, background 0.15s;
      }
      .btn-primary {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        box-shadow: 0 6px 14px rgba(99, 102, 241, 0.4);
      }
      .btn-primary:hover {
        transform: translateY(-2px);
      }
      .btn-ghost {
        background: #f1f5f9;
        color: #334155;
      }
      .btn-ghost:hover {
        background: #e2e8f0;
      }
      .btn-say {
        background: linear-gradient(135deg, #10b981, #059669);
        color: #fff;
      }
      .btn-hint {
        background: #fef3c7;
        color: #78350f;
      }

      .feedback {
        text-align: center;
        font-size: 1.1rem;
        font-weight: 800;
        margin: 10px 0;
        min-height: 1.6em;
      }
      .feedback.ok {
        color: #059669;
      }
      .feedback.no {
        color: #dc2626;
      }

      .match-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      @media (max-width: 480px) {
        .match-grid {
          grid-template-columns: repeat(3, 1fr);
          gap: 6px;
        }
      }
      .match-card {
        aspect-ratio: 3 / 4;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        border-radius: 14px;
        border: 3px solid transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6px;
        cursor: pointer;
        font-weight: 800;
        text-align: center;
        font-size: clamp(0.72rem, 2.6vw, 0.95rem);
        line-height: 1.2;
        font-family: inherit;
        transition: transform 0.15s, background 0.15s;
        word-break: keep-all;
      }
      .match-card.flip {
        background: #fff;
        color: #1e293b;
        border-color: #6366f1;
        transform: rotateY(0);
      }
      .match-card.done {
        background: #dcfce7;
        color: #065f46;
        border-color: #10b981;
        cursor: default;
      }
      .match-card:not(.flip):not(.done)::before {
        content: "?";
        font-size: 2rem;
      }
      .match-card:not(.flip):not(.done) .inner {
        display: none;
      }

      .final-card {
        background: linear-gradient(135deg, #fef3c7 0%, #fbcfe8 100%);
        border-radius: 28px;
        padding: 34px 22px;
        text-align: center;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.15);
      }
      .final-card .trophy {
        font-size: 4.5rem;
        line-height: 1;
      }
      .final-card h2 {
        font-family: "Luckiest Guy", sans-serif;
        font-size: 2.2rem;
        color: #7c2d12;
        margin: 10px 0 6px;
        text-shadow: 2px 2px 0 #fff;
      }
      .final-card .big-score {
        font-size: 3.4rem;
        font-weight: 900;
        color: #7c2d12;
        margin: 6px 0;
        font-family: "Luckiest Guy", sans-serif;
      }
      .final-card .stars {
        font-size: 2rem;
        letter-spacing: 8px;
        margin: 6px 0 14px;
      }

      @keyframes pop {
        0% { transform: scale(0.8); opacity: 0; }
        60% { transform: scale(1.08); opacity: 1; }
        100% { transform: scale(1); }
      }
      .pop {
        animation: pop 0.28s ease-out;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        75% { transform: translateX(6px); }
      }
      .shake {
        animation: shake 0.24s ease-in-out;
      }

      .hidden {
        display: none !important;
      }

      /* ---- 100점 뱃지 ---- */
      .badges-wrap {
        margin: 0 0 16px;
      }
      .all-master {
        background: linear-gradient(135deg, #fde68a 0%, #f59e0b 50%, #ef4444 100%);
        border-radius: 22px;
        padding: 18px 20px;
        text-align: center;
        color: #7c2d12;
        box-shadow: 0 10px 26px rgba(239, 68, 68, 0.25);
        border: 3px solid #fff;
        margin-bottom: 14px;
        position: relative;
        overflow: hidden;
      }
      .all-master::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.45), transparent 40%),
          radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.35), transparent 40%);
        pointer-events: none;
      }
      .all-master .am-emoji {
        font-size: 2.6rem;
        line-height: 1;
      }
      .all-master h3 {
        font-family: "Luckiest Guy", "Fredoka", sans-serif;
        font-size: 1.6rem;
        margin: 6px 0 4px;
        letter-spacing: 1px;
        color: #7c2d12;
        text-shadow: 2px 2px 0 #fff;
      }
      .all-master p {
        margin: 0;
        font-weight: 800;
        font-size: 0.92rem;
      }
      .badge-strip {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
      }
      .badge-chip {
        background: #fff;
        border-radius: 16px;
        padding: 10px 12px;
        border: 2px solid #e2e8f0;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.06);
      }
      .badge-chip.is-done {
        border-color: #fbbf24;
        background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      }
      .badge-chip.is-pending {
        opacity: 0.55;
        filter: grayscale(0.3);
      }
      .badge-chip .bc-ico {
        font-size: 1.6rem;
        line-height: 1;
        flex: 0 0 auto;
      }
      .badge-chip .bc-body {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .badge-chip .bc-name {
        font-weight: 800;
        font-size: 0.88rem;
        color: #334155;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .badge-chip.is-done .bc-name {
        color: #7c2d12;
      }
      .badge-chip .bc-date {
        font-size: 0.76rem;
        color: #64748b;
        font-weight: 700;
      }
      .badge-chip.is-done .bc-date {
        color: #b45309;
      }
      .menu-card {
        position: relative;
      }
      .menu-card .card-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        background: linear-gradient(135deg, #fbbf24, #f59e0b);
        color: #7c2d12;
        font-size: 0.72rem;
        font-weight: 900;
        padding: 4px 10px;
        border-radius: 999px;
        letter-spacing: 0.02em;
        box-shadow: 0 4px 10px rgba(245, 158, 11, 0.4);
        display: none;
      }
      .menu-card.is-perfect {
        border-color: #f59e0b;
        background: linear-gradient(135deg, #fffbeb 0%, #fff 50%);
      }
      .menu-card.is-perfect .card-badge {
        display: inline-block;
      }
      /* ---- 단원 칩(아이콘) 행 ---- */
      .units-section {
        margin: 4px 0 14px;
      }
      .units-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin: 0 4px 8px;
      }
      .units-head h3 {
        margin: 0;
        font-size: 1rem;
        color: #1e293b;
      }
      .units-head small { color: #94a3b8; font-weight: 700; font-size: 0.78rem; }
      .units-row {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding: 2px 4px 8px;
        scrollbar-width: thin;
      }
      .unit-chip {
        flex: 0 0 auto;
        position: relative;
        background: #fff;
        border: 3px solid #e2e8f0;
        border-radius: 18px;
        padding: 12px 14px 12px 12px;
        min-width: 120px;
        max-width: 220px;
        cursor: pointer;
        font-family: inherit;
        text-align: left;
        transition: transform 0.1s, border-color 0.15s, box-shadow 0.15s;
      }
      .unit-chip:hover {
        transform: translateY(-2px);
        border-color: #6366f1;
      }
      .unit-chip.is-active {
        border-color: #6366f1;
        background: linear-gradient(135deg, #eef2ff, #fff);
        box-shadow: 0 8px 18px rgba(99, 102, 241, 0.2);
      }
      .unit-chip .uc-ico {
        font-size: 1.4rem;
        margin-bottom: 2px;
      }
      .unit-chip .uc-title {
        font-weight: 900;
        color: #1e293b;
        font-size: 0.92rem;
        line-height: 1.2;
      }
      .unit-chip .uc-date {
        color: #64748b;
        font-size: 0.74rem;
        font-weight: 700;
        margin-top: 2px;
      }
      .unit-chip .uc-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        margin-top: 6px;
      }
      .unit-chip .uc-tag {
        background: #e0e7ff;
        color: #4338ca;
        font-size: 0.66rem;
        font-weight: 800;
        padding: 1px 6px;
        border-radius: 999px;
      }
      .unit-chip.is-active .uc-tag { background: #c7d2fe; }
      .unit-chip .uc-del {
        position: absolute;
        top: -6px;
        right: -6px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid #fff;
        background: #ef4444;
        color: #fff;
        font-size: 0.7rem;
        font-weight: 900;
        cursor: pointer;
        display: none;
        line-height: 1;
        font-family: inherit;
      }
      .unit-chip:hover .uc-del,
      .unit-chip.is-active .uc-del { display: block; }
      .unit-chip[data-default="1"] .uc-del { display: none !important; }

      /* ---- 메뉴 카드 비활성화 ---- */
      .menu-card.is-disabled {
        opacity: 0.4;
        filter: grayscale(0.6);
        cursor: not-allowed;
      }
      .menu-card.is-disabled:hover { transform: none; }
      .menu-card .card-locked {
        position: absolute;
        top: 8px;
        left: 8px;
        background: #94a3b8;
        color: #fff;
        font-size: 0.66rem;
        font-weight: 800;
        padding: 2px 8px;
        border-radius: 999px;
      }

      /* ---- AI 업로드 패널 ---- */
      .ai-panel {
        background: linear-gradient(135deg, #eef2ff, #fff);
        border: 3px solid #c7d2fe;
        border-radius: 20px;
        padding: 16px 18px;
        margin: 12px 0 18px;
        box-shadow: 0 10px 24px rgba(99, 102, 241, 0.08);
      }
      .ai-panel .ai-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .ai-panel h3 { margin: 0 0 2px; color: #1e293b; font-size: 1.05rem; }
      .ai-panel p { margin: 0; color: #475569; font-size: 0.86rem; font-weight: 600; }
      .ai-panel .ai-toggle {
        background: #fff;
        border: 2px solid #c7d2fe;
        color: #4f46e5;
        font-weight: 800;
        padding: 6px 12px;
        border-radius: 999px;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
      }
      .ai-panel .ai-toggle:hover { background: #eef2ff; }
      .ai-body { margin-top: 14px; }
      .ai-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 10px;
      }
      .ai-field > span {
        font-weight: 800;
        color: #1e293b;
        font-size: 0.88rem;
      }
      .ai-field > span small { font-weight: 600; color: #94a3b8; margin-left: 4px; }
      .ai-field input[type="password"],
      .ai-field input[type="text"],
      .ai-field input[type="file"] {
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        padding: 10px 12px;
        font-family: inherit;
        font-size: 0.94rem;
        background: #fff;
      }
      .ai-field input:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
      }
      .ai-help { color: #64748b; font-weight: 600; font-size: 0.78rem; }
      .ai-help a { color: #4f46e5; text-decoration: underline; font-weight: 800; }
      .ai-help.is-saved { color: #059669; font-weight: 800; }
      .key-row { display: flex; gap: 6px; align-items: stretch; }
      .key-row input { flex: 1 1 auto; }
      .key-row .key-eye,
      .key-row .key-clear {
        flex: 0 0 auto;
        background: #f1f5f9;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        padding: 0 12px;
        font-size: 1rem;
        cursor: pointer;
        font-family: inherit;
        color: #475569;
      }
      .key-row .key-eye:hover,
      .key-row .key-clear:hover { background: #e2e8f0; }
      .key-row .key-clear { color: #b91c1c; border-color: #fecaca; background: #fef2f2; }
      .key-row .key-clear:hover { background: #fee2e2; }
      .ai-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
      .ai-status {
        margin-top: 10px;
        font-size: 0.86rem;
        color: #475569;
        min-height: 20px;
        font-weight: 700;
      }
      .ai-status.is-loading { color: #4f46e5; }
      .ai-status.is-error { color: #b91c1c; }
      .ai-status.is-ok { color: #059669; }
      .photo-preview {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;

      @keyframes scPop {
        0% { transform: scale(0.7); opacity: 0; }
        70% { transform: scale(1.08); opacity: 1; }

      }
      @keyframes scGlow {
        0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6); }
        60% { box-shadow: 0 0 0 14px rgba(16, 185, 129, 0); }
        100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }

    <script>
      /* ----------------------------- Data ----------------------------- */
      let VOCAB = [
        { word: "alter", meaning: "바꾸다, 변경하다", en: "to change or modify something" },
        { word: "collapse", meaning: "무너지다, 붕괴하다", en: "to fall down suddenly" },

        { word: "force", meaning: "힘, 세력", en: "strength or power used on something" },
        { word: "constant", meaning: "끊임없는, 일정한", en: "happening all the time without stopping" },
        { word: "severe", meaning: "매우 심한, 극심한", en: "very bad or intense" },
        { word: "substantial", meaning: "상당한, 꽤 큰", en: "large in amount or size" },

        { word: "hesitate", meaning: "망설이다, 주저하다", en: "to pause before doing something" },
        { word: "submerge", meaning: "물에 잠기다, 물속에 넣다", en: "to go under water" },
        { word: "delay", meaning: "지연시키다, 늦추다", en: "to make something happen later" },
      ];

      let SPELL = [
        "change", "surface", "piece", "natural",
        "pressure", "quite", "important", "except",
        "question", "certain", "usually", "become",
        "together", "weekend", "field", "nobody",

      let SPELL_MEANINGS = {
        change: "바꾸다, 변화",
        surface: "표면, 지면",
        piece: "조각, 부분",
        natural: "자연의, 자연스러운",
        pressure: "압력, 압박",
        quite: "꽤, 상당히",
        important: "중요한",
        except: "~를 제외하고",
        question: "질문, 문제",
        certain: "확실한, 어떤",
        usually: "보통, 대개",

        field: "들판, 분야",
        nobody: "아무도 ~않다",
      };

      // Writing prompts (Part D)
      let WRITE_PROMPTS = [
        {
          id: 1,
          title: "Prompt 1",
          text: "Which natural disaster is most interesting? Why?",
          ko: "어떤 자연재해가 가장 흥미로운가요? 왜 그런가요?",
        },
        {
          id: 2,
          title: "Prompt 2",
          text: "Choose a natural disaster. Using cause and effect, tell how this disaster affects people and land.",
          ko: "자연재해를 하나 골라, 원인과 결과(cause and effect)를 써서 그 재해가 사람과 땅에 어떤 영향을 주는지 설명하세요.",
        },
      ];

      const DISASTER_KEYWORDS = [
        "earthquake", "earthquakes", "tornado", "tornadoes", "tornados", "hurricane", "hurricanes",
        "tsunami", "tsunamis", "flood", "floods", "flooding", "wildfire", "wildfires",
        "volcano", "volcanoes", "volcanic", "eruption", "eruptions", "blizzard", "blizzards",
        "drought", "droughts", "storm", "storms", "thunderstorm", "thunderstorms",
        "typhoon", "typhoons", "cyclone", "cyclones", "avalanche", "avalanches",
        "landslide", "landslides", "disaster", "disasters",
      ];

      const COMPOUND_CONJ = ["and", "but", "or", "so", "yet"];

      // Sentence type data — labels: "compound" | "complex" | "runon"
      let SENTENCES = [
        { s: "I like science fiction movies, but my father likes comedies.", t: "compound", why: "두 독립절을 and/or/but 로 연결 → Compound" },
        { s: "Because it was raining, we stayed inside.", t: "complex", why: "'because' 같은 종속 접속사가 쓰임 → Complex" },
        { s: "Kites are fun to fly people all over the world like to fly them.", t: "runon", why: "두 완전한 문장이 쉼표/접속사 없이 이어져 있어요 → Run-on" },
        { s: "She was tired, so she went to bed early.", t: "compound", why: "and/or/but/so 같은 등위 접속사 → Compound" },
        { s: "Although he was nervous, he gave a great speech.", t: "complex", why: "'although' → 종속 접속사 → Complex" },
        { s: "I love pizza my sister loves pasta.", t: "runon", why: "두 문장이 접속사 없이 붙어 있어요 → Run-on" },
        { s: "We stayed inside because it was raining.", t: "complex", why: "'because' → 종속 접속사 (뒤쪽에 쓰임) → Complex" },
        { s: "My dog barks a lot, and my cat is very quiet.", t: "compound", why: "and 로 두 독립절 연결 → Compound" },
        { s: "Since we had time, we visited the museum.", t: "complex", why: "'since' → 종속 접속사 → Complex" },
        { s: "The storm was severe it caused a lot of damage.", t: "runon", why: "두 독립 문장이 그냥 붙어 있음 → Run-on" },
        { s: "You can take the bus, or you can walk home.", t: "compound", why: "or 로 두 독립절 연결 → Compound" },
        { s: "When the earthquake hit, the building collapsed.", t: "complex", why: "'when' → 종속 접속사 → Complex" },
      ];

      // 기본 데이터 스냅샷(딥카피) - "기본값으로 되돌리기"용
      const DEFAULTS = {
        VOCAB: JSON.parse(JSON.stringify(VOCAB)),
        SPELL: JSON.parse(JSON.stringify(SPELL)),
        SPELL_MEANINGS: JSON.parse(JSON.stringify(SPELL_MEANINGS)),
        SENTENCES: JSON.parse(JSON.stringify(SENTENCES)),
        WRITE_PROMPTS: JSON.parse(JSON.stringify(WRITE_PROMPTS)),
      };

      /* --------------------------- State ----------------------------- */
      const BEST_KEY = "study_game_best_v1";
      const state = {
        mode: null,
        modeFilter: null,
        questions: [],
        idx: 0,
        score: 0,
        streak: 0,
        sessionWrongs: [],
        sessionRights: [],
        spellWrongs: [],
        spellRights: [],
      };

      const $ = (id) => document.getElementById(id);
      const menuView = $("menuView");
      const gameView = $("gameView");
      const finalView = $("finalView");
      const gameBody = $("gameBody");

      function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }
      function pickN(arr, n) {
        return shuffle(arr).slice(0, n);
      }
      // ---- Speech (robust) ----
      let _voicesReady = false;
      let _cachedVoices = [];
      let _speechWarmed = false;

      function loadVoicesOnce() {
        if (!("speechSynthesis" in window)) return;
        const pull = () => {
          _cachedVoices = window.speechSynthesis.getVoices() || [];
          if (_cachedVoices.length) _voicesReady = true;
        };
        pull();
        if (!_voicesReady) {
          window.speechSynthesis.onvoiceschanged = () => pull();
          // fallback timer
          setTimeout(pull, 600);
          setTimeout(pull, 1500);
        }
      }
      loadVoicesOnce();

      function pickEnVoice() {
        const v = _cachedVoices.length ? _cachedVoices : (window.speechSynthesis && window.speechSynthesis.getVoices()) || [];
        return (
          v.find((x) => /en[-_]US/i.test(x.lang) && /google/i.test(x.name || "")) ||
          v.find((x) => /en[-_]US/i.test(x.lang)) ||
          v.find((x) => /^en[-_]GB/i.test(x.lang)) ||
          v.find((x) => /^en/i.test(x.lang)) ||
          null
        );
      }
      function pickKoVoice() {
        const v = _cachedVoices.length ? _cachedVoices : (window.speechSynthesis && window.speechSynthesis.getVoices()) || [];
        return (
          v.find((x) => /ko[-_]KR/i.test(x.lang) && /google/i.test(x.name || "")) ||
          v.find((x) => /ko[-_]KR/i.test(x.lang)) ||
          v.find((x) => /^ko/i.test(x.lang)) ||
          null
        );
      }

      function warmSpeech() {
        if (_speechWarmed) return;
        if (!("speechSynthesis" in window)) return;
        try {
          const u = new SpeechSynthesisUtterance(" ");
          u.volume = 0;
          u.lang = "en-US";
          window.speechSynthesis.speak(u);
          _speechWarmed = true;
        } catch (e) {}
      }

      function flashButton(btn) {
        if (!btn) return;
        btn.classList.remove("pop");
        void btn.offsetWidth;
        btn.classList.add("pop");
      }

      function speak(word, opts) {
        opts = opts || {};
        const btn = opts.btn || null;
        flashButton(btn);
        if (!("speechSynthesis" in window)) {
          alert("이 브라우저는 음성 재생을 지원하지 않아요 😢\nChrome/Safari에서 열어보세요.");
          return;
        }
        try {
          const synth = window.speechSynthesis;
          warmSpeech();
          try { synth.resume(); } catch (e) {}
          try { synth.cancel(); } catch (e) {}
          const utter = new SpeechSynthesisUtterance(String(word || ""));
          utter.lang = "en-US";
          utter.rate = 0.85;
          utter.pitch = 1;
          utter.volume = 1;
          const v = pickEnVoice();
          if (v) utter.voice = v;
          utter.onerror = (e) => { console.warn("speech error", e); };
          setTimeout(() => {
            try { synth.speak(utter); } catch (e) { console.warn(e); }
          }, 40);
        } catch (e) {
          console.warn(e);
        }
      }

      function speakKo(text, opts) {
        opts = opts || {};
        if (!("speechSynthesis" in window)) return;
        try {
          const synth = window.speechSynthesis;
          warmSpeech();
          try { synth.resume(); } catch (e) {}
          // 한국어 음성은 정답/오답 피드백용이라 기존 영어 재생을 끊지 않도록
          // cancel()은 하지 않고 그냥 큐에 추가
          const u = new SpeechSynthesisUtterance(String(text || ""));
          u.lang = "ko-KR";
          u.rate = typeof opts.rate === "number" ? opts.rate : 1.05;
          u.pitch = typeof opts.pitch === "number" ? opts.pitch : 1.1;
          u.volume = typeof opts.volume === "number" ? opts.volume : 1;
          const v = pickKoVoice();
          if (v) u.voice = v;
          u.onerror = (e) => { console.warn("ko speech error", e); };
          setTimeout(() => {
            try { synth.speak(u); } catch (e) { console.warn(e); }
          }, 30);
        } catch (e) { console.warn(e); }
      }

      // ---- Sound effects (Web Audio) ----
      let _audioCtx = null;
      function getAudio() {
        if (_audioCtx) return _audioCtx;
        try {
          _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {}
        return _audioCtx;
      }
      function playTone({ freq = 800, dur = 0.15, type = "sine", vol = 0.2, when = 0, slideTo = null }) {
        const ctx = getAudio();
        if (!ctx) return;
        if (ctx.state === "suspended") {
          try { ctx.resume(); } catch (e) {}
        }
        const t0 = ctx.currentTime + when;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t0);
        if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
        gain.gain.setValueAtTime(0, t0);
        gain.gain.linearRampToValueAtTime(vol, t0 + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(t0);
        osc.stop(t0 + dur + 0.05);
      }
      function playCorrect() {
        // C5 - E5 - G5 상행 아르페지오 (경쾌한 "띵동")
        playTone({ freq: 523.25, dur: 0.1, vol: 0.18, type: "triangle", when: 0 });
        playTone({ freq: 659.25, dur: 0.1, vol: 0.18, type: "triangle", when: 0.08 });
        playTone({ freq: 783.99, dur: 0.22, vol: 0.2, type: "triangle", when: 0.16 });
        // 한국어 음성: "식세븐"
        setTimeout(() => speakKo("식세븐", { rate: 1.1, pitch: 1.2 }), 220);
      }
      function playWrong() {
        // 낮은 "삐익" - 실수 음
        playTone({ freq: 260, dur: 0.18, vol: 0.22, type: "square", when: 0, slideTo: 180 });
        playTone({ freq: 160, dur: 0.28, vol: 0.18, type: "square", when: 0.16, slideTo: 110 });
        // 한국어 음성: "응 아니야"
        setTimeout(() => speakKo("응 아니야", { rate: 1.1, pitch: 1.05 }), 260);
      }
      function playWin() {
        playTone({ freq: 523.25, dur: 0.12, vol: 0.2, type: "triangle", when: 0 });
        playTone({ freq: 659.25, dur: 0.12, vol: 0.2, type: "triangle", when: 0.1 });
        playTone({ freq: 783.99, dur: 0.12, vol: 0.2, type: "triangle", when: 0.2 });
        playTone({ freq: 1046.5, dur: 0.32, vol: 0.22, type: "triangle", when: 0.3 });
      }

      // Unlock audio on very first user interaction (iOS/Safari requirement)
      document.addEventListener(
        "click",
        function unlockOnce() {
          warmSpeech();
          loadVoicesOnce();
          const ctx = getAudio();
          if (ctx && ctx.state === "suspended") {
            try { ctx.resume(); } catch (e) {}
          }
          document.removeEventListener("click", unlockOnce);
        },
        { once: true, capture: true }
      );

      // ---- Perfect badges (100점 완주 기록) ----
      const PERFECT_KEY = "study_game_perfect_v1";
      const MODE_META = {
        vocab: { name: "단어 뜻 맞히기", ico: "📖" },
        spell: { name: "스펠링 퍼즐", ico: "✏️" },
        sent: { name: "문장 종류 맞히기", ico: "🔤" },

      };
      const MODE_KEYS = ["vocab", "spell", "sent", "sentence"];
      function getPerfects() {
        try {
          const raw = localStorage.getItem(PERFECT_KEY);
          return raw ? JSON.parse(raw) || {} : {};
        } catch (e) { return {}; }
      }
      function savePerfect(mode) {

      // ---- Vocab session persistence (wrong/right words) ----
      // 세션 기록은 활성 단원 안에 저장 (단원별 ○/× 추적)
      function getVocabSession() {
        const u = getActiveUnit();
        return { wrongs: (u.vocabWrongs || []).slice(), rights: (u.vocabRights || []).slice() };
      }
      function saveVocabSession(wrongs, rights) {
        saveActiveUnitField("vocabWrongs", wrongs || []);
        saveActiveUnitField("vocabRights", rights || []);
      }
      function getSpellSession() {
        const u = getActiveUnit();
        return { wrongs: (u.spellWrongs || []).slice(), rights: (u.spellRights || []).slice() };
      }
      function saveSpellSession(wrongs, rights) {
        saveActiveUnitField("spellWrongs", wrongs || []);
        saveActiveUnitField("spellRights", rights || []);
      }
      // 저장된 이력 + 현재 세션을 합쳐서 {rights:Set, wrongs:Set} 반환
      function computeStatus(kind) {
        const saved = kind === "spell" ? getSpellSession() : getVocabSession();
        const rights = new Set(saved.rights || []);
        const wrongs = new Set(saved.wrongs || []);
        // 현재 세션의 결과를 덮어씀 (틀리면 정답 기록보다 우선)
        const curR = kind === "spell" ? (state.spellRights || []) : (state.sessionRights || []);
        const curW = kind === "spell" ? (state.spellWrongs || []) : (state.sessionWrongs || []);
        curR.forEach((w) => { rights.add(w); wrongs.delete(w); });
        curW.forEach((w) => { wrongs.add(w); rights.delete(w); });
        return { rights: rights, wrongs: wrongs };
      }

      /* --------------- 📷 Gemini 사진 업로드 & 다중 단원 시스템 --------------- */
      const GEMINI_KEY_KEY = "study_game_gemini_key_v1";
      const GEMINI_MODEL = "gemini-2.5-flash";
      const UNITS_KEY = "study_game_units_v2";
      const ACTIVE_UNIT_KEY = "study_game_active_unit_v2";
      const DEFAULT_PERSIST_KEY = "study_game_default_persist_v2";
      const CUSTOM_DATA_KEY = "study_game_custom_data_v1"; // legacy (마이그레이션용)
      const DEFAULT_UNIT_ID = "default";

      function getUnits() {
        try {
          const raw = localStorage.getItem(UNITS_KEY);
          if (!raw) return [];
          const arr = JSON.parse(raw);
          return Array.isArray(arr) ? arr : [];
        } catch (e) { return []; }
      }
      function saveUnits(arr) {
        try { localStorage.setItem(UNITS_KEY, JSON.stringify(arr || [])); } catch (e) {}
      }
      function getActiveUnitId() {
        try { return localStorage.getItem(ACTIVE_UNIT_KEY) || DEFAULT_UNIT_ID; } catch (e) { return DEFAULT_UNIT_ID; }
      }
      function setActiveUnitId(id) {
        try { localStorage.setItem(ACTIVE_UNIT_KEY, id || DEFAULT_UNIT_ID); } catch (e) {}
      }
      function getDefaultPersisted() {
        try {
          const raw = localStorage.getItem(DEFAULT_PERSIST_KEY);
          if (!raw) return {};
          return JSON.parse(raw) || {};
        } catch (e) { return {}; }
      }
      function saveDefaultPersisted(p) {
        try { localStorage.setItem(DEFAULT_PERSIST_KEY, JSON.stringify(p || {})); } catch (e) {}
      }

      function makeDefaultUnit() {
        const persisted = getDefaultPersisted();
        return {
          id: DEFAULT_UNIT_ID,
          title: "기본 자연재해",
          icon: "📚",
          createdAt: 0,
          mode: "full",
          vocab: JSON.parse(JSON.stringify(DEFAULTS.VOCAB)),
          spell: JSON.parse(JSON.stringify(DEFAULTS.SPELL)),
          spell_meanings: JSON.parse(JSON.stringify(DEFAULTS.SPELL_MEANINGS)),
          sentences: JSON.parse(JSON.stringify(DEFAULTS.SENTENCES)),
          prompts: JSON.parse(JSON.stringify(DEFAULTS.WRITE_PROMPTS)),
          disabledWords: persisted.disabledWords || [],
          vocabRights: persisted.vocabRights || [],
          vocabWrongs: persisted.vocabWrongs || [],
          spellRights: persisted.spellRights || [],
          spellWrongs: persisted.spellWrongs || [],
        };
      }

      function getActiveUnit() {
        const id = getActiveUnitId();
        if (id === DEFAULT_UNIT_ID) return makeDefaultUnit();
        const units = getUnits();
        const found = units.find((u) => u.id === id);
        if (!found) {
          setActiveUnitId(DEFAULT_UNIT_ID);
          return makeDefaultUnit();
        }
        // Defensive defaults for missing fields (forward compat)
        found.disabledWords = found.disabledWords || [];
        found.vocabRights = found.vocabRights || [];
        found.vocabWrongs = found.vocabWrongs || [];
        found.spellRights = found.spellRights || [];
        found.spellWrongs = found.spellWrongs || [];
        found.vocab = found.vocab || [];
        found.spell = found.spell || [];
        found.spell_meanings = found.spell_meanings || {};
        found.sentences = found.sentences || [];
        found.prompts = found.prompts || [];
        return found;
      }

      function saveActiveUnitField(field, value) {
        const id = getActiveUnitId();
        if (id === DEFAULT_UNIT_ID) {
          const p = getDefaultPersisted();
          p[field] = value;
          saveDefaultPersisted(p);
          return;
        }
        const units = getUnits();
        const idx = units.findIndex((u) => u.id === id);
        if (idx >= 0) {
          units[idx][field] = value;
          saveUnits(units);
        }
      }

      // 활성 단원 데이터를 게임 전역 변수에 적용
      function applyActiveUnit() {
        const u = getActiveUnit();
        VOCAB = u.vocab && u.vocab.length ? u.vocab : [];
        SPELL = u.spell && u.spell.length ? u.spell : [];
        SPELL_MEANINGS = u.spell_meanings || {};
        SENTENCES = u.sentences && u.sentences.length ? u.sentences : [];
        WRITE_PROMPTS = u.prompts && u.prompts.length ? u.prompts : [];
        return u;
      }

      function unitHasMode(u, mode) {
        if (!u) return false;
        if (mode === "vocab") return Array.isArray(u.vocab) && u.vocab.length > 0;
        if (mode === "spell") return Array.isArray(u.spell) && u.spell.length > 0;
        if (mode === "sent") return Array.isArray(u.sentences) && u.sentences.length > 0;
        if (mode === "sentence") return Array.isArray(u.prompts) && u.prompts.length > 0;
        return false;
      }

      // Gemini 응답 → 단원 객체 생성
      function buildUnitFromGemini(parsed, opts) {
        opts = opts || {};
        const onlyVocab = opts.mode === "vocab";
        const now = Date.now();
        const d = new Date(now);
        const dt = (d.getMonth() + 1) + "." + String(d.getDate()).padStart(2, "0");
        const id = "u_" + now + "_" + Math.random().toString(36).slice(2, 7);

        const unit = {
          id: id,
          title: dt + (onlyVocab ? " 단어" : " 단원"),
          icon: onlyVocab ? "📖" : "🆕",
          createdAt: now,
          mode: onlyVocab ? "vocab" : "full",
          vocab: [], spell: [], spell_meanings: {}, sentences: [], prompts: [],
          disabledWords: [], vocabRights: [], vocabWrongs: [], spellRights: [], spellWrongs: [],
        };

        if (Array.isArray(parsed.vocab)) {
          unit.vocab = parsed.vocab
            .filter((v) => v && typeof v.word === "string" && typeof v.meaning === "string")
            .map((v) => ({
              word: String(v.word).trim().toLowerCase(),
              meaning: String(v.meaning).trim(),
              en: typeof v.en === "string" ? String(v.en).trim() : "",
            }))
            .filter((v) => v.word && v.meaning);
        }

        if (!onlyVocab) {
          if (Array.isArray(parsed.spell)) {
            const words = [];
            const meanings = {};
            parsed.spell.forEach((it) => {
              if (typeof it === "string") {
                const w = it.trim().toLowerCase();
                if (w) { words.push(w); meanings[w] = ""; }
              } else if (it && typeof it.word === "string") {
                const w = String(it.word).trim().toLowerCase();
                if (w) { words.push(w); meanings[w] = typeof it.meaning === "string" ? String(it.meaning).trim() : ""; }
              }
            });
            unit.spell = words;
            unit.spell_meanings = meanings;
          }
          if (Array.isArray(parsed.sentences)) {
            const allowed = new Set(["compound", "complex", "runon"]);
            unit.sentences = parsed.sentences
              .filter((x) => x && typeof x.s === "string" && typeof x.t === "string")
              .map((x) => ({
                s: String(x.s).trim(),
                t: String(x.t).trim().toLowerCase().replace(/[-_\s]/g, ""),
                why: typeof x.why === "string" ? String(x.why).trim() : "",
              }))
              .filter((x) => x.s.length > 4 && allowed.has(x.t));
          }
          if (Array.isArray(parsed.prompts)) {
            unit.prompts = parsed.prompts
              .filter((p) => p && typeof p.text === "string" && p.text.trim().length > 4)
              .map((p, i) => ({
                id: typeof p.id === "number" ? p.id : i + 1,
                title: typeof p.title === "string" && p.title.trim() ? p.title.trim() : "Prompt " + (i + 1),
                text: String(p.text).trim(),
                ko: typeof p.ko === "string" ? String(p.ko).trim() : "",
              }));
          }
        }

        return unit;
      }

      function unitIsValid(unit, requireOnlyVocab) {
        if (!unit) return false;
        if (requireOnlyVocab) return Array.isArray(unit.vocab) && unit.vocab.length >= 2;
        return (
          (Array.isArray(unit.vocab) && unit.vocab.length >= 2) ||
          (Array.isArray(unit.spell) && unit.spell.length >= 2) ||
          (Array.isArray(unit.sentences) && unit.sentences.length >= 2) ||
          (Array.isArray(unit.prompts) && unit.prompts.length >= 1)
        );
      }

      // 기존 CUSTOM_DATA_KEY 데이터를 새 단원으로 1회 마이그레이션
      (function migrateLegacyCustomData() {
        try {
          const oldRaw = localStorage.getItem(CUSTOM_DATA_KEY);
          if (!oldRaw) return;
          const old = JSON.parse(oldRaw);
          if (!old || typeof old !== "object") return;
          const units = getUnits();
          if (units.some((u) => u._fromLegacy)) {
            localStorage.removeItem(CUSTOM_DATA_KEY);
            return;
          }
          const u = buildUnitFromGemini(old, { mode: "full" });
          if (old._sourcedAt) u.createdAt = old._sourcedAt;
          u._fromLegacy = true;
          if (unitIsValid(u, false)) {
            units.push(u);
            saveUnits(units);
          }
          localStorage.removeItem(CUSTOM_DATA_KEY);
        } catch (e) {}
      })();

      function fileToBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            const res = reader.result || "";
            const idx = String(res).indexOf(",");
            resolve(idx >= 0 ? String(res).slice(idx + 1) : String(res));
          };
          reader.onerror = () => reject(new Error("파일을 읽지 못했어요."));
          reader.readAsDataURL(file);
        });
      }

      async function callGeminiVision(apiKey, files, opts) {
        opts = opts || {};
        const onlyVocab = opts.mode === "vocab";
        const url = "https://generativelanguage.googleapis.com/v1beta/models/" + GEMINI_MODEL + ":generateContent?key=" + encodeURIComponent(apiKey);

        const parts = [];
        const promptLines = onlyVocab
          ? [
              "You are a kind English study assistant helping a Korean elementary school student.",
              "Analyze the attached photo(s) and extract ONLY English vocabulary words for memorization.",
              "Return a single valid JSON object:",
              "{",
              '  "vocab": [ {"word":"lowercase English word","meaning":"Korean translation","en":"short English definition"} ]',
              "}",
              "Rules:",
              "- Include every English word that appears in the image(s) that a student should study.",
              "- If a definition is shown next to a word, use it; otherwise provide a clear, simple Korean meaning yourself.",
              "- Words must be lowercase English; meanings must be short Korean for an elementary student.",
              "- Do NOT include spell/sentences/prompts keys.",
              "- Output ONLY the JSON object, no markdown, no code fences, no extra text.",
            ]
          : [
              "You are a kind English study assistant helping a Korean elementary school student.",
              "Analyze the attached study-guide photo(s). Extract ONLY content clearly present in the images.",
              "Return a single valid JSON object with these keys (use empty arrays for any section not present):",
              "{",
              '  "vocab":     [ {"word":"lowercase English word","meaning":"Korean translation","en":"short English definition"} ],',
              '  "spell":     [ {"word":"lowercase English word","meaning":"short Korean meaning"} ],',
              '  "sentences": [ {"s":"example sentence exactly as shown","t":"compound|complex|runon","why":"short Korean reason why"} ],',
              '  "prompts":   [ {"id":1,"title":"Prompt 1","text":"English prompt text","ko":"Korean translation"} ]',
              "}",
              "Rules:",
              "- vocab: include ONLY words that are paired with a definition/meaning in the image.",
              "- spell: include words from any spelling word list (Part B, spelling list, etc).",
              "- sentences: include example sentences labeled or identifiable as compound, complex, or run-on. Use only those three labels for 't'.",
              "- prompts: include writing prompts asking the student to write a paragraph.",
              "- Meanings/explanations must be in simple Korean for an elementary student.",
              "- Do NOT invent content that is not in the images.",
              "- Output ONLY the JSON object, no markdown, no code fences, no extra text.",
            ];
        parts.push({ text: promptLines.join("\n") });

        for (let i = 0; i < files.length; i++) {
          const f = files[i];
          const b64 = await fileToBase64(f);
          parts.push({
            inline_data: {
              mime_type: f.type || "image/jpeg",
              data: b64,
            },
          });
        }

        const body = {
          contents: [{ role: "user", parts: parts }],
          generationConfig: {
            temperature: 0.2,
            responseMimeType: "application/json",
          },
        };

        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          let msg = "Gemini 호출 실패 (" + res.status + ")";
          try { const errJson = await res.json(); if (errJson && errJson.error && errJson.error.message) msg += ": " + errJson.error.message; } catch (e) {}
          throw new Error(msg);
        }
        const data = await res.json();
        const text = (((data.candidates || [])[0] || {}).content || {}).parts || [];
        const combined = text.map((p) => p.text || "").join("").trim();
        if (!combined) throw new Error("응답이 비어있어요.");

        // 간혹 ```json ... ``` 로 감싸져 오는 경우 처리
        let jsonStr = combined;
        const fenceMatch = combined.match(/```(?:json)?\s*([\s\S]*?)```/i);
        if (fenceMatch) jsonStr = fenceMatch[1].trim();

        try {
          return JSON.parse(jsonStr);
        } catch (e) {
          throw new Error("JSON 파싱 실패: " + jsonStr.slice(0, 200));
        }
      }

      function wireAiPanel() {
        const toggle = $("aiToggle");
        const body = $("aiBody");
        const keyInput = $("geminiKey");
        const fileInput = $("photoInput");
        const btnApply = $("btnApplyPhoto");
        const btnApplyVocab = $("btnApplyPhotoVocab");
        const btnReset = $("btnResetData");
        const status = $("photoStatus");
        const preview = $("photoPreview");
        const keyStatus = $("keyStatus");
        const btnToggleKey = $("btnToggleKey");
        const btnClearKey = $("btnClearKey");
        if (!toggle || !body) return;

        function setKeyStatus(saved, maskedKey) {
          if (!keyStatus) return;
          if (saved && maskedKey) {
            keyStatus.classList.add("is-saved");
            keyStatus.innerHTML = "✓ 저장됨 (" + maskedKey + ") · 다음에 다시 입력하지 않아도 돼요.";
          } else {
            keyStatus.classList.remove("is-saved");
            keyStatus.innerHTML = '키는 <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">Google AI Studio</a>에서 무료로 만들 수 있어요.';
          }
        }
        function maskKey(k) {
          if (!k) return "";
          const s = String(k);
          if (s.length <= 8) return s.slice(0, 2) + "…";
          return s.slice(0, 4) + "…" + s.slice(-4);
        }

        // 저장된 API 키 복원
        try {
          const savedKey = localStorage.getItem(GEMINI_KEY_KEY);
          if (savedKey && keyInput) {
            keyInput.value = savedKey;
            setKeyStatus(true, maskKey(savedKey));
          }
        } catch (e) {}

        // 입력할 때마다 자동 저장 (디바운스)
        let _keyTimer = null;
        keyInput && keyInput.addEventListener("input", () => {
          clearTimeout(_keyTimer);
          _keyTimer = setTimeout(() => {
            const v = (keyInput.value || "").trim();
            try {
              if (v) {
                localStorage.setItem(GEMINI_KEY_KEY, v);
                setKeyStatus(true, maskKey(v));
              } else {
                localStorage.removeItem(GEMINI_KEY_KEY);
                setKeyStatus(false);
              }
            } catch (e) {}
          }, 350);
        });

        // 키 보이기/숨기기
        btnToggleKey && btnToggleKey.addEventListener("click", () => {
          if (!keyInput) return;
          if (keyInput.type === "password") {
            keyInput.type = "text";
            btnToggleKey.textContent = "🙈";
          } else {
            keyInput.type = "password";
            btnToggleKey.textContent = "👁";
          }
        });

        // 저장된 키 삭제
        btnClearKey && btnClearKey.addEventListener("click", () => {
          if (!confirm("저장된 API 키를 삭제할까요?")) return;
          try { localStorage.removeItem(GEMINI_KEY_KEY); } catch (e) {}
          if (keyInput) keyInput.value = "";
          setKeyStatus(false);
        });

        toggle.addEventListener("click", () => {
          const open = !body.classList.contains("hidden");
          if (open) {
            body.classList.add("hidden");
            toggle.textContent = "열기 ▾";
            toggle.setAttribute("aria-expanded", "false");
          } else {
            body.classList.remove("hidden");
            toggle.textContent = "닫기 ▴";
            toggle.setAttribute("aria-expanded", "true");
          }
        });

        fileInput && fileInput.addEventListener("change", () => {
          preview.innerHTML = "";
          Array.from(fileInput.files || []).forEach((f) => {
            const img = document.createElement("img");
            img.src = URL.createObjectURL(f);
            img.alt = f.name;
            preview.appendChild(img);
          });
        });

        async function runUpload(modeOpts, btnEl) {
          const onlyVocab = modeOpts && modeOpts.mode === "vocab";
          const key = (keyInput.value || "").trim();
          const files = Array.from(fileInput.files || []);
          if (!key) {
            status.className = "ai-status is-error";
            status.textContent = "⚠️ Gemini API 키를 먼저 입력해 주세요.";
            return;
          }
          if (files.length === 0) {
            status.className = "ai-status is-error";
            status.textContent = "⚠️ 학습지 사진을 하나 이상 선택해 주세요.";
            return;
          }
          try { localStorage.setItem(GEMINI_KEY_KEY, key); setKeyStatus(true, maskKey(key)); } catch (e) {}

          if (btnApply) btnApply.disabled = true;
          if (btnApplyVocab) btnApplyVocab.disabled = true;
          status.className = "ai-status is-loading";
          status.textContent = (onlyVocab ? "🤖 단어를 추출하고 있어요…" : "🤖 Gemini가 사진을 읽고 있어요…") + " (10~30초 소요)";
          try {
            const parsed = await callGeminiVision(key, files, modeOpts);
            renderAiPreview(parsed);
            const newUnit = buildUnitFromGemini(parsed, modeOpts);
            if (!unitIsValid(newUnit, onlyVocab)) {
              status.className = "ai-status is-error";
              status.textContent = "⚠️ 추출된 내용이 충분하지 않아요" + (onlyVocab ? " (단어 2개 이상 필요)" : "") + ". 더 선명한 사진으로 다시 시도해 주세요.";
              return;
            }
            const units = getUnits();
            units.push(newUnit);
            saveUnits(units);
            setActiveUnitId(newUnit.id);
            applyActiveUnit();
            renderMenuDataInfo();
            renderUnitsRow();
            renderMenuCardsState();
            status.className = "ai-status is-ok";
            status.textContent = "✅ 새 단원이 만들어졌어요: " + newUnit.title + (onlyVocab ? " (단어 뜻 맞히기만 가능)" : "");
            // 파일 입력 비우기
            if (fileInput) fileInput.value = "";
            preview.innerHTML = "";
          } catch (e) {
            console.warn(e);
            status.className = "ai-status is-error";
            status.textContent = "⚠️ 실패: " + (e && e.message ? e.message : String(e));
          } finally {
            if (btnApply) btnApply.disabled = false;
            if (btnApplyVocab) btnApplyVocab.disabled = false;
          }
        }

        btnApply && btnApply.addEventListener("click", () => runUpload({ mode: "full" }, btnApply));
        btnApplyVocab && btnApplyVocab.addEventListener("click", () => runUpload({ mode: "vocab" }, btnApplyVocab));

        btnReset && btnReset.addEventListener("click", () => {
          if (!confirm("기본 단원(자연재해 어휘)으로 되돌릴까요? 활성 단원만 기본으로 바뀌어요. (다른 단원 칩은 유지)")) return;
          setActiveUnitId(DEFAULT_UNIT_ID);
          applyActiveUnit();
          renderMenuDataInfo();
          renderUnitsRow();
          renderMenuCardsState();
          status.className = "ai-status is-ok";
          status.textContent = "↺ 기본 단원으로 되돌렸어요.";
          const aiPreview = $("aiPreview");
          if (aiPreview) aiPreview.classList.add("hidden");
        });
      }
      wireAiPanel();

      /* ---------- 단원 칩 렌더 + 카드 비활성화 ---------- */
      function fmtDate(ts) {
        if (!ts) return "";
        const d = new Date(ts);
        return (d.getMonth() + 1) + "." + String(d.getDate()).padStart(2, "0");
      }

      function renderUnitsRow() {
        const row = $("unitsRow");
        if (!row) return;
        row.innerHTML = "";
        const activeId = getActiveUnitId();

        const allUnits = [makeDefaultUnit()].concat(getUnits().slice().sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)));

        allUnits.forEach((u) => {
          const isDefault = u.id === DEFAULT_UNIT_ID;
          const chip = document.createElement("button");
          chip.type = "button";
          chip.className = "unit-chip" + (u.id === activeId ? " is-active" : "");
          chip.dataset.id = u.id;
          if (isDefault) chip.dataset.default = "1";

          const tags = [];
          if (Array.isArray(u.vocab) && u.vocab.length) tags.push('<span class="uc-tag">📖 ' + u.vocab.length + '</span>');
          if (Array.isArray(u.spell) && u.spell.length) tags.push('<span class="uc-tag">✏️ ' + u.spell.length + '</span>');
          if (Array.isArray(u.sentences) && u.sentences.length) tags.push('<span class="uc-tag">🔤 ' + u.sentences.length + '</span>');
          if (Array.isArray(u.prompts) && u.prompts.length) tags.push('<span class="uc-tag">📝 ' + u.prompts.length + '</span>');

          chip.innerHTML =
            '<div class="uc-ico">' + (u.icon || "📚") + '</div>' +
            '<div class="uc-title">' + u.title + '</div>' +
            '<div class="uc-date">' + (isDefault ? "기본 제공" : fmtDate(u.createdAt)) + '</div>' +
            '<div class="uc-tags">' + tags.join("") + '</div>' +
            (isDefault ? "" : '<button type="button" class="uc-del" title="단원 삭제">✕</button>');

          chip.addEventListener("click", (e) => {
            if (e.target && e.target.classList && e.target.classList.contains("uc-del")) return;
            setActiveUnitId(u.id);
            applyActiveUnit();
            renderMenuDataInfo();
            renderUnitsRow();
            renderMenuCardsState();
          });
          const delBtn = chip.querySelector(".uc-del");
          if (delBtn) {
            delBtn.addEventListener("click", (e) => {
              e.stopPropagation();
              if (!confirm("이 단원을 삭제할까요? 단원에 저장된 ○/× 기록도 함께 사라져요.")) return;
              const units = getUnits().filter((x) => x.id !== u.id);
              saveUnits(units);
              if (activeId === u.id) setActiveUnitId(DEFAULT_UNIT_ID);
              applyActiveUnit();
              renderMenuDataInfo();
              renderUnitsRow();
              renderMenuCardsState();
            });
          }

          row.appendChild(chip);
        });
      }

      function renderMenuCardsState() {
        const u = getActiveUnit();
        const map = { vocab: "card-vocab", spell: "card-spell", sent: "card-sent", sentence: "card-sentence" };
        Object.keys(map).forEach((mode) => {
          const el = document.getElementById(map[mode]);
          if (!el) return;
          const has = unitHasMode(u, mode);
          el.classList.toggle("is-disabled", !has);
          let lock = el.querySelector(".card-locked");
          if (!has) {
            if (!lock) {
              lock = document.createElement("span");
              lock.className = "card-locked";
              lock.textContent = "🔒 자료 없음";
              el.appendChild(lock);
            }
          } else if (lock) {
            lock.remove();
          }
        });
      }

      function startMode(mode, opts) {
        opts = opts || {};
        const u = getActiveUnit();
        if (!unitHasMode(u, mode)) {
          alert("이 단원에는 " + ({ vocab: "단어 뜻 맞히기", spell: "스펠링 퍼즐", sent: "문장 종류 맞히기", sentence: "문장 만들기" }[mode] || mode) + " 자료가 없어요.\n사진을 더 업로드하거나 다른 단원을 선택해 주세요.");
          return;
        }
        state.mode = mode;
        state.modeFilter = opts.filter || null;
        state.score = 0;
        state.streak = 0;
        state.idx = 0;
        state.sessionWrongs = [];
        state.sessionRights = [];
        state.spellWrongs = [];
        state.spellRights = [];
        if (mode === "vocab") {
          // 비활성(아는 단어) 제외
          const disabled = new Set(u.disabledWords || []);
          let basePool = VOCAB.filter((v) => !disabled.has(v.word));
          if (basePool.length === 0) basePool = VOCAB; // 모두 제외된 경우 안전장치
          let pool = basePool;
          if (opts.filter === "wrong") {
            const saved = getVocabSession();
            const words = new Set(saved.wrongs || []);
            const filtered = basePool.filter((v) => words.has(v.word));
            if (filtered.length > 0) pool = filtered;
          } else if (opts.filter === "right") {
            const saved = getVocabSession();
            const words = new Set(saved.rights || []);
            const filtered = basePool.filter((v) => words.has(v.word));
            if (filtered.length > 0) pool = filtered;
          }
          const count = Math.min(10, Math.max(1, pool.length));
          state.questions = pickN(pool, count);
        } else if (mode === "spell") {
          const count = Math.min(10, Math.max(1, SPELL.length));
          state.questions = pickN(SPELL, count);
        }
        else if (mode === "sent") {
          const count = Math.min(10, Math.max(1, SENTENCES.length));
          state.questions = pickN(SENTENCES, count);
        }
        else if (mode === "sentence") state.questions = null;
        menuView.classList.add("hidden");
        finalView.classList.add("hidden");
        gameView.classList.remove("hidden");
        renderQuestion();
      }
      function updateHud() {
        if (state.mode === "sentence") {
          $("progressChip").textContent = "📝 문장 쓰기";
        } else {
          const total = state.questions ? state.questions.length : 10;
          $("progressChip").textContent = (state.idx + 1) + " / " + total;
        }
        $("scoreChip").textContent = "⭐ " + state.score;
        $("streakChip").textContent = "🔥 " + state.streak;
      }
      function next() {
        state.idx += 1;
        if (!state.questions || state.idx >= state.questions.length) {
          finishGame();
          return;
        }
        renderQuestion();
      }
      function finishGame() {
        const perfectMax = state.mode === "sentence" ? 6 : (state.questions ? state.questions.length : 10);
        setBest(state.mode, state.score);
        const best = getBest()[state.mode] || 0;
        let emoji = "🏆", stars = "⭐⭐⭐", title = "최고예요!";
        const ratio = state.score / perfectMax;
        if (ratio >= 1) { emoji = "🏆"; stars = "⭐⭐⭐⭐⭐"; title = "완벽해요!"; }
        else if (ratio >= 0.8) { emoji = "🎉"; stars = "⭐⭐⭐⭐"; title = "아주 잘했어요!"; }
        else if (ratio >= 0.6) { emoji = "👍"; stars = "⭐⭐⭐"; title = "잘했어요!"; }
        else if (ratio >= 0.4) { emoji = "💪"; stars = "⭐⭐"; title = "조금 더 힘내요!"; }
        else { emoji = "🌱"; stars = "⭐"; title = "다시 도전해봐요!"; }

        $("finalEmoji").textContent = emoji;
        $("finalTitle").textContent = title;
        $("finalScoreText").textContent = state.score + " / " + perfectMax;
        $("finalStars").textContent = stars;
        $("bestScore").textContent = best;

        // 100점 완주 뱃지 기록 (필터 없는 전체 모드일 때만)
        let newlyEarned = false;
        if (ratio >= 1 && !state.modeFilter) {
          // vocab의 경우 전체 단어 10개 풀에서 10/10이어야 함. match는 16/16.
          newlyEarned = savePerfect(state.mode);
        }
        const finalSub = $("finalSub");
        if (newlyEarned) {
          finalSub.innerHTML =
            '<span style="display:inline-block;background:linear-gradient(135deg,#fde68a,#f59e0b);color:#7c2d12;padding:8px 14px;border-radius:12px;font-weight:900;box-shadow:0 4px 10px rgba(245,158,11,0.35)">🏅 100점 완주 뱃지 획득! ' +
            (getPerfects()[state.mode] || "") + '</span><br><br>' +
            '최고 기록: <span id="bestScore2">' + best + '</span>';
          // 뱃지 획득 축하 사운드
          setTimeout(() => playWin(), 250);
          setTimeout(() => playWin(), 650);
        } else {
          finalSub.innerHTML = '최고 기록: <span id="bestScore2">' + best + '</span>';
        }

        // Vocab: 세션 저장 + 복습 버튼 구성
        const reviewRow = $("finalReviewRow");
        reviewRow.innerHTML = "";
        if (state.mode === "vocab") {
          // Merge current session into persisted history.
          // - Words wrongs once stay wrong until the user gets them right
          // - A wrong in this session overrides a previous right
          const prev = getVocabSession();
          const prevRights = new Set(prev.rights || []);
          const prevWrongs = new Set(prev.wrongs || []);
          const nowWrongs = new Set(state.sessionWrongs);
          const nowRights = new Set(state.sessionRights);
          // For words answered now:
          nowWrongs.forEach((w) => { prevWrongs.add(w); prevRights.delete(w); });
          nowRights.forEach((w) => { prevRights.add(w); prevWrongs.delete(w); });
          saveVocabSession(Array.from(prevWrongs), Array.from(prevRights));

          const wrongCount = prevWrongs.size;
          const rightCount = prevRights.size;

          const btnWrong = document.createElement("button");
          btnWrong.className = "btn btn-primary";
          btnWrong.style.background = "linear-gradient(135deg, #ef4444, #dc2626)";
          btnWrong.textContent = "🔴 틀린 단어만 다시보기 (" + wrongCount + ")";
          if (wrongCount === 0) { btnWrong.disabled = true; btnWrong.style.opacity = "0.5"; btnWrong.style.cursor = "not-allowed"; }
          btnWrong.addEventListener("click", () => startMode("vocab", { filter: "wrong" }));
          reviewRow.appendChild(btnWrong);

          const btnRight = document.createElement("button");
          btnRight.className = "btn btn-primary";
          btnRight.style.background = "linear-gradient(135deg, #10b981, #059669)";
          btnRight.textContent = "🟢 맞은 단어 다시보기 (" + rightCount + ")";
          if (rightCount === 0) { btnRight.disabled = true; btnRight.style.opacity = "0.5"; btnRight.style.cursor = "not-allowed"; }
          btnRight.addEventListener("click", () => startMode("vocab", { filter: "right" }));
          reviewRow.appendChild(btnRight);
        }

        // Spell: 세션을 localStorage에 병합 저장 (이후 오버레이에서 ○/× 유지)
        if (state.mode === "spell") {
          const prev = getSpellSession();
          const prevRights = new Set(prev.rights || []);
          const prevWrongs = new Set(prev.wrongs || []);
          const nowWrongs = new Set(state.spellWrongs);
          const nowRights = new Set(state.spellRights);
          nowWrongs.forEach((w) => { prevWrongs.add(w); prevRights.delete(w); });
          nowRights.forEach((w) => { prevRights.add(w); prevWrongs.delete(w); });
          saveSpellSession(Array.from(prevWrongs), Array.from(prevRights));
        }

        // 승리 효과음
        if (ratio >= 0.6) playWin();
        else playWrong();

        menuView.classList.add("hidden");
        gameView.classList.add("hidden");
        finalView.classList.remove("hidden");
      }

      /* ------------------------- Render by mode --------------------- */
      function renderQuestion() {
        updateHud();
        gameBody.innerHTML = "";
        const m = state.mode;
        if (m === "vocab") return renderVocab();
        if (m === "spell") return renderSpell();
        if (m === "sent") return renderSent();
        if (m === "sentence") return renderSentence();
      }

      /* ---------- 오늘 외워야 할 단어 오버레이 ---------- */
      function closeStudyOverlay() {
        const ov = document.getElementById("studyOverlay");
        if (ov) ov.remove();
      }
      function openStudyListOverlay(kind, opts) {
        opts = opts || {};
        closeStudyOverlay();
        const excludeMode = !!opts.excludeMode && kind === "vocab";
        const st = computeStatus(kind);
        const rights = st.rights;
        const wrongs = st.wrongs;
        const activeUnit = getActiveUnit();
        const disabled = new Set(activeUnit.disabledWords || []);

        const ov = document.createElement("div");
        ov.className = "study-overlay";
        ov.id = "studyOverlay";
        ov.addEventListener("click", (e) => {
          if (e.target === ov) closeStudyOverlay();
        });

        const sheet = document.createElement("div");
        sheet.className = "sheet pop";

        const titleText = excludeMode
          ? "🚫 아는 단어 제외하기"
          : (kind === "spell" ? "📚 오늘 외워야 할 스펠링 단어" : "📚 오늘 외워야 할 단어");
        const totalCount = kind === "spell" ? SPELL.length : VOCAB.length;

        const closeRow = document.createElement("div");
        closeRow.className = "close-row";
        const h = document.createElement("div");
        const subText = excludeMode
          ? "단어를 탭하면 게임에서 제외 ⇄ 다시 포함 토글돼요. 제외된 단어는 회색으로 표시됩니다."
          : "총 " + totalCount + "개 · 뜻을 탭하면 가렸다 보였다 할 수 있어요";
        h.innerHTML = '<h3>' + titleText + '</h3><div class="sub">' + subText + '</div>';
        const rightControls = document.createElement("div");
        rightControls.style.display = "flex";
        rightControls.style.alignItems = "center";

        const btnHideAll = document.createElement("button");
        btnHideAll.className = "btn-hideall";
        btnHideAll.type = "button";
        btnHideAll.textContent = "👁 전체 가리기";
        rightControls.appendChild(btnHideAll);

        const closeBtn = document.createElement("button");
        closeBtn.className = "close-btn";
        closeBtn.textContent = "✕";
        closeBtn.addEventListener("click", closeStudyOverlay);
        rightControls.appendChild(closeBtn);

        closeRow.appendChild(h);
        closeRow.appendChild(rightControls);
        sheet.appendChild(closeRow);

        const list = document.createElement("div");
        list.className = "study-list";

        const items = kind === "spell"
          ? SPELL.map((w) => ({ word: w, meaning: SPELL_MEANINGS[w] || "" }))
          : VOCAB.map((v) => ({ word: v.word, meaning: v.meaning }));

        let rightCnt = 0, wrongCnt = 0, excludedCnt = 0;
        items.forEach((it) => {
          const row = document.createElement("div");
          const isR = rights.has(it.word);
          const isW = wrongs.has(it.word);
          const isExcluded = disabled.has(it.word);
          if (isR) rightCnt++;
          if (isW) wrongCnt++;
          if (isExcluded) excludedCnt++;
          row.className = "study-item" + (isR ? " is-right" : "") + (isW ? " is-wrong" : "") + (isExcluded ? " is-excluded" : "");

          const mk = document.createElement("span");
          mk.className = "mk";
          if (excludeMode) mk.textContent = isExcluded ? "🚫" : "✓";
          else mk.textContent = isR ? "○" : isW ? "×" : "·";

          const sw = document.createElement("span");
          sw.className = "sw";
          sw.textContent = it.word;

          const sm = document.createElement("span");
          sm.className = "sm";
          sm.textContent = it.meaning;
          if (excludeMode) {
            sm.title = "탭하면 단어를 제외/포함 토글";
            sm.style.cursor = "pointer";
          } else {
            sm.title = "클릭해서 가리기/보이기";
            sm.addEventListener("click", (e) => {
              e.stopPropagation();
              sm.classList.toggle("is-hidden");
            });
          }

          const say = document.createElement("button");
          say.type = "button";
          say.className = "say";
          say.title = "발음 듣기";
          say.textContent = "🔊";
          say.addEventListener("click", (e) => {
            e.stopPropagation();
            speak(it.word, { btn: e.currentTarget });
          });

          row.appendChild(mk);
          row.appendChild(sw);
          row.appendChild(sm);
          row.appendChild(say);

          if (excludeMode) {
            row.style.cursor = "pointer";
            row.addEventListener("click", () => {
              const isOn = row.classList.toggle("is-excluded");
              mk.textContent = isOn ? "🚫" : "✓";
              if (isOn) disabled.add(it.word);
              else disabled.delete(it.word);
              saveActiveUnitField("disabledWords", Array.from(disabled));
              const remain = (VOCAB.filter((v) => !disabled.has(v.word))).length;
              if (countText) countText.textContent = "🚫 제외 " + disabled.size + " · 학습 " + remain;
            });
          }

          list.appendChild(row);
        });

        // excludeMode일 때 행 클릭 시 카운터 업데이트용 참조 (summary 렌더 후 할당)
        let countText = null;
        sheet.appendChild(list);

        // 전체 가리기 / 전체 보이기 토글
        let allHidden = false;
        btnHideAll.addEventListener("click", () => {
          allHidden = !allHidden;
          const sms = list.querySelectorAll(".sm");
          sms.forEach((el) => {
            if (allHidden) el.classList.add("is-hidden");
            else el.classList.remove("is-hidden");
          });
          btnHideAll.classList.toggle("is-on", allHidden);
          btnHideAll.textContent = allHidden ? "👁 전체 보이기" : "👁 전체 가리기";
        });

        const summary = document.createElement("div");
        summary.className = "study-summary";
        if (excludeMode) {
          const remain = (VOCAB.filter((v) => !disabled.has(v.word))).length;

      /* ---------- Spelling scramble ---------- */
      function buildDistractorPool(word) {
        // 단어 길이에 따라 방해용 글자 갯수 결정 (짧으면 많이, 길면 조금 덜)
        const len = word.length;
        let extras;
        if (len <= 4) extras = 6;
        else if (len <= 6) extras = 6;
        else if (len <= 8) extras = 7;
        else extras = 8;

        // 후보 풀: 다른 스펠링 단어들의 글자 + 흔한 영어 글자
        const common = "abcdefghijklmnopqrstuvwxyz".split("");
        const fromOthers = [];
        SPELL.forEach((w) => {
          if (w !== word) w.split("").forEach((ch) => fromOthers.push(ch));
        });
        const pool = fromOthers.concat(common);

        const wordLetterCounts = {};
        word.split("").forEach((ch) => { wordLetterCounts[ch] = (wordLetterCounts[ch] || 0) + 1; });

        const picks = [];
        const maxTries = extras * 20;
        let tries = 0;
        while (picks.length < extras && tries < maxTries) {
          tries++;
          const candidate = pool[Math.floor(Math.random() * pool.length)];
          // 난이도: 단어 안에 없는 글자를 우선, 가끔 단어 안에 있는 글자도 섞음(함정)
          const inWord = !!wordLetterCounts[candidate];
          if (inWord && Math.random() < 0.7) continue;
          picks.push(candidate);
        }
        return picks;
      }

      /* ---------- 문장 만들기 (Sentence writing) ---------- */
      let _activeRecog = null;
      function stopActiveRecog() {
        if (_activeRecog) {
