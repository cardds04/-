          _activeRecog = null;
        }
      }

      function startSpeechInput(opts) {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
          alert("이 브라우저는 음성 입력을 지원하지 않아요 😢\n크롬(안드로이드) 또는 사파리/크롬 데스크톱에서 열어주세요.");
          return null;
        }
        const r = new SR();
        r.continuous = true;
        r.interimResults = true;
        r.lang = "en-US";
        r.onresult = (e) => {
          let finalDelta = "";
          let interim = "";
          for (let i = e.resultIndex; i < e.results.length; i++) {
            const t = e.results[i][0].transcript;
            if (e.results[i].isFinal) finalDelta += t;
            else interim += t;
          }
          if (typeof opts.onDelta === "function") opts.onDelta(finalDelta, interim);
        };
        r.onerror = (e) => {
          console.warn("recog error", e && e.error);
          if (typeof opts.onEnd === "function") opts.onEnd(e && e.error);
        };
        r.onend = () => {
          if (typeof opts.onEnd === "function") opts.onEnd(null);
        };
        try { r.start(); } catch (e) { console.warn(e); return null; }
        return r;
      }

      function splitSentences(text) {
        return String(text || "")
          .split(/(?<=[.!?])\s+|\n+/)
          .map((s) => s.trim())
          .filter((s) => s.length > 1);
      }

      function evaluateParagraph(text, promptId) {
        const out = { items: [], passCount: 0 };
        const clean = String(text || "");
        const trimmed = clean.trim();
        const lower = trimmed.toLowerCase();
        const sentences = splitSentences(trimmed);
        const words = lower.match(/[a-z']+/g) || [];
        const sentCount = sentences.length;

        // 1) 들여쓰기
        const firstLine = String(clean.split("\n")[0] || "");
        const hasIndent = /^(?:[ ]{2,}|\t)/.test(firstLine);
        out.items.push({
          key: "indent",
          ok: hasIndent,
          label: "문단 들여쓰기 (Paragraph indenting)",
          hint: hasIndent
            ? "첫 줄 들여쓰기를 잘했어요."
            : "문단 첫 줄을 공백 두 칸(또는 Tab)으로 시작해야 해요. 예: \"␣␣Earthquakes are very scary...\"",
        });

        // 2) Topic sentence (첫 문장이 자연재해를 소개하며 충분한 길이)
        const firstSent = sentences[0] || "";
        const disasterMentioned = DISASTER_KEYWORDS.some((w) => lower.includes(w));
        const firstSentLower = firstSent.toLowerCase();
        const firstHasDisaster = DISASTER_KEYWORDS.some((w) => firstSentLower.includes(w));
        const topicOk = firstSent.length >= 18 && firstHasDisaster;
        out.items.push({
          key: "topic",
          ok: topicOk,
          label: "Topic sentence (주제 문장)",
          hint: topicOk
            ? "첫 문장이 주제를 잘 소개했어요."
            : "첫 문장에서 주제(자연재해)를 분명히 소개해 보세요. 예: \"Earthquakes are one of the most powerful natural disasters on Earth.\"",
        });

        // 3) Answer the prompt (자연재해 관련 키워드 포함)
        out.items.push({
          key: "prompt",
          ok: disasterMentioned,
          label: "Answer the prompt (주제에 맞는 답)",
          hint: disasterMentioned
            ? "자연재해 이야기를 잘 썼어요."
            : "자연재해(earthquake, tornado, hurricane, flood, volcano 등)를 꼭 언급해야 해요.",
        });

        // 4) Compound sentence (쉼표 + and/but/or/so/yet)
        const compoundRe = /,\s*(and|but|or|so|yet)\s+\w+/i;
        const compoundOk = compoundRe.test(trimmed);
        const badRunOn = !compoundOk && / (and|but|or|so) /i.test(trimmed);
        out.items.push({
          key: "compound",
          ok: compoundOk,
          label: "Compound sentence 사용",
          hint: compoundOk
            ? "compound sentence를 잘 사용했어요."
            : (badRunOn
                ? "접속사 앞에 쉼표(,)를 넣어 compound sentence로 만들어 보세요. 예: \"Floods can destroy homes, and they can hurt animals.\""
                : "쉼표와 and/but/or/so를 써서 두 독립절을 연결한 compound sentence 한 문장을 꼭 넣어 주세요."),
        });

        // 5) 8 or more lines (문장 8개 이상)
        const linesOk = sentCount >= 8;
        out.items.push({
          key: "length",
          ok: linesOk,
          label: "8문장 이상 쓰기 (Have 8 or more lines)",
          hint: linesOk
            ? "문장 수: " + sentCount + "개 — 충분해요!"
            : "지금 " + sentCount + "개. 조금 더 써서 8문장 이상을 채워 보세요.",
        });

        // 6) Neat writing — 간단한 스펠링/대소문자/구두점 체크
        const issues = [];
        // 6-1) 문장 첫 글자 대문자
        const badCaps = sentences.filter((s) => /^[a-z]/.test(s));
        if (badCaps.length) issues.push("문장을 대문자로 시작하지 않은 곳이 있어요: \"" + badCaps[0].slice(0, 28) + "…\"");
        // 6-2) 문장 끝에 마침표/물음표/느낌표
        const missingPunct = clean.trim().length > 0 && !/[.!?]\s*$/.test(clean.trim());
        if (missingPunct) issues.push("마지막 문장 끝에 마침표(.)를 찍어 주세요.");
        // 6-3) 두 칸 이상 띄어쓰기(공백)나 이상한 문자
        if (/\s{3,}/.test(trimmed)) issues.push("공백이 너무 많은 곳이 있어요.");
        // 6-4) 반복 글자 (heeeelp 같은 것)
        const longRep = words.find((w) => /(.)\1{3,}/.test(w));
        if (longRep) issues.push("같은 글자를 여러 번 반복한 단어가 있어요: \"" + longRep + "\" → 스펠링 확인!");
        // 6-5) 흔히 틀리는 스펠링 감지
        const commonMisspell = {
          "earthquke": "earthquake", "earthqake": "earthquake",
          "hurrican": "hurricane", "hurrikane": "hurricane",
          "tornaddo": "tornado", "tornato": "tornado",
          "volcanoe": "volcano", "volcanos": "volcanoes",
          "tsunamy": "tsunami", "sunami": "tsunami",
          "flod": "flood", "floud": "flood",
          "wildfier": "wildfire", "wildefire": "wildfire",
          "desaster": "disaster", "disastor": "disaster", "dissaster": "disaster",
          "thier": "their", "recieve": "receive", "beacuse": "because", "becuase": "because",
          "alot": "a lot", "definately": "definitely", "seperate": "separate",
        };
        const misspellFound = [];
        words.forEach((w) => {
          if (commonMisspell[w] && misspellFound.length < 3) {
            misspellFound.push({ bad: w, good: commonMisspell[w] });
          }
        });
        if (misspellFound.length) {
          issues.push(
            "스펠링을 확인해 보세요: " +
              misspellFound.map((m) => '"' + m.bad + '" → "' + m.good + '"').join(", ")
          );
        }
        const neatOk = issues.length === 0;
        out.items.push({
          key: "neat",
          ok: neatOk,
          label: "Neat writing (깔끔한 글쓰기)",
          hint: neatOk
            ? "스펠링·대소문자·구두점이 깔끔해요."
            : issues.join(" · "),
        });

        out.passCount = out.items.filter((x) => x.ok).length;
        return out;
      }

      // 단어/구두점 단위 diff → 변경된 토큰에 밑줄
      function diffToHtml(originalText, correctedText) {
        function esc(s) {
          return String(s || "").replace(/[&<>"']/g, function (c) {
            return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
          });
        }
        function tokenize(s) {
          // 단어(알파벳/숫자/어포스트로피), 공백, 기타 기호 단위로 분리
          return String(s || "").match(/[A-Za-z0-9']+|\s+|[^\sA-Za-z0-9']+/g) || [];
        }
        const a = tokenize(originalText);
        const b = tokenize(correctedText);
        const n = a.length, m = b.length;
        // LCS DP (뒤에서 앞으로)
        const dp = [];
        for (let i = 0; i <= n; i++) dp.push(new Array(m + 1).fill(0));
        for (let i = n - 1; i >= 0; i--) {
          for (let j = m - 1; j >= 0; j--) {
            if (a[i] === b[j]) dp[i][j] = dp[i + 1][j + 1] + 1;
            else dp[i][j] = Math.max(dp[i + 1][j], dp[i][j + 1]);
          }
        }
        let i = 0, j = 0;
        let html = "";
        while (j < m) {
          if (i < n && a[i] === b[j]) {
            html += esc(b[j]).replace(/\n/g, "<br>");
            i++; j++;
          } else if (i < n && dp[i + 1][j] >= dp[i][j + 1]) {
            i++;
          } else {
            const tok = b[j];
            // 공백만 있는 토큰은 밑줄 대신 그대로
            if (/^\s+$/.test(tok)) {
              html += esc(tok).replace(/\n/g, "<br>");
            } else {
              html += '<u class="diff-add">' + esc(tok) + "</u>";
            }
            j++;
          }
        }
        return html;
      }

            _activeRecog = r;
            btnMic.classList.add("is-on");
            btnMic.textContent = "⏹ 듣는 중… (탭해서 멈추기)";
            writeArea.classList.add("is-listening");
          }
        });

        $("btnClearText").addEventListener("click", () => {
          if (writeArea.value.trim()) {
            const yes = confirm("지금까지 쓴 내용을 새 글로 비울까요?\n걱정 마요 — 위쪽 '저장된 글쓰기'에 자동으로 저장돼 있어요. (저장 안 됐다면 취소를 누르고 💾 임시저장 먼저!)");
            if (!yes) return;
          }
          writeArea.value = "  ";
          drawRubricLive();
          writeArea.focus();
          const wrap = $("feedbackWrap");
          if (wrap) wrap.innerHTML = "";
        });

        $("btnSaveDraft").addEventListener("click", () => {
          const text = writeArea.value;
          if (!text.trim()) {
            alert("저장할 내용이 없어요.");
            return;
          }
          const draftId = "w_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6);
          pushSavedWriting({
            id: draftId,
            ts: Date.now(),
            promptId: activePrompt,
            text: text,
            kind: "draft",
          });
          renderSavedBox(draftId);
          const btn = $("btnSaveDraft");
          const orig = btn.textContent;
          btn.textContent = "✓ 저장됨";
          setTimeout(() => { btn.textContent = orig; }, 1200);
        });

        function escapeHtml(s) {
          return String(s || "").replace(/[&<>"']/g, function (c) {
            return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
          });
        }

        async function copyTextToClipboard(txt) {
          try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
              await navigator.clipboard.writeText(txt);
              return true;
            }
            const ta = document.createElement("textarea");
            ta.value = txt;
            ta.style.position = "fixed";
            ta.style.opacity = "0";
            document.body.appendChild(ta);
            ta.select();
            const ok = document.execCommand("copy");
            document.body.removeChild(ta);
            return ok;
          } catch (e) { return false; }
        }

        async function showCorrectionView(origText, promptObj, apiKey, ctx) {
          const wrapEl = $("feedbackWrap");
          if (!wrapEl) return;
          wrapEl.innerHTML =
            '<div class="feedback-panel pop"><div class="feedback-loading">' +
            '<div class="spin"></div>' +
            '<div>🪄 Gemini가 최소 수정안을 준비하고 있어요…</div>' +
            "</div></div>";
          wrapEl.scrollIntoView({ behavior: "smooth", block: "start" });
          let res;
          try {
            res = await aiCorrectParagraph(origText, promptObj, apiKey);
          } catch (err) {
            wrapEl.innerHTML = "";
            const errBox = document.createElement("div");
            errBox.className = "feedback-panel pop";
            errBox.innerHTML =
              '<div style="color:#991b1b;font-weight:800;margin-bottom:8px">⚠️ 고치기에 실패했어요.</div>' +
              '<div style="color:#64748b;font-weight:600;font-size:0.9rem">' + escapeHtml(err && err.message ? err.message : "오류") + '</div>';
            const back = document.createElement("button");
            back.className = "btn btn-ghost";
            back.textContent = "← 이전 화면";
            back.style.marginTop = "10px";
            back.addEventListener("click", () => {
              if (ctx && ctx.feedbackOpts) renderFeedbackPanel(ctx.feedbackOpts);
            });
            errBox.appendChild(back);
            wrapEl.appendChild(errBox);
            return;
          }
          const corrected = (res && typeof res.corrected === "string") ? res.corrected : "";
          const note = (res && typeof res.note === "string") ? res.note : "";
          const panel = document.createElement("div");
          panel.className = "feedback-panel pop is-pass";

          const src = document.createElement("span");
          src.className = "feedback-source";
          src.textContent = "🪄 Gemini 최소 수정";
          panel.appendChild(src);

          const h = document.createElement("h3");
          h.textContent = "✍️ 고친 글 (밑줄 = 바뀐 부분)";
          panel.appendChild(h);

          if (note) {
            const ov = document.createElement("div");
            ov.className = "feedback-overall";
            ov.textContent = "💡 " + note;
            panel.appendChild(ov);
          }

          const diffBox = document.createElement("div");
          diffBox.className = "diff-view";
          diffBox.innerHTML = diffToHtml(origText, corrected);
          panel.appendChild(diffBox);

          const origBox = document.createElement("details");
          origBox.className = "diff-original";
          origBox.innerHTML =
            '<summary>📝 내 원래 글 보기</summary>' +
            '<pre class="diff-orig-text">' + escapeHtml(origText) + '</pre>';
          panel.appendChild(origBox);

          const btnsRow = document.createElement("div");
          btnsRow.className = "btn-row";
          btnsRow.style.marginTop = "14px";

          const btnBack = document.createElement("button");
          btnBack.className = "btn btn-ghost";
          btnBack.textContent = "← 첨삭으로 돌아가기";
          btnBack.addEventListener("click", () => {
            if (ctx && ctx.feedbackOpts) renderFeedbackPanel(ctx.feedbackOpts);
            else wrapEl.innerHTML = "";
          });

          const btnCopy = document.createElement("button");
          btnCopy.className = "btn btn-ghost";
          btnCopy.textContent = "📋 고친 글 복사";
          btnCopy.addEventListener("click", async () => {
            const ok = await copyTextToClipboard(corrected);
            if (ok) {
              const o = btnCopy.textContent;
              btnCopy.textContent = "✓ 복사됨";
              setTimeout(() => { btnCopy.textContent = o; }, 1200);
            } else {
              alert("복사에 실패했어요.");
            }
          });

          const btnApply = document.createElement("button");
          btnApply.className = "btn btn-primary";
          btnApply.textContent = "📝 이 글로 바꾸기";
          btnApply.addEventListener("click", () => {
            if (!confirm("지금 쓰고 있는 글을 고친 글로 바꿀까요?")) return;
            writeArea.value = corrected;
            try { drawRubricLive(); } catch (e) {}
            wrapEl.innerHTML = "";
            writeArea.focus();
            writeArea.scrollIntoView({ behavior: "smooth", block: "start" });
          });

          btnsRow.appendChild(btnBack);
          btnsRow.appendChild(btnCopy);
          btnsRow.appendChild(btnApply);
          panel.appendChild(btnsRow);

          wrapEl.innerHTML = "";
          wrapEl.appendChild(panel);
          panel.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function renderFeedbackPanel(opts) {
          // opts: { items:[{key,ok,reason}], fixes:[{original,suggested,why}], overall, total, source }
          const items = Array.isArray(opts.items) ? opts.items : [];
          const fixes = Array.isArray(opts.fixes) ? opts.fixes : [];
          const total = opts.total || items.length || 6;
          const passCount = items.filter((it) => it.ok).length;
          const pass = passCount === total && total > 0;
          const wrap = $("feedbackWrap");
          const panel = document.createElement("div");
          panel.className = "feedback-panel pop " + (pass ? "is-pass" : "is-fail");

          const src = document.createElement("span");
          src.className = "feedback-source" + (opts.source === "ai" ? "" : " is-local");
          src.textContent = opts.source === "ai" ? "🤖 Gemini 첨삭" : "📏 규칙 기반 첨삭";
          panel.appendChild(src);

          const head = document.createElement("h3");
          head.textContent = pass
            ? "🏆 완벽해요! 모든 조건을 만족했어요 (" + passCount + "/" + total + ")"
            : (passCount >= Math.ceil(total * 0.66)
                ? "👍 잘했어요. 조금만 더 다듬어 볼까요? (" + passCount + "/" + total + ")"
                : "🌱 조언을 참고해 다시 써 볼까요? (" + passCount + "/" + total + ")");
          panel.appendChild(head);

          items.forEach((it) => {
            const row = document.createElement("div");
            row.className = "feedback-row " + (it.ok ? "ok" : "no");
            const label = RUBRIC_LABELS[it.key] || it.label || it.key || "항목";
            const hint = it.reason || it.hint || "";
            row.innerHTML =
              '<span class="fr-mk">' + (it.ok ? "✅" : "⚠️") + "</span>" +
              '<div class="fr-body">' +
              '<div class="fr-label">' + escapeHtml(label) + "</div>" +
              '<div class="fr-hint">' + escapeHtml(hint) + "</div>" +
              "</div>";
            panel.appendChild(row);
          });

          if (fixes.length) {
            const fixWrap = document.createElement("div");
            fixWrap.className = "feedback-fixes";
            const h4 = document.createElement("h4");
            h4.textContent = "✍️ 고치면 좋은 부분 (최소 수정)";
            fixWrap.appendChild(h4);
            const list = document.createElement("div");
            list.className = "fix-list";
            fixes.forEach((f) => {
              if (!f || (!f.original && !f.suggested)) return;
              const item = document.createElement("div");
              item.className = "fix-item";
              const line = document.createElement("div");
              line.className = "fix-row";
              line.innerHTML =
                '<span class="fix-orig">' + escapeHtml(f.original || "") + "</span>" +
                '<span class="fix-arrow">→</span>' +
                '<span class="fix-sug">' + escapeHtml(f.suggested || "") + "</span>";
              item.appendChild(line);
              if (f.why) {
                const why = document.createElement("div");
                why.className = "fix-why";
                why.textContent = "💡 " + f.why;
                item.appendChild(why);
              }
              list.appendChild(item);
            });
            fixWrap.appendChild(list);
            panel.appendChild(fixWrap);
          }

          if (opts.overall) {
            const ov = document.createElement("div");
            ov.className = "feedback-overall";
            ov.textContent = "🌟 " + opts.overall;
            panel.appendChild(ov);
          }

          const btnsRow = document.createElement("div");
          btnsRow.className = "btn-row";
          btnsRow.style.marginTop = "14px";
          const btnEnd = document.createElement("button");
          btnEnd.className = "btn btn-primary";
          btnEnd.textContent = "📊 최종 결과 보기";
          btnEnd.addEventListener("click", () => {
            state.score = passCount;
            state.streak = passCount;
            updateHud();
            finishGame();
          });
          const btnRetry = document.createElement("button");
          btnRetry.className = "btn btn-ghost";
          btnRetry.textContent = "✏️ 더 고쳐 쓰기";
          btnRetry.addEventListener("click", () => {
            wrap.innerHTML = "";
            writeArea.focus();
          });

          const btnFix = document.createElement("button");
          btnFix.className = "btn btn-fix";
          btnFix.textContent = "🪄 고쳐줘요";
          btnFix.addEventListener("click", async () => {
            const origText = (opts && typeof opts.sourceText === "string") ? opts.sourceText : writeArea.value;
            const apiKey = (localStorage.getItem(GEMINI_KEY_KEY) || "").trim();
            if (!apiKey) {
              alert("메인 화면에서 Gemini API 키를 먼저 저장해 주세요.");
              return;
            }
            if (!origText.trim()) {
              alert("고칠 글이 없어요.");
              return;
            }
            showCorrectionView(origText, opts && opts.promptObj ? opts.promptObj : null, apiKey, { feedbackOpts: opts });
          });

          btnsRow.appendChild(btnRetry);
          btnsRow.appendChild(btnFix);
          btnsRow.appendChild(btnEnd);
          panel.appendChild(btnsRow);

          wrap.innerHTML = "";
          wrap.appendChild(panel);
          if (pass) playWin();
          else if (passCount >= Math.ceil(total * 0.66)) playCorrect();
          else playWrong();
          panel.scrollIntoView({ behavior: "smooth", block: "start" });
          return { passCount: passCount, total: total };
        }

        $("btnSubmitPara").addEventListener("click", async () => {
          stopActiveRecog();
          const text = writeArea.value;
          if (!text.trim()) {
            alert("글을 먼저 써 주세요.");
            return;
          }
          const apiKey = (localStorage.getItem(GEMINI_KEY_KEY) || "").trim();
          const promptObj = (WRITE_PROMPTS || []).find(function (p) { return p.id === activePrompt; }) || (WRITE_PROMPTS || [])[0] || { id: activePrompt, text: "" };
          const wrap = $("feedbackWrap");

          // 로컬 규칙 기반 평가 (저장/폴백용)
          const ev = evaluateParagraph(text, activePrompt);

          if (apiKey) {
            wrap.innerHTML =
              '<div class="feedback-panel pop"><div class="feedback-loading">' +
              '<div class="spin"></div>' +
              '<div>🤖 Gemini가 글을 살펴보고 있어요… 잠시만요.</div>' +
              "</div></div>";
            wrap.scrollIntoView({ behavior: "smooth", block: "start" });
            try {
              const ai = await aiReviewParagraph(text, promptObj, apiKey);
              if (!ai || !Array.isArray(ai.items) || ai.items.length === 0) throw new Error("응답 형식 오류");
              // 6개 항목이 모두 있는지 확인, 없으면 로컬로 채움
              const aiByKey = {};
              ai.items.forEach(function (it) { if (it && it.key) aiByKey[it.key] = it; });
              const localByKey = {};
              ev.items.forEach(function (it) { localByKey[it.key] = it; });
              const mergedItems = ["indent", "topic", "prompt", "compound", "length", "neat"].map(function (k) {
                const a = aiByKey[k];
                const l = localByKey[k];
                if (a && typeof a.ok === "boolean") {
                  return { key: k, ok: !!a.ok, reason: a.reason || (l ? l.hint : "") };
                }
                return { key: k, ok: l ? !!l.ok : false, reason: l ? l.hint : "" };
              });
              const result = renderFeedbackPanel({
                items: mergedItems,
                fixes: Array.isArray(ai.fixes) ? ai.fixes : [],
                overall: ai.overall || "",
                total: 6,
                source: "ai",
                sourceText: text,
                promptObj: promptObj,
              });
              const submitId1 = "w_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6);
              pushSavedWriting({
                id: submitId1,
                ts: Date.now(),
                promptId: activePrompt,
                text: text,
                passCount: result.passCount,
                total: result.total,
                kind: "submit",
              });
              renderSavedBox(submitId1);
              return;
            } catch (err) {
              console.warn("Gemini 첨삭 실패:", err);
              const errBox = document.createElement("div");
              errBox.style.cssText = "margin-bottom:10px; padding:10px 12px; background:#fef2f2; border:2px dashed #fecaca; border-radius:12px; color:#991b1b; font-weight:700; font-size:0.9rem;";
              errBox.textContent = "⚠️ Gemini 첨삭을 불러오지 못해 규칙 기반 첨삭으로 보여줄게요. (" + (err && err.message ? err.message : "오류") + ")";
              wrap.innerHTML = "";
              wrap.appendChild(errBox);
              // fall through to local
            }
          }

          // 로컬 폴백 (API 키 없음 또는 실패)
          const localItems = ev.items.map(function (it) {
            return { key: it.key, ok: !!it.ok, reason: it.hint };
          });
          const result = renderFeedbackPanel({
            items: localItems,
            fixes: [],
            overall: !apiKey ? "AI 첨삭을 보려면 메인 화면에서 Gemini 키를 저장해 주세요." : "",
            total: ev.items.length,
            source: "local",
            sourceText: text,
            promptObj: promptObj,
          });
          const submitId2 = "w_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6);
          pushSavedWriting({
            id: submitId2,
            ts: Date.now(),
            promptId: activePrompt,
            text: text,
            passCount: result.passCount,
            total: result.total,
            kind: "submit",
          });
          renderSavedBox(submitId2);
        });
      }

      /* --------------------------- Events --------------------------- */
      document.querySelectorAll(".menu-card").forEach((btn) => {
        btn.addEventListener("click", () => {
          if (btn.classList.contains("is-disabled")) {
            const u = getActiveUnit();
            const modeName = { vocab: "단어 뜻 맞히기", spell: "스펠링 퍼즐", sent: "문장 종류 맞히기", sentence: "문장 만들기" }[btn.dataset.mode] || btn.dataset.mode;
            alert("'" + u.title + "' 단원에는 " + modeName + " 자료가 없어요. \n다른 단원을 선택하거나 사진을 업로드해 주세요.");
            return;
          }
          startMode(btn.dataset.mode);
        });
      });
      $("btnBack").addEventListener("click", () => {
        try { if (typeof stopActiveRecog === "function") stopActiveRecog(); } catch (e) {}
        try { closeStudyOverlay(); } catch (e) {}
        try { const ov = document.querySelector(".help-overlay"); if (ov) ov.remove(); } catch (e) {}
        showMenu();
      });
      $("btnPlayAgain").addEventListener("click", () => startMode(state.mode, { filter: state.modeFilter }));
      $("btnGoMenu").addEventListener("click", showMenu);

      showMenu();
    </script>
  </body>
</html>
