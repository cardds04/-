<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📚 Study Guide Game · 단원 학습 게임</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nanum+Gothic:wght@700;800&family=Luckiest+Guy&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Fredoka", "Nanum Gothic", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #fde68a 0%, #fbcfe8 50%, #c7d2fe 100%);
        color: #1e293b;
        -webkit-tap-highlight-color: transparent;
      }
      .app {
        max-width: 760px;
        margin: 0 auto;
        padding: 18px 16px 120px;
      }
      .page-title {
        text-align: center;
        font-family: "Luckiest Guy", "Fredoka", sans-serif;
        font-size: clamp(1.8rem, 6vw, 2.6rem);
        color: #1e293b;
        letter-spacing: 1px;
        margin: 6px 0 2px;
        text-shadow: 2px 2px 0 #fff, 4px 4px 0 rgba(0, 0, 0, 0.08);
      }
      .page-sub {
        text-align: center;
        color: #475569;
        font-weight: 700;
        margin: 0 0 18px;
        font-size: 0.95rem;
      }
      .hud {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        background: #fff;
        border-radius: 18px;
        padding: 10px 14px;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.1);
        margin-bottom: 14px;
      }
      .hud .hud-left {
        display: flex;
        gap: 10px;
        align-items: center;
        font-weight: 800;
        color: #334155;
      }
      .hud .hud-back {
        background: #e2e8f0;
        color: #334155;
        border: none;
        padding: 8px 14px;
        border-radius: 12px;
        font-weight: 800;
        cursor: pointer;
        font-family: inherit;
      }
      .hud .hud-back:hover {
        background: #cbd5e1;
      }
      .hud .score {
        background: linear-gradient(135deg, #fde047, #fb923c);
        padding: 6px 12px;
        border-radius: 999px;
        color: #7c2d12;
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      .hud .streak {
        background: linear-gradient(135deg, #fca5a5, #ef4444);
        padding: 6px 12px;
        border-radius: 999px;
        color: #fff;
        font-weight: 800;
      }
      .hud .progress {
        background: #e2e8f0;
        padding: 6px 12px;
        border-radius: 999px;
        color: #334155;
        font-weight: 800;
      }

      .menu {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }
      .menu-card {
        background: #fff;
        border-radius: 24px;
        padding: 22px 18px;
        border: 3px solid transparent;
        cursor: pointer;
        text-align: left;
        font-family: inherit;
        transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      }
      .menu-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.18);
      }
      .menu-card:active {
        transform: translateY(-1px);
      }
      .menu-card .ico {
        font-size: 2.4rem;
        line-height: 1;
        margin-bottom: 8px;
      }
      .menu-card h3 {
        margin: 4px 0 4px;
        font-size: 1.2rem;
        color: #1e293b;
      }
      .menu-card p {
        margin: 0;
        color: #64748b;
        font-size: 0.88rem;
        font-weight: 600;
      }
      .menu-card.m-vocab {
        border-color: #6366f1;
      }
      .menu-card.m-spell {
        border-color: #10b981;
      }
      .menu-card.m-sent {
        border-color: #f59e0b;
      }
      .menu-card.m-match {
        border-color: #ec4899;
      }

      .question-card {
        background: #fff;
        border-radius: 24px;
        padding: 26px 22px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.1);
        margin-bottom: 14px;
      }
      .question-card .prompt-small {
        font-size: 0.82rem;
        font-weight: 800;
        color: #6366f1;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .question-card .prompt-big {
        font-size: clamp(1.6rem, 6vw, 2.4rem);
        font-weight: 800;
        color: #0f172a;
        text-align: center;
        padding: 14px 10px;
        font-family: "Fredoka", sans-serif;
        letter-spacing: -0.01em;
        word-break: break-word;
      }
      .question-card .sentence-box {
        font-size: clamp(1.05rem, 3.6vw, 1.25rem);
        line-height: 1.5;
        background: #f8fafc;
        border-radius: 16px;
        padding: 16px 18px;
        color: #1e293b;
        font-weight: 600;
        border: 2px dashed #cbd5e1;
      }

      .choices {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
      }
      .choice-btn {
        background: #fff;
        border: 3px solid #e2e8f0;
        border-radius: 16px;
        padding: 14px 16px;
        text-align: left;
        font-family: inherit;
        font-weight: 700;
        font-size: 1rem;
        color: #1e293b;
        cursor: pointer;
        transition: transform 0.1s, background 0.15s, border-color 0.15s;
      }
      .choice-btn:hover:not(:disabled) {
        background: #eef2ff;
        border-color: #6366f1;
        transform: translateY(-2px);
      }
      .choice-btn:disabled {
        cursor: not-allowed;
      }
      .choice-btn.correct {
        background: #dcfce7;
        border-color: #10b981;
        color: #065f46;
      }
      .choice-btn.wrong {
        background: #fee2e2;
        border-color: #ef4444;
        color: #991b1b;
      }

      .scramble {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        padding: 14px 4px;
      }
      .letter-tile {
        background: linear-gradient(145deg, #fff, #f1f5f9);
        border: 3px solid #94a3b8;
        color: #1e293b;
        font-family: "Luckiest Guy", "Fredoka", sans-serif;
        font-size: 1.8rem;
        font-weight: 700;
        padding: 8px 14px;
        min-width: 48px;
        min-height: 54px;
        border-radius: 14px;
        cursor: pointer;
        text-align: center;
        line-height: 1.2;
        box-shadow: 0 4px 0 #64748b, 0 6px 10px rgba(15, 23, 42, 0.12);
        transition: transform 0.08s, box-shadow 0.08s;
        text-transform: lowercase;
        user-select: none;
      }
      .letter-tile:hover {
        transform: translateY(-2px);
      }
      .letter-tile:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 #64748b, 0 3px 6px rgba(15, 23, 42, 0.1);
      }
      .letter-tile.used {
        opacity: 0.2;
        pointer-events: none;
      }
      .scramble-target {
        min-height: 70px;
        background: #fff7ed;
        border: 3px dashed #fb923c;
        border-radius: 16px;
        padding: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        align-items: center;
      }
      .scramble-target .letter-tile {
        border-color: #f59e0b;
        box-shadow: 0 3px 0 #b45309;
      }
      .scramble-hint {
        text-align: center;
        color: #64748b;
        font-weight: 700;
        margin: 8px 0;
        font-size: 0.9rem;
      }

      .btn-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      .btn {
        font-family: inherit;
        font-weight: 800;
        font-size: 1rem;
        padding: 12px 22px;
        border-radius: 14px;
        border: none;
        cursor: pointer;
        transition: transform 0.1s, background 0.15s;
      }
      .btn-primary {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        box-shadow: 0 6px 14px rgba(99, 102, 241, 0.4);
      }
      .btn-primary:hover {
        transform: translateY(-2px);
      }
      .btn-ghost {
        background: #f1f5f9;
        color: #334155;
      }
      .btn-ghost:hover {
        background: #e2e8f0;
      }
      .btn-say {
        background: linear-gradient(135deg, #10b981, #059669);
        color: #fff;
      }
      .btn-hint {
        background: #fef3c7;
        color: #78350f;
      }

      .feedback {
        text-align: center;
        font-size: 1.1rem;
        font-weight: 800;
        margin: 10px 0;
        min-height: 1.6em;
      }
      .feedback.ok {
        color: #059669;
      }
      .feedback.no {
        color: #dc2626;
      }

      .match-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      @media (max-width: 480px) {
        .match-grid {
          grid-template-columns: repeat(3, 1fr);
          gap: 6px;
        }
      }
      .match-card {
        aspect-ratio: 3 / 4;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        border-radius: 14px;
        border: 3px solid transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6px;
        cursor: pointer;
        font-weight: 800;
        text-align: center;
        font-size: clamp(0.72rem, 2.6vw, 0.95rem);
        line-height: 1.2;
        font-family: inherit;
        transition: transform 0.15s, background 0.15s;
        word-break: keep-all;
      }
      .match-card.flip {
        background: #fff;
        color: #1e293b;
        border-color: #6366f1;
        transform: rotateY(0);
      }
      .match-card.done {
        background: #dcfce7;
        color: #065f46;
        border-color: #10b981;
        cursor: default;
      }
      .match-card:not(.flip):not(.done)::before {
        content: "?";
        font-size: 2rem;
      }
      .match-card:not(.flip):not(.done) .inner {
        display: none;
      }

      .final-card {
        background: linear-gradient(135deg, #fef3c7 0%, #fbcfe8 100%);
        border-radius: 28px;
        padding: 34px 22px;
        text-align: center;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.15);
      }
      .final-card .trophy {
        font-size: 4.5rem;
        line-height: 1;
      }
      .final-card h2 {
        font-family: "Luckiest Guy", sans-serif;
        font-size: 2.2rem;
        color: #7c2d12;
        margin: 10px 0 6px;
        text-shadow: 2px 2px 0 #fff;
      }
      .final-card .big-score {
        font-size: 3.4rem;
        font-weight: 900;
        color: #7c2d12;
        margin: 6px 0;
        font-family: "Luckiest Guy", sans-serif;
      }
      .final-card .stars {
        font-size: 2rem;
        letter-spacing: 8px;
        margin: 6px 0 14px;
      }

      @keyframes pop {
        0% { transform: scale(0.8); opacity: 0; }
        60% { transform: scale(1.08); opacity: 1; }
        100% { transform: scale(1); }
      }
      .pop {
        animation: pop 0.28s ease-out;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        75% { transform: translateX(6px); }
      }
      .shake {
        animation: shake 0.24s ease-in-out;
      }

      .hidden {
        display: none !important;
      }

      /* ---- 100점 뱃지 ---- */
      .badges-wrap {
        margin: 0 0 16px;
      }
      .all-master {
        background: linear-gradient(135deg, #fde68a 0%, #f59e0b 50%, #ef4444 100%);
        border-radius: 22px;
        padding: 18px 20px;
        text-align: center;
        color: #7c2d12;
        box-shadow: 0 10px 26px rgba(239, 68, 68, 0.25);
        border: 3px solid #fff;
        margin-bottom: 14px;
        position: relative;
        overflow: hidden;
      }
      .all-master::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.45), transparent 40%),
          radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.35), transparent 40%);
        pointer-events: none;
      }
      .all-master .am-emoji {
        font-size: 2.6rem;
        line-height: 1;
      }
      .all-master h3 {
        font-family: "Luckiest Guy", "Fredoka", sans-serif;
        font-size: 1.6rem;
        margin: 6px 0 4px;
        letter-spacing: 1px;
        color: #7c2d12;
        text-shadow: 2px 2px 0 #fff;
      }
      .all-master p {
        margin: 0;
        font-weight: 800;
        font-size: 0.92rem;
      }
      .badge-strip {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
      }
      .badge-chip {
        background: #fff;
        border-radius: 16px;
        padding: 10px 12px;
        border: 2px solid #e2e8f0;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.06);
      }
      .badge-chip.is-done {
        border-color: #fbbf24;
        background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      }
      .badge-chip.is-pending {
        opacity: 0.55;
        filter: grayscale(0.3);
      }
      .badge-chip .bc-ico {
        font-size: 1.6rem;
        line-height: 1;
        flex: 0 0 auto;
      }
      .badge-chip .bc-body {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .badge-chip .bc-name {
        font-weight: 800;
        font-size: 0.88rem;
        color: #334155;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .badge-chip.is-done .bc-name {
        color: #7c2d12;
      }
      .badge-chip .bc-date {
        font-size: 0.76rem;
        color: #64748b;
        font-weight: 700;
      }
      .badge-chip.is-done .bc-date {
        color: #b45309;
      }
      .menu-card {
        position: relative;
      }
      .menu-card .card-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        background: linear-gradient(135deg, #fbbf24, #f59e0b);
        color: #7c2d12;
        font-size: 0.72rem;
        font-weight: 900;
        padding: 4px 10px;
        border-radius: 999px;
        letter-spacing: 0.02em;
        box-shadow: 0 4px 10px rgba(245, 158, 11, 0.4);
        display: none;
      }
      .menu-card.is-perfect {
        border-color: #f59e0b;
        background: linear-gradient(135deg, #fffbeb 0%, #fff 50%);
      }
      .menu-card.is-perfect .card-badge {
        display: inline-block;
      }
      /* ---- AI 업로드 패널 ---- */
      .ai-panel {
        background: linear-gradient(135deg, #eef2ff, #fff);
        border: 3px solid #c7d2fe;
        border-radius: 20px;
        padding: 16px 18px;
        margin: 12px 0 18px;
        box-shadow: 0 10px 24px rgba(99, 102, 241, 0.08);
      }
      .ai-panel .ai-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .ai-panel h3 { margin: 0 0 2px; color: #1e293b; font-size: 1.05rem; }
      .ai-panel p { margin: 0; color: #475569; font-size: 0.86rem; font-weight: 600; }
      .ai-panel .ai-toggle {
        background: #fff;
        border: 2px solid #c7d2fe;
        color: #4f46e5;
        font-weight: 800;
        padding: 6px 12px;
        border-radius: 999px;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
      }
      .ai-panel .ai-toggle:hover { background: #eef2ff; }
      .ai-body { margin-top: 14px; }
      .ai-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 10px;
      }
      .ai-field > span {
        font-weight: 800;
        color: #1e293b;
        font-size: 0.88rem;
      }
      .ai-field > span small { font-weight: 600; color: #94a3b8; margin-left: 4px; }
      .ai-field input[type="password"],
      .ai-field input[type="text"],
      .ai-field input[type="file"] {
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        padding: 10px 12px;
        font-family: inherit;
        font-size: 0.94rem;
        background: #fff;
      }
      .ai-field input:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
      }
      .ai-help { color: #64748b; font-weight: 600; font-size: 0.78rem; }
      .ai-help a { color: #4f46e5; text-decoration: underline; font-weight: 800; }
      .ai-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
      .ai-status {
        margin-top: 10px;
        font-size: 0.86rem;
        color: #475569;
        min-height: 20px;
        font-weight: 700;
      }
      .ai-status.is-loading { color: #4f46e5; }
      .ai-status.is-error { color: #b91c1c; }
      .ai-status.is-ok { color: #059669; }
      .photo-preview {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 8px 0 4px;
      }
      .photo-preview img {
        width: 72px;
        height: 72px;
        object-fit: cover;
        border-radius: 10px;
        border: 2px solid #e2e8f0;
        background: #f8fafc;
      }
      .ai-preview {
        margin-top: 12px;
        background: #fff;
        border: 2px dashed #c7d2fe;
        border-radius: 14px;
        padding: 12px 14px;
        font-size: 0.86rem;
        color: #334155;
      }
      .ai-preview h4 {
        margin: 6px 0 4px;
        font-size: 0.92rem;
        color: #1e293b;
      }
      .ai-preview ul { margin: 0 0 6px 18px; padding: 0; }
      .ai-preview li { margin-bottom: 2px; }

      /* ---- 오늘 외워야 할 단어 오버레이 ---- */
      .study-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.55);
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 24px 16px;
        z-index: 9999;
        overflow-y: auto;
      }
      .study-overlay .sheet {
        background: #fff;
        border-radius: 22px;
        width: 100%;
        max-width: 520px;
        padding: 20px 22px 22px;
        box-shadow: 0 22px 56px rgba(0, 0, 0, 0.25);
        border: 3px solid #e2e8f0;
      }
      .study-overlay .sheet h3 {
        margin: 0 0 4px;
        color: #1e293b;
        font-size: 1.2rem;
      }
      .study-overlay .sheet .sub {
        color: #64748b;
        font-size: 0.84rem;
        font-weight: 700;
        margin-bottom: 12px;
      }
      .study-overlay .close-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 4px;
      }
      .study-overlay .close-btn {
        background: #f1f5f9;
        border: 2px solid #e2e8f0;
        border-radius: 999px;
        width: 36px;
        height: 36px;
        font-size: 1.1rem;
        font-weight: 800;
        color: #475569;
        cursor: pointer;
        font-family: inherit;
      }
      .study-overlay .close-btn:hover { background: #e2e8f0; }
      .study-list { display: flex; flex-direction: column; gap: 6px; }
      .study-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 14px;
        background: #f8fafc;
        border: 2px solid #e2e8f0;
      }
      .study-item.is-right {
        background: linear-gradient(135deg, #f0fdf4, #fff);
        border-color: #10b981;
      }
      .study-item.is-wrong {
        background: linear-gradient(135deg, #fef2f2, #fff);
        border-color: #ef4444;
      }
      .study-item .mk {
        flex: 0 0 auto;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: 1rem;
        color: #94a3b8;
        background: #e2e8f0;
      }
      .study-item.is-right .mk { background: #10b981; color: #fff; }
      .study-item.is-wrong .mk { background: #ef4444; color: #fff; }
      .study-item .sw {
        flex: 0 0 auto;
        min-width: 110px;
        font-weight: 900;
        color: #1e293b;
        font-size: 1rem;
      }
      .study-item .sm {
        flex: 1 1 auto;
        color: #475569;
        font-weight: 600;
        font-size: 0.9rem;
        word-break: keep-all;
        cursor: pointer;
        transition: filter 0.15s;
        user-select: none;
        position: relative;
        padding: 2px 4px;
        border-radius: 6px;
      }
      .study-item .sm:hover { background: #eef2ff; }
      .study-item .sm.is-hidden {
        background: #e2e8f0;
        color: transparent;
        text-shadow: 0 0 10px #94a3b8;
      }
      .study-item .sm.is-hidden::after {
        content: "탭해서 보기 👆";
        position: absolute;

    <script>
      /* ----------------------------- Data ----------------------------- */
      let VOCAB = [
        { word: "alter", meaning: "바꾸다, 변경하다", en: "to change or modify something" },
        { word: "collapse", meaning: "무너지다, 붕괴하다", en: "to fall down suddenly" },
        { word: "crisis", meaning: "위기, 큰 어려움", en: "a time of serious trouble" },
        { word: "effect", meaning: "영향, 결과", en: "a result of a cause" },
        { word: "erode", meaning: "(땅·바위가) 침식되다", en: "to slowly wear away" },
        { word: "force", meaning: "힘, 세력", en: "strength or power used on something" },
        { word: "constant", meaning: "끊임없는, 일정한", en: "happening all the time without stopping" },
        { word: "severe", meaning: "매우 심한, 극심한", en: "very bad or intense" },
        { word: "substantial", meaning: "상당한, 꽤 큰", en: "large in amount or size" },
        { word: "unpredictable", meaning: "예측할 수 없는", en: "cannot be known before it happens" },
        { word: "landform", meaning: "지형 (산·강 같은 땅 모양)", en: "a natural feature of Earth's surface" },
        { word: "emergency", meaning: "비상 사태", en: "a sudden dangerous situation" },
        { word: "forecast", meaning: "예보, 예측하다", en: "to say what will happen in the future" },
        { word: "hesitate", meaning: "망설이다, 주저하다", en: "to pause before doing something" },
        { word: "submerge", meaning: "물에 잠기다, 물속에 넣다", en: "to go under water" },
        { word: "delay", meaning: "지연시키다, 늦추다", en: "to make something happen later" },
      ];

      let SPELL = [
        "change", "surface", "piece", "natural",
        "pressure", "quite", "important", "except",
        "question", "certain", "usually", "become",
        "together", "weekend", "field", "nobody",
      ];
      let SPELL_MEANINGS = {
        change: "바꾸다, 변화",
        surface: "표면, 지면",
        piece: "조각, 부분",
        natural: "자연의, 자연스러운",
        pressure: "압력, 압박",
        quite: "꽤, 상당히",
        important: "중요한",
        except: "~를 제외하고",
        question: "질문, 문제",
        certain: "확실한, 어떤",
        usually: "보통, 대개",
        become: "~이 되다",
        together: "함께",
        weekend: "주말",
        field: "들판, 분야",
        nobody: "아무도 ~않다",
      };

      // Writing prompts (Part D)
      let WRITE_PROMPTS = [
        {
          id: 1,
          title: "Prompt 1",
          text: "Which natural disaster is most interesting? Why?",
          ko: "어떤 자연재해가 가장 흥미로운가요? 왜 그런가요?",
        },
        {
          id: 2,
          title: "Prompt 2",
          text: "Choose a natural disaster. Using cause and effect, tell how this disaster affects people and land.",
          ko: "자연재해를 하나 골라, 원인과 결과(cause and effect)를 써서 그 재해가 사람과 땅에 어떤 영향을 주는지 설명하세요.",
        },
      ];

      const DISASTER_KEYWORDS = [
        "earthquake", "earthquakes", "tornado", "tornadoes", "tornados", "hurricane", "hurricanes",
        "tsunami", "tsunamis", "flood", "floods", "flooding", "wildfire", "wildfires",
        "volcano", "volcanoes", "volcanic", "eruption", "eruptions", "blizzard", "blizzards",
        "drought", "droughts", "storm", "storms", "thunderstorm", "thunderstorms",
        "typhoon", "typhoons", "cyclone", "cyclones", "avalanche", "avalanches",
        "landslide", "landslides", "disaster", "disasters",
      ];

      const COMPOUND_CONJ = ["and", "but", "or", "so", "yet"];

      // Sentence type data — labels: "compound" | "complex" | "runon"
      let SENTENCES = [
        { s: "I like science fiction movies, but my father likes comedies.", t: "compound", why: "두 독립절을 and/or/but 로 연결 → Compound" },
        { s: "Because it was raining, we stayed inside.", t: "complex", why: "'because' 같은 종속 접속사가 쓰임 → Complex" },
        { s: "Kites are fun to fly people all over the world like to fly them.", t: "runon", why: "두 완전한 문장이 쉼표/접속사 없이 이어져 있어요 → Run-on" },
        { s: "She was tired, so she went to bed early.", t: "compound", why: "and/or/but/so 같은 등위 접속사 → Compound" },
        { s: "Although he was nervous, he gave a great speech.", t: "complex", why: "'although' → 종속 접속사 → Complex" },
        { s: "I love pizza my sister loves pasta.", t: "runon", why: "두 문장이 접속사 없이 붙어 있어요 → Run-on" },
        { s: "We stayed inside because it was raining.", t: "complex", why: "'because' → 종속 접속사 (뒤쪽에 쓰임) → Complex" },
        { s: "My dog barks a lot, and my cat is very quiet.", t: "compound", why: "and 로 두 독립절 연결 → Compound" },
        { s: "Since we had time, we visited the museum.", t: "complex", why: "'since' → 종속 접속사 → Complex" },
        { s: "The storm was severe it caused a lot of damage.", t: "runon", why: "두 독립 문장이 그냥 붙어 있음 → Run-on" },
        { s: "You can take the bus, or you can walk home.", t: "compound", why: "or 로 두 독립절 연결 → Compound" },
        { s: "When the earthquake hit, the building collapsed.", t: "complex", why: "'when' → 종속 접속사 → Complex" },
      ];

      // 기본 데이터 스냅샷(딥카피) - "기본값으로 되돌리기"용
      const DEFAULTS = {
        VOCAB: JSON.parse(JSON.stringify(VOCAB)),
        SPELL: JSON.parse(JSON.stringify(SPELL)),
        SPELL_MEANINGS: JSON.parse(JSON.stringify(SPELL_MEANINGS)),
        SENTENCES: JSON.parse(JSON.stringify(SENTENCES)),
        WRITE_PROMPTS: JSON.parse(JSON.stringify(WRITE_PROMPTS)),
      };

      /* --------------------------- State ----------------------------- */
      const BEST_KEY = "study_game_best_v1";
      const state = {
        mode: null,
        modeFilter: null,
        questions: [],
        idx: 0,
        score: 0,
        streak: 0,
        sessionWrongs: [],
        sessionRights: [],
        spellWrongs: [],
        spellRights: [],
      };

      const $ = (id) => document.getElementById(id);
      const menuView = $("menuView");
      const gameView = $("gameView");
      const finalView = $("finalView");
      const gameBody = $("gameBody");

      function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }
      function pickN(arr, n) {
        return shuffle(arr).slice(0, n);
      }
      // ---- Speech (robust) ----
      let _voicesReady = false;
      let _cachedVoices = [];
      let _speechWarmed = false;

      function loadVoicesOnce() {
        if (!("speechSynthesis" in window)) return;
        const pull = () => {
          _cachedVoices = window.speechSynthesis.getVoices() || [];
          if (_cachedVoices.length) _voicesReady = true;
        };
        pull();
        if (!_voicesReady) {
          window.speechSynthesis.onvoiceschanged = () => pull();
          // fallback timer
          setTimeout(pull, 600);
          setTimeout(pull, 1500);
        }
      }
      loadVoicesOnce();

      function pickEnVoice() {
        const v = _cachedVoices.length ? _cachedVoices : (window.speechSynthesis && window.speechSynthesis.getVoices()) || [];
        return (
          v.find((x) => /en[-_]US/i.test(x.lang) && /google/i.test(x.name || "")) ||
          v.find((x) => /en[-_]US/i.test(x.lang)) ||
          v.find((x) => /^en[-_]GB/i.test(x.lang)) ||
          v.find((x) => /^en/i.test(x.lang)) ||
          null
        );
      }
      function pickKoVoice() {
        const v = _cachedVoices.length ? _cachedVoices : (window.speechSynthesis && window.speechSynthesis.getVoices()) || [];
        return (
          v.find((x) => /ko[-_]KR/i.test(x.lang) && /google/i.test(x.name || "")) ||
          v.find((x) => /ko[-_]KR/i.test(x.lang)) ||
          v.find((x) => /^ko/i.test(x.lang)) ||
          null
        );
      }

      function warmSpeech() {
        if (_speechWarmed) return;
        if (!("speechSynthesis" in window)) return;
        try {
          const u = new SpeechSynthesisUtterance(" ");
          u.volume = 0;
          u.lang = "en-US";
          window.speechSynthesis.speak(u);
          _speechWarmed = true;
        } catch (e) {}
      }

      function flashButton(btn) {
        if (!btn) return;
        btn.classList.remove("pop");
        void btn.offsetWidth;
        btn.classList.add("pop");
      }

      function speak(word, opts) {
        opts = opts || {};
        const btn = opts.btn || null;
        flashButton(btn);
        if (!("speechSynthesis" in window)) {
          alert("이 브라우저는 음성 재생을 지원하지 않아요 😢\nChrome/Safari에서 열어보세요.");
          return;
        }
        try {
          const synth = window.speechSynthesis;
          warmSpeech();
          try { synth.resume(); } catch (e) {}
          try { synth.cancel(); } catch (e) {}
          const utter = new SpeechSynthesisUtterance(String(word || ""));
          utter.lang = "en-US";
          utter.rate = 0.85;
          utter.pitch = 1;
          utter.volume = 1;

        opts = opts || {};
        if (!("speechSynthesis" in window)) return;

          const synth = window.speechSynthesis;

          // 한국어 음성은 정답/오답 피드백용이라 기존 영어 재생을 끊지 않도록

          u.rate = typeof opts.rate === "number" ? opts.rate : 1.05;
          u.pitch = typeof opts.pitch === "number" ? opts.pitch : 1.1;

      // ---- Sound effects (Web Audio) ----

      function getAudio() {

      function playTone({ freq = 800, dur = 0.15, type = "sine", vol = 0.2, when = 0, slideTo = null }) {
        const ctx = getAudio();
        if (!ctx) return;
        if (ctx.state === "suspended") {
          try { ctx.resume(); } catch (e) {}
        }
        const t0 = ctx.currentTime + when;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t0);
        if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
        gain.gain.setValueAtTime(0, t0);
        gain.gain.linearRampToValueAtTime(vol, t0 + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(t0);
        osc.stop(t0 + dur + 0.05);
      }

      // 업로드된 데이터를 게임 전역 변수에 적용 (카테고리 비어있으면 기본값 유지)
      function applyCustomData(data) {
        if (!data || typeof data !== "object") return false;
        let any = false;

        if (Array.isArray(data.vocab) && data.vocab.length) {
          const cleaned = data.vocab
            .filter((v) => v && typeof v.word === "string" && typeof v.meaning === "string")
            .map((v) => ({
              word: String(v.word).trim().toLowerCase(),
              meaning: String(v.meaning).trim(),
              en: typeof v.en === "string" ? String(v.en).trim() : "",
            }))
            .filter((v) => v.word.length > 0 && v.meaning.length > 0);
          if (cleaned.length >= 2) {
            VOCAB = cleaned;
            any = true;
          }
        }

        if (Array.isArray(data.spell) && data.spell.length) {
          const words = [];
          const meanings = {};
          data.spell.forEach((it) => {
            if (typeof it === "string") {
              const w = it.trim().toLowerCase();
              if (w.length > 0) { words.push(w); meanings[w] = ""; }
            } else if (it && typeof it.word === "string") {
              const w = String(it.word).trim().toLowerCase();
              if (w.length > 0) {
                words.push(w);
                meanings[w] = typeof it.meaning === "string" ? String(it.meaning).trim() : "";
              }
            }
          });
          if (words.length >= 2) {
            SPELL = words;
            SPELL_MEANINGS = meanings;
            any = true;
          }
        }

        if (Array.isArray(data.sentences) && data.sentences.length) {
          const allowed = new Set(["compound", "complex", "runon"]);
          const cleaned = data.sentences
            .filter((x) => x && typeof x.s === "string" && typeof x.t === "string")
            .map((x) => ({
              s: String(x.s).trim(),
              t: String(x.t).trim().toLowerCase().replace(/[-_\s]/g, ""),
              why: typeof x.why === "string" ? String(x.why).trim() : "",
            }))
            .filter((x) => x.s.length > 4 && allowed.has(x.t));
          if (cleaned.length >= 2) {
            SENTENCES = cleaned;
            any = true;
          }
        }

        if (Array.isArray(data.prompts) && data.prompts.length) {
          const cleaned = data.prompts
            .filter((p) => p && typeof p.text === "string" && p.text.trim().length > 4)
            .map((p, i) => ({
              id: typeof p.id === "number" ? p.id : i + 1,
              title: typeof p.title === "string" && p.title.trim() ? p.title.trim() : "Prompt " + (i + 1),
              text: String(p.text).trim(),
              ko: typeof p.ko === "string" ? String(p.ko).trim() : "",
            }));
          if (cleaned.length >= 1) {
            WRITE_PROMPTS = cleaned;
            any = true;
          }
        }

        return any;
      }

      function fileToBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            const res = reader.result || "";
            const idx = String(res).indexOf(",");
            resolve(idx >= 0 ? String(res).slice(idx + 1) : String(res));
          };
          reader.onerror = () => reject(new Error("파일을 읽지 못했어요."));
          reader.readAsDataURL(file);
        });
      }

      async function callGeminiVision(apiKey, files) {
        const GEMINI_MODEL = "gemini-2.0-flash";
        const url = "https://generativelanguage.googleapis.com/v1beta/models/" + GEMINI_MODEL + ":generateContent?key=" + encodeURIComponent(apiKey);

        const parts = [];
        parts.push({
          text: [
            "You are a kind English study assistant helping a Korean elementary school student.",
            "Analyze the attached study-guide photo(s). Extract ONLY content clearly present in the images.",
            "Return a single valid JSON object with these keys (use empty arrays for any section not present):",
            "{",
            '  "vocab":     [ {"word":"lowercase English word","meaning":"Korean translation","en":"short English definition"} ],',
            '  "spell":     [ {"word":"lowercase English word","meaning":"short Korean meaning"} ],',
            '  "sentences": [ {"s":"example sentence exactly as shown","t":"compound|complex|runon","why":"short Korean reason why"} ],',
            '  "prompts":   [ {"id":1,"title":"Prompt 1","text":"English prompt text","ko":"Korean translation"} ]',
            "}",
            "Rules:",
            "- vocab: include ONLY words that are paired with a definition/meaning in the image.",
            "- spell: include words from any spelling word list (Part B, spelling list, etc).",
            "- sentences: include example sentences labeled or identifiable as compound, complex, or run-on. Use only those three labels for 't'.",
            "- prompts: include writing prompts asking the student to write a paragraph.",
            "- Meanings/explanations must be in simple Korean for an elementary student.",
            "- Do NOT invent content that is not in the images.",
            "- Output ONLY the JSON object, no markdown, no code fences, no extra text.",
          ].join("\n"),
        });

        for (let i = 0; i < files.length; i++) {
          const f = files[i];
          const b64 = await fileToBase64(f);
          parts.push({
            inline_data: {
              mime_type: f.type || "image/jpeg",
              data: b64,
            },
          });
        }

        const body = {
          contents: [{ role: "user", parts: parts }],
          generationConfig: {
            temperature: 0.2,
            responseMimeType: "application/json",
          },
        };

        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          let msg = "Gemini 호출 실패 (" + res.status + ")";
          try { const errJson = await res.json(); if (errJson && errJson.error && errJson.error.message) msg += ": " + errJson.error.message; } catch (e) {}
          throw new Error(msg);
        }
        const data = await res.json();
        const text = (((data.candidates || [])[0] || {}).content || {}).parts || [];
        const combined = text.map((p) => p.text || "").join("").trim();
        if (!combined) throw new Error("응답이 비어있어요.");

        // 간혹 ```json ... ``` 로 감싸져 오는 경우 처리
        let jsonStr = combined;
        const fenceMatch = combined.match(/```(?:json)?\s*([\s\S]*?)```/i);
        if (fenceMatch) jsonStr = fenceMatch[1].trim();

        try {
          return JSON.parse(jsonStr);
        } catch (e) {
          throw new Error("JSON 파싱 실패: " + jsonStr.slice(0, 200));
        }
      }

              renderMenuDataInfo();

              status.textContent = "✅ 단원이 업데이트됐어요! 메뉴에서 게임을 시작해 보세요.";
              // 복습 기록은 새 단어 세트와 맞지 않을 수 있으므로 초기화 추천
              try {
                localStorage.removeItem("study_game_vocab_session_v1");
                localStorage.removeItem("study_game_spell_session_v1");
              } catch (e) {}
            }
          } catch (e) {
            console.warn(e);
            status.className = "ai-status is-error";
            status.textContent = "⚠️ 실패: " + (e && e.message ? e.message : String(e));
          } finally {
            btnApply.disabled = false;
          }
        });

        btnReset && btnReset.addEventListener("click", () => {
          if (!confirm("기본 단원(자연재해 어휘)으로 되돌릴까요? 업로드로 생성한 단원은 삭제돼요.")) return;
          clearCustomData();
          VOCAB = JSON.parse(JSON.stringify(DEFAULTS.VOCAB));
          SPELL = JSON.parse(JSON.stringify(DEFAULTS.SPELL));
          SPELL_MEANINGS = JSON.parse(JSON.stringify(DEFAULTS.SPELL_MEANINGS));
          SENTENCES = JSON.parse(JSON.stringify(DEFAULTS.SENTENCES));
          WRITE_PROMPTS = JSON.parse(JSON.stringify(DEFAULTS.WRITE_PROMPTS));
          try {
            localStorage.removeItem("study_game_vocab_session_v1");
            localStorage.removeItem("study_game_spell_session_v1");
          } catch (e) {}
          renderMenuDataInfo();

          status.textContent = "↺ 기본 단원으로 되돌렸어요.";

      }
      wireAiPanel();
      function startMode(mode, opts) {
        opts = opts || {};
        state.mode = mode;
        state.modeFilter = opts.filter || null;
        state.score = 0;
        state.streak = 0;
        state.idx = 0;
        state.sessionWrongs = [];
        state.sessionRights = [];
        state.spellWrongs = [];
        state.spellRights = [];
        if (mode === "vocab") {
          let pool = VOCAB;
          if (opts.filter === "wrong") {
            const saved = getVocabSession();
            const words = new Set(saved.wrongs || []);
            const filtered = VOCAB.filter((v) => words.has(v.word));
            if (filtered.length > 0) pool = filtered;
          } else if (opts.filter === "right") {
            const saved = getVocabSession();
            const words = new Set(saved.rights || []);
            const filtered = VOCAB.filter((v) => words.has(v.word));
            if (filtered.length > 0) pool = filtered;
          }
          const count = Math.min(10, Math.max(1, pool.length));
          state.questions = pickN(pool, count);
        } else if (mode === "spell") state.questions = pickN(SPELL, 10);
        else if (mode === "sent") state.questions = pickN(SENTENCES, 10);
        else if (mode === "sentence") state.questions = null;
        menuView.classList.add("hidden");
        finalView.classList.add("hidden");
        gameView.classList.remove("hidden");
        renderQuestion();
      }
      function updateHud() {
        if (state.mode === "sentence") {
          $("progressChip").textContent = "📝 문장 쓰기";
        } else {
          const total = state.questions ? state.questions.length : 10;
          $("progressChip").textContent = (state.idx + 1) + " / " + total;
        }
        $("scoreChip").textContent = "⭐ " + state.score;
        $("streakChip").textContent = "🔥 " + state.streak;
      }
      function next() {
        state.idx += 1;
        if (!state.questions || state.idx >= state.questions.length) {
          finishGame();
          return;
        }
        renderQuestion();
      }
      function finishGame() {
        const perfectMax = state.mode === "sentence" ? 6 : (state.questions ? state.questions.length : 10);
        setBest(state.mode, state.score);
        const best = getBest()[state.mode] || 0;
        let emoji = "🏆", stars = "⭐⭐⭐", title = "최고예요!";
        const ratio = state.score / perfectMax;
        if (ratio >= 1) { emoji = "🏆"; stars = "⭐⭐⭐⭐⭐"; title = "완벽해요!"; }
        else if (ratio >= 0.8) { emoji = "🎉"; stars = "⭐⭐⭐⭐"; title = "아주 잘했어요!"; }
        else if (ratio >= 0.6) { emoji = "👍"; stars = "⭐⭐⭐"; title = "잘했어요!"; }
        else if (ratio >= 0.4) { emoji = "💪"; stars = "⭐⭐"; title = "조금 더 힘내요!"; }
        else { emoji = "🌱"; stars = "⭐"; title = "다시 도전해봐요!"; }

        $("finalEmoji").textContent = emoji;
        $("finalTitle").textContent = title;
        $("finalScoreText").textContent = state.score + " / " + perfectMax;
        $("finalStars").textContent = stars;
        $("bestScore").textContent = best;

        // 100점 완주 뱃지 기록 (필터 없는 전체 모드일 때만)
        let newlyEarned = false;
        if (ratio >= 1 && !state.modeFilter) {
          // vocab의 경우 전체 단어 10개 풀에서 10/10이어야 함. match는 16/16.
          newlyEarned = savePerfect(state.mode);
        }
        const finalSub = $("finalSub");
        if (newlyEarned) {
          finalSub.innerHTML =
            '<span style="display:inline-block;background:linear-gradient(135deg,#fde68a,#f59e0b);color:#7c2d12;padding:8px 14px;border-radius:12px;font-weight:900;box-shadow:0 4px 10px rgba(245,158,11,0.35)">🏅 100점 완주 뱃지 획득! ' +
            (getPerfects()[state.mode] || "") + '</span><br><br>' +
            '최고 기록: <span id="bestScore2">' + best + '</span>';
          // 뱃지 획득 축하 사운드
          setTimeout(() => playWin(), 250);
          setTimeout(() => playWin(), 650);
        } else {
          finalSub.innerHTML = '최고 기록: <span id="bestScore2">' + best + '</span>';
        }

        // Vocab: 세션 저장 + 복습 버튼 구성
        const reviewRow = $("finalReviewRow");
        reviewRow.innerHTML = "";
        if (state.mode === "vocab") {
          // Merge current session into persisted history.
          // - Words wrongs once stay wrong until the user gets them right
          // - A wrong in this session overrides a previous right
          const prev = getVocabSession();
          const prevRights = new Set(prev.rights || []);
          const prevWrongs = new Set(prev.wrongs || []);
          const nowWrongs = new Set(state.sessionWrongs);
          const nowRights = new Set(state.sessionRights);
          // For words answered now:
          nowWrongs.forEach((w) => { prevWrongs.add(w); prevRights.delete(w); });
          nowRights.forEach((w) => { prevRights.add(w); prevWrongs.delete(w); });
          saveVocabSession(Array.from(prevWrongs), Array.from(prevRights));

          const wrongCount = prevWrongs.size;
          const rightCount = prevRights.size;

          const btnWrong = document.createElement("button");
          btnWrong.className = "btn btn-primary";
          btnWrong.style.background = "linear-gradient(135deg, #ef4444, #dc2626)";
          btnWrong.textContent = "🔴 틀린 단어만 다시보기 (" + wrongCount + ")";
          if (wrongCount === 0) { btnWrong.disabled = true; btnWrong.style.opacity = "0.5"; btnWrong.style.cursor = "not-allowed"; }
          btnWrong.addEventListener("click", () => startMode("vocab", { filter: "wrong" }));
          reviewRow.appendChild(btnWrong);

          const btnRight = document.createElement("button");
          btnRight.className = "btn btn-primary";
          btnRight.style.background = "linear-gradient(135deg, #10b981, #059669)";
          btnRight.textContent = "🟢 맞은 단어 다시보기 (" + rightCount + ")";
          if (rightCount === 0) { btnRight.disabled = true; btnRight.style.opacity = "0.5"; btnRight.style.cursor = "not-allowed"; }
          btnRight.addEventListener("click", () => startMode("vocab", { filter: "right" }));
          reviewRow.appendChild(btnRight);
        }

        // Spell: 세션을 localStorage에 병합 저장 (이후 오버레이에서 ○/× 유지)
        if (state.mode === "spell") {
          const prev = getSpellSession();
          const prevRights = new Set(prev.rights || []);
          const prevWrongs = new Set(prev.wrongs || []);
          const nowWrongs = new Set(state.spellWrongs);
          const nowRights = new Set(state.spellRights);
          nowWrongs.forEach((w) => { prevWrongs.add(w); prevRights.delete(w); });
          nowRights.forEach((w) => { prevRights.add(w); prevWrongs.delete(w); });
          saveSpellSession(Array.from(prevWrongs), Array.from(prevRights));
        }

        // 승리 효과음
        if (ratio >= 0.6) playWin();
        else playWrong();

        menuView.classList.add("hidden");
        gameView.classList.add("hidden");
        finalView.classList.remove("hidden");
      }

      /* ---------- Spelling scramble ---------- */
      function buildDistractorPool(word) {
        // 단어 길이에 따라 방해용 글자 갯수 결정 (짧으면 많이, 길면 조금 덜)
        const len = word.length;
        let extras;
        if (len <= 4) extras = 6;
        else if (len <= 6) extras = 6;
        else if (len <= 8) extras = 7;
        else extras = 8;

        // 후보 풀: 다른 스펠링 단어들의 글자 + 흔한 영어 글자
        const common = "abcdefghijklmnopqrstuvwxyz".split("");
        const fromOthers = [];
        SPELL.forEach((w) => {
          if (w !== word) w.split("").forEach((ch) => fromOthers.push(ch));
        });
        const pool = fromOthers.concat(common);

        const wordLetterCounts = {};
        word.split("").forEach((ch) => { wordLetterCounts[ch] = (wordLetterCounts[ch] || 0) + 1; });

        const picks = [];
        const maxTries = extras * 20;
        let tries = 0;
        while (picks.length < extras && tries < maxTries) {
          tries++;
          const candidate = pool[Math.floor(Math.random() * pool.length)];
          // 난이도: 단어 안에 없는 글자를 우선, 가끔 단어 안에 있는 글자도 섞음(함정)
          const inWord = !!wordLetterCounts[candidate];
          if (inWord && Math.random() < 0.7) continue;
          picks.push(candidate);
        }
        return picks;
      }

              }
            });
            tgt.appendChild(placed);
          });

        $("btnSaySp").addEventListener("click", (e) => speak(word, { btn: e.currentTarget }));
        $("btnHintSp").addEventListener("click", () => {

        });
        $("btnClear").addEventListener("click", () => {
          tgt.querySelectorAll(".letter-tile").forEach((el) => el.remove());
          src.querySelectorAll(".letter-tile").forEach((el) => el.classList.remove("used"));
          const eh = document.createElement("span");
          eh.className = "scramble-hint";

      function checkSpell(word) {
        const tgt = $("targetArea");
        const tiles = Array.from(tgt.querySelectorAll(".letter-tile"));
        const typed = tiles.map((t) => t.textContent).join("");
        const fb = $("feedback");
        if (!typed) {

          fb.className = "feedback no shake";
          return;

          fb.textContent = "정답! 🎉  " + word;

          state.score += 1;
          state.streak += 1;
          state.spellRights.push(word);

          state.streak = 0;
          state.spellWrongs.push(word);
          playWrong();
          updateHud();
          $("btnCheck").classList.add("hidden");
          $("btnClear").classList.add("hidden");
          $("btnNext").classList.remove("hidden");

          '<div style="height:10px"></div>' +
          '<div class="choices">' +
          '<button class="choice-btn" data-v="compound"><b>Compound</b><br><small style="color:#64748b">and / or / but · 두 독립절 연결</small></button>' +
          '<button class="choice-btn" data-v="complex"><b>Complex</b><br><small style="color:#64748b">because / although / since…</small></button>' +
          '<button class="choice-btn" data-v="runon"><b>Run-on</b><br><small style="color:#64748b">접속사 없이 붙은 두 문장</small></button>' +
          '</div>' +
          '<div class="feedback" id="feedback"></div>' +
          '<div class="btn-row"><button class="btn btn-primary hidden" id="btnNext">다음 →</button></div>';
        gameBody.appendChild(card);

        card.querySelectorAll(".choice-btn").forEach((btn) => {
          btn.addEventListener("click", () => pickSent(btn, btn.dataset.v, item));
        });
        $("btnNext").addEventListener("click", next);
      }
      function pickSent(btn, value, item) {
        const all = document.querySelectorAll(".choice-btn");
        all.forEach((b) => (b.disabled = true));
        const fb = $("feedback");
        if (value === item.t) {
          btn.classList.add("correct");
          state.score += 1;
          state.streak += 1;
          playCorrect();
          fb.textContent = "정답! 🎉  " + item.why;
          fb.className = "feedback ok pop";
        } else {
          btn.classList.add("wrong");
          all.forEach((b) => { if (b.dataset.v === item.t) b.classList.add("correct"); });
          state.streak = 0;
          playWrong();
          fb.textContent = "아쉬워요. " + item.why;
          fb.className = "feedback no shake";
        }
        updateHud();
        $("btnNext").classList.remove("hidden");
      }

      /* ---------- 문장 만들기 (Sentence writing) ---------- */
      let _activeRecog = null;
      function stopActiveRecog() {
        if (_activeRecog) {
          try { _activeRecog.stop(); } catch (e) {}
          _activeRecog = null;
        }
      }

      function startSpeechInput(opts) {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
          alert("이 브라우저는 음성 입력을 지원하지 않아요 😢\n크롬(안드로이드) 또는 사파리/크롬 데스크톱에서 열어주세요.");
          return null;
        }
        const r = new SR();
        r.continuous = true;
        r.interimResults = true;
        r.lang = "en-US";
        r.onresult = (e) => {
          let finalDelta = "";
          let interim = "";
          for (let i = e.resultIndex; i < e.results.length; i++) {
            const t = e.results[i][0].transcript;
            if (e.results[i].isFinal) finalDelta += t;
            else interim += t;
          }
          if (typeof opts.onDelta === "function") opts.onDelta(finalDelta, interim);
        };
        r.onerror = (e) => {
          console.warn("recog error", e && e.error);
          if (typeof opts.onEnd === "function") opts.onEnd(e && e.error);
        };
        r.onend = () => {
          if (typeof opts.onEnd === "function") opts.onEnd(null);
        };
        try { r.start(); } catch (e) { console.warn(e); return null; }
        return r;
      }

      function splitSentences(text) {
        return String(text || "")
          .split(/(?<=[.!?])\s+|\n+/)
          .map((s) => s.trim())
          .filter((s) => s.length > 1);
      }

      function evaluateParagraph(text, promptId) {
        const out = { items: [], passCount: 0 };
        const clean = String(text || "");
        const trimmed = clean.trim();
        const lower = trimmed.toLowerCase();
        const sentences = splitSentences(trimmed);
        const words = lower.match(/[a-z']+/g) || [];
        const sentCount = sentences.length;

        // 1) 들여쓰기
        const firstLine = String(clean.split("\n")[0] || "");
        const hasIndent = /^(?:[ ]{2,}|\t)/.test(firstLine);
        out.items.push({
          ok: hasIndent,
          label: "문단 들여쓰기 (Paragraph indenting)",
          hint: hasIndent
            ? "첫 줄 들여쓰기를 잘했어요."
            : "문단 첫 줄을 공백 두 칸(또는 Tab)으로 시작해야 해요. 예: \"␣␣Earthquakes are very scary...\"",
        });

        // 2) Topic sentence (첫 문장이 자연재해를 소개하며 충분한 길이)
        const firstSent = sentences[0] || "";
        const disasterMentioned = DISASTER_KEYWORDS.some((w) => lower.includes(w));
        const firstSentLower = firstSent.toLowerCase();
        const firstHasDisaster = DISASTER_KEYWORDS.some((w) => firstSentLower.includes(w));
        const topicOk = firstSent.length >= 18 && firstHasDisaster;
        out.items.push({
          ok: topicOk,
          label: "Topic sentence (주제 문장)",
          hint: topicOk
            ? "첫 문장이 주제를 잘 소개했어요."
            : "첫 문장에서 주제(자연재해)를 분명히 소개해 보세요. 예: \"Earthquakes are one of the most powerful natural disasters on Earth.\"",
        });

        // 3) Answer the prompt (자연재해 관련 키워드 포함)
        out.items.push({
          ok: disasterMentioned,
          label: "Answer the prompt (주제에 맞는 답)",
          hint: disasterMentioned
            ? "자연재해 이야기를 잘 썼어요."
            : "자연재해(earthquake, tornado, hurricane, flood, volcano 등)를 꼭 언급해야 해요.",
        });

        // 4) Compound sentence (쉼표 + and/but/or/so/yet)
        const compoundRe = /,\s*(and|but|or|so|yet)\s+\w+/i;
        const compoundOk = compoundRe.test(trimmed);
        const badRunOn = !compoundOk && / (and|but|or|so) /i.test(trimmed);
        out.items.push({
          ok: compoundOk,
          label: "Compound sentence 사용",
          hint: compoundOk
            ? "compound sentence를 잘 사용했어요."
            : (badRunOn
                ? "접속사 앞에 쉼표(,)를 넣어 compound sentence로 만들어 보세요. 예: \"Floods can destroy homes, and they can hurt animals.\""
                : "쉼표와 and/but/or/so를 써서 두 독립절을 연결한 compound sentence 한 문장을 꼭 넣어 주세요."),
        });

        // 5) 8 or more lines (문장 8개 이상)
        const linesOk = sentCount >= 8;
        out.items.push({
          ok: linesOk,
          label: "8문장 이상 쓰기 (Have 8 or more lines)",
          hint: linesOk
            ? "문장 수: " + sentCount + "개 — 충분해요!"
            : "지금 " + sentCount + "개. 조금 더 써서 8문장 이상을 채워 보세요.",
        });

        // 6) Neat writing — 간단한 스펠링/대소문자/구두점 체크
        const issues = [];
        // 6-1) 문장 첫 글자 대문자
        const badCaps = sentences.filter((s) => /^[a-z]/.test(s));
        if (badCaps.length) issues.push("문장을 대문자로 시작하지 않은 곳이 있어요: \"" + badCaps[0].slice(0, 28) + "…\"");
        // 6-2) 문장 끝에 마침표/물음표/느낌표
        const missingPunct = clean.trim().length > 0 && !/[.!?]\s*$/.test(clean.trim());
        if (missingPunct) issues.push("마지막 문장 끝에 마침표(.)를 찍어 주세요.");
        // 6-3) 두 칸 이상 띄어쓰기(공백)나 이상한 문자
        if (/\s{3,}/.test(trimmed)) issues.push("공백이 너무 많은 곳이 있어요.");
        // 6-4) 반복 글자 (heeeelp 같은 것)
        const longRep = words.find((w) => /(.)\1{3,}/.test(w));
        if (longRep) issues.push("같은 글자를 여러 번 반복한 단어가 있어요: \"" + longRep + "\" → 스펠링 확인!");
        // 6-5) 흔히 틀리는 스펠링 감지
        const commonMisspell = {
          "earthquke": "earthquake", "earthqake": "earthquake",
          "hurrican": "hurricane", "hurrikane": "hurricane",
          "tornaddo": "tornado", "tornato": "tornado",
          "volcanoe": "volcano", "volcanos": "volcanoes",
          "tsunamy": "tsunami", "sunami": "tsunami",
          "flod": "flood", "floud": "flood",
          "wildfier": "wildfire", "wildefire": "wildfire",
          "desaster": "disaster", "disastor": "disaster", "dissaster": "disaster",
          "thier": "their", "recieve": "receive", "beacuse": "because", "becuase": "because",
          "alot": "a lot", "definately": "definitely", "seperate": "separate",
        };
        const misspellFound = [];
        words.forEach((w) => {
          if (commonMisspell[w] && misspellFound.length < 3) {
            misspellFound.push({ bad: w, good: commonMisspell[w] });
          }
        });
        if (misspellFound.length) {
          issues.push(
            "스펠링을 확인해 보세요: " +
              misspellFound.map((m) => '"' + m.bad + '" → "' + m.good + '"').join(", ")
          );
        }
        const neatOk = issues.length === 0;
        out.items.push({
          ok: neatOk,
          label: "Neat writing (깔끔한 글쓰기)",
          hint: neatOk
            ? "스펠링·대소문자·구두점이 깔끔해요."
            : issues.join(" · "),
        });

        out.passCount = out.items.filter((x) => x.ok).length;
        return out;
      }

      function renderSentence() {
        // 1) 프롬프트 선택 + 루브릭 + 쓰기 영역 + 마이크 + 제출
        const card = document.createElement("div");
        card.className = "question-card pop";
        card.innerHTML =
          '<div class="prompt-small">📝 프롬프트를 골라 영어 문단을 써 보세요</div>' +
          '<div class="prompt-picker" id="promptPicker"></div>' +
          '<div class="rubric-list" id="rubricList"></div>' +
          '<textarea class="write-area" id="writeArea" placeholder="  Earthquakes are one of the most..."></textarea>' +
          '<div class="write-meta">' +
          '<span id="writeStats">문장 0 · 단어 0</span>' +
          '<span style="color:#94a3b8">💡 Tip: 문단 첫 줄은 공백 두 칸으로 들여쓰기</span>' +
          '</div>' +
          '<div class="btn-row" style="margin-top:4px">' +
          '<button class="btn btn-mic" id="btnMic">🎤 음성으로 말하기</button>' +
          '<button class="btn btn-ghost" id="btnClearText">🧹 지우기</button>' +
          '<button class="btn btn-primary" id="btnSubmitPara">✓ 제출</button>' +
          '</div>' +
          '<div id="feedbackWrap"></div>';
        gameBody.appendChild(card);

        // 프롬프트 칩
        const picker = $("promptPicker");
        let activePrompt = 1;
        function drawPicker() {
          picker.innerHTML = "";
          WRITE_PROMPTS.forEach((p) => {
            const el = document.createElement("button");
            el.type = "button";
            el.className = "prompt-pick" + (p.id === activePrompt ? " is-active" : "");
            el.innerHTML =
              '<span class="pp-tag">' + p.title + '</span><br>' +
              '<strong>' + p.text + '</strong><br>' +
              '<small style="color:#64748b;font-weight:600">' + p.ko + '</small>';
            el.addEventListener("click", () => {
              activePrompt = p.id;
              drawPicker();
            });
            picker.appendChild(el);
          });
        }
        drawPicker();

        // 루브릭 라이브 업데이트
        const writeArea = $("writeArea");
        const rubricList = $("rubricList");
        function drawRubricLive() {
          const ev = evaluateParagraph(writeArea.value, activePrompt);
          rubricList.innerHTML = "";
          ev.items.forEach((it) => {
            const el = document.createElement("span");
            el.className = "rub " + (it.ok ? "ok" : "no");
            el.innerHTML = '<span class="mk">' + (it.ok ? "✅" : "⚠️") + "</span>" + it.label;
            rubricList.appendChild(el);
          });
          // 통계
          const sents = splitSentences(writeArea.value);
          const ws = (writeArea.value.match(/[A-Za-z']+/g) || []).length;
          $("writeStats").textContent = "문장 " + sents.length + " · 단어 " + ws;
        }
        writeArea.addEventListener("input", drawRubricLive);
        drawRubricLive();

        // 마이크 음성 입력
        const btnMic = $("btnMic");
        btnMic.addEventListener("click", () => {
          if (_activeRecog) {
            stopActiveRecog();
            btnMic.classList.remove("is-on");
            btnMic.textContent = "🎤 음성으로 말하기";
            writeArea.classList.remove("is-listening");
            return;
          }
          const r = startSpeechInput({
            onDelta: (finalDelta, interim) => {
              if (finalDelta) {
                const cur = writeArea.value;
                // 필요한 경우 공백/구두점 보정
                const needsSpace = cur && !/[\s\n]$/.test(cur);
                let add = finalDelta.trim();
                // 첫 글자 대문자
                if (!cur || /[.!?]\s*$/.test(cur.trim())) {
                  add = add.charAt(0).toUpperCase() + add.slice(1);
                }
                writeArea.value = (cur + (needsSpace ? " " : "") + add).replace(/ {2,}/g, " ");
                // 마지막 문장이 자동으로 마침표 없이 들어왔으면 임시 점 추가
                if (!/[.!?]$/.test(writeArea.value.trim())) writeArea.value = writeArea.value.trim() + ".";
                writeArea.value += " ";
                drawRubricLive();
              }
              // interim은 표시만 (이번 MVP에서는 생략)
            },
            onEnd: (errCode) => {
              _activeRecog = null;
              btnMic.classList.remove("is-on");
              btnMic.textContent = "🎤 음성으로 말하기";
              writeArea.classList.remove("is-listening");
              if (errCode === "not-allowed" || errCode === "service-not-allowed") {
                alert("마이크 권한을 허용해 주세요 🎤");
              }
            },
          });
          if (r) {
            _activeRecog = r;
            btnMic.classList.add("is-on");
            btnMic.textContent = "⏹ 듣는 중… (탭해서 멈추기)";
            writeArea.classList.add("is-listening");
          }
        });

        $("btnClearText").addEventListener("click", () => {
          if (!writeArea.value.trim()) return;
          if (!confirm("지금까지 쓴 내용을 모두 지울까요?")) return;
          writeArea.value = "  ";
          drawRubricLive();
          writeArea.focus();
        });

        $("btnSubmitPara").addEventListener("click", () => {
          stopActiveRecog();
          const ev = evaluateParagraph(writeArea.value, activePrompt);
          const wrap = $("feedbackWrap");
          const panel = document.createElement("div");
          const pass = ev.passCount === ev.items.length;
          panel.className = "feedback-panel pop " + (pass ? "is-pass" : "is-fail");
          const head = document.createElement("h3");
          head.textContent = pass
            ? "🏆 완벽해요! 모든 조건을 만족했어요 (" + ev.passCount + "/" + ev.items.length + ")"
            : (ev.passCount >= 4
                ? "👍 잘했어요. 조금만 더 다듬어 볼까요? (" + ev.passCount + "/" + ev.items.length + ")"
                : "🌱 조언을 참고해 다시 써 볼까요? (" + ev.passCount + "/" + ev.items.length + ")");
          panel.appendChild(head);
          ev.items.forEach((it) => {
            const row = document.createElement("div");
            row.className = "feedback-row " + (it.ok ? "ok" : "no");
            row.innerHTML =
              '<span class="fr-mk">' + (it.ok ? "✅" : "⚠️") + "</span>" +
              '<div class="fr-body">' +
              '<div class="fr-label">' + it.label + "</div>" +
              '<div class="fr-hint">' + it.hint + "</div>" +
              "</div>";
            panel.appendChild(row);
          });
          const btnsRow = document.createElement("div");
          btnsRow.className = "btn-row";
          btnsRow.style.marginTop = "14px";
          const btnEnd = document.createElement("button");
          btnEnd.className = "btn btn-primary";
          btnEnd.textContent = "📊 최종 결과 보기";
          btnEnd.addEventListener("click", () => {
            state.score = ev.passCount;
            state.streak = ev.passCount;
            updateHud();
            finishGame();
          });
          const btnRetry = document.createElement("button");
          btnRetry.className = "btn btn-ghost";
          btnRetry.textContent = "✏️ 더 고쳐 쓰기";
          btnRetry.addEventListener("click", () => {
            wrap.innerHTML = "";
            writeArea.focus();
          });
          btnsRow.appendChild(btnRetry);
          btnsRow.appendChild(btnEnd);
          panel.appendChild(btnsRow);
          wrap.innerHTML = "";
          wrap.appendChild(panel);
          if (pass) playWin();
          else if (ev.passCount >= 4) playCorrect();
          else playWrong();
          panel.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      }

      /* --------------------------- Events --------------------------- */
      document.querySelectorAll(".menu-card").forEach((btn) => {
        btn.addEventListener("click", () => startMode(btn.dataset.mode));
      });
      $("btnBack").addEventListener("click", () => {
        try { if (typeof stopActiveRecog === "function") stopActiveRecog(); } catch (e) {}
        try { closeStudyOverlay(); } catch (e) {}
        showMenu();
      });
      $("btnPlayAgain").addEventListener("click", () => startMode(state.mode, { filter: state.modeFilter }));
      $("btnGoMenu").addEventListener("click", showMenu);

      showMenu();
    </script>
  </body>
</html>
