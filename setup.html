<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>스케줄 사이트 연결 설정</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        background: #f6f8fb;
        color: #1f2937;
      }
      .wrap {
        max-width: 720px;
        margin: 40px auto;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }
      p {
        margin: 0 0 16px;
        color: #4b5563;
        line-height: 1.5;
      }
      label {
        display: block;
        font-size: 14px;
        margin: 12px 0 6px;
        font-weight: 600;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 16px;
      }
      button, a.btn {
        border: 1px solid #2563eb;
        background: #2563eb;
        color: #fff;
        border-radius: 10px;
        padding: 10px 14px;
        text-decoration: none;
        font-size: 14px;
        cursor: pointer;
      }
      button.secondary, a.btn.secondary {
        background: #fff;
        color: #2563eb;
      }
      .status {
        margin-top: 14px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>공용 데이터 연결 설정</h1>
      <p>
        이 페이지는 현재 `sync-config.js` 값을 읽기 전용으로 보여줍니다.
        관리자/고객/작가 페이지는 브라우저 저장소를 무시하고, 해당 파일의 값만 사용합니다.
      </p>

      <label for="supabaseUrl">Supabase Project URL</label>
      <input id="supabaseUrl" type="text" placeholder="https://xxxx.supabase.co" />

      <label for="supabaseAnonKey">Supabase anon public key</label>
      <input id="supabaseAnonKey" type="text" placeholder="eyJ..." />

      <div class="row">
        <button id="saveBtn" type="button" disabled>저장 비활성화</button>
        <button id="clearBtn" class="secondary" type="button" disabled>설정지우기 비활성화</button>
        <a class="btn secondary" href="index.html">관리자 페이지 이동</a>
        <a class="btn secondary" href="customer.html">고객 페이지 이동</a>
        <a class="btn secondary" href="photographer.html">작가 페이지 이동</a>
      </div>

      <div id="status" class="status"></div>
    </main>

    <script src="./sync-config.js"></script>
    <script>
      const urlEl = document.getElementById("supabaseUrl");
      const keyEl = document.getElementById("supabaseAnonKey");
      const saveBtnEl = document.getElementById("saveBtn");
      const clearBtnEl = document.getElementById("clearBtn");
      const statusEl = document.getElementById("status");

      function refreshInputs() {
        const config = window.SCHEDULE_SITE_SYNC_CONFIG || {};
        urlEl.value = config.supabaseUrl || "";
        keyEl.value = config.supabaseAnonKey || "";
        urlEl.readOnly = true;
        keyEl.readOnly = true;
      }

      function setStatus(text, ok) {
        statusEl.textContent = text;
        statusEl.style.color = ok ? "#166534" : "#b91c1c";
      }

      saveBtnEl.addEventListener("click", () => {
        setStatus("저장은 비활성화되어 있습니다. sync-config.js를 수정해주세요.", false);
      });

      clearBtnEl.addEventListener("click", () => {
        setStatus("초기화는 비활성화되어 있습니다. sync-config.js를 수정해주세요.", false);
      });

      refreshInputs();
      setStatus("sync-config.js 값을 사용 중입니다. 브라우저 저장소는 사용하지 않습니다.", true);
    </script>
  </body>
</html>
