<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>고객 스케줄 등록</title>
    <style>
      :root {
        --line: #d7ddec;
        --text: #1f2940;
        --muted: #5f6c88;
        --blue: #466ba9;
        --bg: #f4f7fd;
        --red: #d74444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap { width: min(860px, 94vw); margin: 28px auto 36px; }
      .card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 16px; }
      h1 { margin: 0 0 8px; font-size: 1.8rem; }
      .sub { margin: 0 0 16px; color: var(--muted); }
      .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
      .tabs button { border: 1px solid var(--line); background: #f7f9ff; border-radius: 8px; padding: 7px 12px; font-weight: 700; cursor: pointer; }
      .tabs button.active { border-color: var(--blue); background: var(--blue); color: #fff; }
      .hidden { display: none !important; }
      .form { display: grid; gap: 8px; }
      .row { display: flex; align-items: center; gap: 8px; border: 1px solid var(--line); border-radius: 8px; background: #fcfdff; padding: 9px 10px; }
      .row input, .row select { width: 100%; border: 0; outline: none; background: transparent; font-size: 0.95rem; }
      .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .triple { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
      .btn { border: 0; background: var(--blue); color: #fff; border-radius: 10px; padding: 10px 12px; font-weight: 700; cursor: pointer; }
      .outline { border: 1px solid var(--line); background: #fff; color: var(--text); }
      .top-line { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
      .hint { margin: -2px 0 4px; font-size: 0.84rem; color: var(--muted); }
      .danger { color: var(--red); }
      .compose-wrap { border: 1px solid var(--line); border-radius: 8px; padding: 10px; background: #fcfdff; }
      .compose-label { font-weight: 700; margin-bottom: 8px; display: block; }
      .compose-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
      .compose-btn { border: 1px solid var(--line); background: #fff; color: var(--text); border-radius: 999px; padding: 6px 12px; font-weight: 700; cursor: pointer; }
      .compose-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
      .status-list { display: grid; gap: 8px; margin-top: 8px; }
      .status-card { border: 1px solid var(--line); border-radius: 10px; background: #fbfcff; padding: 10px; }
      .payment-summary-box { border: 1px solid var(--line); border-radius: 10px; background: #fbfcff; padding: 10px; margin-top: 8px; }
      .payment-summary-title { font-weight: 700; margin-bottom: 6px; }
      .payment-summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .status-head { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 6px; font-weight: 700; }
      .status-meta { font-size: 0.9rem; line-height: 1.5; color: #2f3c58; }
      .status-actions { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
      .small { font-size: 0.82rem; padding: 5px 10px; border-radius: 999px; }
      .divider { margin: 10px 0 6px; border-top: 1px dashed var(--line); }
      .weekday-weekend { color: var(--red); font-weight: 700; }
      .status-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
      .history-modal {
        position: fixed;
        inset: 0;
        background: rgba(17, 26, 44, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 14px;
        z-index: 999;
      }
      .history-modal.hidden { display: none; }
      .history-panel {
        width: min(760px, 96vw);
        max-height: 86vh;
        overflow: auto;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
      }
      .history-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }
      .history-list {
        display: grid;
        gap: 6px;
        margin-top: 10px;
      }
      .history-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
        background: #fbfcff;
        font-size: 0.88rem;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="card">
        <h1>고객용 스케줄 등록</h1>
        <p class="sub">회원가입 후 로그인하면 업체 스케줄을 직접 등록할 수 있습니다.</p>

        <div id="authBlock">
          <div class="tabs">
            <button id="loginTabBtn" class="active" type="button">로그인</button>
          </div>
          <form id="loginForm" class="form">
            <div class="row"><span>🆔</span><input id="loginId" type="text" placeholder="아이디" required /></div>
            <div class="row"><span>🔑</span><input id="loginPassword" type="password" placeholder="비밀번호" required /></div>
            <button id="saveLoginToggleBtn" class="btn outline small" type="button">아이디와 비번 저장하기: OFF</button>
            <button class="btn" type="submit">로그인</button>
            <button id="openSignupBtn" class="btn outline" type="button">회원가입</button>
          </form>
          <form id="signupForm" class="form hidden">
            <div class="row"><span>🆔</span><input id="signupId" type="text" placeholder="아이디" required /></div>
            <div class="row"><span>🔑</span><input id="signupPassword" type="password" placeholder="비밀번호" required /></div>
            <div class="row"><span>🏢</span><input id="signupCompany" type="text" placeholder="업체명" required /></div>
            <div class="row"><span>📞</span><input id="signupPhone" type="text" placeholder="연락처" required /></div>
            <div class="row"><span>🔢</span><input id="signupCompanyCode" type="text" placeholder="업체 고유번호(선택)" /></div>
            <button class="btn" type="submit">회원가입</button>
            <button id="backToLoginBtn" class="btn outline" type="button">로그인으로 돌아가기</button>
          </form>
        </div>

        <div id="scheduleBlock" class="hidden">
          <div class="top-line">
            <strong id="welcomeText"></strong>
            <button id="logoutBtn" class="btn outline" type="button">로그아웃</button>
          </div>

          <div class="tabs" style="margin-top: 4px;">
            <button id="registerTabBtn" class="active" type="button">스케줄등록</button>
            <button id="statusTabBtn" type="button">내등록현황</button>
          </div>

          <section id="registerSection">
            <form id="customerScheduleForm" class="form">
              <div class="triple">
                <div class="row"><span>📅</span><select id="scheduleYear" required></select></div>
                <div class="row"><span>📆</span><select id="scheduleMonth" required></select></div>
                <div class="row"><span>🗓️</span><select id="scheduleDay" required></select></div>
              </div>
              <div class="pair">
                <div class="row"><span>⏰</span><select id="scheduleHour" required></select></div>
                <div class="row"><span>⏱️</span><select id="scheduleMinute" required></select></div>
              </div>
              <p class="hint"><strong>희망시간</strong> | 선택 가능 시간은 10시~17시이며, 그 외 시간은 관리자에게 문의해주세요.<br />스케줄에 따라 시간은 변동될 수 있으며, 변동 시 안내 후 협의를 통해 시간을 다시 정합니다.</p>
              <div class="row"><span>📍</span><input id="schedulePlace" type="text" placeholder="촬영장소" required /></div>
              <div class="triple">
                <div class="row">
                  <span>📐</span>
                  <select id="schedulePyeong">
                    <option value="">평수 선택</option>
                    <option value="45평이하">45평이하</option>
                    <option value="45평이상">45평이상</option>
                    <option value="95평이상">95평이상</option>
                    <option value="145평이상">145평이상</option>
                  </select>
                </div>
                <div class="row"><span>🔒</span><input id="scheduleJointCode" type="text" placeholder="공동현관 비번" /></div>
                <div class="row"><span>🗝️</span><input id="scheduleDoorCode" type="text" placeholder="세대 비번" /></div>
              </div>
              <div class="row"><span>📝</span><input id="scheduleMemo" type="text" placeholder="메모사항" /></div>
              <div class="compose-wrap">
                <span class="compose-label">촬영구성</span>
                <div class="compose-buttons" id="composeButtons">
                  <button class="compose-btn active" type="button" data-compose="미선택">미선택</button>
                  <button class="compose-btn" type="button" data-compose="사진만">사진만</button>
                  <button class="compose-btn" type="button" data-compose="사진영상 둘다">사진영상둘다</button>
                </div>
                <input id="scheduleComposition" type="hidden" value="미선택" />
              </div>
              <button class="btn" type="submit">스케줄 등록</button>
              <p class="hint">스케줄 등록 후에는 <strong>내등록현황</strong> 탭에서 확인할 수 있습니다.</p>
            </form>
          </section>

          <section id="statusSection" class="hidden">
            <div id="paymentSummaryBox" class="payment-summary-box"></div>
            <div class="status-top">
              <p class="hint danger">등록한 스케줄은 4일 전까지 수정/삭제 가능하며, 3일 이내에는 관리자에게 요청해야 합니다.</p>
              <button id="orderHistoryBtn" class="btn outline small" type="button">기록보기</button>
            </div>
            <div id="statusList" class="status-list"></div>
          </section>
        </div>
      </div>
    </main>
    <div id="orderHistoryModal" class="history-modal hidden">
      <div class="history-panel">
        <div class="history-head">
          <strong>주문 기록</strong>
          <button id="orderHistoryCloseBtn" class="btn outline small" type="button">닫기</button>
        </div>
        <div id="orderHistorySummary"></div>
        <div id="orderHistoryDetailList" class="history-list"></div>
      </div>
    </div>

    <script src="./sync-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const STORAGE_CUSTOMERS = "scheduleSiteCustomers";
      const STORAGE_COMPANIES = "scheduleSiteCustomerCompanies";
      const STORAGE_SCHEDULES = "scheduleSiteCustomerSchedules";
      const STORAGE_SESSION = "scheduleSiteCustomerSession";
      const STORAGE_CUSTOMER_REMEMBERED_LOGIN = "scheduleSiteCustomerRememberedLogin";
      const STORAGE_ALERTS = "scheduleSiteCustomerAlerts";
      const STORAGE_LOGIN_LOGS = "scheduleSiteCustomerLogins";
      const STORAGE_ADMIN_WRITER_SCHEDULES = "scheduleSiteWriterSchedules";
      const STORAGE_ADMIN_SCHEDULES = "scheduleSiteAdminSchedules";
      const STORAGE_CANCELED_SCHEDULES = "scheduleSiteCanceledSchedules";
      const STORAGE_DAILY_LIMITS = "scheduleSiteDailyLimits";
      const STORAGE_DAYOFF_DEDUCTIONS = "scheduleSiteDayoffDeductions";
      const STORAGE_DAYOFF_REQUESTS = "scheduleSiteDayoffRequests";
      const STORAGE_LIMIT_CONFIG = "scheduleSiteLimitConfig";
      const syncConfig = window.SCHEDULE_SITE_SYNC_CONFIG || {};
      const FALLBACK_SUPABASE_URL = "https://pidfkrxsgffoqstogmli.supabase.co";
      const FALLBACK_SUPABASE_ANON_KEY = "sb_publishable_0JHUt_yXZx78FwoqO8XCDg_s319cLiW";
      const REMOTE_SYNC_ENDPOINT = syncConfig.remoteSyncEndpoint || "";
      const SUPABASE_URL =
        syncConfig.supabaseUrl ||
        FALLBACK_SUPABASE_URL;
      const SUPABASE_ANON_KEY =
        syncConfig.supabaseAnonKey ||
        FALLBACK_SUPABASE_ANON_KEY;
      const USE_SUPABASE_SYNC = Boolean(SUPABASE_URL && SUPABASE_ANON_KEY);
      const SUPABASE_STATE_TABLE = "app_state";
      const SUPABASE_STATE_ID = "global";
      const STORAGE_SYNC_KEYS = [
        "scheduleSiteCustomerCompanies",
        "scheduleSiteCustomerSchedules",
        "scheduleSiteCustomerAlerts",
        "scheduleSiteCustomers",
        "scheduleSiteCustomerLogins",
        "scheduleSiteAdminCompanies",
        "scheduleSiteCanceledSchedules",
        "scheduleSiteWriters",
        "scheduleSiteWriterSchedules",
        "scheduleSiteAdminSchedules",
        "scheduleSiteDailyLimits",
        "scheduleSiteDayoffDeductions",
        "scheduleSiteDayoffRequests",
        "scheduleSiteDayoffAlertReadIds",
        "scheduleSiteLimitConfig",
        "scheduleSiteExcludedPhotographers",
        "scheduleSitePhotographerProfiles"
      ];
      function buildCurrentStateSnapshot() {
        const state = {};
        STORAGE_SYNC_KEYS.forEach((key) => {
          const value = localStorage.getItem(key);
          state[key] = value === null ? null : value;
        });
        return state;
      }

      function applyRemoteState(state) {
        if (!state || typeof state !== "object") return;
        isApplyingRemoteState = true;
        try {
          STORAGE_SYNC_KEYS.forEach((key) => {
            if (!Object.prototype.hasOwnProperty.call(state, key)) {
              originalRemoveItem(key);
              return;
            }
            const value = state[key];
            if (value === null || value === undefined) {
              originalRemoveItem(key);
            } else {
              originalSetItem(key, String(value));
            }
          });
        } finally {
          isApplyingRemoteState = false;
          lastObservedState = buildCurrentStateSnapshot();
        }
      }

      function pullRemoteStateSync() {
        try {
          if (USE_SUPABASE_SYNC) {
            const xhr = new XMLHttpRequest();
            xhr.open(
              "GET",
              `${SUPABASE_URL}/rest/v1/${SUPABASE_STATE_TABLE}?id=eq.${encodeURIComponent(SUPABASE_STATE_ID)}&select=payload&limit=1`,
              false
            );
            xhr.setRequestHeader("apikey", SUPABASE_ANON_KEY);
            xhr.setRequestHeader("Authorization", `Bearer ${SUPABASE_ANON_KEY}`);
            xhr.setRequestHeader("Cache-Control", "no-cache");
            xhr.send();
            if (xhr.status < 200 || xhr.status >= 300) return false;
            const rows = JSON.parse(xhr.responseText || "[]");
            if (!Array.isArray(rows) || !rows.length) return false;
            const row = rows[0];
            const state = row && row.payload && typeof row.payload === "object" ? row.payload : {};
            applyRemoteState(state);
            return true;
          }

          if (!REMOTE_SYNC_ENDPOINT) return false;
          const xhr = new XMLHttpRequest();
          const connector = REMOTE_SYNC_ENDPOINT.includes("?") ? "&" : "?";
          xhr.open("GET", `${REMOTE_SYNC_ENDPOINT}${connector}t=${Date.now()}`, false);
          xhr.setRequestHeader("Cache-Control", "no-cache");
          xhr.send();
          if (xhr.status < 200 || xhr.status >= 300) return false;
          const payload = JSON.parse(xhr.responseText || "{}");
          const state = payload && typeof payload === "object" ? payload.state || {} : {};
          applyRemoteState(state);
          return true;
        } catch (error) {
          // 서버 미접속 상태에서는 로컬 모드로 계속 동작
        }
        return false;
      }

      let remoteSyncTimer = null;
      let isRemotePushRunning = false;
      let isApplyingRemoteState = false;
      let currentPushPromise = null;
      const pendingLocalSyncKeys = new Set();
      let localChangePollTimer = null;
      let serverPullTimer = null;
      let lastObservedState = {};
      let syncStatusBadgeEl = null;
      const originalSetItem = localStorage.setItem.bind(localStorage);
      const originalRemoveItem = localStorage.removeItem.bind(localStorage);
      function formatSyncTime(date = new Date()) {
        const h = String(date.getHours()).padStart(2, "0");
        const m = String(date.getMinutes()).padStart(2, "0");
        const s = String(date.getSeconds()).padStart(2, "0");
        return `${h}:${m}:${s}`;
      }
      function setSyncStatus(text, tone = "info") {
        if (!syncStatusBadgeEl) {
          syncStatusBadgeEl = document.createElement("div");
          syncStatusBadgeEl.style.position = "fixed";
          syncStatusBadgeEl.style.right = "14px";
          syncStatusBadgeEl.style.bottom = "14px";
          syncStatusBadgeEl.style.zIndex = "99999";
          syncStatusBadgeEl.style.padding = "8px 10px";
          syncStatusBadgeEl.style.borderRadius = "10px";
          syncStatusBadgeEl.style.fontSize = "12px";
          syncStatusBadgeEl.style.fontWeight = "700";
          syncStatusBadgeEl.style.color = "#fff";
          syncStatusBadgeEl.style.boxShadow = "0 6px 18px rgba(0,0,0,0.2)";
          document.body.appendChild(syncStatusBadgeEl);
        }
        const toneMap = {
          ok: "#166534",
          warn: "#b45309",
          error: "#b91c1c",
          info: "#1d4ed8"
        };
        syncStatusBadgeEl.style.background = toneMap[tone] || toneMap.info;
        syncStatusBadgeEl.textContent = `동기화: ${text}`;
      }
      async function fetchRemoteStateSnapshot() {
        if (USE_SUPABASE_SYNC) {
          const response = await fetch(
            `${SUPABASE_URL}/rest/v1/${SUPABASE_STATE_TABLE}?id=eq.${encodeURIComponent(SUPABASE_STATE_ID)}&select=payload&limit=1`,
            {
              method: "GET",
              headers: {
                apikey: SUPABASE_ANON_KEY,
                Authorization: `Bearer ${SUPABASE_ANON_KEY}`
              },
              cache: "no-store"
            }
          );
          if (!response.ok) return {};
          const rows = await response.json();
          if (!Array.isArray(rows) || rows.length === 0) return {};
          const row = rows[0];
          return row && row.payload && typeof row.payload === "object" ? row.payload : {};
        }
        if (!REMOTE_SYNC_ENDPOINT) return {};
        const connector = REMOTE_SYNC_ENDPOINT.includes("?") ? "&" : "?";
        const response = await fetch(`${REMOTE_SYNC_ENDPOINT}${connector}t=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) return {};
        const payload = await response.json();
        return payload && typeof payload === "object" ? payload.state || {} : {};
      }
      function applyRemoteStateSnapshotWithPending(remoteState) {
        if (!remoteState || typeof remoteState !== "object") return;
        STORAGE_SYNC_KEYS.forEach((key) => {
          if (pendingLocalSyncKeys.has(key)) return;
          if (!Object.prototype.hasOwnProperty.call(remoteState, key)) return;
          const value = remoteState[key];
          if (value === null || value === undefined) {
            originalRemoveItem(key);
            return;
          }
          originalSetItem(key, String(value));
        });
      }
      function tryParseJsonValue(value) {
        if (typeof value !== "string") return null;
        try {
          return JSON.parse(value);
        } catch (error) {
          return null;
        }
      }
      function guessMergeKey(row, index) {
        if (!row || typeof row !== "object") return `idx:${index}`;
        const preferredKeys = ["id", "scheduleId", "customerId", "cancelId", "code", "name", "createdAt"];
        for (const key of preferredKeys) {
          if (Object.prototype.hasOwnProperty.call(row, key) && row[key] !== null && row[key] !== undefined && row[key] !== "") {
            return `${key}:${String(row[key])}`;
          }
        }
        return `json:${JSON.stringify(row)}`;
      }
      function mergeStorageValue(remoteValue, localValue) {
        if (localValue === null || localValue === undefined) return null;
        if (remoteValue === null || remoteValue === undefined) return localValue;
        const remoteJson = tryParseJsonValue(remoteValue);
        const localJson = tryParseJsonValue(localValue);
        if (Array.isArray(remoteJson) && Array.isArray(localJson)) {
          const mergedMap = new Map();
          remoteJson.forEach((row, index) => {
            mergedMap.set(guessMergeKey(row, index), row);
          });
          localJson.forEach((row, index) => {
            mergedMap.set(guessMergeKey(row, index), row);
          });
          return JSON.stringify(Array.from(mergedMap.values()));
        }
        if (
          remoteJson &&
          localJson &&
          typeof remoteJson === "object" &&
          typeof localJson === "object" &&
          !Array.isArray(remoteJson) &&
          !Array.isArray(localJson)
        ) {
          return JSON.stringify({ ...remoteJson, ...localJson });
        }
        return localValue;
      }
      function buildMergedStateForPush(remoteState, localState) {
        const mergedState = {};
        STORAGE_SYNC_KEYS.forEach((key) => {
          const hasRemote = remoteState && Object.prototype.hasOwnProperty.call(remoteState, key);
          const remoteValue = hasRemote ? remoteState[key] : null;
          const localValue = Object.prototype.hasOwnProperty.call(localState, key) ? localState[key] : null;
          if (!pendingLocalSyncKeys.has(key)) {
            mergedState[key] = remoteValue === undefined ? null : remoteValue;
            return;
          }
          mergedState[key] = mergeStorageValue(remoteValue, localValue);
        });
        return mergedState;
      }
      async function pushRemoteState() {
        if (isRemotePushRunning) return;
        isRemotePushRunning = true;
        setSyncStatus("저장 중...", "warn");
        try {
          const latestRemoteState = await fetchRemoteStateSnapshot();
          applyRemoteStateSnapshotWithPending(latestRemoteState);
          const localState = buildCurrentStateSnapshot();
          const state = buildMergedStateForPush(latestRemoteState, localState);
          if (USE_SUPABASE_SYNC) {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_STATE_TABLE}?on_conflict=id`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                apikey: SUPABASE_ANON_KEY,
                Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
                Prefer: "resolution=merge-duplicates,return=minimal"
              },
              body: JSON.stringify([{ id: SUPABASE_STATE_ID, payload: state }])
            });
            if (!response.ok) {
              const errorText = await response.text();
              throw new Error(`Supabase upsert 실패 (${response.status}): ${errorText}`);
            }
            console.log("[SYNC][customer] upsert success", {
              id: SUPABASE_STATE_ID,
              keys: Object.keys(state || {}).length,
              pending: pendingLocalSyncKeys.size
            });
            setSyncStatus(`저장 완료 ${formatSyncTime()}`, "ok");
            pendingLocalSyncKeys.clear();
            lastObservedState = buildCurrentStateSnapshot();
            return;
          }
          if (!REMOTE_SYNC_ENDPOINT) return;
          const response = await fetch(REMOTE_SYNC_ENDPOINT, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ state })
          });
          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`원격 PUT 실패 (${response.status}): ${errorText}`);
          }
          console.log("[SYNC][customer] remote PUT success", { keys: Object.keys(state || {}).length });
          setSyncStatus(`저장 완료 ${formatSyncTime()}`, "ok");
          pendingLocalSyncKeys.clear();
          lastObservedState = buildCurrentStateSnapshot();
        } catch (error) {
          console.error("[SYNC][customer] 저장 실패", error);
          setSyncStatus("저장 실패", "error");
          alert(`데이터 저장 실패: ${error && error.message ? error.message : "알 수 없는 오류"}`);
          throw error;
        } finally {
          isRemotePushRunning = false;
        }
      }
      function runPushNow() {
        if (!currentPushPromise) {
          currentPushPromise = pushRemoteState().finally(() => {
            currentPushPromise = null;
          });
        }
        return currentPushPromise;
      }
      async function flushPendingSync() {
        if (remoteSyncTimer) {
          clearTimeout(remoteSyncTimer);
          remoteSyncTimer = null;
        }
        if (pendingLocalSyncKeys.size > 0) {
          await runPushNow();
          return;
        }
        if (currentPushPromise) await currentPushPromise;
      }

      function scheduleRemotePush(delayMs = 250) {
        if (remoteSyncTimer) clearTimeout(remoteSyncTimer);
        remoteSyncTimer = setTimeout(() => {
          void runPushNow();
        }, Math.max(0, Number(delayMs) || 0));
      }
      let lastFocusPullAt = 0;
      async function pullRemoteStateOnFocus() {
        const now = Date.now();
        if (now - lastFocusPullAt < 800) return;
        lastFocusPullAt = now;
        await flushPendingSync();
        setSyncStatus("서버 확인 중...", "info");
        pullRemoteStateSync();
        pendingLocalSyncKeys.clear();
        lastObservedState = buildCurrentStateSnapshot();
        setSyncStatus(`서버 반영 ${formatSyncTime()}`, "ok");
        renderAuthState();
      }
      function captureLocalChangesForSync() {
        if (isApplyingRemoteState) return;
        const currentState = buildCurrentStateSnapshot();
        STORAGE_SYNC_KEYS.forEach((key) => {
          if ((lastObservedState[key] ?? null) !== (currentState[key] ?? null)) {
            pendingLocalSyncKeys.add(key);
          }
        });
        lastObservedState = currentState;
        if (pendingLocalSyncKeys.size > 0) void runPushNow();
      }
      function startLocalChangeWatcher() {
        if (localChangePollTimer) clearInterval(localChangePollTimer);
        localChangePollTimer = setInterval(captureLocalChangesForSync, 300);
      }
      function startServerPullWatcher() {
        if (serverPullTimer) clearInterval(serverPullTimer);
        serverPullTimer = setInterval(() => {
          void pullRemoteStateOnFocus();
        }, 2000);
      }
      function startRealtimeSyncSubscription() {
        if (!USE_SUPABASE_SYNC) return;
        if (!window.supabase || typeof window.supabase.createClient !== "function") return;
        try {
          const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
          client
            .channel(`app-state-${SUPABASE_STATE_ID}`)
            .on(
              "postgres_changes",
              { event: "*", schema: "public", table: SUPABASE_STATE_TABLE, filter: `id=eq.${SUPABASE_STATE_ID}` },
              (payload) => {
                const nextState = payload && payload.new && payload.new.payload && typeof payload.new.payload === "object"
                  ? payload.new.payload
                  : null;
                if (!nextState) return;
                applyRemoteState(nextState);
                pendingLocalSyncKeys.clear();
                setSyncStatus(`실시간 반영 ${formatSyncTime()}`, "ok");
                renderAuthState();
              }
            )
            .subscribe();
        } catch (error) {
          // realtime 연결 실패 시 수동 pull/push 동기화로 계속 동작
        }
      }

      STORAGE_SYNC_KEYS.forEach((key) => originalRemoveItem(key));
      setSyncStatus("초기 동기화 중...", "info");
      const initialPullOk = pullRemoteStateSync();
      if (!initialPullOk) {
        setSyncStatus("동기화 재시도 중...", "warn");
        void fetchRemoteStateSnapshot()
          .then((state) => {
            applyRemoteState(state || {});
            pendingLocalSyncKeys.clear();
            lastObservedState = buildCurrentStateSnapshot();
            setSyncStatus(`연결됨 ${formatSyncTime()}`, "ok");
            renderAuthState();
          })
          .catch(() => {
            setSyncStatus("초기 동기화 실패", "error");
          });
      } else {
        setSyncStatus(`연결됨 ${formatSyncTime()}`, "ok");
      }
      pendingLocalSyncKeys.clear();
      lastObservedState = buildCurrentStateSnapshot();
      localStorage.setItem = (key, value) => {
        originalSetItem(key, value);
        if (!isApplyingRemoteState && STORAGE_SYNC_KEYS.includes(String(key))) {
          pendingLocalSyncKeys.add(String(key));

      localStorage.removeItem = (key) => {

        if (!isApplyingRemoteState && STORAGE_SYNC_KEYS.includes(String(key))) {
          pendingLocalSyncKeys.add(String(key));
          void runPushNow();
        }
      };
      startLocalChangeWatcher();
      startServerPullWatcher();
      startRealtimeSyncSubscription();

        void pullRemoteStateOnFocus();
      });

      function getCompanyKey(text, companyCode = "") {
        const code = normalize(companyCode);
        if (code) return `code:${code.toLowerCase()}`;
        return `name:${normalize(text)
          .replace(/\([^)]*\)/g, "")
          .replace(/\s+/g, "")
          .toLowerCase()}`;
      }

      function buildStableAdminScheduleId(row, companyKeyOverride = "") {
        const date = normalize(row?.date) || "nodate";
        const time = normalize(row?.time) || "notime";
        const companyKey = companyKeyOverride || getCompanyKey(row?.company, row?.companyCode) || "nocompany";
        const placeKey = normalize(row?.place)
          .replace(/\s+/g, "")
          .toLowerCase() || "noplace";
        return `admin-${companyKey}-${date}-${time}-${placeKey}`;
      }

      function pad2(value) {

      function isWeekend(year, month, day) {
        const weekday = new Date(year, month - 1, day).getDay();
        return weekday === 0 || weekday === 6;
      }

      function isHolidayDate(dateKey) {
        const holidayDateSet = new Set([
          "2025-01-01", "2025-01-28", "2025-01-29", "2025-01-30",
          "2025-03-01", "2025-03-03",
          "2025-05-05", "2025-05-06",
          "2025-06-06", "2025-08-15",
          "2025-10-03", "2025-10-06", "2025-10-07", "2025-10-08", "2025-10-09",
          "2025-12-25",
          "2026-01-01", "2026-02-16", "2026-02-17", "2026-02-18",
          "2026-03-01", "2026-03-02",
          "2026-05-05", "2026-05-24", "2026-05-25",
          "2026-06-06",
          "2026-08-15", "2026-08-17",
          "2026-09-24", "2026-09-25", "2026-09-26",
          "2026-10-03", "2026-10-05", "2026-10-09",
          "2026-12-25",
          "2027-01-01", "2027-02-06", "2027-02-08", "2027-02-09",
          "2027-03-01",
          "2027-05-05", "2027-05-13",
          "2027-06-06", "2027-06-07",
          "2027-08-15", "2027-08-16",
          "2027-09-14", "2027-09-15", "2027-09-16",
          "2027-10-03", "2027-10-04", "2027-10-09", "2027-10-11",
          "2027-12-25", "2027-12-27"
        ]);
        return holidayDateSet.has(String(dateKey || "").slice(0, 10));
      }

      function getDefaultDailyLimit(dateKey) {
        const config = readStorageObject(STORAGE_LIMIT_CONFIG);
        const weekdayLimit = Math.max(0, Number(config.weekdayLimit) || 8);
        const holidayLimit = Math.max(0, Number(config.holidayLimit) || 4);
        const weekday = new Date(`${dateKey}T00:00:00`).getDay();
        const weekend = weekday === 0 || weekday === 6;
        return weekend || isHolidayDate(dateKey) ? holidayLimit : weekdayLimit;
      }

      function getEffectiveDailyLimit(dateKey) {
        const deductions = readStorageObject(STORAGE_DAYOFF_DEDUCTIONS);
        const requests = readStorageArray(STORAGE_DAYOFF_REQUESTS);
        const base = getDefaultDailyLimit(dateKey);
        const legacyRaw = Number(deductions[dateKey]);
        const legacyDeduction = Number.isNaN(legacyRaw) || legacyRaw < 0 ? 0 : Math.floor(legacyRaw);
        const requestedDeduction = requests
          .filter((item) => String(item?.date || "") === String(dateKey || ""))
          .reduce((sum, item) => sum + Math.max(0, Number(item?.amount) || 0), 0);
        return Math.max(0, base - legacyDeduction - requestedDeduction);
      }

      function getBookedCountForDate(dateKey) {
        const targetDate = String(dateKey || "").trim();
        const adminSourceRows = readStorageArray(STORAGE_ADMIN_SCHEDULES);
        const customerRows = readStorageArray(STORAGE_SCHEDULES);
        if (adminSourceRows.length > 0) {
          return adminSourceRows.filter((row) => String(row?.date || "").trim() === targetDate).length;
        }
        const adminRows = readStorageArray(STORAGE_ADMIN_WRITER_SCHEDULES);
        const customerIds = new Set(
          customerRows
            .map((row) => String(row?.customerScheduleId || "").trim())
            .filter(Boolean)
        );

        const customerCount = customerRows.filter((row) => String(row?.date || "").trim() === targetDate).length;
        const adminOnlyCount = adminRows.filter((row) => {
          if (String(row?.date || "").trim() !== targetDate) return false;
          const mirrorId = String(row?.writerMirrorId || "").trim();
          if (!mirrorId) return true;
          return !customerIds.has(mirrorId);
        }).length;
        return customerCount + adminOnlyCount;
      }

      function syncAdminSchedulesToCustomerUser(user) {
        if (!user) return;
        const adminRows = readStorageArray(STORAGE_ADMIN_SCHEDULES);
        const targetCompanyKey = getCompanyKey(user.company, user.companyCode);
        const schedules = readStorageArray(STORAGE_SCHEDULES);
        const adminCompanyRows = adminRows.filter((row) => getCompanyKey(row?.company, row?.companyCode) === targetCompanyKey);
        const buildRowKey = (row) =>
          [
            normalize(row?.date),
            normalize(row?.time),
            targetCompanyKey,
            normalize(row?.place)
          ].join("|");
        const adminIdSet = new Set(
          adminCompanyRows
            .map((row) => normalize(row?.customerScheduleId))
            .filter(Boolean)
        );
        const adminFallbackKeySet = new Set(adminCompanyRows.map((row) => buildRowKey(row)));
        let changed = false;

        // 관리자 원본 기준으로 해당 업체의 잔존(고아) 스케줄 정리
        for (let i = schedules.length - 1; i >= 0; i -= 1) {
          const row = schedules[i];
          if (getCompanyKey(row?.company, row?.companyCode) !== targetCompanyKey) continue;
          const scheduleId = normalize(row?.customerScheduleId);
          const fallbackKey = buildRowKey(row);
          const existsInAdmin =
            (scheduleId && adminIdSet.has(scheduleId)) || adminFallbackKeySet.has(fallbackKey);
          if (!existsInAdmin) {
            schedules.splice(i, 1);
            changed = true;
          }
        }

        adminCompanyRows.forEach((row) => {
          const scheduleId = normalize(row?.customerScheduleId) || buildStableAdminScheduleId(row, targetCompanyKey);
          const fallbackMatch = (item) =>
            String(item?.date || "").trim() === String(row?.date || "").trim() &&
            String(item?.time || "").trim() === String(row?.time || "").trim() &&
            getCompanyKey(item?.company, item?.companyCode) === targetCompanyKey &&
            normalize(item?.place) === normalize(row?.place);
          const index = scheduleId
            ? schedules.findIndex((item) => String(item?.customerScheduleId || "").trim() === scheduleId)
            : schedules.findIndex(fallbackMatch);

          const nextRow = {
            customerScheduleId: scheduleId,
            customerId: String(user.id || "").trim(),
            customerPhone: String(user.phone || "").trim(),
            date: String(row?.date || "").trim(),
            time: String(row?.time || "09:00").trim() || "09:00",
            name: String(row?.name || "작가미정").trim() || "작가미정",
            company: normalize(user.company),
            companyCode: normalize(user.companyCode),
            place: normalize(row?.place),
            pyeong: normalize(row?.pyeong),
            jointCode: normalize(row?.jointCode),
            doorCode: normalize(row?.doorCode),
            memo: normalize(row?.memo),
            composition: normalize(row?.composition) || "사진만",
            paymentStatus: normalize(row?.paymentStatus) || "미입금",
            paymentPayer: normalize(row?.paymentPayer),
            paymentAmount: normalize(row?.paymentAmount),
            paymentDate: normalize(row?.paymentDate),
            couponUsed: Boolean(row?.couponUsed),
            adminTimeUpdated: Boolean(row?.adminTimeUpdated),
            writerPhone: normalize(row?.writerPhone),
            writerCarNumber: normalize(row?.writerCarNumber)
          };

          if (index >= 0) {
            schedules[index] = { ...schedules[index], ...nextRow };
            changed = true;
            return;
          }
          schedules.unshift(nextRow);
          changed = true;
        });

        if (changed) {
          writeStorageArray(STORAGE_SCHEDULES, schedules);
        }
      }

      function renderAuthState() {

      function ensureCompanyStored(companyName, phone, companyCode = "") {
        const companies = readStorageArray(STORAGE_COMPANIES);
        const company = normalize(companyName);
        const normalizedCode = normalize(companyCode);
        const targetKey = getCompanyKey(company, normalizedCode);
        const existingIndex = companies.findIndex((item) => getCompanyKey(item?.name, item?.companyCode || item?.code) === targetKey);
        const exists = existingIndex >= 0;
        if (!exists) {
          companies.unshift({ name: company, phone: normalize(phone), companyCode: normalizedCode });
          writeStorageArray(STORAGE_COMPANIES, companies);
          return true;
        }
        if (normalizedCode && !normalize(companies[existingIndex]?.companyCode || companies[existingIndex]?.code)) {
          companies[existingIndex].companyCode = normalizedCode;
          writeStorageArray(STORAGE_COMPANIES, companies);
        }
        return false;
      }

      function renderRegisterMonthOptions(selectedYear, preferredMonth) {
        const now = new Date();
        const currentYearValue = now.getFullYear();
        const currentMonth = now.getMonth() + 1;
        const year = Number(selectedYear);
        const startMonth = year === currentYearValue ? currentMonth : 1;
        scheduleMonthEl.innerHTML = Array.from({ length: 12 - startMonth + 1 }, (_, idx) => startMonth + idx)
          .map((month) => `<option value="${month}">${month}월</option>`)
          .join("");
        const safePreferred = Number(preferredMonth);
        const nextMonth = Number.isNaN(safePreferred) ? startMonth : Math.max(safePreferred, startMonth);
        scheduleMonthEl.value = String(nextMonth);
      }

      function renderDayOptions(year, month, preferredDay) {
        const selectedYear = Number(year);
        const selectedMonth = Number(month);
        const daysInMonth = new Date(selectedYear, selectedMonth, 0).getDate();
        scheduleDayEl.innerHTML = Array.from({ length: daysInMonth }, (_, idx) => idx + 1)
          .map((day) => {
            const weekday = weekdayNames[new Date(selectedYear, selectedMonth - 1, day).getDay()];
            const weekend = isWeekend(selectedYear, selectedMonth, day);
            return `<option value="${day}" style="${weekend ? "color:#d74444;" : ""}">${day}일 (${weekday})</option>`;
          })
          .join("");
        scheduleDayEl.value = String(Math.min(Math.max(Number(preferredDay) || 1, 1), daysInMonth));
        updateSelectedDayColor();

      function buildDayOptionsHtml(year, month, preferredDay) {
        const selectedYear = Number(year);
        const selectedMonth = Number(month);
        const daysInMonth = new Date(selectedYear, selectedMonth, 0).getDate();
        const selectedDay = Math.min(Math.max(Number(preferredDay) || 1, 1), daysInMonth);
        const html = Array.from({ length: daysInMonth }, (_, idx) => idx + 1)
          .map((day) => {
            const weekday = weekdayNames[new Date(selectedYear, selectedMonth - 1, day).getDay()];
            const weekend = isWeekend(selectedYear, selectedMonth, day);
            return `<option value="${day}" ${day === selectedDay ? "selected" : ""} style="${weekend ? "color:#d74444;" : ""}">${day}일 (${weekday})</option>`;
          })
          .join("");
        return { html, selectedDay };
      }

      function refreshEditDayOptions(cardEl, preferredDay) {
        if (!cardEl) return;

        daySelectEl.innerHTML = html;

        daySelectEl.classList.toggle("weekday-weekend", isWeekend(year, month, selectedDay));

      function getUserSchedules() {
        const user = getCurrentSessionUser();
        if (!user) return [];
        syncAdminSchedulesToCustomerUser(user);
        const userId = String(user.id || "").trim();
        const userCompanyKey = getCompanyKey(user.company, user.companyCode);
        return readStorageArray(STORAGE_SCHEDULES).filter((row) => {
          const rowCustomerId = String(row?.customerId || "").trim();
          const rowCompanyKey = getCompanyKey(row?.company, row?.companyCode);
          if (rowCustomerId && rowCustomerId === userId) return true;
          return userCompanyKey && rowCompanyKey && rowCompanyKey === userCompanyKey;
        });
      }

      function isPastSchedule(dateText) {
        if (!/^\d{4}-\d{2}-\d{2}$/.test(dateText || "")) return false;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const target = new Date(`${dateText}T00:00:00`);
        return target.getTime() < today.getTime();
      }

      function canEditOrDelete(dateText) {
        if (!/^\d{4}-\d{2}-\d{2}$/.test(dateText || "")) return false;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const target = new Date(`${dateText}T00:00:00`);
        const diffDays = Math.floor((target.getTime() - today.getTime()) / 86400000);
        return diffDays >= 4;
      }

      function renderOrderHistorySummary() {
        const schedules = getUserSchedules();

          const monthKey = String(item.date || "").slice(0, 7);

          grouped.set(monthKey, (grouped.get(monthKey) || 0) + 1);
        });
        const monthlyRows = [...grouped.entries()]
          .sort((a, b) => b[0].localeCompare(a[0]))
          .map(([month, count]) => `<tr><td>${month}</td><td>${count}건</td></tr>`)
          .join("");
        const detailRows = schedules
          .sort((a, b) => {
            const at = new Date(`${a.date}T${a.time || "00:00"}:00`).getTime();
            const bt = new Date(`${b.date}T${b.time || "00:00"}:00`).getTime();
            return bt - at;

            (item) => `
              <div class="history-item">
                ${item.date || "-"} ${item.time || "-"}<br />
                장소: ${item.place || "-"} | 평수: ${item.pyeong || "-"} | 구성: ${item.composition || "-"}

      statusListEl.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button) return;
        const action = button.dataset.action;
        const scheduleId = button.dataset.id;
        const schedules = readStorageArray(STORAGE_SCHEDULES);
        const index = schedules.findIndex((item) => item.customerScheduleId === scheduleId);
        const item = schedules[index];

        if (action === "startEdit") {
          if (!item || !canEditOrDelete(item.date)) {
            alert("3일 이내 일정은 관리자에게 요청해주세요.");
            return;
          }
          editingScheduleId = scheduleId;
          renderStatusList();
          return;
        }

        if (action === "cancelEdit") {
          editingScheduleId = null;
          renderStatusList();
          return;
        }

        if (action === "pickEditCompose") {
          const cardEl = button.closest(".status-card");
          const hiddenEl = cardEl?.querySelector(".edit-composition");
          if (!cardEl || !hiddenEl) return;
          hiddenEl.value = button.dataset.value || "사진만";
          cardEl.querySelectorAll("button[data-action='pickEditCompose']").forEach((btn) => {
            btn.classList.toggle("active", btn === button);
          });
          return;
        }

        if (action === "saveEdit") {
          if (!item || !canEditOrDelete(item.date)) {
            alert("3일 이내 일정은 관리자에게 요청해주세요.");
            return;
          }
          const cardEl = button.closest(".status-card");
          if (!cardEl) return;
          const editYear = Number(cardEl.querySelector(".edit-year")?.value);
          const editMonth = Number(cardEl.querySelector(".edit-month")?.value);
          const editDay = Number(cardEl.querySelector(".edit-day")?.value);
          const editDate = `${editYear}-${pad2(editMonth)}-${pad2(editDay)}`;
          if (!canEditOrDelete(editDate)) {
            alert("수정 후 일정이 3일 이내가 되면 저장할 수 없습니다. 관리자에게 요청해주세요.");
            return;
          }
          item.date = editDate;
          item.time = `${cardEl.querySelector(".edit-hour")?.value || "10"}:${cardEl.querySelector(".edit-minute")?.value || "00"}`;
          item.place = normalize(cardEl.querySelector(".edit-place")?.value);
          item.pyeong = normalize(cardEl.querySelector(".edit-pyeong")?.value);
          item.memo = normalize(cardEl.querySelector(".edit-memo")?.value);
          item.composition = normalize(cardEl.querySelector(".edit-composition")?.value) || "사진만";
          item.adminTimeUpdated = false;
          schedules[index] = item;
          writeStorageArray(STORAGE_SCHEDULES, schedules);

          const user = getCurrentSessionUser();
          if (user) {
            const alerts = readStorageArray(STORAGE_ALERTS);
            alerts.unshift({
              id: `alert-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
              type: "schedule_edit",
              scheduleId: item.customerScheduleId,
              company: user.company,
              date: item.date,
              time: item.time,
              createdAt: new Date().toISOString(),
              read: false
            });
            writeStorageArray(STORAGE_ALERTS, alerts);
          }

          editingScheduleId = null;
          renderStatusList();
          return;
        }

        if (action === "deleteRow") {
          if (!item || !canEditOrDelete(item.date)) {
            alert("3일 이내 일정은 관리자에게 요청해주세요.");
            return;
          }
          const confirmed = confirm("등록한 스케줄을 삭제할까요?");
          if (!confirmed) return;
          const deletedDate = item.date;
          const deletedTime = item.time;
          const deletedCompany = item.company;
          appendCanceledScheduleRecord(item, "customer", "고객취소");
          schedules.splice(index, 1);
          writeStorageArray(STORAGE_SCHEDULES, schedules);
          const adminSchedules = readStorageArray(STORAGE_ADMIN_SCHEDULES);
          const writerSchedules = readStorageArray(STORAGE_ADMIN_WRITER_SCHEDULES);
          const deletedScheduleId = normalize(item?.customerScheduleId);
          const isSameSchedule = (row) => {
            const sameById = deletedScheduleId && normalize(row?.customerScheduleId || row?.writerMirrorId) === deletedScheduleId;
            if (sameById) return true;
            return (
              normalize(row?.date) === normalize(item?.date) &&
              normalize(row?.time) === normalize(item?.time) &&
              getCompanyKey(row?.company, row?.companyCode) === getCompanyKey(item?.company, item?.companyCode) &&
              normalize(row?.place) === normalize(item?.place)
            );
          };
          const nextAdminSchedules = adminSchedules.filter((row) => !isSameSchedule(row));
          const nextWriterSchedules = writerSchedules.filter((row) => !isSameSchedule(row));
          writeStorageArray(STORAGE_ADMIN_SCHEDULES, nextAdminSchedules);
          writeStorageArray(STORAGE_ADMIN_WRITER_SCHEDULES, nextWriterSchedules);
          const cancelAlerts = readStorageArray(STORAGE_ALERTS);
          cancelAlerts.unshift({
            id: `alert-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
            type: "schedule_cancel",
            company: deletedCompany,
            date: deletedDate,
            time: deletedTime,
            createdAt: new Date().toISOString(),
            read: false
          });
          writeStorageArray(STORAGE_ALERTS, cancelAlerts);
          renderPaymentSummary();
          renderStatusList();
        }
      });

      });
      orderHistoryModalEl.addEventListener("click", (event) => {
        if (event.target === orderHistoryModalEl) {
          orderHistoryModalEl.classList.add("hidden");
        }
      });
      composeButtonsEl.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-compose]");
        if (!button) return;
        setSelectedComposition(button.dataset.compose || "미선택");
      });
      scheduleYearEl.addEventListener("change", () => {
        renderRegisterMonthOptions(scheduleYearEl.value, scheduleMonthEl.value);
        renderDayOptions(scheduleYearEl.value, scheduleMonthEl.value, scheduleDayEl.value);
      });
      scheduleMonthEl.addEventListener("change", () => {
        renderDayOptions(scheduleYearEl.value, scheduleMonthEl.value, scheduleDayEl.value);
      });
      scheduleDayEl.addEventListener("change", updateSelectedDayColor);

      setupDateTimeSelectors();
      switchAuthTab("login");
      renderAuthState();
      window.addEventListener("storage", (event) => {
        if (event.key === STORAGE_ADMIN_SCHEDULES || event.key === STORAGE_SCHEDULES) {
          renderAuthState();
        }
      });
    </script>
  </body>
</html>
