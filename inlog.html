<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="인로그(INLOG) — 포트폴리오, 상품 안내, 주문 등록" />
    <title>인로그 INLOG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --page-bg: #ffd503;
        --ink: #000000;
        --grid-line: #000000;
        --gallery-max: 1100px;
        --header-stack-h: calc(20px + 5.25rem);
      }

      @media (max-width: 560px) {
        :root {
          --header-stack-h: calc(20px + 8.5rem);
        }
      }

      * {
        box-sizing: border-box;
      }

      html {
        background-color: var(--page-bg);
      }

      body {
        margin: 0;
        font-family: "Montserrat", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        background-color: var(--page-bg);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        max-width: 1280px;
        margin: 0 auto;
        padding: 20px 18px 56px;
      }

      .page--header {
        padding-bottom: 0;
      }

      .hero-banner + .page {
        padding-top: 0;
      }

      .site-header-fixed {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 200;
        background-color: var(--page-bg);
      }

      .hero-banner {
        width: 100vw;
        max-width: 100vw;
        margin-left: calc(50% - 50vw);
        box-sizing: border-box;
        background-color: #000;
        padding: 0;
        padding-top: var(--header-stack-h);
        overflow: hidden;
      }

      .hero-banner__figure {
        margin: calc(-1 * var(--header-stack-h)) 0 0;
        width: 100%;
        max-width: none;
        aspect-ratio: 3 / 1;
        overflow: hidden;
        background: #000;
        border: 0;
      }

      .hero-banner__figure img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .site-header {
        width: 100%;
        max-width: min(var(--gallery-max), 100%);
        margin: 0 auto 0;
      }

      .site-header__bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 16px 24px;
        padding: 6px 0 18px;
      }

      .site-header__logo {
        font-weight: 800;
        font-size: clamp(1.65rem, 4.2vw, 2.35rem);
        letter-spacing: -0.02em;
        line-height: 1;
        color: var(--ink);
        flex-shrink: 0;
      }

      .site-header__logo:hover {
        opacity: 0.75;
      }

      .site-header__nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: clamp(14px, 3.2vw, 32px);
        font-family: "Bebas Neue", "Montserrat", sans-serif;
        font-size: clamp(1.35rem, 3.8vw, 1.85rem);
        letter-spacing: 0.08em;
        line-height: 1;
      }

      .site-header__nav a {
        color: var(--ink);
        text-decoration: none;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .site-header__nav a:hover {
        opacity: 0.65;
      }

      .site-header__nav a.site-header__cta {
        text-decoration: underline;
        text-underline-offset: 4px;
        text-decoration-thickness: 2px;
      }

      .latest {
        margin-top: 0;
        width: 100vw;
        max-width: 100vw;
        margin-left: calc(50% - 50vw);
        padding: 40px 18px 48px;
        background: #000;
        text-align: center;
        box-sizing: border-box;
      }

      .latest__intro {
        max-width: 40rem;
        margin: 0 auto 36px;
        padding: 0 12px;
        text-align: center;
      }

      .latest__title-en {
        margin: 0 0 18px;
        font-family: "Bebas Neue", "Montserrat", sans-serif;
        font-size: clamp(2.75rem, 11vw, 5rem);
        font-weight: 400;
        line-height: 0.95;
        letter-spacing: 0.06em;
        color: var(--page-bg);
      }

      .latest__title-ko {
        margin: 0 0 16px;
        font-family: "Montserrat", "Apple SD Gothic Neo", sans-serif;
        font-weight: 700;
        font-size: clamp(1.05rem, 3.2vw, 1.4rem);
        line-height: 1.35;
        letter-spacing: -0.02em;
        color: var(--page-bg);
      }

      .latest__desc {
        margin: 0;
        font-family: "Montserrat", "Apple SD Gothic Neo", sans-serif;
        font-weight: 400;
        font-size: clamp(0.78rem, 2.2vw, 0.95rem);
        line-height: 1.55;
        letter-spacing: 0.01em;
        color: var(--page-bg);
        opacity: 0.95;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        width: 100%;
        max-width: min(var(--gallery-max), 100%);
        margin: 0 auto;
        background: transparent;
      }

      @media (max-width: 720px) {
        .gallery {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 400px) {
        .gallery {
          grid-template-columns: 1fr;
        }
      }

      .gallery__item {
        position: relative;
        margin: 0;
        aspect-ratio: 5 / 6;
        overflow: hidden;
        background: #000;
      }

      .gallery__item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transform: scale(1.3);
        transform-origin: center center;
        transition: transform 0.4s ease;
      }

      .gallery__item:hover img {
        transform: scale(1.378);
      }

      .gallery__badge {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 1;
        padding: 5px 11px;
        border-radius: 0;
        background: var(--page-bg);
        color: var(--ink);
        font-weight: 800;
        font-size: clamp(0.58rem, 1.8vw, 0.68rem);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-family: "Montserrat", sans-serif;
        border: 1px solid var(--ink);
        pointer-events: none;
      }

      .site-footer {
        width: 100%;
        background-color: var(--page-bg);
        color: var(--ink);
        padding: 52px 18px 60px;
        text-align: center;
        box-sizing: border-box;
      }

      .site-footer__inner {
        max-width: 42rem;
        margin: 0 auto;
      }

      .site-footer__brand {
        display: inline-block;
        margin-bottom: 36px;
        text-decoration: none;
        color: inherit;
        line-height: 0;
      }

      .site-footer__brand:focus-visible {
        outline: 2px solid var(--ink);
        outline-offset: 4px;
      }

      .site-footer__shield {
        display: block;
        width: min(132px, 36vw);
        height: auto;
        margin: 0 auto;
      }

      .site-footer__lines {
        display: flex;
        flex-direction: column;
        gap: 14px;
        font-size: clamp(0.72rem, 2.4vw, 0.88rem);
        line-height: 1.55;
        color: var(--ink);
      }

      .site-footer__line {
        margin: 0;
        word-break: keep-all;
      }

      .site-footer__line--links {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 6px 10px;
      }

      .site-footer__line--links a {
        text-decoration: none;
        color: var(--ink);
        font-weight: 600;
      }

      .site-footer__line--links a:hover {
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .site-footer__sep {
        color: var(--ink);
        opacity: 0.45;
        user-select: none;
      }
    </style>
  </head>
