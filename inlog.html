    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;800&display=swap"
      rel="stylesheet"

    <style>
      :root {
        --page-bg: #ffd503;
        --ink: #000000;
        --grid-line: #000000;
        --gallery-max: 1100px;
        /* 실제 높이는 헤더 바로 아래 스크립트가 .site-header-fixed offsetHeight 로 덮어씀 */
        --header-stack-h: 88px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        background-color: var(--page-bg);
      }

      body {
        margin: 0;
        font-family: "Montserrat", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        background-color: var(--page-bg);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        max-width: 1280px;
        margin: 0 auto;
        padding: 20px 18px 56px;
      }

      .page--header {
        padding-bottom: 0;
      }

      /* 고정 헤더 높이만큼만 비움 (--header-stack-h에 상단 여백 이미 포함) */
      body > .page {
        padding-top: var(--header-stack-h);
      }

      .site-header-fixed {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 200;
        background-color: var(--page-bg);
      }

      .site-header {
        width: 100%;
        max-width: min(var(--gallery-max), 100%);
        margin: 0 auto 0;
      }

      .site-header__bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 16px 24px;
        padding: 6px 0 18px;
      }

      .site-header__logo {
        font-weight: 800;
        font-size: clamp(1.65rem, 4.2vw, 2.35rem);
        letter-spacing: -0.02em;
        line-height: 1;
        color: var(--ink);
        flex-shrink: 0;
      }

      .site-header__logo:hover {
        opacity: 0.75;
      }

      .site-header__nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: clamp(14px, 3.2vw, 32px);
        font-family: "Bebas Neue", "Montserrat", sans-serif;
        font-size: clamp(1.35rem, 3.8vw, 1.85rem);
        letter-spacing: 0.08em;
        line-height: 1;
      }

      .site-header__nav a {
        color: var(--ink);
        text-decoration: none;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .site-header__nav a:hover {
        opacity: 0.65;
      }

      .site-header__nav a.site-header__cta {
        text-decoration: underline;
        text-underline-offset: 4px;
        text-decoration-thickness: 2px;
      }

      .site-header__nav a.is-active {
        text-decoration: underline;
        text-underline-offset: 5px;
        text-decoration-thickness: 2px;
        opacity: 1;
      }

      .photo-empty {
        margin: 24px auto;
        max-width: 28rem;
        padding: 0 18px;
        font-size: 0.95rem;
        color: var(--page-bg);
        opacity: 0.85;
        line-height: 1.5;
      }

      /* Photo 뷰: 인트로만 좌우 여백, 그리드는 뷰포트 가로 풀 */
      .photo-latest {
        padding-left: 0;
        padding-right: 0;
      }

      .photo-latest .latest__intro {
        padding-left: max(18px, env(safe-area-inset-left, 0px));
        padding-right: max(18px, env(safe-area-inset-right, 0px));
      }

      /* 대표사진만 3열 (썸네일은 정사각 크롭) */
      .photo-covers {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0;
        width: 100%;
      }

      .photo-covers > li {
        margin: 0;
        padding: 0;
      }

      .photo-cover-cell {
        display: block;
        width: 100%;
        margin: 0;
        padding: 0;
        border: none;
        background: #000;
        cursor: pointer;
        aspect-ratio: 1;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
      }

      .photo-cover-cell img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        pointer-events: none;
      }

      @media (hover: hover) and (pointer: fine) {
        .photo-cover-cell:hover {
          opacity: 0.92;
        }
      }

      /* 상세: 한 줄에 한 장, 원본 가로세로 비율 유지 */
      .photo-detail {
        width: 100%;
        margin: 0;
        padding: 0 0 24px;
        background: #000;
      }

      .photo-detail[hidden] {
        display: none !important;
      }

      .photo-detail__back {
        display: block;
        width: 100%;
        max-width: 28rem;
        margin: 0 auto 20px;
        padding: 12px 18px;
        border: 1px solid rgba(255, 213, 3, 0.45);
        background: transparent;
        color: var(--page-bg);
        font-family: "Montserrat", "Apple SD Gothic Neo", sans-serif;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        text-align: center;
      }

      .photo-detail__back:hover {
        opacity: 0.85;
      }

      .photo-detail__strip {
        display: flex;
        flex-direction: column;
        gap: 0;
        width: 100%;
        margin: 0;
        padding: 0;
      }

      .photo-detail__row {
        width: 100%;
        margin: 0;
        padding: 0;
        line-height: 0;
        background: #000;
      }

      .photo-detail__row img {
        width: 100%;
        height: auto;
        max-width: 100%;
        display: block;
      }

      .latest {
        margin-top: 0;
        width: 100vw;
        max-width: 100vw;
        margin-left: calc(50% - 50vw);
        padding: 40px 18px 48px;
        background: #000;
        text-align: center;
        box-sizing: border-box;
      }

      .latest__intro {
        max-width: 40rem;
        margin: 0 auto 36px;
        padding: 0 12px;
        text-align: center;
      }

      .latest__title-en {
        margin: 0 0 18px;
        font-family: "Bebas Neue", "Montserrat", sans-serif;
        font-size: clamp(2.75rem, 11vw, 5rem);
        font-weight: 400;
        line-height: 0.95;
        letter-spacing: 0.06em;
        color: var(--page-bg);
      }

      .latest__title-ko {
        margin: 0 0 16px;
        font-family: "Montserrat", "Apple SD Gothic Neo", sans-serif;
        font-weight: 700;
        font-size: clamp(1.05rem, 3.2vw, 1.4rem);
        line-height: 1.35;
        letter-spacing: -0.02em;
        color: var(--page-bg);
      }

      .latest__desc {
        margin: 0;
        font-family: "Montserrat", "Apple SD Gothic Neo", sans-serif;
        font-weight: 400;
        font-size: clamp(0.78rem, 2.2vw, 0.95rem);
        line-height: 1.55;
        letter-spacing: 0.01em;
        color: var(--page-bg);
        opacity: 0.95;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        width: 100%;
        max-width: min(var(--gallery-max), 100%);
        margin: 0 auto;
        background: transparent;
      }

      @media (max-width: 720px) {
        .gallery {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 400px) {
        .gallery {
          grid-template-columns: 1fr;
        }
      }

      .gallery__item {
        position: relative;
        margin: 0;
        aspect-ratio: 5 / 6;
        overflow: hidden;
        background: #000;
      }

      .inlog-gallery-link {
        display: block;
        width: 100%;
        height: 100%;
        overflow: hidden;
        text-decoration: none;
        color: inherit;
      }

      .inlog-gallery-link--inactive {
        pointer-events: none;
        cursor: default;
      }

      .inlog-gallery-link:not(.inlog-gallery-link--inactive):focus-visible {
        outline: 3px solid var(--page-bg);
        outline-offset: -3px;
      }

      .gallery__item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transform: scale(1);
        transform-origin: center center;
        transition: transform 0.4s ease;
      }

      @media (hover: hover) and (pointer: fine) {
        .gallery__item:hover .inlog-gallery-link:not(.inlog-gallery-link--inactive) img {
          transform: scale(1.06);
        }
      }

      .gallery__badge {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 1;
        padding: 5px 11px;
        border-radius: 0;
        background: var(--page-bg);
        color: var(--ink);
        font-weight: 800;
        font-size: clamp(0.58rem, 1.8vw, 0.68rem);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-family: "Montserrat", sans-serif;
        border: 1px solid var(--ink);
        pointer-events: none;
      }

      .site-footer {
        width: 100%;
        background-color: var(--page-bg);
        color: var(--ink);
        padding: 52px 18px 60px;
        text-align: center;
        box-sizing: border-box;
      }

      .site-footer__inner {
        max-width: 42rem;
        margin: 0 auto;
      }

      .site-footer__brand {
        display: inline-block;
        margin-bottom: 36px;
        text-decoration: none;
        color: inherit;
        line-height: 0;
      }

      .site-footer__brand:focus-visible {
        outline: 2px solid var(--ink);
        outline-offset: 4px;
      }

      .site-footer__shield {
        display: block;
        width: min(132px, 36vw);
        height: auto;
        margin: 0 auto;
      }

      .site-footer__lines {
        display: flex;
        flex-direction: column;
        gap: 14px;
        font-size: clamp(0.72rem, 2.4vw, 0.88rem);
        line-height: 1.55;
        color: var(--ink);
      }

      .site-footer__line {
        margin: 0;
        word-break: keep-all;
      }

      .site-footer__line--links {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 6px 10px;
      }

      .site-footer__line--links a {
        text-decoration: none;
        color: var(--ink);
        font-weight: 600;
      }

      .site-footer__line--links a:hover {
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .site-footer__sep {
        color: var(--ink);
        opacity: 0.45;
        user-select: none;
      }
    </style>
  </head>

    <script>
      (function () {
        function syncInlogHeaderStack() {
          var el = document.querySelector(".site-header-fixed");
          if (!el) return;
          document.documentElement.style.setProperty("--header-stack-h", el.offsetHeight + "px");
        }
        syncInlogHeaderStack();
        window.addEventListener("resize", syncInlogHeaderStack);
        var el = document.querySelector(".site-header-fixed");
        if (el && typeof ResizeObserver !== "undefined") {
          new ResizeObserver(syncInlogHeaderStack).observe(el);
        }
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(syncInlogHeaderStack).catch(function () {});
        }
      })();
    </script>

            <span class="site-footer__sep">|</span>
            <a href="#">개인정보처리방침</a>
            <span class="site-footer__sep">|</span>
            <a href="#">공지사항</a>
          </p>
        </div>
      </div>
    </footer>
    <script src="./sync-config.js"></script>
    <script>
      (function () {
        const STORAGE_KEY = "scheduleSiteInlogHomeMainV1";
        const TABLE = "schedule_site_client_kv";
        const ROW_ID = "scoped_local_v1";
        const SLOT_COUNT = 12;
        const PHOTO_STORAGE_KEY = "scheduleSiteInlogPhotoAlbumsV1";
        function sanitizeInlogHomeHref(s) {
          const t = String(s || "").trim();
          if (!t) return "";
          const low = t.toLowerCase();
          if (low.startsWith("javascript:") || low.startsWith("data:") || low.startsWith("vbscript:")) return "";
          return t;
        }
        function defaultInlogHomePayload() {
          const u = (id, w) =>
            `https://images.unsplash.com/${id}?auto=format&fit=crop&w=${w}&q=80`;
          const gl = (id, w, alt, badge, link) => ({
            src: u(id, w),
            alt,
            badge,
            link: link || ""
          });
          return {
            v: 1,
            gallery: [
              gl("photo-1515886657613-9f3515b0c78f", 900, "최신 작품 1", ""),
              gl("photo-1469334031218-e382a71b716b", 900, "최신 작품 2", "New Brand"),
              gl("photo-1509631179647-017733169913", 900, "최신 작품 3", ""),
              gl("photo-1521572163474-6864f9cf17ab", 900, "최신 작품 4", "New Brand"),
              gl("photo-1496747611176-843222e1e57c", 900, "최신 작품 5", ""),
              gl("photo-1539109136881-3be0616acf4b", 900, "최신 작품 6", ""),
              gl("photo-1524504388940-b1c1722653e1", 900, "최신 작품 7", ""),
              gl("photo-1504194104404-433918773792", 900, "최신 작품 8", ""),
              gl("photo-1483988352577-2f64eed4693a", 900, "최신 작품 9", ""),
              gl("photo-1475180238706-0630aa49665f", 900, "최신 작품 10", ""),
              gl("photo-1552374196-c4e7ffc6e126", 900, "최신 작품 11", ""),
              gl("photo-1506794778202-cad84cf45f1d", 900, "최신 작품 12", "")
            ]
          };
        }
        function mergeInlogHomePayload(base, p) {
          const out = JSON.parse(JSON.stringify(base));
          const g = Array.isArray(p.gallery) ? p.gallery : [];
          for (let i = 0; i < SLOT_COUNT; i++) {
            const item = g[i];
            if (!item || typeof item !== "object") continue;
            if (item.src) out.gallery[i].src = String(item.src).trim();
            if (item.alt != null) out.gallery[i].alt = String(item.alt);
            out.gallery[i].badge = item.badge != null ? String(item.badge).trim() : "";
            if (item.link != null) out.gallery[i].link = sanitizeInlogHomeHref(String(item.link));
          }
          return out;
        }
        function applyInlogGalleryLink(i, item) {
          const linkEl = document.querySelector('.inlog-gallery-link[data-inlog-index="' + i + '"]');
          if (!linkEl) return;
          const raw = sanitizeInlogHomeHref(item && item.link);
          if (raw) {
            linkEl.href = raw;
            linkEl.classList.remove("inlog-gallery-link--inactive");
            if (/^https?:\/\//i.test(raw)) {
              linkEl.target = "_blank";
              linkEl.rel = "noopener noreferrer";
            } else {
              linkEl.removeAttribute("target");
              linkEl.removeAttribute("rel");
            }
            const lab = String(item.alt || "").trim() || "갤러리 이미지";
            linkEl.setAttribute("aria-label", lab + " — 링크로 이동");
          } else {
            linkEl.href = "#";
            linkEl.classList.add("inlog-gallery-link--inactive");
            linkEl.removeAttribute("target");
            linkEl.removeAttribute("rel");
            linkEl.removeAttribute("aria-label");
          }
        }
        function applyInlogHomePayload(payload) {
          for (let i = 0; i < SLOT_COUNT; i++) {
            const item = payload.gallery[i];
            if (!item) continue;
            const img = document.querySelector('.inlog-gallery-img[data-inlog-index="' + i + '"]');
            if (img && item.src) {
              img.src = item.src;
              img.alt = item.alt || img.alt || "";
            }
            const badge = document.querySelector('.inlog-gallery-badge[data-inlog-index="' + i + '"]');
            if (badge) {
              const t = String(item.badge || "").trim();
              if (t) {
                badge.textContent = t;
                badge.hidden = false;
              } else {
                badge.textContent = "";
                badge.hidden = true;
              }
            }
            applyInlogGalleryLink(i, item);
          }
        }
        function uPhoto(id) {
          return `https://images.unsplash.com/${id}?auto=format&fit=crop&w=900&q=80`;
        }
        function defaultPhotoAlbumsPayload() {
          return {
            v: 1,
            albums: [
              {
                id: "sample-apt",
                title: "아파트 단지 촬영",
                coverSrc: uPhoto("photo-1515886657613-9f3515b0c78f"),
                coverAlt: "",
                photos: [
                  { src: uPhoto("photo-1515886657613-9f3515b0c78f"), alt: "" },
                  { src: uPhoto("photo-1469334031218-e382a71b716b"), alt: "" },
                  { src: uPhoto("photo-1509631179647-017733169913"), alt: "" }
                ]
              },
              {
                id: "sample-studio",
                title: "스튜디오",
                coverSrc: uPhoto("photo-1521572163474-6864f9cf17ab"),
                coverAlt: "",
                photos: [
                  { src: uPhoto("photo-1521572163474-6864f9cf17ab"), alt: "" },
                  { src: uPhoto("photo-1496747611176-843222e1e57c"), alt: "" },
                  { src: uPhoto("photo-1539109136881-3be0616acf4b"), alt: "" }
                ]
              }
            ]
          };
        }
        function mergePhotoAlbumsPayload(p) {
          if (!p || typeof p !== "object") return { v: 1, albums: [] };
          const albums = Array.isArray(p.albums) ? p.albums : [];
          const out = { v: 1, albums: [] };
          albums.forEach((a, i) => {
            if (!a || typeof a !== "object") return;
            const id = String(a.id || "").trim() || "alb-" + i;
            const title = String(a.title || "").trim() || "현장 " + (i + 1);
            const coverSrc = String(a.coverSrc || "").trim();
            const coverAlt = String(a.coverAlt || "").trim();
            const photos = Array.isArray(a.photos)
              ? a.photos
                  .map((ph) => ({
                    src: String(ph && ph.src ? ph.src : "").trim(),
                    alt: String(ph && ph.alt != null ? ph.alt : "").trim()
                  }))
                  .filter((ph) => ph.src)
              : [];
            out.albums.push({ id, title, coverSrc, coverAlt, photos });
          });
          return out;
        }
        function getAlbumCoverSrc(alb) {
          const c = String(alb.coverSrc || "").trim();
          if (c) return c;
          const ph0 = alb.photos && alb.photos[0];
          return ph0 && ph0.src ? String(ph0.src).trim() : "";
        }
        function getAlbumDetailPhotos(alb) {
          const cover = getAlbumCoverSrc(alb);
          const raw = Array.isArray(alb.photos) ? alb.photos : [];
          const list = raw
            .map((ph) => String(ph && ph.src ? ph.src : "").trim())
            .filter(Boolean);
          if (list.length) return list;
          return cover ? [cover] : [];
        }
        function renderPhotoAlbumsMount(photoPayload) {
          const mount = document.getElementById("inlogPhotoAlbumsMount");
          if (!mount) return;
          mount.innerHTML = "";
          mount.removeAttribute("class");
          const albums = photoPayload && Array.isArray(photoPayload.albums) ? photoPayload.albums : [];
          const withCover = albums.map((alb, i) => ({ alb, cover: getAlbumCoverSrc(alb), i })).filter((x) => x.cover);
          if (!withCover.length) {
            const p = document.createElement("p");
            p.className = "photo-empty";
            p.textContent = "등록된 현장이 없습니다. 관리자 인로그 Photo 탭에서 현장·대표(커버)·사진 URL을 등록해 주세요.";
            mount.appendChild(p);
            return;
          }
          const grid = document.createElement("ul");
          grid.className = "photo-covers";
          grid.setAttribute("aria-label", "현장 대표 사진 목록");

          const detail = document.createElement("div");
          detail.className = "photo-detail";
          detail.hidden = true;
          detail.setAttribute("aria-hidden", "true");

          const backBtn = document.createElement("button");
          backBtn.type = "button";
          backBtn.className = "photo-detail__back";
          backBtn.textContent = "← 목록으로";

          const strip = document.createElement("div");
          strip.className = "photo-detail__strip";

          detail.appendChild(backBtn);
          detail.appendChild(strip);

          function showGrid() {
            detail.hidden = true;
            detail.setAttribute("aria-hidden", "true");
            grid.hidden = false;
            grid.removeAttribute("aria-hidden");
          }
          function showDetail(urls) {
            strip.innerHTML = "";
            urls.forEach((src) => {
              const row = document.createElement("div");
              row.className = "photo-detail__row";
              const im = document.createElement("img");
              im.src = src;
              im.alt = "";
              im.loading = "lazy";
              im.decoding = "async";
              row.appendChild(im);
              strip.appendChild(row);
            });
            grid.hidden = true;
            grid.setAttribute("aria-hidden", "true");
            detail.hidden = false;
            detail.removeAttribute("aria-hidden");
            backBtn.focus();
          }

          backBtn.addEventListener("click", showGrid);

          withCover.forEach(({ alb, cover }) => {
            const li = document.createElement("li");
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "photo-cover-cell";
            btn.setAttribute(
              "aria-label",
              String(alb.title || "현장").trim() ? `${alb.title} 사진 보기` : "현장 사진 보기"
            );
            const im = document.createElement("img");
            im.src = cover;
            im.alt = "";
            im.loading = "lazy";
            btn.appendChild(im);
            btn.addEventListener("click", () => showDetail(getAlbumDetailPhotos(alb)));
            li.appendChild(btn);
            grid.appendChild(li);
          });

          mount.appendChild(grid);
          mount.appendChild(detail);
        }
        document.addEventListener("keydown", (e) => {
          if (e.key !== "Escape") return;
          const detail = document.querySelector("#inlogPhotoAlbumsMount .photo-detail");
          if (!detail || detail.hidden) return;
          detail.querySelector(".photo-detail__back")?.click();
        });
        function parsePhotoAlbumsFromKv(kv) {
          const rawP = kv && kv[PHOTO_STORAGE_KEY];
          if (rawP == null || rawP === "") {
            return defaultPhotoAlbumsPayload();
          }
          try {
            const parsed = typeof rawP === "string" ? JSON.parse(rawP) : rawP;
            if (parsed && typeof parsed === "object") {
              return mergePhotoAlbumsPayload(parsed);
            }
          } catch (e) {
            console.warn("[INLOG_PHOTO] parse", e);
          }
          return defaultPhotoAlbumsPayload();
        }
        async function loadInlogHomeFromSupabase() {
          let payload = defaultInlogHomePayload();
          let photoPayload = defaultPhotoAlbumsPayload();
          const syncConfig = window.SCHEDULE_SITE_SYNC_CONFIG || {};
          const FALLBACK_SUPABASE_URL = "https://pidfkrxsgffoqstogmli.supabase.co";
          const FALLBACK_SUPABASE_ANON_KEY = "sb_publishable_0JHUt_yXZx78FwoqO8XCDg_s319cLiW";
          const url = syncConfig.supabaseUrl || FALLBACK_SUPABASE_URL;
          const key = syncConfig.supabaseAnonKey || FALLBACK_SUPABASE_ANON_KEY;
          if (!url || !key) {
            applyInlogHomePayload(payload);
            renderPhotoAlbumsMount(photoPayload);
            return;
          }
          try {
            const res = await fetch(
              `${url}/rest/v1/${TABLE}?id=eq.${encodeURIComponent(ROW_ID)}&select=kv&limit=1`,
              {
                headers: { apikey: key, Authorization: "Bearer " + key },
                cache: "no-store"
              }
            );
            if (!res.ok) {
              applyInlogHomePayload(payload);
              renderPhotoAlbumsMount(photoPayload);
              return;
            }
            const rows = await res.json();
            const kv = rows && rows[0] && rows[0].kv;
            const raw = kv && kv[STORAGE_KEY];
            if (raw) {
              try {
                const parsed = typeof raw === "string" ? JSON.parse(raw) : raw;
                if (parsed && typeof parsed === "object") {
                  payload = mergeInlogHomePayload(defaultInlogHomePayload(), parsed);
                }
              } catch (parseErr) {
                console.warn("[INLOG_HOME] parse", parseErr);
              }
            }
            photoPayload = parsePhotoAlbumsFromKv(kv);
          } catch (e) {
            console.warn("[INLOG_HOME] load", e);
          }
          applyInlogHomePayload(payload);
          renderPhotoAlbumsMount(photoPayload);
        }
        if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", loadInlogHomeFromSupabase);
        else void loadInlogHomeFromSupabase();
      })();
    </script>
    <script>
      (function () {
        function applyInlogRoute() {
          const isPhoto = /^#photo$/i.test(location.hash || "");
          const home = document.getElementById("inlog-view-home");
          const photo = document.getElementById("inlog-view-photo");
          const navPhoto = document.getElementById("inlog-nav-photo");
          if (home) home.hidden = isPhoto;
          if (photo) photo.hidden = !isPhoto;
          if (navPhoto) navPhoto.classList.toggle("is-active", isPhoto);
          if (isPhoto) window.scrollTo(0, 0);
        }
        window.addEventListener("hashchange", applyInlogRoute);
        if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", applyInlogRoute);
        else applyInlogRoute();
      })();
    </script>
  </body>
</html>
