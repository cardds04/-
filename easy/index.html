<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>이지숏폼</title>
  <meta name="theme-color" content="#111114" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="이지숏폼" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.webmanifest?v=2" />
  <link rel="icon" href="icon.svg?v=2" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg?v=2" />
  <link rel="stylesheet" href="easyshorts.css?v=293" />
  <link rel="stylesheet" href="easy-mobile.css?v=26" />
</head>
<body class="mode-easy easy-only es-locked">

  <!-- 잠금(비밀번호) 화면 -->
  <div id="easyGate" class="easy-gate">
    <div class="easy-gate-card">
      <div class="easy-gate-logo">⚡</div>
      <div class="easy-gate-title">이지숏폼</div>
      <div class="easy-gate-sub">사진만 넣으면 완성되는 인테리어 숏폼</div>
      <input type="password" id="easyGatePw" class="easy-gate-pw" placeholder="비밀번호" autocomplete="off" inputmode="text" />
      <button type="button" id="easyGateBtn" class="easy-gate-btn">들어가기</button>
      <div id="easyGateMsg" class="easy-gate-msg"></div>
    </div>
  </div>

  <!-- 템플릿 불러오기(seed) 화면 — 템플릿이 하나도 없을 때 -->
  <div id="easySeed" class="easy-seed" hidden>
    <div class="easy-seed-card">
      <div class="easy-seed-title">📦 템플릿 불러오기</div>
      <div class="easy-seed-sub">처음 한 번만 — 내보낸 <b>easy-seed.json</b> 파일을 선택하면 템플릿이 들어옵니다.</div>
      <input type="file" id="easySeedFile" accept="application/json,.json" class="easy-seed-file" />
      <div id="easySeedMsg" class="easy-seed-msg"></div>
      <button type="button" id="easySeedSkip" class="easy-seed-skip">건너뛰기 (빈 상태로 시작)</button>
    </div>
  </div>

  <!-- 이지숏폼 본체 — easyshorts.js 가 내부를 채움 -->
  <section id="easyRoot"></section>

  <script src="easymux.js?v=1"></script>
  <script src="easyshorts.js?v=327"></script>
  <script src="easy-auth.js?v=2"></script>
  <script src="easy-pwa.js?v=4"></script>
  <script src="easy-boot.js?v=4"></script>
</body>
</html>
