name: 이지숏폼 안드로이드 APK 빌드

# 수동 실행(Actions 탭의 Run workflow) + easyshorts-app 변경 푸시 시 자동 빌드.
on:
  workflow_dispatch:
  push:
    paths:
      - "easyshorts-app/**"
      - ".github/workflows/android-build.yml"

permissions:
  contents: write   # Releases 생성에 필요

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Java(JDK 17) 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK 준비
        uses: android-actions/setup-android@v3

      - name: 의존성 설치
        working-directory: easyshorts-app
        run: npm install

      - name: Capacitor 동기화
        working-directory: easyshorts-app
        run: npx cap sync android

      - name: gradlew 실행권한
        working-directory: easyshorts-app/android
        run: chmod +x ./gradlew

      - name: 디버그 APK 빌드
        working-directory: easyshorts-app/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: APK 이름 고정(easyshorts.apk)
        run: cp easyshorts-app/android/app/build/outputs/apk/debug/app-debug.apk easyshorts.apk

      - name: Releases 에 업로드(최신으로 표시)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-v${{ github.run_number }}
          name: 이지숏폼 앱 v${{ github.run_number }}
          make_latest: true
          files: easyshorts.apk
          body: |
            이지숏폼 안드로이드 설치형 앱 (테스트 빌드 v${{ github.run_number }})

            ▸ 폰에서 아래 **easyshorts.apk** 를 눌러 다운로드 → 설치
            ▸ "출처를 알 수 없는 앱" 허용이 필요할 수 있어요.
            ▸ 최신 버전은 항상 이 주소: https://github.com/cardds04/-/releases/latest/download/easyshorts.apk
