<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>이지숏폼</title>
  <style>
    html,body{margin:0;height:100%;background:#111114;color:#eaeaf0;font:16px/1.5 -apple-system,system-ui,sans-serif}
    .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px}
    .logo{font-size:54px}
    .sp{width:34px;height:34px;border:3px solid #2a2a31;border-top-color:#8b7bf7;border-radius:50%;animation:s 1s linear infinite}
    @keyframes s{to{transform:rotate(360deg)}}
    .msg{color:#8a8a96;font-size:14px}
    .retry{margin-top:8px;padding:10px 18px;border:1px solid #3a3a44;border-radius:10px;background:#1b1b21;color:#eaeaf0;font-size:14px}
  </style>
</head>
<body>
  <!-- server.url(sc-pink/easy)을 띄우므로 이 화면은 보통 안 보임. 네트워크가 끊겼을 때만 보임. -->
  <div class="wrap">
    <div class="logo">⚡</div>
    <div class="sp"></div>
    <div class="msg" id="m">이지숏폼을 불러오는 중…</div>
    <button class="retry" onclick="location.href='https://sc-pink.vercel.app/easy/'">다시 시도</button>
  </div>
  <script>
    // 혹시 server.url 로딩이 안 됐을 때를 위한 안전망
    setTimeout(function(){ var m=document.getElementById('m'); if(m) m.textContent='연결이 느려요. 인터넷을 확인해 주세요.'; }, 6000);
  </script>
</body>
</html>
