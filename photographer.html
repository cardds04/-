      /** 목록 행 UUID + 로컬에만 남아 있는 완료 캐시 UUID (행 병합 일시 누락 시에도 상태 API에 포함) */
      function scheduleIdsForPhotographerShootWriter(writer) {
        if (!writer) return [];
        const fromRows = getMySchedules()
          .map((r) => canonScheduleUuidFromRow(r))
          .filter(Boolean);
        const lb = readWriterShootSiteLocalFor(writer.id);
        const now = Date.now();
        const ttlOk = (entry) => {
          const t = entry && typeof entry === "object" ? Number(entry.savedAt) || 0 : 0;
          return t && now - t <= WRITER_SHOOT_SITE_LOCAL_TTL_MS;
        };
        const extras = [];
        for (const k of Object.keys(lb)) {
          const cu = canonScheduleUuid(k);
          if (!cu || !ttlOk(lb[k])) continue;
          extras.push(cu);
        }
        return [...new Set([...fromRows, ...extras])];
      }

      async function refreshPhotographerShootStatus() {
        const w = getCurrentWriter();
        if (!w || !USE_SUPABASE_SYNC) {
          return;
        }
        const scheduleIds = scheduleIdsForPhotographerShootWriter(w);
        if (!scheduleIds.length) {
          return;
        }
        mergeWriterShootLocalIntoGlobals(w, scheduleIds);
        const startedAtGen = photographerShootStatusGen;
        try {
          const res = await fetch("/api/photographer-shoot-status", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              writerLoginId: w.id,
              writerPassword: w.password,
              scheduleIds
            })
          });
          const data = await res.json().catch(() => ({}));
          if (startedAtGen !== photographerShootStatusGen) return;
          const localBucket = readWriterShootSiteLocalFor(w.id);
          const now = Date.now();
          const ttlOk = (entry) => {
            const t = entry && typeof entry === "object" ? Number(entry.savedAt) || 0 : 0;
            return t && now - t <= WRITER_SHOOT_SITE_LOCAL_TTL_MS;
          };
          if (res.ok && data.ok && Array.isArray(data.doneScheduleIds)) {
            const serverDone = new Set(data.doneScheduleIds.map((x) => canonScheduleUuid(x)).filter(Boolean));
            const next = new Set(serverDone);
            for (const sid of scheduleIds) {
              const loc = localBucket[sid];
              if (!loc || !ttlOk(loc)) continue;
              if (!serverDone.has(sid)) next.add(sid);
            }
            let diff = next.size !== photographerShootDoneIds.size;
            if (!diff) {
              for (const id of next) {
                if (!photographerShootDoneIds.has(id)) {
                  diff = true;
                  break;
                }
              }
            }
            const mergedDelivery = { ...photographerShootDeliveryById };
            if (data.deliveryByScheduleId && typeof data.deliveryByScheduleId === "object") {
              for (const k of Object.keys(data.deliveryByScheduleId)) {
                const ck = canonScheduleUuid(k);
                if (!ck) continue;
                const v = data.deliveryByScheduleId[k];
                mergedDelivery[ck] = mergePhotographerShootDelivery(mergedDelivery[ck], v);
              }
            }
            for (const sid of scheduleIds) {
              if (!next.has(sid)) continue;
              const locDel = localBucket[sid]?.delivery;
              if (locDel && typeof locDel === "object" && Object.keys(locDel).length) {
                mergedDelivery[sid] = mergePhotographerShootDelivery(mergedDelivery[sid], locDel);
              }
            }
            if (!diff) {
              for (const sid of scheduleIds) {
                if (
                  JSON.stringify(photographerShootDeliveryById[sid] || {}) !== JSON.stringify(mergedDelivery[sid] || {})
                ) {
                  diff = true;
                  break;
                }
              }
            }
            photographerShootDoneIds = next;
            photographerShootDeliveryById = mergedDelivery;
            dropWriterShootSiteLocalEntries(w.id, serverDone);
            if (diff) renderScheduleList();
            return;
          }
          applyShootStatusLocalFallback(w, scheduleIds);
        } catch (error) {
          console.warn("[photographer-shoot-status]", error);
          if (startedAtGen === photographerShootStatusGen) applyShootStatusLocalFallback(w, scheduleIds);
        }
      }

      const SHOOT_DELIVERY_DRIVE_LINK_ROWS = [
        { key: "photo_edit_folder_web_link", label: "사진편집완료" },
        { key: "photo_original_folder_web_link", label: "사진원본파일" },
        { key: "video_edit_folder_web_link", label: "영상편집완료" },
        { key: "video_original_folder_web_link", label: "영상원본파일" },
      ];

      function shootDriveDeliverySubfoldersHtml(d) {
        if (!d || typeof d !== "object") return "";
        const parts = [];
        for (const { key, label } of SHOOT_DELIVERY_DRIVE_LINK_ROWS) {
          const url = normalize(d[key]);
          if (!url) continue;
          const safeHref = url.replace(/"/g, "&quot;");
          parts.push(
            `<a href="${safeHref}" target="_blank" rel="noopener noreferrer" style="color:#2563eb;font-weight:600;text-decoration:underline;">${label}</a>`
          );
        }
        if (!parts.length) return "";
        return `<div style="flex-basis:100%;width:100%;font-size:11px;line-height:1.55;color:#475569;margin-top:4px;">Drive 하위폴더 · ${parts.join(
          " · "
        )}</div>`;
      }

      function mergePhotographerShootDelivery(prev, incoming) {
        if (!incoming || typeof incoming !== "object") {
          return prev && typeof prev === "object" ? { ...prev } : {};
        }
        const base = prev && typeof prev === "object" ? { ...prev } : {};
        const out = { ...base, ...incoming };
        const linkKeys = [
          "shoot_folder_web_link",
          "company_folder_web_link",
          ...SHOOT_DELIVERY_DRIVE_LINK_ROWS.map((r) => r.key),
        ];
        for (const key of linkKeys) {
          const a = normalize(base[key]);
          const b = normalize(incoming[key]);
          if (b) out[key] = incoming[key];
          else if (a) out[key] = base[key];
        }
        const pn = normalize(incoming.photographer_original_upload_notified_at);
        const po = normalize(base.photographer_original_upload_notified_at);
        out.photographer_original_upload_notified_at = pn || po || null;
        return out;
      }

      /**
       * 동기: 서버 응답 전·첫 렌더 전에 로컬에 저장된 현장확인 상태를 메모리로 올림 (새로고침 직후 깜빡임·누락 방지)
       * @returns 상태가 바뀌었으면 true
       */
      function mergeWriterShootLocalIntoGlobals(writer, scheduleIds) {
        if (!writer || !USE_SUPABASE_SYNC || !Array.isArray(scheduleIds) || !scheduleIds.length) return false;
        const localBucket = readWriterShootSiteLocalFor(writer.id);
        const now = Date.now();
        const ttlOk = (entry) => {
          const t = entry && typeof entry === "object" ? Number(entry.savedAt) || 0 : 0;
          return t && now - t <= WRITER_SHOOT_SITE_LOCAL_TTL_MS;
        };
        const next = new Set(photographerShootDoneIds);
        for (const sid of scheduleIds) {
          const loc = localBucket[sid];
          if (!loc || !ttlOk(loc)) continue;
          next.add(sid);
        }
        const mergedDelivery = { ...photographerShootDeliveryById };
        for (const sid of scheduleIds) {
          if (!next.has(sid)) continue;
          const locDel = localBucket[sid]?.delivery;
          if (locDel && typeof locDel === "object" && Object.keys(locDel).length) {
            mergedDelivery[sid] = mergePhotographerShootDelivery(mergedDelivery[sid], locDel);
          }
        }
        let diff = next.size !== photographerShootDoneIds.size;
        if (!diff) {
          for (const id of next) {
            if (!photographerShootDoneIds.has(id)) {
              diff = true;
              break;
            }
          }
        }
        if (!diff) {
          for (const sid of scheduleIds) {
            if (
              JSON.stringify(photographerShootDeliveryById[sid] || {}) !== JSON.stringify(mergedDelivery[sid] || {})
            ) {
              diff = true;
              break;
            }
          }
        }
        if (!diff) return false;
        photographerShootDoneIds = next;
        photographerShootDeliveryById = mergedDelivery;
        return true;
      }

      function hydratePhotographerShootFromLocal(writer) {
        if (!writer || !USE_SUPABASE_SYNC) return;
        const scheduleIds = scheduleIdsForPhotographerShootWriter(writer);
        mergeWriterShootLocalIntoGlobals(writer, scheduleIds);
      }

      /** shoot-status API 실패 시에도 이 브라우저에서 완료한 건은 로컬 스냅샷으로 복구 */
      function applyShootStatusLocalFallback(writer, scheduleIds) {
        if (!writer || !USE_SUPABASE_SYNC || !Array.isArray(scheduleIds) || !scheduleIds.length) return;
        if (mergeWriterShootLocalIntoGlobals(writer, scheduleIds)) renderScheduleList();
      }

      function renderScheduleList() {
        const year = Number(filterYearEl.value);
        const month = Number(filterMonthEl.value);
        const dayValue = String(filterDayEl.value || "").trim().toLowerCase();
        const day = Number(dayValue);
        const targetDate = `${year}-${pad2(month)}-${pad2(day)}`;
        const targetMonth = `${year}-${pad2(month)}`;

        const rows = getMySchedules().filter((item) => {
          if (filterMode === "all") return true;
          if (filterMode === "day") {
            if (dayValue === "all") return String(item.date || "").slice(0, 7) === targetMonth;
            return item.date === targetDate;
          }
          return String(item.date || "").slice(0, 7) === targetMonth;
        });
        const modeLabel =
          filterMode === "all"
            ? "전체"
            : filterMode === "day"
            ? dayValue === "all"
              ? `${targetMonth} 전체`
              : `${targetDate}`
            : `${targetMonth}`;
        latestRenderedRows = rows;
        latestModeLabel = modeLabel;
        filterCountTextEl.innerHTML = `<strong>${modeLabel} 조회결과 총 ${rows.length}건</strong>`;
        renderMonthlyShotCount();

        if (rows.length === 0) {
          scheduleListEl.innerHTML = `<div class="status-card">${modeLabel} 기준 스케줄이 없습니다.</div>`;
          return;
        }

        /** 같은 촬영일 기준 시간순 1번·2번·3번… (만들 폴더명 끝에 붙임) */
        const shootFolderDaySlotByItem = new WeakMap();
        const rowsByDate = new Map();
        for (const item of rows) {
          const d = String(item?.date || "").trim();
          if (!rowsByDate.has(d)) rowsByDate.set(d, []);
          rowsByDate.get(d).push(item);
        }
        for (const list of rowsByDate.values()) {
          const sorted = list.slice().sort((a, b) => {
            const dt = toTimeValue(a) - toTimeValue(b);
            if (dt !== 0) return dt;
            const byPlace = normalize(a?.place || "").localeCompare(normalize(b?.place || ""), "ko");
            if (byPlace !== 0) return byPlace;
            return normalize(a?.company || "").localeCompare(normalize(b?.company || ""), "ko");
          });
          sorted.forEach((it, i) => shootFolderDaySlotByItem.set(it, i + 1));
        }

        scheduleListEl.innerHTML = rows
          .map((item, rowIndex) => {
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            const target = new Date(`${item.date || "2099-12-31"}T00:00:00`);
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const isToday = sameDate(now, target);
            const isTomorrow = sameDate(tomorrow, target);
            const statusLabel = target.getTime() < now.getTime() ? "지난일정" : isToday ? "오늘촬영" : isTomorrow ? "내일촬영" : "촬영예정";
            const statusClass = isToday ? "status-label-today" : isTomorrow ? "status-label-tomorrow" : "";
            const fullAddress = String(item.place ?? "").trim() || "-";
            // 업체 전화번호: 등록된 게 있을 때만 한 줄 추가 (없으면 줄을 아예 표시하지 않음).
            // 모바일에서 바로 통화할 수 있도록 tel: 링크로 감싸고, 옆에 작은 복사 버튼도 둔다.
            const companyPhone = getCompanyPhoneForItem(item);
            const hasCompanyPhone = companyPhone && companyPhone !== "-";
            const companyPhoneLine = hasCompanyPhone
              ? `업체연락처: <a href="tel:${encodeURIComponent(companyPhone)}" style="color:#1d4ed8;font-weight:700;text-decoration:none">${companyPhone}</a><button class="btn outline small inline-copy-btn" type="button" data-action="copyText" data-copy-text="${encodeURIComponent(companyPhone)}" style="margin-left:6px">번호복사</button><br />`
              : "";
            const scheduleId = canonScheduleUuidFromRow(item);
            const hasServerId = Boolean(scheduleId);
            const companyDriveLink = normalize(getCompanyDriveFolderLinkForItem(item));
            let deliveryLinkKind = "";
            if (companyDriveLink) {
              if (/^https:\/\/drive\.google\.com/i.test(companyDriveLink)) {
                deliveryLinkKind = ` <span style="font-size:11px;color:#64748b;">(Google)</span>`;
              } else if (/^https?:\/\//i.test(companyDriveLink)) {
                deliveryLinkKind = ` <span style="font-size:11px;color:#64748b;">(네이버웍스)</span>`;
              }
            }
            const daySlot = shootFolderDaySlotByItem.get(item) || 1;
            const shootFolderSuggestName = buildShootFolderNameJS(item.date, item.place, daySlot);
            const folderNameHint = `<span style="font-size:12px;color:#374151;">만들 폴더명: <strong style="color:#1d4ed8;">${shootFolderSuggestName}</strong></span><button type="button" class="btn outline small inline-copy-btn" data-action="copyText" data-copy-text="${encodeURIComponent(shootFolderSuggestName)}" style="margin-left:6px;font-size:11px;padding:1px 7px;">복사</button><br />`;
            const companyDriveLine = companyDriveLink
              ? `${folderNameHint}업체 납품 폴더: <a href="#" data-action="openDeliveryFolderAndCopyFolderName" data-delivery-url="${encodeURIComponent(
                  companyDriveLink
                )}" data-copy-folder-name="${encodeURIComponent(shootFolderSuggestName)}" title="만들 폴더명 복사 후 납품 폴더 열기" style="color:#1d4ed8;font-weight:600;text-decoration:underline;cursor:pointer;">열기 ↗</a>${deliveryLinkKind}<br />`
              : `${folderNameHint}업체 납품 폴더: <span style="color:#b45309;font-size:12px;">아직 표시할 공유 주소가 없습니다. 관리자 「업체정보관리」에서 해당 업체 「폴더 연결」로 네이버웍스 폴더 주소를 등록한 뒤 새로고침(F5)해 주세요.</span><br />`;
            const shootDone = hasServerId && photographerShootDoneIds.has(scheduleId);
            let shootBlock = "";
            if (USE_SUPABASE_SYNC) {
              if (!hasServerId) {
                shootBlock =
                  '<div class="shoot-complete-row" style="font-size:12px;color:#64748b;">현장확인은 고객 안내 문자만 보냅니다. 촬영일 폴더는 「업체 납품 폴더 열기」 후 위 「만들 폴더명」을 복사해 납품 Drive에서 직접 만드세요.</div>';
              } else {
                const d = photographerShootDeliveryById[scheduleId] || {};
                const shootLink = normalize(d?.shoot_folder_web_link);
                const origNotified =
                  typeof d?.photographer_original_upload_notified_at === "string" &&
                  normalize(d?.photographer_original_upload_notified_at);
                const linkHtml = shootLink
                  ? `<a href="${shootLink.replace(/"/g, "&quot;")}" target="_blank" rel="noopener noreferrer" style="margin-left:4px;font-size:12px;color:#1d4ed8;font-weight:600;text-decoration:underline;">촬영 폴더(Drive)</a>`
                  : "";
                const siteIconBtn = shootDone
                  ? `<button type="button" class="shoot-icon-btn shoot-icon-btn--done" disabled title="현장확인 완료" aria-label="현장확인 완료"><span class="shoot-icon-btn__glyph" aria-hidden="true">✓</span><span class="shoot-icon-btn__label">현장확인</span></button>`
                  : `<button type="button" class="shoot-icon-btn shoot-icon-btn--pending shoot-complete-btn" data-action="completeShoot" data-schedule-id="${scheduleId}" title="현장 도착·촬영 완료 처리" aria-label="현장확인"><span class="shoot-icon-btn__glyph" aria-hidden="true">✓</span><span class="shoot-icon-btn__label">현장확인</span></button>`;
                const origIconBtn = origNotified
                  ? `<button type="button" class="shoot-icon-btn shoot-icon-btn--done" disabled title="원본 업로드 안내 완료" aria-label="원본업로드 완료"><span class="shoot-icon-btn__glyph" aria-hidden="true">⬆</span><span class="shoot-icon-btn__label">원본업로드</span></button>`
                  : `<button type="button" class="shoot-icon-btn shoot-icon-btn--pending" data-action="originalUploadNotify" data-schedule-id="${scheduleId}" title="원본 업로드 완료 고객 문자" aria-label="원본업로드"><span class="shoot-icon-btn__glyph" aria-hidden="true">⬆</span><span class="shoot-icon-btn__label">원본업로드</span></button>`;
                const subfoldersHtml = shootDriveDeliverySubfoldersHtml(d);
                shootBlock = `<div class="shoot-pre-actions-wrap" data-schedule-id="${scheduleId}"><div class="shoot-complete-row" style="align-items:flex-start;flex-direction:column;gap:8px;"><div class="shoot-actions-icons">${siteIconBtn}${origIconBtn}</div><div style="display:flex;flex-wrap:wrap;align-items:center;gap:6px;">${linkHtml}</div>${subfoldersHtml}</div></div>`;
              }
            }
            return `
              <article class="status-card">
                <div class="status-head">
                  <span>${item.date || "-"} | ${item.time || "-"}</span>
                  <span class="${statusClass}">${statusLabel}</span>
                </div>
                <div class="status-meta">
                  업체: ${item.company || "-"}<br />
                  ${companyPhoneLine}장소: ${item.place || "-"}<button class="btn outline small inline-copy-btn" type="button" data-action="copyNavAddress" data-row-index="${rowIndex}" data-nav-address="${encodeURIComponent(fullAddress)}">주소복사</button><br />
                  공동현관 비번: ${item.jointCode || "-"}<br />
                  세대 비번: ${item.doorCode || "-"}<br />
                  평수: ${item.pyeong || "-"}<br />
                  촬영구성: ${item.composition || "-"}<br />
                  메모: ${item.memo || "-"}${(() => { const dm = getAdminCompanyDefaultMemo(item.company); return dm ? `<br /><span style="color:#3a4a6b;font-weight:600;">기본요청사항:</span> ${dm}` : ""; })()}<br />
                  ${companyDriveLine}
                </div>
                ${shootBlock}
              </article>
            `;
          })
          .join("");

        const wForStatus = getCurrentWriter();
        if (wForStatus && USE_SUPABASE_SYNC) {
          if (photographerShootStatusDebounceTimer) clearTimeout(photographerShootStatusDebounceTimer);
          photographerShootStatusDebounceTimer = setTimeout(() => {
            photographerShootStatusDebounceTimer = null;
            void refreshPhotographerShootStatus();
          }, 180);
        }
      }
      scheduleListEl.addEventListener("click", async (event) => {
        const deliveryFolderOpenLink = event.target.closest("a[data-action='openDeliveryFolderAndCopyFolderName']");
        if (deliveryFolderOpenLink) {
          event.preventDefault();
          let url = "";
          try {
            url = decodeURIComponent(String(deliveryFolderOpenLink.getAttribute("data-delivery-url") || ""));
          } catch (_) {
            url = "";
          }
          url = normalize(url);
          if (!url) return;
          let folderName = "";
          try {
            folderName = decodeURIComponent(String(deliveryFolderOpenLink.getAttribute("data-copy-folder-name") || ""));
          } catch (_) {
            folderName = "";
          }
          folderName = String(folderName || "").trim();
          void (async () => {
            if (folderName) {
              const ok = await copyTextSmart(folderName);
              if (!ok) {
                alert("폴더 이름 자동 복사에 실패했습니다. 드라이브만 엽니다. 위 「만들 폴더명」 옆 복사를 눌러 주세요.");
              }
            }
            window.open(url, "_blank", "noopener,noreferrer");
          })();
          return;
        }
        const shootDoneBtn = event.target.closest("button[data-action='completeShoot']");
        if (shootDoneBtn) {
          const sid = canonScheduleUuid(shootDoneBtn.dataset.scheduleId || "");
          const writer = getCurrentWriter();
          if (!sid) {
            alert("스케줄 식별자가 올바르지 않습니다.");
            return;
          }
          if (!writer || !USE_SUPABASE_SYNC) {
            alert("로그인 및 서버 동기화가 필요합니다.");
            return;
          }
          if (!confirm("현장에 도착하거나 촬영이 완료되었나요?")) {
            return;
          }
          shootDoneBtn.disabled = true;
          try {
            const fd = new FormData();
            fd.append("scheduleId", sid);
            fd.append("writerLoginId", writer.id);
            fd.append("writerPassword", writer.password);
            fd.append("omitSiteImage", "1");
            const res = await fetch("/api/photographer-shoot-complete", { method: "POST", body: fd });
            const data = await res.json().catch(() => ({}));
            const alreadyCompleted =
              res.status === 409 ||
              String(data.message || "")
                .trim()
                .includes("이미 현장 확인");
            if (!res.ok || !data.ok) {
              if (alreadyCompleted && sid) {
                photographerShootStatusGen += 1;
                try {
                  await refreshPhotographerShootStatus();
                } catch (_) {}
                if (!photographerShootDoneIds.has(sid)) {
                  photographerShootDoneIds.add(sid);
                }
                renderScheduleList();
                shootDoneBtn.disabled = false;
                alert(data.message || "이미 현장 확인 처리된 건입니다. 목록이 갱신되었습니다.");
                return;
              }
              alert(data.message || "현장 확인 처리에 실패했습니다.");
              shootDoneBtn.disabled = false;
              return;
            }
            photographerShootStatusGen += 1;
            photographerShootDoneIds.add(sid);
            const prevEntry = photographerShootDeliveryById[sid] || {};
            const mergedDeliveryRow = {
              ...prevEntry,
              shoot_folder_web_link:
                normalize(data.shoot_folder_web_link) || normalize(prevEntry.shoot_folder_web_link) || "",
              company_folder_web_link:
                normalize(data.company_folder_web_link) || normalize(prevEntry.company_folder_web_link) || "",
              photographer_original_upload_notified_at:
                normalize(prevEntry.photographer_original_upload_notified_at) || null,
            };
            for (const row of SHOOT_DELIVERY_DRIVE_LINK_ROWS) {
              const k = row.key;
              mergedDeliveryRow[k] = normalize(data[k]) || normalize(prevEntry[k]) || "";
            }
            photographerShootDeliveryById = {
              ...photographerShootDeliveryById,
              [sid]: mergedDeliveryRow,
            };
            rememberWriterShootSiteLocal(writer.id, sid, data.photographer_site_done_at, mergedDeliveryRow);
            renderScheduleList();
            void refreshPhotographerShootStatus();
            const sms = data.customer_site_notice_sms;
            let smsNote = "";
            if (sms === "sent") {
              if (data.sms_deferred_quiet_hours) {
                smsNote =
                  "\n\n고객 현장 안내 문자는 밤 10시~오전 8시 구간을 피해 한국시간 오전 10시에 예약 발송됩니다.";
              } else {
                smsNote = "\n\n고객에게 현장 확인 안내 문자가 발송되었습니다.";
              }
            } else if (sms === "skipped_no_phone") {
              smsNote =
                "\n\n※ 고객 번호가 없어 안내 문자를 보내지 못했습니다. 업체 디렉터리(customer_phone)·납품 연락처를 확인해 주세요.";
            } else if (sms === "send_failed") {
              smsNote =
                "\n\n※ 고객 안내 문자 발송에 실패했습니다. 번호 형식 또는 솔라피 설정(SOLAPI_* 환경 변수)을 확인해 주세요.";
            }
            alert(
              (data.omit_site_confirmation
                ? "현장 확인 처리되었습니다.\n업체 Drive 폴더가 준비되었습니다."
                : data.site_photo_storage_url
                  ? "현장 확인 처리되었습니다.\n현장 이미지는 저장소에 저장되었고 업체 폴더 정보가 준비되었습니다."
                  : data.drive_upload_skipped
                    ? "현장 확인으로 저장되었습니다.\n폴더는 생성되었고, 파일 업로드는 정책상 막혀 저장되지 않았을 수 있습니다. 공유 드라이브 등 설정이 필요할 수 있습니다."
                    : "현장 확인 처리되었습니다. Google Drive 폴더가 준비되었습니다.") + smsNote
            );
          } catch (err) {
            console.error(err);
            alert("요청 중 오류가 발생했습니다.");
            shootDoneBtn.disabled = false;
          }
          return;
        }
        const originalBtn = event.target.closest("button[data-action='originalUploadNotify']");
        if (originalBtn) {
          const sid = canonScheduleUuid(originalBtn.dataset.scheduleId || "");
          const writer = getCurrentWriter();
          if (!sid) {
            alert("스케줄 식별자가 올바르지 않습니다.");
            return;
          }
          if (!writer || !USE_SUPABASE_SYNC) {
            alert("로그인 및 서버 동기화가 필요합니다.");
            return;
          }
          if (
            !confirm(
              "파일 업로드가 완료되었나요? 확인 후 고객에게 안내 문자가 발송됩니다."
            )
          ) {
            return;
          }
          originalBtn.disabled = true;
          try {
            const res = await fetch("/api/photographer-original-upload-notify", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                writerLoginId: writer.id,
                writerPassword: writer.password,
                scheduleId: sid,
              }),
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok || !data.ok) {
              alert(data.message || "처리에 실패했습니다.");
              originalBtn.disabled = false;
              return;
            }
            photographerShootDeliveryById = {
              ...photographerShootDeliveryById,
              [sid]: {
                ...(photographerShootDeliveryById[sid] || {}),
                photographer_original_upload_notified_at: normalize(
                  data.photographer_original_upload_notified_at
                ),
              },
            };
            renderScheduleList();
            if (normalize(data.customer_original_upload_notice_sms) === "sent") {
              if (data.sms_deferred_quiet_hours) {
                alert(
                  "고객 원본 업로드 안내 문자를 한국시간 오전 10시에 예약 발송하도록 등록했습니다.\n(밤 10시~오전 8시에는 방해를 줄이기 위한 예약입니다.)"
                );
              } else {
                alert("고객에게 원본 업로드 안내 문자를 보냈습니다.");
              }
            } else {
              alert("처리되었습니다.");
            }
          } catch (err) {
            console.error(err);
            alert("요청 중 오류가 발생했습니다.");
            originalBtn.disabled = false;
          }
          return;
        }
        const navBtn = event.target.closest("button[data-action='copyNavAddress'][data-nav-address]");
        if (navBtn) {
          const copied = await copyTextSmart(decodeURIComponent(String(navBtn.dataset.navAddress || "")));
          if (copied) {
            alert("주소가 복사되었습니다.");
          } else {
            alert("주소 복사에 실패했습니다. 다시 시도해주세요.");
          }
          return;
        }
        const phoneBtn = event.target.closest("button[data-action='copyText'][data-copy-text]");
        if (phoneBtn) {
          const copied = await copyTextSmart(decodeURIComponent(String(phoneBtn.dataset.copyText || "")));
          if (copied) {
            alert("번호가 복사되었습니다.");
          } else {
            alert("번호 복사에 실패했습니다. 다시 시도해주세요.");
          }
        }
      });

      function renderUpcomingList() {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const upcomingRows = getMySchedules()
          .filter((item) => {
            if (!/^\d{4}-\d{2}-\d{2}$/.test(item.date || "")) return false;
            const target = new Date(`${item.date}T00:00:00`);
            return target.getTime() >= today.getTime();
          })
          .sort((a, b) => toTimeValue(a) - toTimeValue(b));

        if (upcomingRows.length === 0) {
          upcomingListEl.innerHTML = '<div class="upcoming-item">앞으로 촬영 예정 장소가 없습니다.</div>';
          return;
        }

        upcomingListEl.innerHTML = upcomingRows
          .map(
            (item) => `
              <div class="upcoming-item">
                ${item.date || "-"} ${item.time || "-"}<br />
                업체: ${item.company || "-"} | 장소: ${item.place || "-"}
              </div>
            `
          )
          .join("");
      }

      function renderHistory() {
        const rows = getMySchedules();
        const now = new Date();
        const currentMonth = `${now.getFullYear()}-${pad2(now.getMonth() + 1)}`;
        const monthRows = rows.filter((item) => String(item.date || "").startsWith(currentMonth));
        const monthDoneRows = monthRows.filter((item) => {
          if (!/^\d{4}-\d{2}-\d{2}$/.test(item.date || "")) return false;
          const target = new Date(`${item.date}T00:00:00`);
          target.setHours(0, 0, 0, 0);
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          return target.getTime() <= today.getTime();
        });

        historySummaryEl.innerHTML = `
          <div style="margin-bottom:8px;">이번달 촬영한 횟수: <strong>${monthDoneRows.length}회</strong></div>
          <div style="margin-bottom:8px;">이번달 전체 배정: <strong>${monthRows.length}건</strong></div>
        `;

        historyDetailListEl.innerHTML = monthRows.length
          ? monthRows
              .sort((a, b) => toTimeValue(a) - toTimeValue(b))
              .map(
                (item) => `
                  <div class="history-item">
                    ${item.date || "-"} ${item.time || "-"}<br />
                    업체: ${item.company || "-"} | 장소: ${item.place || "-"}
                  </div>
                `
              )
              .join("")
          : '<div class="history-item">이번달 촬영 내역이 없습니다.</div>';
      }

      async function handleWriterSignup() {
        const id = normalize(document.getElementById("signupId").value);
        const password = normalize(document.getElementById("signupPassword").value);
        const name = normalize(document.getElementById("signupName").value);
        const phone = normalize(document.getElementById("signupPhone").value);
        const carNumber = normalize(document.getElementById("signupCarNumber").value);
        if (!id || !password || !name) {
          alert("아이디, 비밀번호, 작가명을 입력해주세요.");
          return;
        }

        const users = readStorageArray(STORAGE_WRITERS);
        const idExists = users.some((user) => normalize(user.id).toLowerCase() === id.toLowerCase());
        if (idExists) {
          alert("이미 사용 중인 아이디입니다.");
          return;
        }
        const nameExists = users.some((user) => normalize(user.name).toLowerCase() === name.toLowerCase());
        if (nameExists) {
          alert("이미 등록된 작가명입니다. 작가명은 중복 없이 등록해주세요.");
          return;
        }

        if (USE_SUPABASE_SYNC) {
          try {
            const remoteWriters = await fetchWriterJsonRows("writers?select=login_id,name");
            const remoteIdExists = (Array.isArray(remoteWriters) ? remoteWriters : []).some(
              (row) => normalize(row?.login_id).toLowerCase() === id.toLowerCase()
            );
            if (remoteIdExists) {
              alert("이미 사용 중인 아이디입니다. 다른 아이디를 입력해주세요.");
              return;
            }
            const remoteNameExists = (Array.isArray(remoteWriters) ? remoteWriters : []).some(
              (row) => normalize(row?.name).toLowerCase() === name.toLowerCase()
            );
            if (remoteNameExists) {
              alert("이미 등록된 작가명입니다. 다른 작가명을 입력해주세요.");
              return;
            }

            const insertResponse = await fetch(`${SUPABASE_URL}/rest/v1/writers`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                apikey: SUPABASE_ANON_KEY,
                Authorization: `Bearer ${SUPABASE_ANON_KEY}`
              },
              body: JSON.stringify([
                {
                  name,
                  login_id: id,
                  password,
                  phone,
                  car_number: carNumber,
                  is_active: true
                }
              ])
            });
            if (!insertResponse.ok) {
              const errorText = await insertResponse.text();
              throw new Error(`writers insert 실패: ${errorText}`);
            }
            queueWriterTablePull();
          } catch (error) {
            console.error("[TABLE][photographer] signup direct insert 실패", error);
            alert(`작가 등록 실패: ${error && error.message ? error.message : "서버 저장 오류"}`);
            return;
          }
        } else {
          users.unshift({
            id,
            password,
            name,
            phone,
            carNumber,
            createdAt: new Date().toISOString()
          });
          writeStorageArray(STORAGE_WRITERS, users);
        }

        localStorage.setItem(STORAGE_WRITER_SESSION, id);
        signupFormEl.reset();
        renderAuthState();
        alert("회원가입 완료! 내 스케줄을 확인하세요.");
      }
      signupFormEl.addEventListener("submit", async (event) => {
        event.preventDefault();
        await handleWriterSignup();
      });

      loginFormEl.addEventListener("submit", async (event) => {
        event.preventDefault();
        const id = normalize(document.getElementById("loginId").value);
        const password = normalize(document.getElementById("loginPassword").value);
        let users = readStorageArray(STORAGE_WRITERS);
        let matched = users.find((user) => user.id === id && user.password === password);
        if (!matched && USE_SUPABASE_SYNC && users.length === 0) {
          try {
            await pullTablesToWriterStorage();
            users = readStorageArray(STORAGE_WRITERS);
            matched = users.find((user) => user.id === id && user.password === password);
          } catch (e) {
            console.warn("[login] pullTablesToWriterStorage", e);
          }
        }
        if (!matched) {
          alert(
            users.length === 0 && USE_SUPABASE_SYNC
              ? "작가 정보를 불러오지 못했습니다. 잠시 후 다시 시도하거나 새로고침 후 로그인해 주세요."
              : "아이디 또는 비밀번호가 올바르지 않습니다."
          );
          return;
        }
        localStorage.setItem(STORAGE_WRITER_SESSION, matched.id);
        if (rememberLoginEnabled) {
          localStorage.setItem(
            STORAGE_WRITER_REMEMBERED_LOGIN,
            JSON.stringify({ id: matched.id, password: matched.password })
          );
        } else {
          localStorage.removeItem(STORAGE_WRITER_REMEMBERED_LOGIN);
        }
        loginFormEl.reset();
        renderAuthState();
      });

      logoutBtnEl.addEventListener("click", () => {
        skipAutoLoginOnce = true;
        localStorage.removeItem(STORAGE_WRITER_SESSION);
        renderAuthState();
      });
      saveLoginToggleBtnEl.addEventListener("click", () => {
        rememberLoginEnabled = !rememberLoginEnabled;
        updateRememberLoginButtonText();
      });

      loginTabBtnEl.addEventListener("click", () => switchAuthTab("login"));
      signupTabBtnEl?.addEventListener("click", () => switchAuthTab("signup"));
      openSignupBtnEl.addEventListener("click", () => switchAuthTab("signup"));
      backToLoginBtnEl.addEventListener("click", () => switchAuthTab("login"));
      prevDayModeBtnEl.addEventListener("click", () => moveToRelativeMonth(-1));
      todayModeBtnEl.addEventListener("click", () => moveToRelativeDay(0));
      nextDayModeBtnEl.addEventListener("click", () => moveToRelativeDay(1));
      nextMonthModeBtnEl?.addEventListener("click", () => moveToRelativeMonth(1));
      copyVisibleScheduleBtnEl.addEventListener("click", copyVisibleSchedules);
      dayOffRequestBtnEl.addEventListener("click", openDayOffDatePicker);
      dayOffDateEl.addEventListener("change", () => {
        requestDayOffReduction(dayOffDateEl.value);
      });
      dayoffListEl.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-action='cancelDayoffRequest']");
        if (!button) return;
        cancelMyDayoffRequest(button.dataset.requestId);
      });

      filterYearEl.addEventListener("change", () => {
        quickDayPreset = "";
        updateFilterTabState();
        refreshDayOptions(filterDayEl.value);
        persistPhotographerScheduleFilterIfLoggedIn();
        renderScheduleList();
      });
      filterMonthEl.addEventListener("change", () => {
        quickDayPreset = "";
        updateFilterTabState();
        refreshDayOptions(filterDayEl.value);
        persistPhotographerScheduleFilterIfLoggedIn();
        renderScheduleList();
      });
      filterDayEl.addEventListener("change", () => {
        quickDayPreset = "";
        updateFilterTabState();
        persistPhotographerScheduleFilterIfLoggedIn();
        renderScheduleList();
      });

      historyBtnEl.addEventListener("click", () => {
        renderHistory();
        historyModalEl.classList.remove("hidden");
      });
      historyCloseBtnEl.addEventListener("click", () => {
        historyModalEl.classList.add("hidden");
      });
      historyModalEl.addEventListener("click", (event) => {
        if (event.target === historyModalEl) historyModalEl.classList.add("hidden");
      });

      payrollAddBtnEl?.addEventListener("click", async () => {
        const writer = getCurrentWriter();
        if (!writer || !payrollCategorySelectEl || !payrollAmountInputEl) return;
        const amount = Math.max(0, Number(payrollAmountInputEl.value) || 0);
        if (amount <= 0) {
          alert("금액을 입력해 주세요.");
          return;
        }
        const monthKey = getCurrentMonthKey();
        const { rec } = getMonthlyPayrollRecord(writer.id, monthKey);
        const lines = Array.isArray(rec.lines) ? rec.lines.slice() : [];
        let attachmentDataUrl = "";
        const file = payrollFileInputEl?.files && payrollFileInputEl.files[0];
        if (file) {
          if (file.size > 900 * 1024) {
            alert("첨부 이미지는 900KB 이하로 올려 주세요.");
            return;
          }
          attachmentDataUrl = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(String(reader.result || ""));
            reader.onerror = () => resolve("");
            reader.readAsDataURL(file);
          });
        }
        lines.push({
          id: `ln-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
          category: payrollCategorySelectEl.value || "etc",
          amountWon: amount,
          memo: normalize(payrollMemoInputEl?.value || ""),
          attachmentDataUrl
        });
        rec.lines = lines;
        persistMonthlyPayrollRecord(rec);
        if (payrollAmountInputEl) payrollAmountInputEl.value = "";
        if (payrollMemoInputEl) payrollMemoInputEl.value = "";
        if (payrollFileInputEl) payrollFileInputEl.value = "";
        renderPhotographerPayroll();
      });

      payrollLinesListEl?.addEventListener("click", (event) => {
        const btn = event.target.closest(".payroll-line-remove");
        if (!btn || !btn.dataset.lineId) return;
        const writer = getCurrentWriter();
        if (!writer) return;
        const monthKey = getCurrentMonthKey();
        const { rec } = getMonthlyPayrollRecord(writer.id, monthKey);
        const lines = (Array.isArray(rec.lines) ? rec.lines : []).filter((ln) => ln.id !== btn.dataset.lineId);
        rec.lines = lines;
        persistMonthlyPayrollRecord(rec);
        renderPhotographerPayroll();
      });

      window.addEventListener("storage", (event) => {
        if (
          event.key === STORAGE_SCHEDULES ||
          event.key === STORAGE_ADMIN_WRITER_SCHEDULES ||
          event.key === STORAGE_DAILY_LIMITS ||
          event.key === STORAGE_LIMIT_CONFIG ||
          event.key === STORAGE_DAYOFF_DEDUCTIONS ||
          event.key === STORAGE_DAYOFF_REQUESTS ||
          event.key === STORAGE_WRITER_SESSION ||
          event.key === STORAGE_WRITERS ||
          event.key === STORAGE_PHOTOGRAPHER_PAYROLL_CONFIG ||
          event.key === STORAGE_PHOTOGRAPHER_PAYROLL_MONTHLY
        ) {
          renderAuthState();
        }
      });

      function bootstrapPhotographerPageData() {
        const clientKvPullDone = pullScheduleSiteClientKvFromSupabase();
        switchAuthTab("login");
        renderAuthState();
        queueWriterTablePull();
        clientKvPullDone.then((didHydrate) => {
          if (!didHydrate) return;
          queueWriterTablePull();
          renderAuthState();
          try {
            if (typeof renderPhotographerPayroll === "function") renderPhotographerPayroll();
          } catch (_) {}
        });
      }
      void bootstrapPhotographerPageData();
    </script>
