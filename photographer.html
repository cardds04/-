<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>작가용 스케줄 페이지</title>
    <style>
      :root {
        --line: #d7ddec;
        --text: #1f2940;
        --muted: #5f6c88;
        --blue: #466ba9;
        --bg: #f4f7fd;
        --red: #d74444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap { width: min(900px, 94vw); margin: 28px auto 36px; }
      .card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 16px; }
      h1 { margin: 0 0 8px; font-size: 1.8rem; }
      .sub { margin: 0 0 16px; color: var(--muted); }
      .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
      .tabs button { border: 1px solid var(--line); background: #f7f9ff; border-radius: 8px; padding: 7px 12px; font-weight: 700; cursor: pointer; }
      .tabs button.active { border-color: var(--blue); background: var(--blue); color: #fff; }
      #dayOffRequestBtn {
        margin-left: auto;
        border-color: #e2c400;
        background: #ffe066;
        color: #3a3200;
      }
      #dayOffRequestBtn:hover {
        background: #ffd43b;
      }
      .hidden { display: none !important; }
      .form { display: grid; gap: 8px; }
      .row { display: flex; align-items: center; gap: 8px; border: 1px solid var(--line); border-radius: 8px; background: #fcfdff; padding: 9px 10px; }
      .row input, .row select { width: 100%; border: 0; outline: none; background: transparent; font-size: 0.95rem; }
      .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .triple { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
      .btn { border: 0; background: var(--blue); color: #fff; border-radius: 10px; padding: 10px 12px; font-weight: 700; cursor: pointer; }
      .outline { border: 1px solid var(--line); background: #fff; color: var(--text); }
      .small { font-size: 0.82rem; padding: 5px 10px; border-radius: 999px; }
      .top-line { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
      .hint { margin: -2px 0 4px; font-size: 0.84rem; color: var(--muted); }
      .filter-wrap { border: 1px solid var(--line); border-radius: 10px; background: #fbfcff; padding: 10px; margin: 10px 0; }
      .status-list { display: grid; gap: 8px; margin-top: 8px; }
      .copy-bar { display: flex; justify-content: flex-end; margin-top: 8px; }
      .status-card { border: 1px solid var(--line); border-radius: 10px; background: #fbfcff; padding: 10px; }
      .status-head { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 6px; font-weight: 700; }
      .status-label-today { color: var(--red); }
      .status-label-tomorrow { color: #1c9b4a; }
      .status-meta { font-size: 0.9rem; line-height: 1.5; color: #2f3c58; }
      .inline-copy-btn { margin-left: 6px; }
      .upcoming-wrap { margin-top: 12px; }
      .upcoming-title { font-weight: 700; margin-bottom: 8px; }
      .upcoming-list { display: grid; gap: 6px; }
      .upcoming-item { border: 1px solid var(--line); border-radius: 8px; padding: 8px; background: #fbfcff; font-size: 0.88rem; line-height: 1.45; }
      .dayoff-wrap { margin-top: 12px; }
      .dayoff-title { font-weight: 700; margin-bottom: 8px; }
      .dayoff-list { display: grid; gap: 6px; }
      .dayoff-item { border: 1px solid var(--line); border-radius: 8px; padding: 8px; background: #fbfcff; font-size: 0.88rem; line-height: 1.45; }
      .dayoff-item-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
      .history-modal {
        position: fixed;
        inset: 0;
        background: rgba(17, 26, 44, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 14px;
        z-index: 999;
      }
      .history-modal.hidden { display: none; }
      .history-panel {
        width: min(760px, 96vw);
        max-height: 86vh;
        overflow: auto;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
      }
      .history-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }
      .history-list {
        display: grid;
        gap: 6px;
        margin-top: 10px;
      }
      .history-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
        background: #fbfcff;
        font-size: 0.88rem;
        line-height: 1.45;
      }
      @media (max-width: 720px) {
        .pair, .triple { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="card">
        <h1>작가용 스케줄 페이지</h1>
        <p class="sub">회원가입 후 로그인하면 내 스케줄과 촬영 기록을 확인할 수 있습니다.</p>

        <div id="authBlock">
          <div class="tabs">
            <button id="loginTabBtn" class="active" type="button">로그인</button>
            <button id="signupTabBtn" type="button" onclick="window.__openWriterSignup && window.__openWriterSignup()">회원가입</button>
          </div>
          <form id="loginForm" class="form" novalidate>
            <div class="row"><span>🆔</span><input id="loginId" type="text" placeholder="아이디" required /></div>
            <div class="row"><span>🔑</span><input id="loginPassword" type="password" placeholder="비밀번호" required /></div>
            <button id="saveLoginToggleBtn" class="btn outline small" type="button">아이디와 비번 저장하기: OFF</button>
            <button class="btn" type="submit">로그인</button>
            <button id="openSignupBtn" class="btn outline" type="button" onclick="window.__openWriterSignup && window.__openWriterSignup()">회원가입</button>
          </form>
          <form id="signupForm" class="form hidden" novalidate>
            <div class="row"><span>🆔</span><input id="signupId" type="text" placeholder="아이디" required /></div>
            <div class="row"><span>🔑</span><input id="signupPassword" type="password" placeholder="비밀번호" required /></div>
            <div class="row"><span>👤</span><input id="signupName" type="text" placeholder="작가명" required /></div>
            <div class="row"><span>📞</span><input id="signupPhone" type="text" placeholder="연락처(선택)" /></div>
            <div class="row"><span>🚗</span><input id="signupCarNumber" type="text" placeholder="차량번호(선택)" /></div>
            <button id="signupSubmitBtn" class="btn" type="submit">회원가입</button>
            <button id="backToLoginBtn" class="btn outline" type="button" onclick="window.__backToWriterLogin && window.__backToWriterLogin()">로그인으로 돌아가기</button>
          </form>
        </div>

        <div id="scheduleBlock" class="hidden">
          <div class="top-line">
            <strong id="welcomeText"></strong>
            <div style="display:flex; gap:6px;">
              <span id="monthlyShotCount" class="btn outline small" style="display:inline-flex; align-items:center;">이번달 촬영횟수 0회</span>
              <button id="historyBtn" class="btn outline small" type="button">기록보기</button>
              <button id="logoutBtn" class="btn outline" type="button">로그아웃</button>
            </div>
          </div>

          <div class="filter-wrap">
            <div class="tabs" style="margin-bottom:8px;">
              <button id="prevDayModeBtn" type="button">이전달</button>
              <button id="todayModeBtn" type="button">오늘</button>
              <button id="nextDayModeBtn" type="button">내일</button>
              <button id="nextMonthModeBtn" type="button">다음달</button>
              <button id="dayOffRequestBtn" class="outline" type="button">휴무요청</button>
            </div>
            <div class="triple">
              <div class="row"><span>📅</span><select id="filterYear"></select></div>
              <div class="row"><span>📆</span><select id="filterMonth"></select></div>
              <div class="row"><span>🗓️</span><select id="filterDay"></select></div>
            </div>
            <p class="hint">기본값은 오늘 날짜입니다. 월별/일별로 내 스케줄을 조회할 수 있습니다.</p>
            <p id="filterCountText" class="hint"><strong>조회결과 총 0건</strong></p>
            <input id="dayOffDate" type="date" class="hidden" />
          </div>
          <div id="scheduleCopyBar" class="copy-bar">
            <button id="copyVisibleScheduleBtn" class="btn outline small" type="button">내용전체복사</button>
          </div>

          <div id="scheduleList" class="status-list"></div>

          <div class="upcoming-wrap">
            <div class="upcoming-title">앞으로 촬영 예정 장소</div>
            <div id="upcomingList" class="upcoming-list"></div>
          </div>

          <div class="dayoff-wrap">
            <div class="dayoff-title">휴무요청일</div>
            <div id="dayoffList" class="dayoff-list"></div>
          </div>
        </div>
      </div>
    </main>

    <div id="historyModal" class="history-modal hidden">
      <div class="history-panel">
        <div class="history-head">
          <strong>이번달 촬영 기록</strong>
          <button id="historyCloseBtn" class="btn outline small" type="button">닫기</button>
        </div>
        <div id="historySummary"></div>
        <div id="historyDetailList" class="history-list"></div>
      </div>
    </div>

    <script src="./sync-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const STORAGE_WRITERS = "scheduleSiteWriters";
      const STORAGE_WRITER_SESSION = "scheduleSiteWriterSession";
      const STORAGE_WRITER_REMEMBERED_LOGIN = "scheduleSiteWriterRememberedLogin";
      const STORAGE_COMPANIES = "scheduleSiteCustomerCompanies";
      const STORAGE_SCHEDULES = "scheduleSiteCustomerSchedules";
      const STORAGE_ADMIN_WRITER_SCHEDULES = "scheduleSiteWriterSchedules";
      const STORAGE_ADMIN_SCHEDULES = "scheduleSiteAdminSchedules";
      const STORAGE_DAILY_LIMITS = "scheduleSiteDailyLimits";
      const STORAGE_DAYOFF_DEDUCTIONS = "scheduleSiteDayoffDeductions";
      const STORAGE_DAYOFF_REQUESTS = "scheduleSiteDayoffRequests";
      const STORAGE_LIMIT_CONFIG = "scheduleSiteLimitConfig";
      const syncConfig = window.SCHEDULE_SITE_SYNC_CONFIG || {};
      const FALLBACK_SUPABASE_URL = "https://pidfkrxsgffoqstogmli.supabase.co";
      const FALLBACK_SUPABASE_ANON_KEY = "sb_publishable_0JHUt_yXZx78FwoqO8XCDg_s319cLiW";
      const REMOTE_SYNC_ENDPOINT = syncConfig.remoteSyncEndpoint || "";
      const SUPABASE_URL =
        syncConfig.supabaseUrl ||
        FALLBACK_SUPABASE_URL;
      const SUPABASE_ANON_KEY =
        syncConfig.supabaseAnonKey ||
        FALLBACK_SUPABASE_ANON_KEY;
      const USE_SUPABASE_SYNC = Boolean(SUPABASE_URL && SUPABASE_ANON_KEY);
      const SUPABASE_STATE_TABLE = "app_state";
      const SUPABASE_STATE_ID = "global";
      const SUPABASE_CLIENT_KV_TABLE = "schedule_site_client_kv";
      const SUPABASE_CLIENT_KV_ROW_ID = "scoped_local_v1";
      const SUPABASE_COMPANY_DIRECTORY_TABLE = "company_directory";
      const STORAGE_SYNC_KEYS = [
        "scheduleSiteCustomerCompanies",
        "scheduleSiteCustomerSchedules",
        "scheduleSiteCustomerAlerts",
        "scheduleSiteCustomers",
        "scheduleSiteCustomerLogins",
        "scheduleSiteAdminCompanies",
        "scheduleSiteCanceledSchedules",
        "scheduleSiteWriters",
        "scheduleSiteWriterSchedules",
        "scheduleSiteAdminSchedules",
        "scheduleSiteDailyLimits",
        "scheduleSiteDayoffDeductions",
        "scheduleSiteDayoffRequests",
        "scheduleSiteDayoffAlertReadIds",
        "scheduleSiteLimitConfig",
        "scheduleSiteExcludedPhotographers",
        "scheduleSitePhotographerProfiles"
      ];
      const STORAGE_SYNC_DEFAULTS = {
        scheduleSiteCustomerCompanies: "[]",
        scheduleSiteCustomerSchedules: "[]",
        scheduleSiteCustomerAlerts: "[]",
        scheduleSiteCustomers: "[]",
        scheduleSiteCustomerLogins: "[]",
        scheduleSiteAdminCompanies: "[]",
        scheduleSiteCanceledSchedules: "[]",
        scheduleSiteWriters: "[]",
        scheduleSiteWriterSchedules: "[]",
        scheduleSiteAdminSchedules: "[]",
        scheduleSiteDailyLimits: "{}",
        scheduleSiteDayoffDeductions: "{}",
        scheduleSiteDayoffRequests: "[]",
        scheduleSiteDayoffAlertReadIds: "[]",
        scheduleSiteLimitConfig: "{}",
        scheduleSiteExcludedPhotographers: "[]",
        scheduleSitePhotographerProfiles: "[]"
      };
      const SUPABASE_ONLY_MODE = true;
      // 작가·고객 로그인 세션은 Supabase KV에 절대 올리지 않음 (타 계정 전파 방지)
      const PRIVATE_LOCAL_KEYS = new Set([
        STORAGE_WRITER_SESSION,
        STORAGE_WRITER_REMEMBERED_LOGIN,
        "scheduleSiteCustomerSession",
        "scheduleSiteCustomerRememberedLogin"
      ]);
      const scheduleSiteClientKvState = {
        memoryStore: new Map(),
        snapshotStorageKey: "__scheduleSiteSnapshotV1",
        scopePrefix: "scheduleSite",
        nativeGetItem: null,
        nativeSetItem: null,
        nativeRemoveItem: null,
        nativeClear: null,
        snapshotTimer: null,
        supabasePushTimer: null,
        initialPullDone: false,
        isScopedKey(key) {
          return String(key || "").startsWith(this.scopePrefix);
        },
        getNativeLastScopedWriteAt() {
          try {
            return String(this.nativeGetItem("__scheduleSiteLastScopedWriteAt") || "").trim();
          } catch (error) {
            return "";
          }
        },
        setNativeLastScopedWriteAt(iso) {
          try {
            this.nativeSetItem("__scheduleSiteLastScopedWriteAt", String(iso || ""));
          } catch (error) {}
        },
        scopedKeyCount() {
          return this.memoryStore.size;
        },
        normalizeKvValue(v) {
          if (v === null || v === undefined) return "";
          if (typeof v === "string") return v;
          try {
            return JSON.stringify(v);
          } catch (error) {
            return String(v);
          }
        },
        hydrateFromServerKv(kvObj) {
          if (!kvObj || typeof kvObj !== "object") return;
          this.memoryStore.clear();
          Object.entries(kvObj).forEach(([k, v]) => {
            if (!this.isScopedKey(k)) return;
            if (PRIVATE_LOCAL_KEYS.has(String(k))) return;
            this.memoryStore.set(String(k), this.normalizeKvValue(v));
          });
          try {
            this.nativeSetItem(this.snapshotStorageKey, JSON.stringify(Object.fromEntries(this.memoryStore.entries())));
          } catch (error) {}
        },
        saveSnapshotDebounced() {
          if (this.snapshotTimer) clearTimeout(this.snapshotTimer);
          this.snapshotTimer = setTimeout(() => {
            try {
              this.nativeSetItem(this.snapshotStorageKey, JSON.stringify(Object.fromEntries(this.memoryStore.entries())));
            } catch (error) {}
            this.setNativeLastScopedWriteAt(new Date().toISOString());
            this.queueSupabaseKvPush();
          }, 10);
        },
        queueSupabaseKvPush() {
          if (!USE_SUPABASE_SYNC || !SUPABASE_ONLY_MODE) return;
          if (!this.initialPullDone) return;
          if (typeof window.__scheduleSitePushClientKv !== "function") return;
          if (this.supabasePushTimer) clearTimeout(this.supabasePushTimer);
          this.supabasePushTimer = setTimeout(() => void window.__scheduleSitePushClientKv(), 2500);
        },
        installProxy() {
          if (!SUPABASE_ONLY_MODE) return;
          this.nativeGetItem = localStorage.getItem.bind(localStorage);
          this.nativeSetItem = localStorage.setItem.bind(localStorage);
          this.nativeRemoveItem = localStorage.removeItem.bind(localStorage);
          this.nativeClear = localStorage.clear.bind(localStorage);
          this.memoryStore = new Map();
          try {
            const rawSnapshot = this.nativeGetItem(this.snapshotStorageKey);
            const parsedSnapshot = rawSnapshot ? JSON.parse(rawSnapshot) : null;
            if (parsedSnapshot && typeof parsedSnapshot === "object" && !Array.isArray(parsedSnapshot)) {
              Object.entries(parsedSnapshot).forEach(([key, value]) => {
                if (!this.isScopedKey(key)) return;
                if (PRIVATE_LOCAL_KEYS.has(String(key))) return;
                this.memoryStore.set(String(key), String(value ?? ""));
              });
            }
          } catch (error) {}
          const self = this;
          localStorage.getItem = (key) => {
            const normalizedKey = String(key || "");
            if (PRIVATE_LOCAL_KEYS.has(normalizedKey)) return self.nativeGetItem(normalizedKey);
            if (!self.isScopedKey(normalizedKey)) return self.nativeGetItem(normalizedKey);
            return self.memoryStore.has(normalizedKey) ? self.memoryStore.get(normalizedKey) : null;
          };
          localStorage.setItem = (key, value) => {
            const normalizedKey = String(key || "");
            const normalizedValue = String(value ?? "");
            if (PRIVATE_LOCAL_KEYS.has(normalizedKey)) {
              self.nativeSetItem(normalizedKey, normalizedValue);
              return;
            }
            if (!self.isScopedKey(normalizedKey)) {
              self.nativeSetItem(normalizedKey, normalizedValue);
              return;
            }
            self.memoryStore.set(normalizedKey, normalizedValue);
            self.saveSnapshotDebounced();
          };
          localStorage.removeItem = (key) => {
            const normalizedKey = String(key || "");
            if (PRIVATE_LOCAL_KEYS.has(normalizedKey)) {
              self.nativeRemoveItem(normalizedKey);
              return;
            }
            if (!self.isScopedKey(normalizedKey)) {
              self.nativeRemoveItem(normalizedKey);
              return;
            }
            self.memoryStore.delete(normalizedKey);
            self.saveSnapshotDebounced();
          };
          localStorage.clear = () => {
            self.memoryStore.clear();
            self.nativeRemoveItem(self.snapshotStorageKey);
            self.nativeClear();
          };
        }
      };
      scheduleSiteClientKvState.installProxy();
      const CLIENT_KV_FETCH_TIMEOUT_MS = 5000;
      const CLIENT_KV_PUSH_TIMEOUT_MS = 25000;
      const CLIENT_KV_SEED_PUSH_INTERVAL_MS = 180000;
      let scheduleSiteClientKvPushInFlight = false;
      function scheduleClientKvSeedPushIfNeeded() {
        if (scheduleSiteClientKvState.scopedKeyCount() === 0) return;
        const key = "__scheduleSiteClientKvLastSeedPush";
        try {
          const last = Number(scheduleSiteClientKvState.nativeGetItem(key));
          if (Number.isFinite(last) && Date.now() - last < CLIENT_KV_SEED_PUSH_INTERVAL_MS) return;
          scheduleSiteClientKvState.nativeSetItem(key, String(Date.now()));
        } catch (error) {}
        setTimeout(() => void pushScheduleSiteClientKvToSupabase(), 1000);
      }
      async function pullScheduleSiteClientKvFromSupabase() {
        if (!USE_SUPABASE_SYNC || !SUPABASE_ONLY_MODE) {
          scheduleSiteClientKvState.initialPullDone = true;
          return false;
        }
        let didHydrate = false;
        const ac = new AbortController();
        const tid = setTimeout(() => ac.abort(), CLIENT_KV_FETCH_TIMEOUT_MS);
        try {
          const response = await fetch(
            `${SUPABASE_URL}/rest/v1/${SUPABASE_CLIENT_KV_TABLE}?id=eq.${encodeURIComponent(SUPABASE_CLIENT_KV_ROW_ID)}&select=kv,updated_at&limit=1`,
            {
              method: "GET",
              headers: {
                apikey: SUPABASE_ANON_KEY,
                Authorization: `Bearer ${SUPABASE_ANON_KEY}`
              },
              cache: "no-store",
              signal: ac.signal
            }
          );
          if (!response.ok) {
            const errBody = await response.text();
            console.error("[CLIENT_KV] GET 실패", response.status, errBody);
            return false;
          }
          const rows = await response.json();
          if (!Array.isArray(rows) || rows.length === 0) {
            return false;
          }
          const row = rows[0];
          const serverAt = String(row?.updated_at || "").trim();
          const kv = row?.kv;
          const localWriteAt = scheduleSiteClientKvState.getNativeLastScopedWriteAt();
          const memCount = scheduleSiteClientKvState.scopedKeyCount();
          const serverMs = serverAt ? new Date(serverAt).getTime() : 0;
          const localMs = localWriteAt ? new Date(localWriteAt).getTime() : 0;
          const serverKeyCount = kv && typeof kv === "object" ? Object.keys(kv).length : 0;
          const shouldApply =
            serverKeyCount > 0 &&
            (memCount === 0 || (Boolean(localWriteAt) && serverMs > localMs && !Number.isNaN(serverMs) && !Number.isNaN(localMs)));
          if (shouldApply) {
            scheduleSiteClientKvState.hydrateFromServerKv(kv);
            scheduleSiteClientKvState.setNativeLastScopedWriteAt(serverAt || new Date().toISOString());
            didHydrate = true;
          }
          return didHydrate;
        } catch (error) {
          if (error && error.name === "AbortError") {
            console.warn("[CLIENT_KV] 복원 요청 시간 초과 — 화면은 계속 표시됩니다.");
          } else {
            console.warn("[CLIENT_KV] Supabase 복원 실패", error);
          }
          return false;
        } finally {
          clearTimeout(tid);
          scheduleSiteClientKvState.initialPullDone = true;
          scheduleClientKvSeedPushIfNeeded();
        }
      }
      async function pushScheduleSiteClientKvToSupabase() {
        if (!USE_SUPABASE_SYNC || !SUPABASE_ONLY_MODE || !scheduleSiteClientKvState.initialPullDone) return;
        if (scheduleSiteClientKvPushInFlight) return;
        const kv = Object.fromEntries(
          [...scheduleSiteClientKvState.memoryStore.entries()].filter(([k]) => !PRIVATE_LOCAL_KEYS.has(k))
        );
        if (!Object.keys(kv).length) return;
        scheduleSiteClientKvPushInFlight = true;
        const ac = new AbortController();
        const pushTid = setTimeout(() => ac.abort(), CLIENT_KV_PUSH_TIMEOUT_MS);
        try {
          const response = await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_CLIENT_KV_TABLE}?on_conflict=id`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Prefer: "resolution=merge-duplicates,return=representation",
              apikey: SUPABASE_ANON_KEY,
              Authorization: `Bearer ${SUPABASE_ANON_KEY}`
            },
            signal: ac.signal,
            body: JSON.stringify([{ id: SUPABASE_CLIENT_KV_ROW_ID, kv }])
          });
          if (!response.ok) {
            const errorText = await response.text();
            console.error("[CLIENT_KV] POST 실패", response.status, errorText);
            throw new Error(errorText);
          }
          const rows = await response.json();
          const updatedAt = rows?.[0]?.updated_at;
          if (updatedAt) scheduleSiteClientKvState.setNativeLastScopedWriteAt(String(updatedAt));
        } catch (error) {
          if (error && error.name === "AbortError") {
            console.warn("[CLIENT_KV] 저장 요청 시간 초과");
          } else {
            console.error("[CLIENT_KV] Supabase 저장 실패", error);
          }
        } finally {
          clearTimeout(pushTid);
          scheduleSiteClientKvPushInFlight = false;
        }
      }

      function getDefaultDailyLimit(dateKey) {

      function getEffectiveDailyLimit(dateKey) {
        const deductions = readStorageObject(STORAGE_DAYOFF_DEDUCTIONS);
        const requests = readStorageArray(STORAGE_DAYOFF_REQUESTS);
        const base = getDefaultDailyLimit(dateKey);
        const legacyRaw = Number(deductions[dateKey]);
        const legacyDeduction = Number.isNaN(legacyRaw) || legacyRaw < 0 ? 0 : Math.floor(legacyRaw);
        const requestedDeduction = requests
          .filter((item) => String(item?.date || "") === String(dateKey || ""))
          .reduce((sum, item) => sum + Math.max(0, Number(item?.amount) || 0), 0);
        return Math.max(0, base - legacyDeduction - requestedDeduction);
      }

      function getBookedCountForDate(dateKey) {
        const targetDate = String(dateKey || "").trim();
        const adminSourceRows = readStorageArray(STORAGE_ADMIN_SCHEDULES);
        const customerRows = readStorageArray(STORAGE_SCHEDULES);
        if (adminSourceRows.length > 0) {
          return adminSourceRows.filter((row) => String(row?.date || "").trim() === targetDate).length;
        }
        const adminRows = readStorageArray(STORAGE_ADMIN_WRITER_SCHEDULES);
        const customerIds = new Set(
          customerRows
            .map((row) => String(row?.customerScheduleId || "").trim())
            .filter(Boolean)
        );

        const customerCount = customerRows.filter((row) => String(row?.date || "").trim() === targetDate).length;
        const adminOnlyCount = adminRows.filter((row) => {
          if (String(row?.date || "").trim() !== targetDate) return false;
          const mirrorId = String(row?.writerMirrorId || "").trim();
          if (!mirrorId) return true;
          return !customerIds.has(mirrorId);
        }).length;
        return customerCount + adminOnlyCount;
      }

      function parseScheduleTimeToMinutes(timeText) {
        const raw = String(timeText || "").trim();
        if (!raw) return 0;
        const normalized = raw.replace(/\s+/g, "");
        const meridiem = normalized.match(/^(오전|오후)(\d{1,2})(?::(\d{1,2}))?$/);
        if (meridiem) {
          let hour = Number(meridiem[2]) || 0;
          const minute = Math.min(59, Number(meridiem[3] || "0") || 0);
          if (meridiem[1] === "오후" && hour < 12) hour += 12;
          if (meridiem[1] === "오전" && hour === 12) hour = 0;
          return hour * 60 + minute;
        }
        const hm = normalized.match(/^(\d{1,2})(?::(\d{1,2}))$/);
        if (hm) {
          const hour = Math.min(23, Number(hm[1]) || 0);
          const minute = Math.min(59, Number(hm[2]) || 0);
          return hour * 60 + minute;
        }
        const h = normalized.match(/^(\d{1,2})시(?:반|(\d{1,2})분)?$/);
        if (h) {
          const hour = Math.min(23, Number(h[1]) || 0);
          const minute = normalized.includes("반") ? 30 : Math.min(59, Number(h[2] || "0") || 0);
          return hour * 60 + minute;
        }
        const onlyHour = normalized.match(/^(\d{1,2})$/);
        if (onlyHour) {
          return Math.min(23, Number(onlyHour[1]) || 0) * 60;
        }
        return 0;
      }
      function toTimeValue(item) {
        const dateText = String(item?.date || "").trim();
        let baseDate = new Date("2099-12-31T00:00:00").getTime();
        if (/^\d{4}-\d{2}-\d{2}$/.test(dateText)) {
          const [year, month, day] = dateText.split("-").map((v) => Number(v) || 0);
          baseDate = new Date(year, Math.max(0, month - 1), Math.max(1, day), 0, 0, 0, 0).getTime();
        }
        return baseDate + parseScheduleTimeToMinutes(item?.time) * 60000;
      }

      function normalizeNavigationAddress(placeText) {
        const raw = normalize(placeText).replace(/\([^)]*\)/g, "").replace(/\s+/g, " ").trim();
        if (!raw) return "-";
        const stopRegex =
          /(아파트|오피스텔|빌라|맨션|타운하우스|휴먼시아|래미안|푸르지오|자이|힐스테이트|아이파크|더샵|건영)/;
        const unitRegex = /^(\d+동|\d+호|\d{1,4}-\d{1,4})$/;
        const tokens = raw.split(" ").map((token) => token.trim()).filter(Boolean);
        const kept = [];
        for (const token of tokens) {
          if (stopRegex.test(token) || unitRegex.test(token)) break;
          kept.push(token);
        }
        return normalize(kept.join(" ")) || raw;
      }

      function getMySchedules() {
        const writer = getCurrentWriter();
        if (!writer) return [];
        const writerName = normalize(writer.name).toLowerCase();
        if (!writerName) return [];
        // 고객 로컬(STORAGE_SCHEDULES) 후 서버·관리자 미러를 덮어써 동일 id 에서 서버가 우선(삭제 반영)
        const merged = [...readStorageArray(STORAGE_SCHEDULES), ...readStorageArray(STORAGE_ADMIN_WRITER_SCHEDULES)];
        const dedupedMap = new Map();
        merged.forEach((row) => {
          const keyBase = normalize(row?.writerMirrorId || row?.customerScheduleId);
          const fallbackKey = [
            normalize(row?.date),
            normalize(row?.time),
            normalize(row?.name),
            normalize(row?.company),
            normalize(row?.place)
          ].join("|");
          const key = keyBase || fallbackKey;
          if (!key) return;
          dedupedMap.set(key, row);
        });
        return [...dedupedMap.values()]
          .filter((row) => normalize(row?.name).toLowerCase() === writerName)
          .sort((a, b) => toTimeValue(a) - toTimeValue(b));

      async function requestDayOffReduction(selectedDate) {

          renderAuthState();
          return;
        }
        const dateKey = String(selectedDate || dayOffDateEl.value || "").trim();

          alert("휴무요청 날짜를 선택해주세요.");
          return;
        }
        const currentLimit = getEffectiveDailyLimit(dateKey);
        const bookedCount = getBookedCountForDate(dateKey);
        if (currentLimit - 4 < bookedCount) {
          alert("예약이 이미 차있어 어렵습니다. 관리자에게 요청해주세요.");
          return;
        }
        const requests = readStorageArray(STORAGE_DAYOFF_REQUESTS);
        const writerName = normalize(writer.name).toLowerCase();
        const duplicated = requests.some((item) => {
          if (String(item?.date || "") !== dateKey) return false;
          return normalize(item?.writerName).toLowerCase() === writerName;
        });
        if (duplicated) {
          alert("해당 날짜는 이미 휴무요청했습니다.");
          return;
        }
        if (!USE_SUPABASE_SYNC) {
          requests.unshift({
            id: `dayoff-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
            date: dateKey,
            amount: 4,
            writerId: "",
            writerName: String(writer.name || "").trim(),
            requestedAt: new Date().toISOString()
          });
          localStorage.setItem(STORAGE_DAYOFF_REQUESTS, JSON.stringify(requests));
          renderMyDayoffRequests();
          alert("휴무요청이 반영되었습니다");
          return;
        }
        const wid = String(writer.id || "").trim() || null;
        const row = {
          writer_id: wid,
          writer_name: String(writer.name || "").trim(),
          dayoff_date: dateKey
        };
        const response = await fetch(`${SUPABASE_URL}/rest/v1/dayoff_requests`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Prefer: "return=minimal",
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify([row])
        });
        if (!response.ok) {
          const errorText = await response.text();
          const hint =
            response.status === 401 || response.status === 403
              ? "\n\n(Supabase에서 dayoff_requests 에 anon INSERT 허용 RLS가 필요합니다. 저장소의 supabase/migrations/20260331150000_dayoff_requests_table_and_rls.sql 를 실행하세요.)"
              : "";
          alert(`휴무요청 저장 실패: ${errorText}${hint}`);
          return;
        }
        queueWriterTablePull();
        alert("휴무요청이 반영되었습니다");
      }

      async function cancelMyDayoffRequest(requestId) {
        const writer = getCurrentWriter();
        if (!writer) {
          alert("로그인이 필요합니다.");
          renderAuthState();
          return;
        }
        const targetId = normalize(requestId);
        if (!targetId) return;

        const confirmed = confirm("휴무요청을 취소하시겠습니까?");
        if (!confirmed) return;
        if (!USE_SUPABASE_SYNC) {
          const writerName = normalize(writer.name).toLowerCase();
          const requests = readStorageArray(STORAGE_DAYOFF_REQUESTS);
          const removeIndex = requests.findIndex((item) => normalize(item?.id) === targetId && normalize(item?.writerName).toLowerCase() === writerName);
          if (removeIndex < 0) {
            alert("취소할 휴무요청을 찾지 못했습니다.");
            renderMyDayoffRequests();
            return;
          }
          requests.splice(removeIndex, 1);
          localStorage.setItem(STORAGE_DAYOFF_REQUESTS, JSON.stringify(requests));
          renderMyDayoffRequests();
          alert("휴무요청이 취소되었습니다.");
          return;
        }
        const response = await fetch(`${SUPABASE_URL}/rest/v1/dayoff_requests?id=eq.${encodeURIComponent(targetId)}`, {
          method: "DELETE",
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`
          }
        });
        if (!response.ok) {
          const errorText = await response.text();
          alert(`휴무요청 취소 실패: ${errorText}`);
          return;
        }
        queueWriterTablePull();
        alert("휴무요청이 취소되었습니다.");
      }

      function getMyDayoffRequests() {
        const writer = getCurrentWriter();
        if (!writer) return [];
        const writerId = normalize(writer.id);
        const writerName = normalize(writer.name).toLowerCase();
        return readStorageArray(STORAGE_DAYOFF_REQUESTS)
          .filter((item) => {
            const itemWriterId = normalize(item?.writerId);
            const itemWriterName = normalize(item?.writerName).toLowerCase();
            if (itemWriterId) return itemWriterId === writerId;
            return itemWriterName && itemWriterName === writerName;
          })
          .sort((a, b) => {
            const aTime = new Date(String(a?.requestedAt || "")).getTime();
            const bTime = new Date(String(b?.requestedAt || "")).getTime();
            const safeATime = Number.isNaN(aTime) ? 0 : aTime;
            const safeBTime = Number.isNaN(bTime) ? 0 : bTime;
            return safeBTime - safeATime;
          });
      }

      function renderMyDayoffRequests() {
        const requests = getMyDayoffRequests();
        if (requests.length === 0) {
          dayoffListEl.innerHTML = '<div class="dayoff-item">등록된 휴무요청일이 없습니다.</div>';
          return;
        }
        dayoffListEl.innerHTML = requests
          .map((item) => {
            const date = normalize(item?.date) || "-";
            const requestedAt = normalize(item?.requestedAt).slice(0, 16).replace("T", " ") || "-";
            const requestId = normalize(item?.id);
            return `
              <div class="dayoff-item">
                <div class="dayoff-item-head">
                  <strong>휴무요청일: ${date}</strong>
                  <button class="btn outline small" type="button" data-action="cancelDayoffRequest" data-request-id="${requestId}">취소</button>
                </div>
                요청시간: ${requestedAt}
              </div>
            `;
          })
          .join("");
      }

      function openDayOffDatePicker() {
        const today = new Date();
        const todayValue = `${today.getFullYear()}-${pad2(today.getMonth() + 1)}-${pad2(today.getDate())}`;
        if (!dayOffDateEl.value) dayOffDateEl.value = todayValue;
        if (typeof dayOffDateEl.showPicker === "function") {
          dayOffDateEl.showPicker();
        } else {
          dayOffDateEl.click();
        }
      }

      function renderScheduleList() {
        const year = Number(filterYearEl.value);
        const month = Number(filterMonthEl.value);
        const dayValue = String(filterDayEl.value || "").trim().toLowerCase();
        const day = Number(dayValue);
        const targetDate = `${year}-${pad2(month)}-${pad2(day)}`;
        const targetMonth = `${year}-${pad2(month)}`;

        const rows = getMySchedules().filter((item) => {
          if (filterMode === "all") return true;
          if (filterMode === "day") {
            if (dayValue === "all") return String(item.date || "").slice(0, 7) === targetMonth;
            return item.date === targetDate;
          }
          return String(item.date || "").slice(0, 7) === targetMonth;
        });
        const modeLabel =
          filterMode === "all"
            ? "전체"
            : filterMode === "day"
            ? dayValue === "all"
              ? `${targetMonth} 전체`
              : `${targetDate}`
            : `${targetMonth}`;
        latestRenderedRows = rows;
        latestModeLabel = modeLabel;
        filterCountTextEl.innerHTML = `<strong>${modeLabel} 조회결과 총 ${rows.length}건</strong>`;
        renderMonthlyShotCount();

        if (rows.length === 0) {
          scheduleListEl.innerHTML = `<div class="status-card">${modeLabel} 기준 스케줄이 없습니다.</div>`;
          return;
        }

        scheduleListEl.innerHTML = rows
          .map((item, rowIndex) => {
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            const target = new Date(`${item.date || "2099-12-31"}T00:00:00`);
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const isToday = sameDate(now, target);
            const isTomorrow = sameDate(tomorrow, target);
            const statusLabel = target.getTime() < now.getTime() ? "촬영완료" : isToday ? "오늘촬영" : isTomorrow ? "내일촬영" : "촬영예정";
            const statusClass = isToday ? "status-label-today" : isTomorrow ? "status-label-tomorrow" : "";
            const navAddress = normalizeNavigationAddress(item.place || "-");
            return `
              <article class="status-card">
                <div class="status-head">
                  <span>${item.date || "-"} | ${item.time || "-"}</span>
                  <span class="${statusClass}">${statusLabel}</span>
                </div>
                <div class="status-meta">
                  업체: ${item.company || "-"}<br />
                  장소: ${item.place || "-"}<button class="btn outline small inline-copy-btn" type="button" data-action="copyNavAddress" data-row-index="${rowIndex}" data-nav-address="${encodeURIComponent(navAddress)}">주소복사</button><br />
                  공동현관 비번: ${item.jointCode || "-"}<br />
                  세대 비번: ${item.doorCode || "-"}<br />
                  평수: ${item.pyeong || "-"}<br />
                  촬영구성: ${item.composition || "-"}<br />
                  메모: ${item.memo || "-"}${(() => { const dm = getAdminCompanyDefaultMemo(item.company); return dm ? `<br /><span style="color:#3a4a6b;font-weight:600;">기본요청사항:</span> ${dm}` : ""; })()}
                </div>
              </article>
            `;
          })
          .join("");
      }
      scheduleListEl.addEventListener("click", async (event) => {
        const button = event.target.closest("button[data-action='copyNavAddress'][data-nav-address]");
        if (!button) return;
        const copied = await copyTextSmart(decodeURIComponent(String(button.dataset.navAddress || "")));
        if (copied) {
          alert("주소가 복사되었습니다.");
        } else {
          alert("주소 복사에 실패했습니다. 다시 시도해주세요.");
        }
      });

      function renderUpcomingList() {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const upcomingRows = getMySchedules()
          .filter((item) => {
            if (!/^\d{4}-\d{2}-\d{2}$/.test(item.date || "")) return false;
            const target = new Date(`${item.date}T00:00:00`);
            return target.getTime() >= today.getTime();
          })
          .sort((a, b) => toTimeValue(a) - toTimeValue(b));

        if (upcomingRows.length === 0) {
          upcomingListEl.innerHTML = '<div class="upcoming-item">앞으로 촬영 예정 장소가 없습니다.</div>';
          return;
        }

        upcomingListEl.innerHTML = upcomingRows
          .map(
            (item) => `
              <div class="upcoming-item">
                ${item.date || "-"} ${item.time || "-"}<br />
                업체: ${item.company || "-"} | 장소: ${item.place || "-"}
              </div>
            `
          )
          .join("");
      }

      function renderHistory() {
        const rows = getMySchedules();
        const now = new Date();
        const currentMonth = `${now.getFullYear()}-${pad2(now.getMonth() + 1)}`;
        const monthRows = rows.filter((item) => String(item.date || "").startsWith(currentMonth));
        const monthDoneRows = monthRows.filter((item) => {
          if (!/^\d{4}-\d{2}-\d{2}$/.test(item.date || "")) return false;
          const target = new Date(`${item.date}T00:00:00`);
          target.setHours(0, 0, 0, 0);
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          return target.getTime() <= today.getTime();
        });

        historySummaryEl.innerHTML = `
          <div style="margin-bottom:8px;">이번달 촬영한 횟수: <strong>${monthDoneRows.length}회</strong></div>
          <div style="margin-bottom:8px;">이번달 전체 배정: <strong>${monthRows.length}건</strong></div>
        `;

        historyDetailListEl.innerHTML = monthRows.length
          ? monthRows
              .sort((a, b) => toTimeValue(a) - toTimeValue(b))
              .map(
                (item) => `
                  <div class="history-item">
                    ${item.date || "-"} ${item.time || "-"}<br />
                    업체: ${item.company || "-"} | 장소: ${item.place || "-"}
                  </div>
                `
              )
              .join("")
          : '<div class="history-item">이번달 촬영 내역이 없습니다.</div>';
      }

      async function handleWriterSignup() {
        const id = normalize(document.getElementById("signupId").value);
        const password = normalize(document.getElementById("signupPassword").value);
        const name = normalize(document.getElementById("signupName").value);
        const phone = normalize(document.getElementById("signupPhone").value);
        const carNumber = normalize(document.getElementById("signupCarNumber").value);
        if (!id || !password || !name) {
          alert("아이디, 비밀번호, 작가명을 입력해주세요.");
          return;
        }

        const users = readStorageArray(STORAGE_WRITERS);
        const idExists = users.some((user) => normalize(user.id).toLowerCase() === id.toLowerCase());
        if (idExists) {
          alert("이미 사용 중인 아이디입니다.");
          return;
        }
        const nameExists = users.some((user) => normalize(user.name).toLowerCase() === name.toLowerCase());
        if (nameExists) {
          alert("이미 등록된 작가명입니다. 작가명은 중복 없이 등록해주세요.");
          return;
        }

        if (USE_SUPABASE_SYNC) {
          try {
            const remoteWriters = await fetchWriterJsonRows("writers?select=login_id,name");
            const remoteIdExists = (Array.isArray(remoteWriters) ? remoteWriters : []).some(
              (row) => normalize(row?.login_id).toLowerCase() === id.toLowerCase()
            );
            if (remoteIdExists) {
              alert("이미 사용 중인 아이디입니다. 다른 아이디를 입력해주세요.");
              return;
            }
            const remoteNameExists = (Array.isArray(remoteWriters) ? remoteWriters : []).some(
              (row) => normalize(row?.name).toLowerCase() === name.toLowerCase()
            );
            if (remoteNameExists) {
              alert("이미 등록된 작가명입니다. 다른 작가명을 입력해주세요.");
              return;
            }

            const insertResponse = await fetch(`${SUPABASE_URL}/rest/v1/writers`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                apikey: SUPABASE_ANON_KEY,
                Authorization: `Bearer ${SUPABASE_ANON_KEY}`
              },
              body: JSON.stringify([
                {
                  name,
                  login_id: id,
                  password,
                  phone,
                  car_number: carNumber,
                  is_active: true
                }
              ])
            });
            if (!insertResponse.ok) {
              const errorText = await insertResponse.text();
              throw new Error(`writers insert 실패: ${errorText}`);
            }
            queueWriterTablePull();
          } catch (error) {
            console.error("[TABLE][photographer] signup direct insert 실패", error);
            alert(`작가 등록 실패: ${error && error.message ? error.message : "서버 저장 오류"}`);
            return;
          }
        } else {
          users.unshift({
            id,
            password,
            name,
            phone,
            carNumber,
            createdAt: new Date().toISOString()
          });
          writeStorageArray(STORAGE_WRITERS, users);
        }

        localStorage.setItem(STORAGE_WRITER_SESSION, id);
        signupFormEl.reset();
        renderAuthState();
        alert("회원가입 완료! 내 스케줄을 확인하세요.");
      }
      signupFormEl.addEventListener("submit", async (event) => {
        event.preventDefault();
        await handleWriterSignup();
      });

      loginFormEl.addEventListener("submit", (event) => {
        event.preventDefault();
        const id = normalize(document.getElementById("loginId").value);
        const password = normalize(document.getElementById("loginPassword").value);
        const users = readStorageArray(STORAGE_WRITERS);
        const matched = users.find((user) => user.id === id && user.password === password);
        if (!matched) {
          alert("아이디 또는 비밀번호가 올바르지 않습니다.");
          return;
        }
        localStorage.setItem(STORAGE_WRITER_SESSION, matched.id);
        if (rememberLoginEnabled) {
          localStorage.setItem(
            STORAGE_WRITER_REMEMBERED_LOGIN,
            JSON.stringify({ id: matched.id, password: matched.password })
          );
        } else {
          localStorage.removeItem(STORAGE_WRITER_REMEMBERED_LOGIN);
        }
        loginFormEl.reset();
        renderAuthState();
      });

      logoutBtnEl.addEventListener("click", () => {
        skipAutoLoginOnce = true;
        localStorage.removeItem(STORAGE_WRITER_SESSION);
        renderAuthState();
      });
      saveLoginToggleBtnEl.addEventListener("click", () => {
        rememberLoginEnabled = !rememberLoginEnabled;
        updateRememberLoginButtonText();
      });

      loginTabBtnEl.addEventListener("click", () => switchAuthTab("login"));
      signupTabBtnEl?.addEventListener("click", () => switchAuthTab("signup"));
      openSignupBtnEl.addEventListener("click", () => switchAuthTab("signup"));
      backToLoginBtnEl.addEventListener("click", () => switchAuthTab("login"));
      prevDayModeBtnEl.addEventListener("click", () => moveToRelativeMonth(-1));
      todayModeBtnEl.addEventListener("click", () => moveToRelativeDay(0));
      nextDayModeBtnEl.addEventListener("click", () => moveToRelativeDay(1));
      nextMonthModeBtnEl?.addEventListener("click", () => moveToRelativeMonth(1));
      copyVisibleScheduleBtnEl.addEventListener("click", copyVisibleSchedules);
      dayOffRequestBtnEl.addEventListener("click", openDayOffDatePicker);
      dayOffDateEl.addEventListener("change", () => {
        requestDayOffReduction(dayOffDateEl.value);
      });
      dayoffListEl.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-action='cancelDayoffRequest']");
        if (!button) return;
        cancelMyDayoffRequest(button.dataset.requestId);
      });

      filterYearEl.addEventListener("change", () => {
        quickDayPreset = "";
        updateFilterTabState();
        refreshDayOptions(filterDayEl.value);
        renderScheduleList();
      });
      filterMonthEl.addEventListener("change", () => {
        quickDayPreset = "";
        updateFilterTabState();
        refreshDayOptions(filterDayEl.value);
        renderScheduleList();
      });
      filterDayEl.addEventListener("change", () => {
        quickDayPreset = "";
        updateFilterTabState();
        renderScheduleList();
      });

      historyBtnEl.addEventListener("click", () => {
        renderHistory();
        historyModalEl.classList.remove("hidden");
      });
      historyCloseBtnEl.addEventListener("click", () => {
        historyModalEl.classList.add("hidden");
      });
      historyModalEl.addEventListener("click", (event) => {
        if (event.target === historyModalEl) historyModalEl.classList.add("hidden");
      });

      window.addEventListener("storage", (event) => {
        if (
          event.key === STORAGE_SCHEDULES ||
          event.key === STORAGE_ADMIN_WRITER_SCHEDULES ||
          event.key === STORAGE_DAILY_LIMITS ||
          event.key === STORAGE_LIMIT_CONFIG ||
          event.key === STORAGE_DAYOFF_DEDUCTIONS ||
          event.key === STORAGE_DAYOFF_REQUESTS ||
          event.key === STORAGE_WRITER_SESSION ||
          event.key === STORAGE_WRITERS
        ) {
          renderAuthState();
        }
      });

      function bootstrapPhotographerPageData() {
        const clientKvPullDone = pullScheduleSiteClientKvFromSupabase();
        switchAuthTab("login");
        renderAuthState();
        queueWriterTablePull();
        clientKvPullDone.then((didHydrate) => {
          if (!didHydrate) return;
          queueWriterTablePull();
          renderAuthState();
        });
      }
      void bootstrapPhotographerPageData();
    </script>
  </body>
</html>
