<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>작가용 스케줄 페이지</title>
    <style>
      :root {
        --line: #d7ddec;
        --text: #1f2940;
        --muted: #5f6c88;
        --blue: #466ba9;
        --bg: #f4f7fd;
        --red: #d74444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap { width: min(900px, 94vw); margin: 28px auto 36px; }
      .card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 16px; }
      h1 { margin: 0 0 8px; font-size: 1.8rem; }
      .sub { margin: 0 0 16px; color: var(--muted); }
      .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
      .tabs button { border: 1px solid var(--line); background: #f7f9ff; border-radius: 8px; padding: 7px 12px; font-weight: 700; cursor: pointer; }
      .tabs button.active { border-color: var(--blue); background: var(--blue); color: #fff; }
      #dayOffRequestBtn {
        margin-left: auto;
        border-color: #e2c400;
        background: #ffe066;
        color: #3a3200;
      }
      #dayOffRequestBtn:hover {
        background: #ffd43b;
      }
      .hidden { display: none !important; }
      .form { display: grid; gap: 8px; }
      .row { display: flex; align-items: center; gap: 8px; border: 1px solid var(--line); border-radius: 8px; background: #fcfdff; padding: 9px 10px; }
      .row input, .row select { width: 100%; border: 0; outline: none; background: transparent; font-size: 0.95rem; }
      .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .triple { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
      .btn { border: 0; background: var(--blue); color: #fff; border-radius: 10px; padding: 10px 12px; font-weight: 700; cursor: pointer; }
      .outline { border: 1px solid var(--line); background: #fff; color: var(--text); }
      .small { font-size: 0.82rem; padding: 5px 10px; border-radius: 999px; }
      .top-line { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
      .hint { margin: -2px 0 4px; font-size: 0.84rem; color: var(--muted); }
      /** 고정 업데이트 시각 줄(Vercel 빌드 시 span 안 플레이스홀더 치환) */
      .deploy-stamp-line {
        margin: 4px 0 12px;
        text-align: center;
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
      }
      .filter-wrap { border: 1px solid var(--line); border-radius: 10px; background: #fbfcff; padding: 10px; margin: 10px 0; }
      .status-list { display: grid; gap: 8px; margin-top: 8px; }
      .copy-bar { display: flex; justify-content: flex-end; margin-top: 8px; }
      .status-card { border: 1px solid var(--line); border-radius: 10px; background: #fbfcff; padding: 10px; }
      .shoot-complete-row { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line); display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; }
      .shoot-complete-row.shoot-complete-before { flex-direction: column; align-items: flex-start; gap: 6px; }
      .shoot-complete-hint { font-size: 12px; color: #64748b; line-height: 1.45; max-width: 100%; }
      .shoot-preview { max-height: 76px; border-radius: 8px; border: 1px solid var(--line); object-fit: cover; }
      .shoot-actions-icons { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 10px; margin-bottom: 4px; }
      .shoot-icon-btn {
        min-width: 58px;
        min-height: 54px;
        padding: 6px 8px;
        border-radius: 12px;
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        font: inherit;
        box-sizing: border-box;
        transition: background 0.15s, border-color 0.15s, filter 0.12s;
      }
      .shoot-icon-btn--pending {
        background: #fef9c3;
        border: 2px solid #eab308;
        color: #713f12;
        cursor: pointer;
      }
      .shoot-icon-btn--pending:hover {
        filter: brightness(0.97);
      }
      .shoot-icon-btn--done {
        background: #dcfce7;
        border: 2px solid #22c55e;
        color: #166534;
        cursor: default;
      }
      .shoot-icon-btn--done:disabled {
        opacity: 1;
      }
      .shoot-icon-btn__glyph {
        font-size: 1.2rem;
        line-height: 1;
      }
      .shoot-icon-btn__label {
        font-size: 0.62rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1.15;
        text-align: center;
        max-width: 58px;
      }
      .shoot-done-badge { font-size: 12px; font-weight: 700; color: #15803d; background: #dcfce7; padding: 4px 10px; border-radius: 6px; }
      .status-head { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 6px; font-weight: 700; }
      .status-label-today { color: var(--red); }
      .status-label-tomorrow { color: #1c9b4a; }
      .status-meta { font-size: 0.9rem; line-height: 1.5; color: #2f3c58; }
      .inline-copy-btn { margin-left: 6px; }
      .upcoming-wrap { margin-top: 12px; }
      .upcoming-title { font-weight: 700; margin-bottom: 8px; }
      .upcoming-list { display: grid; gap: 6px; }
      .upcoming-item { border: 1px solid var(--line); border-radius: 8px; padding: 8px; background: #fbfcff; font-size: 0.88rem; line-height: 1.45; }
      .dayoff-wrap { margin-top: 12px; }
      .dayoff-title { font-weight: 700; margin-bottom: 8px; }
      .dayoff-list { display: grid; gap: 6px; }
      .dayoff-item { border: 1px solid var(--line); border-radius: 8px; padding: 8px; background: #fbfcff; font-size: 0.88rem; line-height: 1.45; }
      .dayoff-item-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
      .history-modal {
        position: fixed;
        inset: 0;
        background: rgba(17, 26, 44, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 14px;
        z-index: 999;
      }
      .history-modal.hidden { display: none; }
      .history-panel {
        width: min(760px, 96vw);
        max-height: 86vh;
        overflow: auto;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
      }
      .history-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }
      .history-list {
        display: grid;
        gap: 6px;
        margin-top: 10px;
      }
      .history-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
        background: #fbfcff;
        font-size: 0.88rem;
        line-height: 1.45;
      }
      .payroll-panel {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #f8fbff;
        padding: 12px;
        margin-top: 10px;
      }
      .payroll-panel h3 { margin: 0 0 8px; font-size: 1rem; }
      .payroll-summary { font-size: 0.9rem; line-height: 1.65; color: #2f3c58; margin-bottom: 10px; }
      .payroll-summary strong { color: var(--text); }
      .payroll-line {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 6px;
        align-items: center;
        font-size: 0.85rem;
        padding: 6px 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        margin-bottom: 6px;
      }
      .payroll-line-meta { font-size: 0.78rem; color: var(--muted); }
      .payroll-add {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
        margin-top: 8px;
      }
      .payroll-add select, .payroll-add input[type="number"], .payroll-add input[type="text"] {
        padding: 6px 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 0.88rem;
      }
      .payroll-thumb { max-height: 40px; border-radius: 4px; vertical-align: middle; margin-left: 4px; }
      @media (max-width: 720px) {
        .pair, .triple { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="card">
        <h1>작가용 스케줄 페이지</h1>
        <p class="deploy-stamp-line" aria-live="polite">
          <span id="writerUpdateStampInner">업데이트시각:0507 02:54</span>
        </p>
        <script>
          (function () {
            var STAMP_PENDING = "__SCHEDULE_SITE_ADMIN_UPDATE_LABEL__";
            function compactKst(ms) {
              try {
                var d = new Date(Number(ms));
                if (Number.isNaN(d.getTime())) return "";
                var parts = new Intl.DateTimeFormat("en-GB", {
                  timeZone: "Asia/Seoul",
                  month: "2-digit",
                  day: "2-digit",
                  hour: "2-digit",
                  minute: "2-digit",
                  hour12: false,
                }).formatToParts(d);
                var mv = parts.find(function (p) {
                  return p.type === "month";
                });
                var dv = parts.find(function (p) {
                  return p.type === "day";
                });
                var hv = parts.find(function (p) {
                  return p.type === "hour";
                });
                var minv = parts.find(function (p) {
                  return p.type === "minute";
                });
                var pad = function (v) {
                  return String(v == null ? "" : v).padStart(2, "0");
                };
                return pad(mv && mv.value) + pad(dv && dv.value) + " " + pad(hv && hv.value) + ":" + pad(minv && minv.value);
              } catch (_) {
                return "";
              }
            }
            function setStampLine(innerText) {
              var inner = document.getElementById("writerUpdateStampInner");
              if (inner && innerText) inner.textContent = innerText;
            }
            (function syncFromLastModified() {
              var inner = document.getElementById("writerUpdateStampInner");
              if (!inner || inner.textContent.trim() !== STAMP_PENDING) return;
              var lm = Date.parse(document.lastModified);
              if (lm && !Number.isNaN(lm)) {
                var s = compactKst(lm);
                if (s) setStampLine("업데이트시각:" + s);
              }
            })();
            async function refreshDeployMeta() {
              var inner = document.getElementById("writerUpdateStampInner");
              if (!inner) return;
              if (inner.textContent.trim() !== STAMP_PENDING) return;
              try {
                var res = await fetch("/api/site-release-meta?t=" + Date.now(), { cache: "no-store" });
                var data = await res.json().catch(function () {
                  return {};
                });
                if (!res.ok || !data.ok) {
                  if (inner.textContent.trim() === STAMP_PENDING) setStampLine("업데이트시각:—");
                  return;
                }
                var iso = String(data.serverRevisionStartedAtIsoUtc || "").trim();
                var at = iso ? Date.parse(iso) : NaN;
                var s = at && !Number.isNaN(at) ? compactKst(at) : "";
                setStampLine("업데이트시각:" + (s || "—"));
              } catch (_) {
                if (inner.textContent.trim() === STAMP_PENDING) setStampLine("업데이트시각:—");
              }
            }
            window.scheduleSiteRefreshDeployMeta = refreshDeployMeta;
            void refreshDeployMeta();
          })();
        </script>
        <p class="sub">회원가입 후 로그인하면 내 스케줄과 촬영 기록을 확인할 수 있습니다.</p>

      function mergeShootSiteLocalDocsSymmetric(a, b) {
        const out = {};
        const wa = a && typeof a === "object" ? a : {};
        const wb = b && typeof b === "object" ? b : {};
        for (const wid of new Set([...Object.keys(wa), ...Object.keys(wb)])) {
          const ba = wa[wid] && typeof wa[wid] === "object" ? wa[wid] : {};
          const bb = wb[wid] && typeof wb[wid] === "object" ? wb[wid] : {};
          const merged = {};
          for (const sid of new Set([...Object.keys(ba), ...Object.keys(bb)])) {
            const ea = ba[sid];
            const eb = bb[sid];
            const aOk = ea && typeof ea === "object";
            const bOk = eb && typeof eb === "object";
            if (!aOk && !bOk) continue;
            if (!aOk) {
              merged[sid] = { ...eb };
              continue;
            }
            if (!bOk) {
              merged[sid] = { ...ea };
              continue;
            }
            const ta = Number(ea.savedAt) || 0;
            const tb = Number(eb.savedAt) || 0;
            const layered = tb >= ta ? { ...ea, ...eb } : { ...eb, ...ea };
            merged[sid] = { ...layered, savedAt: Math.max(ta, tb) || layered.savedAt };
          }
          if (Object.keys(merged).length) out[wid] = merged;
        }
        return out;

      /** N동 N호(또는 영문동 N호) 앞 = 단지명. '아파트'가 있으면 그 앞까지가 단지명(예: 청솔우성 아파트 → 청솔우성). */
      function apartmentFolderSuffixFromPlace(rawPlace) {
        let s = String(rawPlace || "").replace(/\s+/g, " ").trim();
        if (!s) return "";
        try {
          if (typeof s.normalize === "function") s = s.normalize("NFKC");
        } catch (_) {}
        const dongHo = s.match(/(\d{1,4}동\s*\d+\s*호|[a-zA-Z]동\s*\d+\s*호)\s*$/iu);
        if (!dongHo) return "";
        let head = s.slice(0, dongHo.index).trim();
        const aptPos = head.search(/\uC544\uD30C\uD2B8/u);
        if (aptPos !== -1) head = head.slice(0, aptPos).trim();
        head = head.replace(/\s*\uC544\uD30C\uD2B8\s*$/iu, "").trim();
        const parts = head.split(/\s+/).filter(Boolean);
        const name = parts.length ? parts[parts.length - 1] : "";
        return name.replace(/[\/\\:*?"<>|]/g, "").trim();
      }

      function guDongLabelForShootFolderName(rawPlace) {
        let s = String(rawPlace || "").replace(/\s+/g, " ").trim();
        if (!s) return "";
        try {
          if (typeof s.normalize === "function") s = s.normalize("NFKC");
        } catch (_) {}
        let m = s.match(/([가-힣]+구)\s+([가-힣0-9]*동)(?=\s|$|[,，、]|\d)/u);
        if (m) return (m[1] + m[2]).replace(/\s+/g, "");
        const compact = s.replace(/\s+/g, "");
        m = compact.match(/([가-힣]+구)([가-힣0-9]*동)/u);
        return m ? m[1] + m[2] : "";
      }

      function buildShootFolderNameJS(dateYmd, rawPlace, daySlotIndex) {
        const dm = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(dateYmd || ""));
        const mmdd = dm ? dm[2] + dm[3] : String(dateYmd || "").replace(/-/g, "").slice(4, 8);
        const s = String(rawPlace || "").replace(/\s+/g, " ").trim();
        const unknown = clampShootFolderSuffix("\uC7A5\uC18C\uBBF8\uC815");
        let base;
        if (!s) {
          base = mmdd + unknown;
        } else {
          const aptPart = apartmentFolderSuffixFromPlace(s);
          if (aptPart) {
            base = mmdd + clampShootFolderSuffix(aptPart);
          } else {
            const guDong = guDongLabelForShootFolderName(s);
            if (guDong) {
              base = mmdd + clampShootFolderSuffix(guDong.replace(/[\/\\:*?"<>|]/g, ""));
            } else {
              const collapsed = s.replace(/\s+/g, "");
              const tail = clampShootFolderSuffix(collapsed) || unknown;
              base = mmdd + tail;
            }
          }
        }
        const slot = Number(daySlotIndex);
        if (Number.isFinite(slot) && slot >= 1) return `${base}${slot}`;
        return base;

      function parseScheduleTimeToMinutes(timeText) {
        const raw = String(timeText || "").trim();
        if (!raw) return 0;
        const normalized = raw.replace(/\s+/g, "");
        const meridiem = normalized.match(/^(오전|오후)(\d{1,2})(?::(\d{1,2}))?$/);
        if (meridiem) {
          let hour = Number(meridiem[2]) || 0;
          const minute = Math.min(59, Number(meridiem[3] || "0") || 0);
          if (meridiem[1] === "오후" && hour < 12) hour += 12;
          if (meridiem[1] === "오전" && hour === 12) hour = 0;
          return hour * 60 + minute;
        }
        const hm = normalized.match(/^(\d{1,2})(?::(\d{1,2}))$/);
        if (hm) {
          const hour = Math.min(23, Number(hm[1]) || 0);
          const minute = Math.min(59, Number(hm[2]) || 0);
          return hour * 60 + minute;
        }
        const h = normalized.match(/^(\d{1,2})시(?:반|(\d{1,2})분)?$/);
        if (h) {
          const hour = Math.min(23, Number(h[1]) || 0);
          const minute = normalized.includes("반") ? 30 : Math.min(59, Number(h[2] || "0") || 0);
          return hour * 60 + minute;
        }
        const onlyHour = normalized.match(/^(\d{1,2})$/);
        if (onlyHour) {
          return Math.min(23, Number(onlyHour[1]) || 0) * 60;
        }
        return 0;
      }

          baseDate = new Date(year, Math.max(0, month - 1), Math.max(1, day), 0, 0, 0, 0).getTime();
        }
        return baseDate + parseScheduleTimeToMinutes(item?.time) * 60000;
      }

        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(normalized);
          } else {
            const textarea = document.createElement("textarea");
            textarea.value = normalized;
            textarea.style.position = "fixed";
            textarea.style.left = "-9999px";
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);
          }
          return true;
        } catch (error) {
          return false;
        }
      }
      function sameDate(a, b) {
        return `${a.getFullYear()}-${pad2(a.getMonth() + 1)}-${pad2(a.getDate())}` === `${b.getFullYear()}-${pad2(b.getMonth() + 1)}-${pad2(b.getDate())}`;
      }

      function getCurrentWriter() {
        const userId = localStorage.getItem(STORAGE_WRITER_SESSION);
        if (!userId) return null;
        const users = readStorageArray(STORAGE_WRITERS);
        return users.find((user) => user.id === userId) || null;
      }

      function getMySchedules() {
        const writer = getCurrentWriter();
        if (!writer) return [];
        const writerName = normalize(writer.name).toLowerCase();
        if (!writerName) return [];
        // 고객 로컬(STORAGE_SCHEDULES) 후 서버·관리자 미러를 덮어써 동일 id 에서 서버가 우선(삭제 반영)
        const merged = [...readStorageArray(STORAGE_SCHEDULES), ...readStorageArray(STORAGE_ADMIN_WRITER_SCHEDULES)];
        const dedupedMap = new Map();
        merged.forEach((row) => {
          const keyBase = normalize(row?.writerMirrorId || row?.customerScheduleId);
          const fallbackKey = [
            normalize(row?.date),
            normalize(row?.time),
            normalize(row?.name),
            normalize(row?.company),
            normalize(row?.place)
          ].join("|");
          const key = keyBase || fallbackKey;
          if (!key) return;
          // 같은 key 가 또 들어오면 객체를 병합한다.
          // 단, 새로 들어온 행의 값이 빈 문자열/null/undefined면 기존 값을 유지(덮어쓰지 않음).
          // 이게 없으면 STORAGE_ADMIN_WRITER_SCHEDULES 미러가 jointCode/doorCode/customerPhone 같은
          // 필드를 누락한 채 들어왔을 때 customer 저장소의 진짜 값을 빈 값으로 지워버린다.
          const prev = dedupedMap.get(key);
          if (!prev) {
            dedupedMap.set(key, row);
            return;
          }
          const next = { ...prev };
          Object.keys(row || {}).forEach((k) => {
            const v = row[k];
            if (v === undefined || v === null || v === "") return;
            next[k] = v;
          });
          dedupedMap.set(key, next);
        });
        return [...dedupedMap.values()]
          .filter((row) => normalize(row?.name).toLowerCase() === writerName)
          .sort((a, b) => toTimeValue(a) - toTimeValue(b));
      }

      function buildFilterOptions() {
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth() + 1;
        const currentDay = now.getDate();

        filterYearEl.innerHTML = Array.from({ length: 5 }, (_, idx) => currentYear - 1 + idx)
          .map((year) => `<option value="${year}">${year}년</option>`)
          .join("");
        filterYearEl.value = String(currentYear);

        filterMonthEl.innerHTML = Array.from({ length: 12 }, (_, idx) => idx + 1)
          .map((month) => `<option value="${month}">${month}월</option>`)
          .join("");
        filterMonthEl.value = String(currentMonth);

        refreshDayOptions(currentDay);
      }

      function persistPhotographerScheduleFilterIfLoggedIn() {
        const writer = getCurrentWriter();
        if (!writer?.id || !filterYearEl || !filterMonthEl || !filterDayEl) return;
        if (scheduleBlockEl?.classList.contains("hidden")) return;
        const fy = Number(filterYearEl.value);
        const fm = Number(filterMonthEl.value);
        const fd = String(filterDayEl.value ?? "").trim();
        if (!Number.isFinite(fy) || !Number.isFinite(fm) || fm < 1 || fm > 12 || !fd) return;
        try {
          localStorage.setItem(
            STORAGE_PHOTOGRAPHER_SCHEDULE_VIEW_V1,
            JSON.stringify({
              wid: String(writer.id).trim(),
              fy,
              fm,
              fd,
              updatedAt: new Date().toISOString(),
            })
          );
        } catch (_) {}
      }

      function applyPhotographerScheduleFilterPrefs(writer) {
        const wid = String(writer?.id || "").trim();
        if (!wid || !filterYearEl || !filterMonthEl || !filterDayEl) return;
        let prefs = null;
        try {
          const raw = localStorage.getItem(STORAGE_PHOTOGRAPHER_SCHEDULE_VIEW_V1);
          prefs = raw ? JSON.parse(raw) : null;
        } catch (_) {
          prefs = null;
        }
        if (!prefs || typeof prefs !== "object" || String(prefs.wid || "").trim() !== wid) return;
        const yNum = Number(prefs.fy);
        const mNum = Number(prefs.fm);
        const fd = String(prefs.fd ?? "").trim();
        if (!Number.isFinite(yNum) || !Number.isFinite(mNum)) return;
        const yearOk = [...filterYearEl.options].some((o) => String(o.value) === String(yNum));
        if (!yearOk) return;
        filterYearEl.value = String(yNum);
        const clampM = Math.min(Math.max(Math.floor(mNum), 1), 12);
        filterMonthEl.value = String(clampM);
        if (fd.toLowerCase() === "all") {
          refreshDayOptions("all");
        } else {
          const dn = Number(fd);
          if (Number.isFinite(dn) && dn >= 1) refreshDayOptions(dn);
          else refreshDayOptions(1);
        }
      }

      /** renderAuthState 등으로 필터가 바뀐 뒤 이전 세션의 quickDayPreset 과 실제 선택 날짜가 어긋나지 않게 함 */
      function syncQuickDayPresetFromCurrentFilter() {
        if (!filterYearEl || !filterMonthEl || !filterDayEl) return;
        if (String(filterDayEl.value).trim().toLowerCase() === "all") {
          quickDayPreset = "";
          return;
        }
        const y = Number(filterYearEl.value);
        const m = Number(filterMonthEl.value);
        const d = Number(filterDayEl.value);
        if (!Number.isFinite(y) || !Number.isFinite(m) || !Number.isFinite(d)) return;
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        if (y === now.getFullYear() && m === now.getMonth() + 1 && d === now.getDate()) {
          quickDayPreset = "today";
          return;
        }
        const tmr = new Date(now);
        tmr.setDate(tmr.getDate() + 1);
        if (y === tmr.getFullYear() && m === tmr.getMonth() + 1 && d === tmr.getDate()) {
          quickDayPreset = "tomorrow";
          return;
        }
        quickDayPreset = "";
      }

      function refreshDayOptions(preferredDay) {
        const year = Number(filterYearEl.value);
        const month = Number(filterMonthEl.value);
        const daysInMonth = new Date(year, month, 0).getDate();
        const dayOptions = Array.from({ length: daysInMonth }, (_, idx) => idx + 1)
          .map((day) => `<option value="${day}">${day}일</option>`)
          .join("");
        filterDayEl.innerHTML = `<option value="all">전체</option>${dayOptions}`;
        const preferredText = String(preferredDay || "").trim().toLowerCase();
        if (preferredText === "all") {
          filterDayEl.value = "all";
          return;
        }
        const day = Math.min(Math.max(Number(preferredDay) || 1, 1), daysInMonth);
        filterDayEl.value = String(day);
      }

      function moveToRelativeDay(offsetDays) {
        const target = new Date();
        target.setHours(0, 0, 0, 0);
        target.setDate(target.getDate() + Number(offsetDays || 0));
        if (Number(offsetDays) === 0) {
          quickDayPreset = "today";
        } else {
          quickDayPreset = "tomorrow";
        }
        filterMode = "day";
        updateFilterTabState();
        filterYearEl.value = String(target.getFullYear());
        filterMonthEl.value = String(target.getMonth() + 1);
        filterMonthEl.closest(".row").classList.remove("hidden");
        filterDayEl.closest(".row").classList.remove("hidden");
        refreshDayOptions(target.getDate());
        persistPhotographerScheduleFilterIfLoggedIn();
        renderScheduleList();
      }
      function moveToRelativeMonth(offsetMonths) {
        const target = new Date();
        target.setHours(0, 0, 0, 0);
        target.setDate(1);
        target.setMonth(target.getMonth() + Number(offsetMonths || 0));
        quickDayPreset = Number(offsetMonths) < 0 ? "prevmonth" : "nextmonth";
        filterMode = "day";
        updateFilterTabState();
        filterYearEl.value = String(target.getFullYear());
        filterMonthEl.value = String(target.getMonth() + 1);
        filterMonthEl.closest(".row").classList.remove("hidden");
        filterDayEl.closest(".row").classList.remove("hidden");
        refreshDayOptions("all");
        persistPhotographerScheduleFilterIfLoggedIn();
        renderScheduleList();
      }

      function getCurrentMonthKey() {
        const t = new Date();
        return `${t.getFullYear()}-${pad2(t.getMonth() + 1)}`;
      }

      function getMonthDoneRowsForPayroll(rows, monthKey) {
        const base = new Date();
        base.setHours(0, 0, 0, 0);
        return rows.filter((item) => {
          if (!String(item.date || "").startsWith(monthKey)) return false;
          if (!/^\d{4}-\d{2}-\d{2}$/.test(item.date || "")) return false;
          const target = new Date(`${item.date}T00:00:00`);
          target.setHours(0, 0, 0, 0);
          return target.getTime() <= base.getTime();
        });
      }

      function getPayrollWriterConfig(writerId, writerDisplayName) {
        const cfg = readStorageObject(STORAGE_PHOTOGRAPHER_PAYROLL_CONFIG);
        const byId = cfg.byWriterId && typeof cfg.byWriterId === "object" ? cfg.byWriterId : {};
        const byName = cfg.byWriterNameKey && typeof cfg.byWriterNameKey === "object" ? cfg.byWriterNameKey : {};
        const wid = String(writerId || "").trim();
        const { canon: nk, keys: nameKeys } = payrollNameKeysForStorage(writerDisplayName || "");
        let row = null;
        if (wid && Object.prototype.hasOwnProperty.call(byId, wid)) row = byId[wid];
        if (!row) {
          for (let i = 0; i < nameKeys.length; i += 1) {
            const k = nameKeys[i];
            if (k && Object.prototype.hasOwnProperty.call(byName, k)) {
              row = byName[k];
              break;
            }
          }
        }
        if (!row && wid) row = byId[wid];
        if (!row && nk) row = byName[nk];
        const fuelWon = Math.max(0, Number(row?.fuelWon) || 0);
        const salaryType = row?.salaryType === "tax_invoice" ? "tax_invoice" : "freelancer";
        return { fuelWon, salaryType };
      }

      function getMonthlyPayrollRecord(writerId, monthKey) {
        const arr = readStorageArray(STORAGE_PHOTOGRAPHER_PAYROLL_MONTHLY);
        let rec = arr.find((r) => r.writerId === writerId && r.monthKey === monthKey);
        if (!rec) {
          rec = {
            id: `ppm-${writerId}-${monthKey}`,
            writerId,
            monthKey,
            lines: [],
            updatedAt: new Date().toISOString()
          };
        }
        return { arr, rec };
      }

      function persistMonthlyPayrollRecord(newRec) {
        const arr = readStorageArray(STORAGE_PHOTOGRAPHER_PAYROLL_MONTHLY);
        const rest = arr.filter((r) => !(r.writerId === newRec.writerId && r.monthKey === newRec.monthKey));
        newRec.updatedAt = new Date().toISOString();
        rest.push(newRec);
        writeStorageArray(STORAGE_PHOTOGRAPHER_PAYROLL_MONTHLY, rest);
      }

      function formatWonPay(n) {
        const x = Number(n) || 0;
        return `${x.toLocaleString("ko-KR")}원`;
      }

      function ensurePayrollCategoryOptions() {
        if (!payrollCategorySelectEl || payrollCategorySelectEl.options.length) return;
        payrollCategorySelectEl.innerHTML = Object.entries(PAYROLL_LINE_CATEGORY_LABELS)
          .map(([k, lab]) => `<option value="${k}">${lab}</option>`)
          .join("");
      }

      function renderPhotographerPayroll() {
        ensurePayrollCategoryOptions();
        ensurePayrollSeedOverridesForKnownWriters();
        const writer = getCurrentWriter();
        if (!writer || !payrollPanelEl || !payrollSummaryEl || !payrollLinesListEl) return;
        payrollPanelEl.classList.remove("hidden");
        const monthKey = getCurrentMonthKey();
        const rows = getMySchedules();
        const monthDone = getMonthDoneRowsForPayroll(rows, monthKey);
        const shootCount = monthDone.length;
        const { fuelWon, salaryType } = getPayrollWriterConfig(writer.id, writer.name);
        const { rec } = getMonthlyPayrollRecord(writer.id, monthKey);
        const lines = Array.isArray(rec.lines) ? rec.lines : [];
        const baseShootPay = shootCount * SHOOT_PAY_WON;
        const extraSum = lines.reduce((s, ln) => s + Math.max(0, Number(ln.amountWon) || 0), 0);
        const gross = baseShootPay + fuelWon + extraSum;
        let finalAmount = gross;
        let finalNote = "";
        if (salaryType === "tax_invoice") {
          finalAmount = Math.round(gross * 1.1);
          finalNote = "세금계산서 포함 (총액에 10% 부가)";
        } else {
          finalAmount = Math.round(gross * (1 - 0.033));
          finalNote = "프리랜서 (원천징수 3.3% 반영)";
        }
        payrollSummaryEl.innerHTML = `
          <div>촬영 기본급: <strong>${formatWonPay(baseShootPay)}</strong> (${shootCount}회 × ${formatWonPay(SHOOT_PAY_WON)})</div>
          <div>관리자 지정 유류비: <strong>${formatWonPay(fuelWon)}</strong></div>
          <div>추가요금 합계: <strong>${formatWonPay(extraSum)}</strong></div>
          <div>세전 합계: <strong>${formatWonPay(gross)}</strong></div>
          <div style="margin-top:6px;padding-top:6px;border-top:1px dashed var(--line);">
            급여형태: <strong>${salaryType === "tax_invoice" ? "세금계산서형" : "프리랜서형"}</strong><br/>
            <strong>${finalNote}</strong><br/>
            최종 표시 급여: <strong style="color:#1c9b4a;font-size:1.05rem;">${formatWonPay(finalAmount)}</strong>
          </div>
        `;
        payrollLinesListEl.innerHTML =
          lines.length === 0
            ? '<div class="hint">입력된 추가요금이 없습니다.</div>'
            : lines
                .map((ln) => {
                  const lab = PAYROLL_LINE_CATEGORY_LABELS[ln.category] || ln.category || "기타";
                  const att = ln.attachmentDataUrl
                    ? `<img class="payroll-thumb" src="${ln.attachmentDataUrl}" alt="" />`
                    : "";
                  return `
              <div class="payroll-line" data-line-id="${ln.id || ""}">
                <div>
                  <div>${lab}${ln.memo ? ` · ${escapeHtmlPayroll(ln.memo)}` : ""}</div>
                  <div class="payroll-line-meta">${formatWonPay(ln.amountWon)}</div>
                </div>
                <div>${att}</div>
                <button type="button" class="btn outline small payroll-line-remove" data-line-id="${ln.id || ""}">삭제</button>
              </div>`;
                })
                .join("");
      }

      function escapeHtmlPayroll(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/"/g, "&quot;");
      }

      function renderMonthlyShotCount() {
        if (!monthlyShotCountEl) return;
        const rows = getMySchedules();
        const today = new Date();
        const currentMonth = `${today.getFullYear()}-${pad2(today.getMonth() + 1)}`;
        const monthDoneRows = rows.filter((item) => {
          if (!String(item.date || "").startsWith(currentMonth)) return false;
          if (!/^\d{4}-\d{2}-\d{2}$/.test(item.date || "")) return false;
          const target = new Date(`${item.date}T00:00:00`);
          target.setHours(0, 0, 0, 0);
          const base = new Date();
          base.setHours(0, 0, 0, 0);
          return target.getTime() <= base.getTime();
        });
        monthlyShotCountEl.textContent = `이번달 촬영횟수 ${monthDoneRows.length}회`;
        renderPhotographerPayroll();
      }

      async function requestDayOffReduction(selectedDate) {
        const writer = getCurrentWriter();
        if (!writer) {
          alert("로그인이 필요합니다.");
          renderAuthState();
          return;
        }
        const dateKey = String(selectedDate || dayOffDateEl.value || "").trim();
        if (!/^\d{4}-\d{2}-\d{2}$/.test(dateKey)) {
          alert("휴무요청 날짜를 선택해주세요.");
          return;
        }
        const currentLimit = getEffectiveDailyLimit(dateKey);
        const bookedCount = getBookedCountForDate(dateKey);
        if (currentLimit - 4 < bookedCount) {
          alert("예약이 이미 차있어 어렵습니다. 관리자에게 요청해주세요.");
          return;
        }
        const requests = readStorageArray(STORAGE_DAYOFF_REQUESTS);
        const writerName = normalize(writer.name).toLowerCase();
        const duplicated = requests.some((item) => {
          if (String(item?.date || "") !== dateKey) return false;
          return normalize(item?.writerName).toLowerCase() === writerName;
        });
        if (duplicated) {
          alert("해당 날짜는 이미 휴무요청했습니다.");
          return;
        }
        if (!USE_SUPABASE_SYNC) {
          requests.unshift({
            id: `dayoff-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
            date: dateKey,
            amount: 4,
            writerId: "",
            writerName: String(writer.name || "").trim(),
            requestedAt: new Date().toISOString()
          });
          localStorage.setItem(STORAGE_DAYOFF_REQUESTS, JSON.stringify(requests));
          renderMyDayoffRequests();
          alert("휴무요청이 반영되었습니다");
          return;
        }
        const wid = String(writer.id || "").trim() || null;
        const row = {
          writer_id: wid,
          writer_name: String(writer.name || "").trim(),
          dayoff_date: dateKey
        };
        const response = await fetch(`${SUPABASE_URL}/rest/v1/dayoff_requests`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Prefer: "return=minimal",
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify([row])
        });
        if (!response.ok) {
          const errorText = await response.text();
          let hint = "";
          if (response.status === 401 || response.status === 403) {
            hint =
              "\n\n(Supabase에서 dayoff_requests 에 anon INSERT 허용 RLS가 필요합니다. migrations/20260331150000_dayoff_requests_table_and_rls.sql 실행)";
          } else if (/22P02|invalid input syntax for type uuid/i.test(errorText)) {
            hint =
              "\n\n(writer_id 컬럼이 uuid 로 되어 있으면 로그인 ID(숫자)를 넣을 수 없습니다. Supabase SQL에서 migrations/20260331160000_dayoff_requests_writer_id_to_text.sql 실행)";
          }
          alert(`휴무요청 저장 실패: ${errorText}${hint}`);
          return;
        }
        queueWriterTablePull();
        alert("휴무요청이 반영되었습니다");
      }

      async function cancelMyDayoffRequest(requestId) {
        const writer = getCurrentWriter();
        if (!writer) {
          alert("로그인이 필요합니다.");
          renderAuthState();
          return;
        }
        const targetId = normalize(requestId);
        if (!targetId) return;

        const confirmed = confirm("휴무요청을 취소하시겠습니까?");
        if (!confirmed) return;
        if (!USE_SUPABASE_SYNC) {
          const writerName = normalize(writer.name).toLowerCase();
          const requests = readStorageArray(STORAGE_DAYOFF_REQUESTS);
          const removeIndex = requests.findIndex((item) => normalize(item?.id) === targetId && normalize(item?.writerName).toLowerCase() === writerName);
          if (removeIndex < 0) {
            alert("취소할 휴무요청을 찾지 못했습니다.");
            renderMyDayoffRequests();
            return;
          }
          requests.splice(removeIndex, 1);
          localStorage.setItem(STORAGE_DAYOFF_REQUESTS, JSON.stringify(requests));
          renderMyDayoffRequests();
          alert("휴무요청이 취소되었습니다.");
          return;
        }
        const response = await fetch(`${SUPABASE_URL}/rest/v1/dayoff_requests?id=eq.${encodeURIComponent(targetId)}`, {
          method: "DELETE",
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`
          }
        });
        if (!response.ok) {
          const errorText = await response.text();
          alert(`휴무요청 취소 실패: ${errorText}`);
          return;
        }
        queueWriterTablePull();
        alert("휴무요청이 취소되었습니다.");
      }

      function getMyDayoffRequests() {
        const writer = getCurrentWriter();
        if (!writer) return [];
        const writerId = normalize(writer.id);
        const writerName = normalize(writer.name).toLowerCase();
        return readStorageArray(STORAGE_DAYOFF_REQUESTS)
          .filter((item) => {
            const itemWriterId = normalize(item?.writerId);
            const itemWriterName = normalize(item?.writerName).toLowerCase();
            if (itemWriterId) return itemWriterId === writerId;
            return itemWriterName && itemWriterName === writerName;
          })
          .sort((a, b) => {
            const aTime = new Date(String(a?.requestedAt || "")).getTime();
            const bTime = new Date(String(b?.requestedAt || "")).getTime();
            const safeATime = Number.isNaN(aTime) ? 0 : aTime;
            const safeBTime = Number.isNaN(bTime) ? 0 : bTime;
            return safeBTime - safeATime;
          });
      }

      function renderMyDayoffRequests() {
        const requests = getMyDayoffRequests();
        if (requests.length === 0) {
          dayoffListEl.innerHTML = '<div class="dayoff-item">등록된 휴무요청일이 없습니다.</div>';

          .map((item) => {
            const date = normalize(item?.date) || "-";
            const requestedAt = normalize(item?.requestedAt).slice(0, 16).replace("T", " ") || "-";
            const requestId = normalize(item?.id);

              <div class="dayoff-item">
                <div class="dayoff-item-head">
                  <strong>휴무요청일: ${date}</strong>
                  <button class="btn outline small" type="button" data-action="cancelDayoffRequest" data-request-id="${requestId}">취소</button>
                </div>
                요청시간: ${requestedAt}

      function openDayOffDatePicker() {
        const today = new Date();
        const todayValue = `${today.getFullYear()}-${pad2(today.getMonth() + 1)}-${pad2(today.getDate())}`;
        if (!dayOffDateEl.value) dayOffDateEl.value = todayValue;
