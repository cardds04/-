        const monthlyRows = [...monthlyCounts.entries()]
          .sort((a, b) => b[0].localeCompare(a[0]))
          .map(([month, count]) => `<tr><td>${escapeHtml(month)}</td><td>${count}회</td></tr>`)
          .join("");

        writerHistoryTitleEl.textContent = `${targetName} 작가 정보`;
        writerHistorySummaryEl.innerHTML = `
          <div class="customer-stats-head">
            <span>총 촬영 배정: ${rows.length}건</span>
          </div>
          ${
            isExcludedWriter
              ? `<div class="actions" style="margin: 8px 0 10px; justify-content: flex-start;">
                   <button class="btn-sm primary" type="button" data-action="restoreExcludedWriter" data-writer-name="${escapeHtml(targetName)}">복귀</button>
                 </div>`
              : ""
          }
          <div class="company-edit-row" style="margin: 8px 0 10px;">
            <div><strong>작가 계정 관리</strong></div>
            <input class="inline-input writer-account-id" type="text" placeholder="아이디" value="${escapeHtml(writerId)}" />
            <input class="inline-input writer-account-password" type="text" placeholder="비밀번호" value="${escapeHtml(writerPassword)}" />
            <div class="actions" style="margin-top: 0; justify-content: flex-start;">
              <button class="btn-sm primary" type="button" data-action="saveWriterAccount" data-writer-name="${escapeHtml(targetName)}">계정저장</button>
            </div>
          </div>
          <table class="payment-table" style="margin-top: 0;">
            <thead>
              <tr>
                <th>월</th>
                <th>촬영횟수</th>
              </tr>
            </thead>
            <tbody>${monthlyRows || '<tr><td colspan="2">기록이 없습니다.</td></tr>'}</tbody>
          </table>
        `;

        writerHistoryDetailEl.innerHTML = rows.length
          ? rows
              .map(
                (item) => `
                  <div class="customer-alert-row" style="align-items: flex-start;">
                    <div>
                      <strong>${escapeHtml(item.date || "-")} ${escapeHtml(item.time || "-")}</strong><br />
                      업체: ${escapeHtml(item.company || "-")}<br />
                      장소: ${formatPlaceForDisplay(item.place)}
                    </div>
                  </div>
                `
              )
              .join("")
          : '<div class="company-item">해당 작가의 촬영 기록이 없습니다.</div>';
      }

      function renderPreviousScheduleHistory() {
        const today = new Date();
        const todayKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, "0")}-${String(today.getDate()).padStart(2, "0")}`;
        const rows = [
          ...data.map((item) => ({ ...item, sourceLabel: "진행중" })),
          ...onHoldPayments.map((item) => ({ ...item, sourceLabel: "보류" })),
          ...refundPayments.map((item) => ({ ...item, sourceLabel: "환불" }))
        ]
          .filter((item) => {
            const dateText = String(item?.date || "").trim();
            return /^\d{4}-\d{2}-\d{2}$/.test(dateText) && dateText < todayKey;
          })
          .sort((a, b) => {
            const at = new Date(`${a.date || "1900-01-01"}T${a.time || "00:00"}:00`).getTime();
            const bt = new Date(`${b.date || "1900-01-01"}T${b.time || "00:00"}:00`).getTime();
            return bt - at;
          });
        const writerNamesInRows = [...new Set(rows.map((item) => String(item?.name || "").trim()).filter(Boolean))];
        const writerButtonNames = [...photographers, ...writerNamesInRows.filter((name) => !photographers.includes(name))];
        if (previousHistoryWriterFilter !== "all" && !writerButtonNames.includes(previousHistoryWriterFilter)) {
          previousHistoryWriterFilter = "all";
        }
        const hasFilter =
          previousHistoryFilterYear !== "all" ||
          previousHistoryFilterMonth !== "all" ||
          previousHistoryFilterDay !== "all" ||
          previousHistoryCompanyFilter !== "";
        const filteredRows = rows.filter((item) => {
          const dateText = String(item?.date || "").trim();
          if (!/^\d{4}-\d{2}-\d{2}$/.test(dateText)) return false;
          const year = dateText.slice(0, 4);
          const month = dateText.slice(5, 7);
          const day = dateText.slice(8, 10);
          const passYear = previousHistoryFilterYear === "all" || year === previousHistoryFilterYear;
          const passMonth = previousHistoryFilterMonth === "all" || month === previousHistoryFilterMonth;
          const passDay = previousHistoryFilterDay === "all" || day === previousHistoryFilterDay;
          const passWriter = previousHistoryWriterFilter === "all" || String(item?.name || "").trim() === previousHistoryWriterFilter;
          const companyKeyword = normalizeCompanyName(previousHistoryCompanyFilter).toLowerCase();
          const companyName = normalizeCompanyName(item?.company).toLowerCase();
          const passCompany = !companyKeyword || companyName.includes(companyKeyword);
          return passYear && passMonth && passDay && passWriter && passCompany;
        });
        const yearOptions = [
          ...new Set([
            String(new Date().getFullYear()),
            ...rows.map((item) => String(item?.date || "").slice(0, 4)).filter((value) => /^\d{4}$/.test(value))
          ])
        ]
          .sort((a, b) => b.localeCompare(a))
          .map(
            (year) => `<option value="${year}" ${previousHistoryFilterYear === year ? "selected" : ""}>${year}년</option>`
          )
          .join("");
        const monthOptions = Array.from({ length: 12 }, (_, idx) => String(idx + 1).padStart(2, "0"))
          .map(
            (month) =>
              `<option value="${month}" ${previousHistoryFilterMonth === month ? "selected" : ""}>${Number(month)}월</option>`
          )
          .join("");
        const dayOptions = Array.from({ length: 31 }, (_, idx) => String(idx + 1).padStart(2, "0"))
          .map(
            (day) =>
              `<option value="${day}" ${previousHistoryFilterDay === day ? "selected" : ""}>${Number(day)}일</option>`
          )
          .join("");

        previousScheduleHistoryTitleEl.textContent = "이전기록";
        previousScheduleHistorySummaryEl.innerHTML = `
          <div class="view-tabs" style="margin: 0 0 8px;">
            <button class="${previousHistoryWriterFilter === "all" ? "active" : ""}" data-history-writer="all" type="button">작가전체</button>
            ${writerButtonNames
              .map(
                (name) =>
                  `<button class="${previousHistoryWriterFilter === name ? "active" : ""}" data-history-writer="${escapeHtml(
                    name
                  )}" type="button">${escapeHtml(name)}</button>`
              )
              .join("")}
          </div>
          <div class="customer-stats-head">
            <span>오늘 이전 총 기록: ${rows.length}건</span>
            <span>조회 결과: ${filteredRows.length}건</span>
            <select id="previousHistoryYearSelect" class="small-select" style="width: 120px;">
              <option value="all" ${previousHistoryFilterYear === "all" ? "selected" : ""}>전체 년</option>
              ${yearOptions}
            </select>
            <select id="previousHistoryMonthSelect" class="small-select" style="width: 120px;">
              <option value="all" ${previousHistoryFilterMonth === "all" ? "selected" : ""}>전체 월</option>
              ${monthOptions}
            </select>
            <select id="previousHistoryDaySelect" class="small-select" style="width: 120px;">
              <option value="all" ${previousHistoryFilterDay === "all" ? "selected" : ""}>전체 일</option>
              ${dayOptions}
            </select>
            <input id="previousHistoryCompanyInput" class="inline-input" type="text" value="${escapeHtml(previousHistoryCompanyFilter)}" placeholder="업체명 검색" style="width: 170px;" />
            <button id="applyPreviousHistoryDateFilterBtn" class="btn-sm ${hasFilter ? "primary" : ""}" type="button">조회</button>
            <button id="clearPreviousHistoryDateFilterBtn" class="btn-sm" type="button">전체</button>
          </div>
        `;
        const yearSelectEl = previousScheduleHistorySummaryEl.querySelector("#previousHistoryYearSelect");
        const monthSelectEl = previousScheduleHistorySummaryEl.querySelector("#previousHistoryMonthSelect");
        const daySelectEl = previousScheduleHistorySummaryEl.querySelector("#previousHistoryDaySelect");
        const companyInputEl = previousScheduleHistorySummaryEl.querySelector("#previousHistoryCompanyInput");
        const applyBtnEl = previousScheduleHistorySummaryEl.querySelector("#applyPreviousHistoryDateFilterBtn");
        const clearBtnEl = previousScheduleHistorySummaryEl.querySelector("#clearPreviousHistoryDateFilterBtn");
        previousScheduleHistorySummaryEl.querySelectorAll("button[data-history-writer]").forEach((btn) => {
          btn.addEventListener("click", () => {
            previousHistoryWriterFilter = String(btn.dataset.historyWriter || "all").trim() || "all";
            renderPreviousScheduleHistory();
          });
        });
        applyBtnEl?.addEventListener("click", () => {
          const nextYear = String(yearSelectEl?.value || "all").trim() || "all";
          const nextMonth = String(monthSelectEl?.value || "all").trim() || "all";
          const nextDay = String(daySelectEl?.value || "all").trim() || "all";
          const nextCompanyKeyword = String(companyInputEl?.value || "").trim();
          const canSearchByCompanyOnly =
            nextCompanyKeyword !== "" && nextYear === "all" && nextMonth === "all" && nextDay === "all";
          const isYearMonthSelected = nextYear !== "all" && nextMonth !== "all";
          if (!canSearchByCompanyOnly && !isYearMonthSelected) {
            alert("조회가 불가합니다. 년도와 월을 선택해주세요.");
            return;
          }
          previousHistoryFilterYear = nextYear;
          previousHistoryFilterMonth = nextMonth;
          previousHistoryFilterDay = nextDay;
          previousHistoryCompanyFilter = nextCompanyKeyword;
          renderPreviousScheduleHistory();
        });
        clearBtnEl?.addEventListener("click", () => {
          if (yearSelectEl) yearSelectEl.value = "all";
          if (monthSelectEl) monthSelectEl.value = "all";
          if (daySelectEl) daySelectEl.value = "all";
        });

        if (filteredRows.length === 0) {
          previousScheduleHistoryDetailEl.innerHTML = '<div class="company-item">조건에 맞는 이전 기록이 없습니다.</div>';
          return;
        }

        const grouped = new Map();
        filteredRows.forEach((item) => {
          const writer = item.name || "작가미정";
          if (!grouped.has(writer)) grouped.set(writer, []);
          grouped.get(writer).push(item);
        });
        const writerRows = [...grouped.entries()].sort((a, b) => {
          const aIdx = photographers.indexOf(a[0]);
          const bIdx = photographers.indexOf(b[0]);
          const aScore = aIdx === -1 ? Number.MAX_SAFE_INTEGER : aIdx;
          const bScore = bIdx === -1 ? Number.MAX_SAFE_INTEGER : bIdx;
          return aScore - bScore || a[0].localeCompare(b[0], "ko");
        });

        previousScheduleHistoryDetailEl.innerHTML = `
          <div class="writer-group-list">
            ${writerRows
              .map(
                ([writer, schedules]) => `
                  <article class="writer-row">
                    <div class="writer-name">${escapeHtml(writer)}작가</div>
                    <div class="writer-places">
                      ${schedules
                        .map((item) => {
                          const statusBadgeClass = item.paymentStatus === "입금완료" ? "neon" : "danger";
                          const statusBadgeText = item.paymentStatus === "입금완료" ? "입금확인" : "미결";
                          return `
                            <span class="writer-place">
                              ${escapeHtml(item.date || "-")} (<span class="weekday-label ${isWeekendDate(item.date) ? "weekend" : ""}">${escapeHtml(getWeekdayKo(item.date))}</span>) | ${escapeHtml(item.time || "-")}
                              <button class="btn-sm ${statusBadgeClass}" type="button" disabled style="margin-left: 6px;">${statusBadgeText}</button><br />
                              업체: ${escapeHtml(item.company || "-")} (${escapeHtml(getCompanyPhoneForDisplay(item.company, item) || "-")})<br />
                              장소: ${formatPlaceForDisplay(item.place)}<br />
                              평수: ${escapeHtml(item.pyeong || "-")}<br />
                              비번: ${escapeHtml(item.jointCode || "-")} / ${escapeHtml(item.doorCode || "-")}<br />
                              메모: ${escapeHtml(summarizeMemo(item.memo))}<br />
                              구성/작가: ${escapeHtml(item.composition || "-")} / ${escapeHtml(item.name || "-")}<br />
                              쿠폰사용: ${item.couponUsed ? "사용" : "미사용"}<br />
                              구분: ${escapeHtml(item.sourceLabel || "진행중")}
                            </span>
                          `;
                        })
                        .join("")}
                    </div>
                  </article>
                `
              )
              .join("")}
          </div>
        `;
      }

      function renderPaymentList() {
        const filtered =
          currentPaymentFilter === "hold"
            ? onHoldPayments.map((item, index) => ({ item, index, source: "hold" }))
            : currentPaymentFilter === "refund"
            ? refundPayments.map((item, index) => ({ item, index, source: "refund" }))
            : data
                .map((item, index) => ({ item, index, source: "active" }))
                .filter(({ item }) => {
                  if (currentPaymentFilter === "unpaid") return item.paymentStatus !== "입금완료";
                  return item.paymentStatus === "입금완료";
                });

        paymentListBodyEl.innerHTML = filtered
          .sort((a, b) => {
            const aDate = new Date(`${a.item.date}T${a.item.time || "00:00"}:00`).getTime();
            const bDate = new Date(`${b.item.date}T${b.item.time || "00:00"}:00`).getTime();
            return aDate - bDate;
          })
          .map(({ item, index, source }) => {
            const isEditing = source === "active" && editingPaymentIndex === index;
            const fallbackDate = item.date || `${currentYear}-01-01`;
            const sourceDate = item.paymentDate || fallbackDate;
            let selectedMonth = "01";
            let selectedDay = "01";
            if (/^\d{4}-\d{2}-\d{2}$/.test(sourceDate)) {
              selectedMonth = sourceDate.slice(5, 7);
              selectedDay = sourceDate.slice(8, 10);
            } else if (/^\d{2}-\d{2}$/.test(sourceDate)) {
              selectedMonth = sourceDate.slice(0, 2);
              selectedDay = sourceDate.slice(3, 5);
            }
            const monthOptions = Array.from({ length: 12 }, (_, idx) => String(idx + 1).padStart(2, "0"))
              .map(
                (month) =>
                  `<option value="${month}" ${month === selectedMonth ? "selected" : ""}>${Number(month)}월</option>`
              )
              .join("");
            const dayOptions = Array.from({ length: 31 }, (_, idx) => String(idx + 1).padStart(2, "0"))
              .map(
                (day) =>
                  `<option value="${day}" ${day === selectedDay ? "selected" : ""}>${Number(day)}일</option>`
              )
              .join("");
            return `
            <tr>
              <td>${item.paymentDate || item.date}</td>
              <td>${escapeHtml(item.company || "-")}</td>
              <td>${
                isEditing
                  ? `<input class="inline-input pay-payer" type="text" value="${escapeHtml(item.paymentPayer || "")}" />`
                  : `${escapeHtml(item.paymentPayer || "-")}`
              }</td>
              <td>${
                isEditing
                  ? `<span class="time-edit-row">
                       <select class="inline-select pay-month" style="width: 92px;">${monthOptions}</select>
                       <select class="inline-select pay-day" style="width: 92px;">${dayOptions}</select>
                     </span>`
                  : `${escapeHtml(item.paymentDate || "-")}`
              }</td>
              <td>${
                isEditing
                  ? `<input class="inline-input pay-amount" type="text" value="${escapeHtml(item.paymentAmount || "")}" />`
                  : `${escapeHtml(item.paymentAmount || "-")}`
              }</td>
              <td>${
                isEditing
                  ? `<span>금액 저장 시 자동 입금</span>`
                  : `${
                      source === "hold"
                        ? "보류"
                        : source === "refund"
                        ? item.refundChecked
                          ? "환불완료"
                          : "미환불"
                        : item.paymentStatus === "입금완료"
                        ? "입금"
                        : "미입금"
                    }`
              }</td>
              <td>
                ${
                  source === "hold"
                    ? `<button class="btn-sm" type="button" data-action="cancelHoldSchedule" data-index="${index}">스케줄취소</button>`
                    : source === "refund"
                    ? `<button class="btn-sm ${item.refundChecked ? "" : "primary"}" type="button" data-action="toggleRefundStatus" data-index="${index}">${
                        item.refundChecked ? "환불체크해제" : "환불체크"
                      }</button>`
                    : isEditing
                    ? `<button class="btn-sm primary" type="button" data-action="savePaymentRow" data-index="${index}">저장</button>
                       <button class="btn-sm" type="button" data-action="cancelPaymentRow" data-index="${index}">취소</button>`
                    : `<button class="btn-sm" type="button" data-action="editPaymentRow" data-index="${index}">입금내역수정</button>
                       ${
                         item.paymentStatus === "입금완료"
                           ? ""
                           : couponApplyIndex === index
                           ? `<button class="btn-sm primary" type="button" data-action="applyCouponOnce" data-index="${index}">1회적용</button>
                              <button class="btn-sm" type="button" data-action="cancelCouponApply" data-index="${index}">취소</button>`
                           : `<button class="btn-sm" type="button" data-action="startCouponApply" data-index="${index}">회차권사용</button>`
                       }`
                }
              </td>
            </tr>
          `;
          })
          .join("");

        if (filtered.length === 0) {
          paymentListBodyEl.innerHTML = `
            <tr>
              <td colspan="7">표시할 내역이 없습니다.</td>
            </tr>
          `;
        }
      }

      function editPaymentFromTable(index) {
        editingPaymentIndex = index;
        couponApplyIndex = null;
        renderPaymentList();
      }

      function savePaymentFromTable(index, rowEl) {
        const item = data[index];
        if (!item || !rowEl) return;

        const payer = rowEl.querySelector(".pay-payer")?.value?.trim() || "";
        const paymentMonth = rowEl.querySelector(".pay-month")?.value || "01";
        const paymentDay = rowEl.querySelector(".pay-day")?.value || "01";
        const paymentDate = `${paymentMonth}-${paymentDay}`;
        const amount = rowEl.querySelector(".pay-amount")?.value?.trim() || "";

        item.paymentPayer = payer;
        item.paymentDate = paymentDate;
        item.paymentAmount = amount;
        item.paymentStatus = amount ? "입금완료" : "미입금";
        if (amount && amount !== "쿠폰사용") {
          item.couponUsed = false;
        }
        editingPaymentIndex = null;
        renderList();
      }

      function applyCouponToPayment(index) {
        const item = data[index];
        if (!item) return;
        if (item.paymentStatus === "입금완료") {
          alert("이미 입금 처리된 스케줄입니다.");
          return;
        }
        const remaining = getCouponRemaining(item.company);
        if (remaining < 1) {
          alert("남은 회차권이 없습니다. 회차권 등록에서 먼저 등록해주세요.");
          return;
        }

        setCouponRemaining(item.company, remaining - 1);
        item.paymentStatus = "입금완료";
        item.paymentAmount = item.paymentAmount || "쿠폰사용";
        item.paymentPayer = item.paymentPayer || "쿠폰";
        if (!item.paymentDate) {
          const now = new Date();
          const month = String(now.getMonth() + 1).padStart(2, "0");
          const day = String(now.getDate()).padStart(2, "0");
          item.paymentDate = `${month}-${day}`;
        }
        item.couponUsed = true;
        couponApplyIndex = null;
        editingPaymentIndex = null;
        renderList();
        renderCouponPassList();
      }

      function cancelHoldSchedule(index) {
        const holdItem = onHoldPayments[index];
        if (!holdItem) return;

        // 쿠폰으로 결제한 건은 1회 복구 후 보류 목록에서 제거
        if (holdItem.couponUsed) {
          const remaining = getCouponRemaining(holdItem.company);
          setCouponRemaining(holdItem.company, remaining + 1);
          onHoldPayments.splice(index, 1);
          renderPaymentList();
          renderCouponPassList();
          return;
        }

        // 현금 입금 건은 환불 업체 목록으로 이동 후 환불 체크 관리
        if (holdItem.paymentStatus === "입금완료") {
          refundPayments.unshift({ ...holdItem, refundChecked: false });
        }
        appendCanceledScheduleRecord(holdItem, "admin", "보류취소");
        onHoldPayments.splice(index, 1);
        renderPaymentList();
      }

      function setupDateInputs() {
        const now = new Date();
        const thisYear = now.getFullYear();
        yearEl.innerHTML = Array.from({ length: 11 }, (_, idx) => thisYear - 5 + idx)
          .map((year) => `<option value="${year}">${year}년</option>`)
          .join("");
        monthEl.innerHTML = Array.from({ length: 12 }, (_, idx) => idx + 1)
          .map((month) => `<option value="${month}">${month}월</option>`)
          .join("");
        yearEl.value = String(thisYear);
        monthEl.value = String(now.getMonth() + 1);
        renderScheduleDayOptionsWithWeekday(String(now.getDate()));
      }

      function renderScheduleDayOptionsWithWeekday(preferredDay) {
        const selectedYear = Number(yearEl.value);
        const selectedMonth = Number(monthEl.value);
        const safeYear = Number.isNaN(selectedYear) ? currentYear : selectedYear;
        const safeMonth = Number.isNaN(selectedMonth) ? 1 : selectedMonth;
        const daysInMonth = new Date(safeYear, safeMonth, 0).getDate();
        const weekdayNames = ["일", "월", "화", "수", "목", "금", "토"];

        dayEl.innerHTML = Array.from({ length: daysInMonth }, (_, idx) => idx + 1)
          .map((day) => {
            const weekday = weekdayNames[new Date(safeYear, safeMonth - 1, day).getDay()];
            return `<option value="${day}">${day}일 (${weekday})</option>`;
          })
          .join("");

        const wantedDay = Number(preferredDay);
        const normalizedDay = Number.isNaN(wantedDay) ? 1 : Math.min(Math.max(wantedDay, 1), daysInMonth);
        dayEl.value = String(normalizedDay);
      }

        );
        const canceledFallbackKeySet = new Set(
          canceledRows.map((item) =>
            [
              String(item?.date || "").trim(),
              String(item?.time || "").trim(),
              normalizeCompanyName(item?.company).toLowerCase(),
              normalizeCompanyName(item?.place).toLowerCase()

        const selectedYear = yearFilterEl.value;
        const selectedMonth = monthFilterEl.value;
        const selectedDay = dayFilterEl.value;
        const companyKeyword = normalizeCompanyName(companyFilterInputEl.value).toLowerCase();
        const today = new Date();
        const todayKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, "0")}-${String(today.getDate()).padStart(2, "0")}`;

        const filtered = data
          .map((item, index) => ({ item, index }))
          .filter(({ item }) => {
            const dateText = String(item.date || "").trim();
            if (!/^\d{4}-\d{2}-\d{2}$/.test(dateText)) return false;
            if (dateText < todayKey) return false;
            const itemDate = new Date(item.date);
            const itemYear = String(itemDate.getFullYear());
            const itemMonth = String(itemDate.getMonth() + 1);
            const itemDay = String(itemDate.getDate());
            const itemScheduleId = String(item?.customerScheduleId || "").trim();
            const itemFallbackKey = [
              String(item?.date || "").trim(),
              String(item?.time || "").trim(),
              normalizeCompanyName(item?.company).toLowerCase(),
              normalizeCompanyName(item?.place).toLowerCase()
            ].join("|");
            const isCanceled =
              (itemScheduleId && canceledScheduleIdSet.has(itemScheduleId)) ||
              canceledFallbackKeySet.has(itemFallbackKey);
            if (isCanceled) return false;

            const passPhotographer =
              currentPhotographerFilter === "all" || item.name === currentPhotographerFilter;
            const passYear = itemYear === selectedYear;
            const passMonth = selectedMonth === "all" || itemMonth === selectedMonth;
            const passDay = selectedDay === "all" || itemDay === selectedDay;
            const passCompany = !companyKeyword || normalizeCompanyName(item.company).toLowerCase().includes(companyKeyword);

            return passPhotographer && passYear && passMonth && passDay && passCompany;
          })
          .sort((a, b) => {
            const aDateTime = new Date(`${a.item.date}T${a.item.time || "00:00"}:00`).getTime();
            const bDateTime = new Date(`${b.item.date}T${b.item.time || "00:00"}:00`).getTime();
            return aDateTime - bDateTime;

        const writerRows = [...grouped.entries()].sort((a, b) => {

          const bIdx = photographers.indexOf(b[0]);
          const aScore = aIdx === -1 ? Number.MAX_SAFE_INTEGER : aIdx;

                            .join("");
                          const compositionOptions = ["사진만", "사진영상 둘다"]
                            .map((value) => `<option value="${value}" ${item.composition === value ? "selected" : ""}>${value}</option>`)
                            .join("");
                          const pyeongOptions = ["45평이하", "45평이상", "95평이상", "145평이상"]
                            .map((value) => `<option value="${value}" ${item.pyeong === value ? "selected" : ""}>${value}</option>`)
                            .join("");
                          const photographerOptions = ["작가미정", ...photographers]
                            .map((name) => `<option value="${escapeHtml(name)}" ${item.name === name ? "selected" : ""}>${escapeHtml(name)}</option>`)
                            .join("");

                          return `
                            <span class="writer-place" data-schedule-card="true" data-index="${index}">
                              ${
                                isEditing
                                  ? `<div class="inline-pair" style="margin-bottom: 6px;">
                                       <input class="inline-input edit-date-only" type="date" value="${item.date}" style="width: 150px;" />
                                       <select class="inline-select edit-hour" style="width: 90px;">${hourOptions}</select>

                                     <div style="margin-bottom: 4px;">평수: <select class="inline-select edit-pyeong">${pyeongOptions}</select></div>
                                     <div style="margin-bottom: 4px;">공동비번: <input class="inline-input edit-jointCode" type="text" value="${escapeHtml(item.jointCode || "")}" /></div>
                                     <div style="margin-bottom: 4px;">세대비번: <input class="inline-input edit-doorCode" type="text" value="${escapeHtml(item.doorCode || "")}" /></div>
                                     <div style="margin-bottom: 4px;">메모: <input class="inline-input edit-memo" type="text" value="${escapeHtml(item.memo || "")}" /></div>

                                       <button class="btn-sm" type="button" data-action="cancelEdit" data-index="${index}">취소</button>
                                     </div>`
                                 : `${escapeHtml(item.date || "-")} (<span class="weekday-label ${isWeekendDate(item.date) ? "weekend" : ""}">${escapeHtml(getWeekdayKo(item.date))}</span>) | ${escapeHtml(item.time || "-")}

        photographers.push(trimmedName);

      function excludePhotographerByName(name) {
        const removeIndex = photographers.findIndex((item) => item === name);
        if (removeIndex < 0) return;
        photographers.splice(removeIndex, 1);
        setExcludedPhotographerNames([...getExcludedPhotographerNames(), name]);

        const today = new Date();
        const todayKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, "0")}-${String(today.getDate()).padStart(2, "0")}`;
        data.forEach((item) => {
          const itemDate = String(item?.date || "").trim();
          if (item.name !== name) return;
          if (!/^\d{4}-\d{2}-\d{2}$/.test(itemDate)) return;
          if (itemDate < todayKey) return;
          item.name = "작가미정";
          item.writerPhone = "";
          item.writerCarNumber = "";
        });

        savePhotographerProfilesToStorage();
        renderPhotographers();
        renderList();
      }

      function deletePhotographerByName(name) {
        const targetName = String(name || "").trim();
        if (!targetName) return;
        const activeIndex = photographers.findIndex((item) => item === targetName);
        if (activeIndex >= 0) {
          photographers.splice(activeIndex, 1);
        }
        setExcludedPhotographerNames(getExcludedPhotographerNames().filter((item) => item !== targetName));
        delete photographerPhones[targetName];
        delete photographerCarNumbers[targetName];

        data.forEach((item) => {
          if (item.name === targetName) {
            item.name = "작가미정";
            item.writerPhone = "";
            item.writerCarNumber = "";
          }
        });

        const writers = readStorageArray(STORAGE_WRITERS).filter((writer) => String(writer?.name || "").trim() !== targetName);
        localStorage.setItem(STORAGE_WRITERS, JSON.stringify(writers));

        if (currentPhotographerFilter === targetName) {
          currentPhotographerFilter = "all";
        }
        editingPhotographerName = null;
        savePhotographerProfilesToStorage();
        renderPhotographers();
        renderList();
      }

      function restoreExcludedPhotographerByName(name) {
        const targetName = String(name || "").trim();
        if (!targetName) return;
        const excludedNames = getExcludedPhotographerNames();
        if (!excludedNames.includes(targetName)) return;
        if (!photographers.includes(targetName)) {
          photographers.push(targetName);
        }
        setExcludedPhotographerNames(excludedNames.filter((item) => item !== targetName));
        savePhotographerProfilesToStorage();
        renderPhotographers();
        renderList();
      }

      function savePhotographerInfo(oldName, itemEl) {
        const index = photographers.findIndex((item) => item === oldName);
        if (index < 0 || !itemEl) return;
        const nameInputEl = itemEl.querySelector(".edit-photographer-name");
        const phoneInputEl = itemEl.querySelector(".edit-photographer-phone");
        const carInputEl = itemEl.querySelector(".edit-photographer-car");

        const newName = String(nameInputEl?.value || "").trim();
        const newPhone = String(phoneInputEl?.value || "").trim();
        const newCarNumber = String(carInputEl?.value || "").trim();

        if (!newName) {
          alert("작가명을 입력해주세요.");
          return;
        }
        const duplicate = photographers.some((name, rowIndex) => rowIndex !== index && name.toLowerCase() === newName.toLowerCase());
        if (duplicate) {
          alert("이미 등록된 작가명입니다.");
          return;
        }

        photographers[index] = newName;
        delete photographerPhones[oldName];
        delete photographerCarNumbers[oldName];
        photographerPhones[newName] = newPhone;
        photographerCarNumbers[newName] = newCarNumber;
        setExcludedPhotographerNames(
          getExcludedPhotographerNames().map((name) => (name === oldName ? newName : name))
        );

        const writers = readStorageArray(STORAGE_WRITERS);
        const writerIndex = writers.findIndex((writer) => String(writer?.name || "").trim() === oldName);
        if (writerIndex >= 0) {
          writers[writerIndex].name = newName;
          if (newPhone) writers[writerIndex].phone = newPhone;
          if (newCarNumber) writers[writerIndex].carNumber = newCarNumber;
          localStorage.setItem(STORAGE_WRITERS, JSON.stringify(writers));
        }

        data.forEach((item) => {
          if (item.name !== oldName) return;
          item.name = newName;
          item.writerPhone = newPhone;
          item.writerCarNumber = newCarNumber;
          syncCustomerScheduleFromAdminEdit(item, item.time || "");
        });

        if (currentPhotographerFilter === oldName) {
          currentPhotographerFilter = newName;
        }
        editingPhotographerName = null;
        savePhotographerProfilesToStorage();
        renderPhotographers();
        renderList();
      }

      function saveInlineEdit(index, itemEl) {
        const item = data[index];
        if (!item || !itemEl) return;
        const previousTime = item.time || "";

        const date = itemEl.querySelector(".edit-date-only")?.value?.trim();
        const hour = itemEl.querySelector(".edit-hour")?.value;
        const minute = itemEl.querySelector(".edit-minute")?.value;
        const company = itemEl.querySelector(".edit-company")?.value?.trim();
        const place = itemEl.querySelector(".edit-place")?.value?.trim();
        const pyeong = itemEl.querySelector(".edit-pyeong")?.value?.trim();
        const jointCode = itemEl.querySelector(".edit-jointCode")?.value?.trim();
        const doorCode = itemEl.querySelector(".edit-doorCode")?.value?.trim();
        const memo = itemEl.querySelector(".edit-memo")?.value?.trim();
        const composition = itemEl.querySelector(".edit-composition")?.value;
        const name = itemEl.querySelector(".edit-name")?.value;
        const nextDate = date || item.date;
        if (nextDate !== item.date) {
          const countAtDate = getActiveScheduleCountByDate(nextDate, index);
          const dailyLimit = getEffectiveDailyLimit(nextDate);
          if (countAtDate >= dailyLimit) {
            alert("예약이 꽉차서 등록이 어렵습니다. 관리자에게 문의해주세요.");
            return;
          }
        }

        if (date) item.date = date;
        if (hour && minute) item.time = `${hour}:${minute}`;
        if (company) item.company = company;
        if (place) item.place = place;
        item.pyeong = pyeong || "";
        item.jointCode = jointCode || "";
        item.doorCode = doorCode || "";
        item.memo = memo || "";
        if (composition) item.composition = composition;
        if (name) {
          item.name = name;
          item.writerPhone = photographerPhones[name] || "";
          item.writerCarNumber = photographerCarNumbers[name] || "";
        }
        syncCustomerScheduleFromAdminEdit(item, previousTime);

        editingIndex = null;
        renderList();
      }

        const date = itemEl.querySelector(".edit-date-only")?.value?.trim();

      function deleteSchedule(index) {
        if (index < 0 || index >= data.length) return;
        const confirmed = confirm("삭제하시겠습니까?");
        if (!confirmed) return;
        const deletedItem = data[index];
        appendCanceledScheduleRecord(deletedItem, "admin", "관리자삭제");
        if (deletedItem?.paymentStatus === "입금완료") {
          onHoldPayments.unshift({ ...deletedItem });
        }
        data.splice(index, 1);

        // 고객 페이지에서 넘어온 일정은 고객 저장소에서도 함께 삭제해야 재등장하지 않음
        const customerSchedules = readStorageArray(STORAGE_CUSTOMER_SCHEDULES);
        let customerIndex = -1;
        const deletedCustomerScheduleId = String(deletedItem?.customerScheduleId || "").trim();
        if (deletedCustomerScheduleId) {
          customerIndex = customerSchedules.findIndex(
            (row) => String(row?.customerScheduleId || "").trim() === deletedCustomerScheduleId
          );
        }
        if (customerIndex < 0) {
          customerIndex = customerSchedules.findIndex(
            (row) =>
              String(row?.date || "").trim() === String(deletedItem?.date || "").trim() &&
              String(row?.time || "").trim() === String(deletedItem?.time || "").trim() &&
              normalizeCompanyName(row?.company) === normalizeCompanyName(deletedItem?.company) &&
              String(row?.place || "").trim() === String(deletedItem?.place || "").trim()
          );
        }
        if (customerIndex >= 0) {
          customerSchedules.splice(customerIndex, 1);
          localStorage.setItem(STORAGE_CUSTOMER_SCHEDULES, JSON.stringify(customerSchedules));
        }

        editingIndex = null;
        editingDateIndex = null;
        renderList();
      }

      adminOverrideSubmitBtnEl.addEventListener("click", () => {
        const password = String(adminOverridePasswordEl.value || "").trim();
        if (password !== ADMIN_OVERRIDE_PASSWORD) {
          alert("관리자 비밀번호가 올바르지 않습니다.");
          return;
        }
        const created = submitScheduleFromForm(true);
        if (!created) return;
        adminOverridePasswordEl.value = "";
      });

      resetAllSchedulesOnce();
      resetAllDataOnceV2();
      loadAdminCompaniesFromStorage();
      loadAdminSchedulesFromStorage();
      hydrateFromCustomerPageStorage();
      loadPhotographerProfilesFromStorage();
      hydrateFromWriterPageStorage();
      renderPhotographers();
      renderCustomerStatsDashboard();
      renderCustomerUpdateNotices();
      renderCustomerAlertHistory();
      renderCompanies();
      setupDateInputs();
      setupCouponInputs();
      setupScheduleFilters();
      renderList();
      switchMainTab("schedule");

      window.addEventListener("storage", (event) => {
        if (event.key === STORAGE_CANCELED_SCHEDULES) {
          renderCanceledSchedules();
        }
        if (event.key === STORAGE_ADMIN_COMPANIES) {
          loadAdminCompaniesFromStorage();
          renderCompanies();
        }
        if (event.key === STORAGE_ADMIN_SCHEDULES) {
          loadAdminSchedulesFromStorage();
          renderList();
        }
        if (event.key === STORAGE_CUSTOMER_SCHEDULES || event.key === STORAGE_CUSTOMER_COMPANIES) {
          hydrateFromCustomerPageStorage();
          renderCustomerStatsDashboard();
          renderCompanies();
          renderList();
        }
        if (
          event.key === STORAGE_WRITERS ||
          event.key === STORAGE_EXCLUDED_PHOTOGRAPHERS ||
          event.key === STORAGE_PHOTOGRAPHER_PROFILES
        ) {
          loadPhotographerProfilesFromStorage();
          hydrateFromWriterPageStorage();
          renderPhotographers();
          renderList();
        }
        if (event.key === STORAGE_CUSTOMER_ALERTS) {
          renderCustomerUpdateNotices();
          renderCustomerAlertHistory();
        }
        if (event.key === STORAGE_CUSTOMERS || event.key === STORAGE_CUSTOMER_LOGINS) {
          renderCustomerStatsDashboard();
        }
        if (
          event.key === STORAGE_DAILY_LIMITS ||
          event.key === STORAGE_LIMIT_CONFIG ||
          event.key === STORAGE_DAYOFF_DEDUCTIONS ||
          event.key === STORAGE_DAYOFF_REQUESTS ||
          event.key === STORAGE_DAYOFF_ALERT_READ_IDS
        ) {
          renderScheduleCalendar();
          renderOpenDayoffSummary();
          renderCustomerUpdateNotices();
          renderCustomerAlertHistory();
        }
      });

      window.addEventListener("focus", () => {
        loadAdminCompaniesFromStorage();
        loadAdminSchedulesFromStorage();
        hydrateFromCustomerPageStorage();
        loadPhotographerProfilesFromStorage();
        hydrateFromWriterPageStorage();
        renderPhotographers();
        renderCustomerStatsDashboard();
        renderCustomerUpdateNotices();
        renderCustomerAlertHistory();
        renderCompanies();
        renderList();
      });

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState !== "visible") return;
        loadAdminCompaniesFromStorage();
        loadAdminSchedulesFromStorage();
        hydrateFromCustomerPageStorage();
        loadPhotographerProfilesFromStorage();
        hydrateFromWriterPageStorage();
        renderPhotographers();
        renderCustomerStatsDashboard();
        renderCustomerUpdateNotices();
        renderCustomerAlertHistory();
        renderOpenDayoffSummary();
        renderCanceledSchedules();
      });
    </script>
  </body>
</html>
