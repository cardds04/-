<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>촬영 스케줄 관리</title>
    <style>
      :root {
        --bg: #f4f6fb;
        --card: #ffffff;
        --line: #d9deea;
        --text: #1f2940;
        --muted: #6b758f;
        --blue: #456aa7;
        --blue-dark: #34568f;
        --badge: #f1f4fa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        background: linear-gradient(#fafbff, #eef2fb);
        color: var(--text);
      }

      .wrap {
        width: min(1180px, 95vw);
        margin: 38px auto 48px;
      }

      h1 {
        margin: 0;
        text-align: center;
        font-size: clamp(28px, 3vw, 44px);
        font-weight: 800;
      }

      .subtitle {
        margin-top: 10px;
        text-align: center;
        color: #2c3242;
        font-size: clamp(14px, 1.3vw, 21px);
      }

      .top-tabs {
        margin: 26px 6px 12px;
        display: flex;
        gap: 18px;
        color: var(--muted);
        font-weight: 700;
      }

      .top-tabs button {
        border: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        padding: 4px 0;
        border-bottom: 2px solid transparent;
        cursor: pointer;
      }

      .top-tabs button.active {
        color: var(--text);
        border-color: var(--blue);
      }

      .board {
        display: grid;
        grid-template-columns: 1.05fr 3fr;
        gap: 16px;
      }

      .my-schedule-card {
        grid-column: 1 / -1;
        width: 100%;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: 0 6px 20px rgba(42, 56, 90, 0.05);
        padding: 16px;
      }

      .card h2 {
        margin: 0 0 12px;
        font-size: 1.65rem;
      }

      .btn-main {
        width: 100%;
        border: 0;
        background: var(--blue);
        color: #fff;
        font-weight: 700;
        border-radius: 10px;
        padding: 12px;
        font-size: 1rem;
        cursor: pointer;
      }

      .btn-main:hover {
        background: var(--blue-dark);
      }

      .helper {
        color: var(--muted);
        margin-top: 14px;
      }

      .member-names {
        margin-top: 8px;
        color: #314160;
        font-size: 0.92rem;
        line-height: 1.6;
      }

      .photographer-buttons {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .photographer-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #f7f9fd;
        padding: 3px 8px;
      }

      .photographer-chip-btn {
        border: 0;
        background: transparent;
        color: #2a3550;
        font-size: 0.9rem;
        font-weight: 700;
      }

      .chip-delete-btn {
        border: 0;
        background: transparent;
        color: #d94848;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
      }

      .sub-title {
        margin: 16px 0 8px;
        font-size: 1.05rem;
      }

      .company-list {
        margin-top: 8px;
        display: grid;
        gap: 6px;
        max-height: 140px;
        overflow: auto;
      }

      .company-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px 9px;
        font-size: 0.9rem;
        background: #fbfcff;
      }

      .company-item.company-clickable {
        cursor: pointer;
      }

      .company-item.company-clickable:hover {
        border-color: #b8c7e7;
        background: #f5f8ff;
      }

      .company-item-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .company-edit-row {
        display: grid;
        gap: 6px;
      }

      .register-panel {
        margin-top: 10px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #f8faff;
      }

      .hidden {
        display: none;
      }

      .form {
        display: grid;
        gap: 10px;
      }

      .schedule-register-card .form {
        gap: 7px;
      }

      .schedule-register-card .filter-row {
        gap: 6px;
      }

      .schedule-register-card .input-row {
        padding: 7px 9px;
      }

      .input-row {
        display: flex;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fcfdff;
        padding: 9px 10px;
        gap: 8px;
      }

      .input-row input,
      .input-row select {
        width: 100%;
        border: 0;
        background: transparent;
        outline: none;
        font-size: 0.97rem;
        color: var(--text);
      }

      .radio-line {
        margin-top: 6px;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }

      .radio-line label {
        color: #2e3549;
        font-size: 0.95rem;
      }

      .new-note {
        text-align: center;
        color: var(--muted);
        margin-top: 10px;
        font-size: 0.9rem;
      }

      .schedule-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .schedule-head h2 {
        margin: 0;
      }

      .head-right {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .count {
        font-weight: 700;
      }

      .small-select {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 6px 9px;
      }

      .view-tabs {
        display: flex;
        gap: 8px;
        margin: 12px 0 6px;
      }

      #dateFilterRow {
        margin-top: 6px;
        margin-bottom: 10px;
      }

      .view-tabs button {
        border: 1px solid var(--line);
        background: #f7f9fd;
        color: #526079;
        border-radius: 8px;
        padding: 6px 12px;
        cursor: pointer;
        font-weight: 700;
      }

      .view-tabs .active {
        background: var(--blue);
        border-color: var(--blue);
        color: #fff;
      }

      .view-tabs .tab-divider {
        width: 1px;
        align-self: stretch;
        background: #d4dbea;
        margin: 0 2px;
      }

      .view-tabs button.date-preset-tab {
        background: #fff7cc;
        border-color: #efd97a;
        color: #6d5b00;
      }

      .view-tabs button.date-preset-tab.active {
        background: #ffe58a;
        border-color: #e2c95b;
        color: #5e4f00;
      }

      .filter-row {
        display: flex;
        gap: 8px;
      }

      .filter-row select {
        min-width: 130px;
        flex: 1;
      }

      .filter-row button {
        white-space: nowrap;
      }

      .list {
        display: grid;
        gap: 10px;
        max-height: 590px;
        overflow: auto;
        padding-right: 4px;
      }

      .writer-group-list {
        display: grid;
        gap: 10px;
      }

      .writer-row {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 10px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #f7f9fd;
        padding: 10px;
      }

      .writer-name {
        font-weight: 800;
        color: #1f2940;
        white-space: nowrap;
      }

      .writer-places {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .writer-place {
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 0.88rem;
        color: #2b3751;
        min-width: 220px;
        line-height: 1.45;
      }

      .item {
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
      }

      .item-time {
        background: #edf2f9;
        padding: 8px 12px;
        font-weight: 700;
        display: grid;
        gap: 8px;
      }

      .item-time-top,
      .item-time-bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .item-body {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        padding: 10px 12px;
      }

      .meta {
        font-size: 0.95rem;
        color: #25314b;
        line-height: 1.6;
      }

      .info-list {
        display: grid;
        gap: 8px;
      }

      .info-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        background: var(--badge);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 0.9rem;
      }

      .actions {
        display: flex;
        gap: 6px;
        justify-content: flex-end;
        margin-top: 4px;
      }

      .quick-meta {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-right: 6px;
      }

      .quick-pill {
        border: 1px solid #9ca8bf;
        background: #fff;
        color: #2b3751;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 0.82rem;
        cursor: pointer;
      }

      .time-edit-row {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .inline-input,
      .inline-select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        padding: 5px 7px;
        font-size: 0.88rem;
      }

      .btn-sm {
        border: 1px solid #9ca8bf;
        background: #fff;
        color: #2b3751;
        border-radius: 999px;
        padding: 4px 9px;
        font-size: 0.82rem;
      }

      .btn-sm[disabled] {
        opacity: 1;
        cursor: default;
      }

      .btn-sm.primary {
        border-color: var(--blue);
        background: var(--blue);
        color: #fff;
      }

      .btn-sm.danger {
        border-color: #d94848;
        background: #e65555;
        color: #fff;
      }

      .btn-sm.neon {
        border-color: #d8e700;
        background: #eefe58;
        color: #263000;
        font-weight: 700;
      }

      #applyPreviousHistoryDateFilterBtn:hover,
      #clearPreviousHistoryDateFilterBtn:hover,
      #todayPreviousHistoryDateFilterBtn:hover {
        border-color: #8ea4cf;
        background: #eef3ff;
      }

      #applyPreviousHistoryDateFilterBtn.primary:hover {
        border-color: #2f4e87;
        background: #34568f;
        color: #fff;
      }

      .inline-pair {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .payment-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
      }

      .payment-table th,
      .payment-table td {
        border: 1px solid var(--line);
        padding: 8px 10px;
        text-align: left;
        font-size: 0.9rem;
      }

      .payment-table th {
        background: #eef3fb;
      }

      .coupon-register-row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: nowrap;
        margin-bottom: 12px;
      }

      .coupon-register-row .inline-input {
        flex: 1;
      }

      .customer-alert-box {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #f8faff;
        padding: 10px;
        margin-bottom: 10px;
        font-size: 0.88rem;
        max-height: 230px;
        overflow-y: auto;
      }

      .customer-alert-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 6px 0;
        border-bottom: 1px dashed #d8dfef;
      }

      .customer-alert-row:last-child {
        border-bottom: 0;
      }

      .customer-alert-history {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        padding: 10px;
        margin-bottom: 10px;
        font-size: 0.86rem;
        max-height: 260px;
        overflow-y: auto;
      }

      .customer-stats-box {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        padding: 10px;
        margin-top: 10px;
        margin-bottom: 10px;
      }

      .customer-stats-head {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 8px;
        font-size: 0.9rem;
      }

      .calendar-modal {
        position: fixed;
        inset: 0;
        background: rgba(14, 20, 34, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        z-index: 999;
      }

      .calendar-modal.hidden {
        display: none;
      }

      .calendar-panel {
        width: min(980px, 96vw);
        max-height: 90vh;
        overflow: auto;
        background: #fff;
        border-radius: 14px;
        border: 1px solid var(--line);
        box-shadow: 0 10px 32px rgba(20, 30, 52, 0.2);
        padding: 14px;
      }

      .calendar-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }

      .calendar-title {
        font-weight: 800;
        font-size: 1.05rem;
      }

      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 8px;
      }

      .calendar-weekday {
        text-align: center;
        font-weight: 700;
        color: #54607c;
        font-size: 0.86rem;
        padding: 4px 0;
      }

      .calendar-weekday.weekend {
        color: #d74444;
      }

      .calendar-day {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fbfcff;
        min-height: 120px;
        padding: 8px;
        font-size: 0.82rem;
      }

      .calendar-day.empty {
        background: #f6f8fc;
      }

      .calendar-day-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .calendar-day-count {
        color: #2f4f85;
      }

      .calendar-day-number.weekend {
        color: #d74444;
      }

      .calendar-company {
        color: #314160;
        line-height: 1.4;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .calendar-limit-row {
        margin-top: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .calendar-bulk-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin: 0 0 10px;
      }

      .calendar-limit-input {
        width: 64px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 3px 5px;
        font-size: 0.8rem;
        background: #fff;
      }

      .weekday-label {
        font-weight: 700;
      }

      .weekday-label.weekend {
        color: #d74444;
      }

      @media (max-width: 1100px) {
        .board {
          grid-template-columns: 1fr;
        }

        .item-body {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>촬영스케줄 관리자페이지</h1>
      <p class="subtitle">촬영과 일정과 입금 내역을 한 화면에서 쉽고 편리하게 관리하세요.</p>

      <div class="top-tabs">
        <button id="tabSchedule" class="active" data-tab="schedule" type="button">스케줄 관리</button>
        <button id="tabPayment" data-tab="payment" type="button">입금 관리</button>
        <button id="tabCoupon" data-tab="coupon" type="button">회차권 등록</button>
      </div>

      <section id="scheduleSection" class="board">
        <article class="card">
          <h2>작가 관리</h2>
          <div id="registerPanel" class="register-panel hidden">
            <div class="input-row">
              <span>👤</span>
              <input id="newPhotographerName" type="text" placeholder="작가 이름 입력" />
            </div>
            <div class="input-row">
              <span>📞</span>
              <input id="newPhotographerPhone" type="text" placeholder="작가번호(연락처) 입력" />
            </div>
            <div class="input-row">
              <span>🚗</span>
              <input id="newPhotographerCar" type="text" placeholder="작가 차량번호 입력" />
            </div>
            <div class="actions" style="margin-top: 8px;">
              <button id="registerPhotographerBtn" class="btn-sm primary" type="button">등록</button>
              <button id="closePhotographerPanelBtn" class="btn-sm" type="button">완료</button>
            </div>
            <div id="panelPhotographerList" class="member-names"></div>
          </div>
          <p class="helper">등록 인원: <strong id="memberCount">2명</strong></p>
          <div id="memberNames" class="company-list"></div>

          <h3 class="sub-title">업체 등록</h3>
          <button id="addCompanyBtn" class="btn-main" type="button">+ 업체 등록</button>
          <div id="companyRegisterPanel" class="register-panel hidden">
            <form id="companyForm" class="form">
              <div class="input-row">
                <span>🏢</span>
                <input id="companyNameInput" type="text" placeholder="업체 이름" required />
              </div>
              <div class="input-row">
                <span>📞</span>
                <input id="companyPhoneInput" type="text" placeholder="연락처" required />
              </div>
              <div class="actions" style="margin-top: 0; justify-content: flex-start;">
                <button class="btn-sm primary" type="submit">등록</button>
                <button id="closeCompanyPanelBtn" class="btn-sm" type="button">완료</button>
              </div>
            </form>
          </div>
          <div class="input-row" style="margin-top: 8px;">
            <span>🔎</span>
            <input id="companySearchInput" type="text" placeholder="업체명 또는 연락처 검색" />
          </div>
          <div id="companyList" class="company-list"></div>
        </article>

        <article class="card schedule-register-card">
          <h2>스케줄 등록</h2>
          <form id="scheduleForm" class="form">
            <div class="filter-row">
              <div class="input-row">
                <span>📅</span>
                <select id="year" required></select>
              </div>
              <div class="input-row">
                <select id="month" required></select>
              </div>
              <div class="input-row">
                <select id="day" required></select>
              </div>
            </div>
            <div class="input-row">
              <span>🏢</span>
              <input id="company" type="text" placeholder="업체명" list="companyAutocompleteList" required />
              <datalist id="companyAutocompleteList"></datalist>
            </div>
            <div class="input-row">
              <span>📍</span>
              <input id="place" type="text" placeholder="촬영장소" required />
            </div>
            <div class="filter-row">
              <div class="input-row">
                <span>📐</span>
                <select id="pyeong">
                  <option value="">평수 선택</option>
                  <option value="45평이하">45평이하</option>
                  <option value="45평이상">45평이상</option>
                  <option value="95평이상">95평이상</option>
                  <option value="145평이상">145평이상</option>
                </select>
              </div>
              <div class="input-row">
                <span>🔒</span>
                <input id="jointCode" type="text" placeholder="공동현관 비번" />
              </div>
              <div class="input-row">
                <span>🗝️</span>
                <input id="doorCode" type="text" placeholder="세대 비번" />
              </div>
            </div>
            <div class="input-row">
              <span>📝</span>
              <input id="memo" type="text" placeholder="메모사항" />
            </div>
            <div>
              <strong>촬영 구성</strong>
              <div class="radio-line">
                <label><input type="radio" name="composition" value="사진만" checked /> 사진만</label>
                <label><input type="radio" name="composition" value="사진영상 둘다" /> 사진영상 둘다</label>
              </div>
            </div>
            <button class="btn-main" type="submit">+ 새 스케줄 추가</button>
            <div class="actions" style="margin-top: 8px; justify-content: flex-start;">
              <input id="adminOverridePassword" class="inline-input" type="password" placeholder="관리자 비밀번호" style="width: 180px;" />
              <button id="adminOverrideSubmitBtn" class="btn-sm" type="button">관리자권한등록</button>
            </div>
          </form>
          <p class="new-note">새로고침하면 데이터가 초기화됩니다.</p>
        </article>

        <article class="card my-schedule-card">
          <div class="schedule-head">
            <h2>전체스케줄</h2>
            <div class="head-right">
              <span class="count">총 <span id="totalCount">0</span>건</span>
              <span id="customerAlertCount" class="count">미확인 알림 총 0개</span>
              <button id="previousScheduleHistoryBtn" class="btn-sm" type="button">이전기록</button>
              <button id="customerAlertHistoryBtn" class="btn-sm" type="button">기록</button>
              <button id="downloadExcelBtn" class="btn-sm" type="button">엑셀 다운로드</button>
              <button id="uploadExcelBtn" class="btn-sm" type="button">엑셀 업로드</button>
            </div>
          </div>

          <div id="viewTabs" class="view-tabs"></div>

      function buildCurrentStateSnapshot() {
        const state = {};
        STORAGE_SYNC_KEYS.forEach((key) => {
          const value = localStorage.getItem(key);
          if (value !== null) state[key] = value;
        });
        return state;
      }

      function applyRemoteState(state) {
        if (!state || typeof state !== "object") return;
        STORAGE_SYNC_KEYS.forEach((key) => {
          if (Object.prototype.hasOwnProperty.call(state, key)) {
            const value = state[key];
            if (value === null || value === undefined) {
              localStorage.removeItem(key);
            } else {
              localStorage.setItem(key, String(value));
            }
          }
        });
      }

      function pullRemoteStateSync() {
        try {
          if (USE_SUPABASE_SYNC) {
            const xhr = new XMLHttpRequest();
            xhr.open(
              "GET",
              `${SUPABASE_URL}/rest/v1/${SUPABASE_STATE_TABLE}?id=eq.${encodeURIComponent(SUPABASE_STATE_ID)}&select=payload&limit=1`,
              false
            );
            xhr.setRequestHeader("apikey", SUPABASE_ANON_KEY);
            xhr.setRequestHeader("Authorization", `Bearer ${SUPABASE_ANON_KEY}`);
            xhr.send();
            if (xhr.status < 200 || xhr.status >= 300) return;
            const rows = JSON.parse(xhr.responseText || "[]");
            if (!Array.isArray(rows) || !rows.length) return;
            const row = rows[0];
            const state = row && row.payload && typeof row.payload === "object" ? row.payload : {};
            applyRemoteState(state);
            return;
          }

          if (!REMOTE_SYNC_ENDPOINT) return;
          const xhr = new XMLHttpRequest();
          xhr.open("GET", REMOTE_SYNC_ENDPOINT, false);
          xhr.send();
          if (xhr.status < 200 || xhr.status >= 300) return;
          const payload = JSON.parse(xhr.responseText || "{}");
          const state = payload && typeof payload === "object" ? payload.state || {} : {};
          applyRemoteState(state);
        } catch (error) {
          // 서버 미접속 상태에서는 로컬 모드로 계속 동작
        }
      }

      let remoteSyncTimer = null;
      function pushRemoteState() {
        const state = buildCurrentStateSnapshot();
        if (USE_SUPABASE_SYNC) {
          fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_STATE_TABLE}?on_conflict=id`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              apikey: SUPABASE_ANON_KEY,
              Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
              Prefer: "resolution=merge-duplicates,return=minimal"
            },
            body: JSON.stringify([{ id: SUPABASE_STATE_ID, payload: state }])
          }).catch(() => {});
          return;
        }
        if (!REMOTE_SYNC_ENDPOINT) return;
        fetch(REMOTE_SYNC_ENDPOINT, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ state })
        }).catch(() => {});
      }

      function scheduleRemotePush() {
        if (remoteSyncTimer) clearTimeout(remoteSyncTimer);
        remoteSyncTimer = setTimeout(pushRemoteState, 250);
      }

      const originalSetItem = localStorage.setItem.bind(localStorage);
      const originalRemoveItem = localStorage.removeItem.bind(localStorage);
      localStorage.setItem = (key, value) => {
        originalSetItem(key, value);
        if (STORAGE_SYNC_KEYS.includes(key)) scheduleRemotePush();
      };
      localStorage.removeItem = (key) => {
        originalRemoveItem(key);

      function savePhotographerProfilesToStorage() {
        const profiles = photographers.map((name) => ({
          name: String(name || "").trim(),
          phone: String(photographerPhones[name] || "").trim(),
          carNumber: String(photographerCarNumbers[name] || "").trim()
        }));
        localStorage.setItem(STORAGE_PHOTOGRAPHER_PROFILES, JSON.stringify(profiles));
      }

      function loadPhotographerProfilesFromStorage() {
        const raw = localStorage.getItem(STORAGE_PHOTOGRAPHER_PROFILES);
        if (raw === null) return;
        let parsed = [];
        try {
          const value = JSON.parse(raw);
          parsed = Array.isArray(value) ? value : [];
        } catch (error) {
          parsed = [];
        }
        const profiles = parsed
          .map((item) => ({
            name: String(item?.name || "").trim(),
            phone: String(item?.phone || "").trim(),
            carNumber: String(item?.carNumber || "").trim()
          }))
          .filter((item) => item.name);

        // 저장된 값이 빈 배열이어도 그대로 반영해야 기본값 부활을 막을 수 있음.
        photographers.splice(0, photographers.length, ...profiles.map((item) => item.name));
        Object.keys(photographerPhones).forEach((key) => delete photographerPhones[key]);
        Object.keys(photographerCarNumbers).forEach((key) => delete photographerCarNumbers[key]);
        profiles.forEach((item) => {
          photographerPhones[item.name] = item.phone;
          photographerCarNumbers[item.name] = item.carNumber;
        });
      }

      }

      function getDefaultDailyLimit(dateKey) {
        const config = readStorageObject(STORAGE_LIMIT_CONFIG);
        const weekdayLimit = Math.max(0, Number(config.weekdayLimit) || 8);
        const holidayLimit = Math.max(0, Number(config.holidayLimit) || 4);
        const weekday = new Date(`${dateKey}T00:00:00`).getDay();
        const isWeekend = weekday === 0 || weekday === 6;
        return isWeekend || isHolidayDate(dateKey) ? holidayLimit : weekdayLimit;
      }

      function getDailyLimitBase(dateKey) {
        return getDefaultDailyLimit(dateKey);
      }

      function getDayoffDeduction(dateKey) {
        const deductions = readStorageObject(STORAGE_DAYOFF_DEDUCTIONS);
        const legacyRaw = Number(deductions[dateKey]);
        const legacyDeduction = Number.isNaN(legacyRaw) || legacyRaw < 0 ? 0 : Math.floor(legacyRaw);
        const requests = readStorageArray(STORAGE_DAYOFF_REQUESTS);
        const requestedDeduction = requests
          .filter((item) => String(item?.date || "") === String(dateKey || ""))
          .reduce((sum, item) => sum + Math.max(0, Number(item?.amount) || 0), 0);
        return legacyDeduction + requestedDeduction;
      }

      function getMonthDayoffRequests(year, month) {
        const monthKey = `${year}-${String(month).padStart(2, "0")}`;
        return readStorageArray(STORAGE_DAYOFF_REQUESTS)
          .filter((item) => String(item?.date || "").startsWith(monthKey))
          .sort((a, b) => new Date(b.requestedAt || 0).getTime() - new Date(a.requestedAt || 0).getTime());
      }

      function renderOpenDayoffSummary() {
        const now = new Date();
        const currentMonthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
        const requests = readStorageArray(STORAGE_DAYOFF_REQUESTS)
          .filter((item) => {
            const date = String(item?.date || "").trim();
            if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) return false;
            return date.slice(0, 7) >= currentMonthKey;
          })
          .sort((a, b) => {
            const dateDiff = String(a?.date || "").localeCompare(String(b?.date || ""));
            if (dateDiff !== 0) return dateDiff;
            return new Date(b?.requestedAt || 0).getTime() - new Date(a?.requestedAt || 0).getTime();
          });

        if (requests.length === 0) {
          openDayoffSummaryBoxEl.innerHTML = "<div>이번달 이후 휴무요청 내역이 없습니다.</div>";
          return;
        }

        const byMonth = requests.reduce((acc, item) => {
          const monthKey = String(item?.date || "").slice(0, 7);
          if (!acc[monthKey]) acc[monthKey] = [];
          acc[monthKey].push(item);
          return acc;
        }, {});

        const monthRows = Object.keys(byMonth)
          .sort((a, b) => a.localeCompare(b))
          .map((monthKey) => {
            const monthItems = byMonth[monthKey];
            const byWriter = monthItems.reduce((acc, item) => {
              const writerName = String(item?.writerName || "작가미상").trim() || "작가미상";
              if (!acc[writerName]) acc[writerName] = [];
              acc[writerName].push(item);
              return acc;
            }, {});

            const writerRows = Object.keys(byWriter)
              .sort((a, b) => a.localeCompare(b, "ko"))
              .map((writerName) => {
                const dateList = byWriter[writerName]
                  .map((item) => escapeHtml(String(item?.date || "-")))
                  .sort((a, b) => a.localeCompare(b))
                  .join(", ");
                return `
                  <div class="customer-alert-row" style="align-items: flex-start;">
                    <span><strong>${escapeHtml(writerName)}</strong>: ${dateList || "-"}</span>
                  </div>
                `;
              })
              .join("");

            const [yearText, monthText] = monthKey.split("-");
            return `
              <div style="margin-top: 8px;">
                <div style="font-weight: 700; margin-bottom: 4px;">${escapeHtml(yearText)}년 ${Number(monthText)}월</div>
                ${writerRows}
              </div>
            `;
          })
          .join("");

        openDayoffSummaryBoxEl.innerHTML = `
          <div style="font-weight: 700; margin-bottom: 6px;">휴무요청작가리스트</div>
          ${monthRows}
        `;
      }

      function getEffectiveDailyLimit(dateKey) {
        return Math.max(0, getDailyLimitBase(dateKey) - getDayoffDeduction(dateKey));
      }

      function getActiveScheduleCountByDate(dateKey, excludeIndex = -1) {
        return data.reduce((count, item, index) => {
          if (excludeIndex >= 0 && index === excludeIndex) return count;
          return item.date === dateKey ? count + 1 : count;
        }, 0);
      }

      function hydrateFromCustomerPageStorage() {
        const customerCompanies = readStorageArray(STORAGE_CUSTOMER_COMPANIES);
        customerCompanies.forEach((company) => {
          const name = normalizeCompanyName(company?.name);
          if (!name) return;
          const phone = String(company?.phone || "").trim();
          const exists = companies.some((item) => normalizeCompanyName(item.name).toLowerCase() === name.toLowerCase());
          if (!exists) {
            companies.unshift({ name, phone: phone || "-" });
          }
        });

        const existingScheduleIds = new Set(data.map((item) => String(item.customerScheduleId || "")).filter(Boolean));
        const customerSchedules = readStorageArray(STORAGE_CUSTOMER_SCHEDULES);
        customerSchedules.forEach((row) => {
          const scheduleId = String(row?.customerScheduleId || "");
          const date = String(row?.date || "").trim();
          const company = normalizeCompanyName(row?.company);
          const place = String(row?.place || "").trim();
          if (!/^\d{4}-\d{2}-\d{2}$/.test(date) || !company || !place) return;
          if (scheduleId && existingScheduleIds.has(scheduleId)) return;

          const fallbackIndex = data.findIndex(
            (item) =>
              String(item?.date || "").trim() === date &&
              String(item?.time || "").trim() === String(row?.time || "").trim() &&
              normalizeCompanyName(item?.company) === company &&
              String(item?.place || "").trim() === place
          );
          if (fallbackIndex >= 0) {
            const target = data[fallbackIndex];
            if (scheduleId && !target.customerScheduleId) {
              target.customerScheduleId = scheduleId;
              existingScheduleIds.add(scheduleId);
            }
            target.customerId = String(row?.customerId || target.customerId || "").trim();
            target.customerPhone = String(row?.customerPhone || target.customerPhone || "").trim();
            target.name = String(row?.name || target.name || "작가미정").trim() || "작가미정";
            target.writerPhone = String(row?.writerPhone || target.writerPhone || "").trim();
            target.writerCarNumber = String(row?.writerCarNumber || target.writerCarNumber || "").trim();
            target.paymentStatus = String(row?.paymentStatus || target.paymentStatus || "미입금").trim() || "미입금";
            return;
          }
          data.unshift({
            customerScheduleId: scheduleId || `legacy-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
            customerId: String(row?.customerId || "").trim(),
            customerPhone: String(row?.customerPhone || "").trim(),
            date,
            time: String(row?.time || "09:00").trim() || "09:00",
            name: String(row?.name || "작가미정").trim() || "작가미정",
            company,
            place,
            pyeong: String(row?.pyeong || "").trim(),
            jointCode: String(row?.jointCode || "").trim(),
            doorCode: String(row?.doorCode || "").trim(),
            memo: String(row?.memo || "").trim(),
            composition: String(row?.composition || "사진만").trim() || "사진만",
            writerPhone: String(row?.writerPhone || "").trim(),
            writerCarNumber: String(row?.writerCarNumber || "").trim(),
            paymentStatus: String(row?.paymentStatus || "미입금").trim() || "미입금",
            paymentPayer: String(row?.paymentPayer || "").trim(),
            paymentAmount: String(row?.paymentAmount || "").trim(),
            paymentDate: String(row?.paymentDate || "").trim(),
            couponUsed: Boolean(row?.couponUsed),
            adminTimeUpdated: Boolean(row?.adminTimeUpdated)
          });
          if (scheduleId) existingScheduleIds.add(scheduleId);
        });
      }

      function hydrateFromWriterPageStorage() {

          if (excludedNames.has(photographers[i])) {
            photographers.splice(i, 1);

        const writerUsers = readStorageArray(STORAGE_WRITERS);
        writerUsers.forEach((user) => {
          const writerName = String(user?.name || "").trim();
          if (!writerName) return;
          if (!excludedNames.has(writerName) && !photographers.includes(writerName)) {
            photographers.push(writerName);

          const carNumber = String(user?.carNumber || "").trim();

          }
          if (carNumber && !photographerCarNumbers[writerName]) {
            photographerCarNumbers[writerName] = carNumber;

      function seedRandomSchedulesForTesting() {
        if (localStorage.getItem(STORAGE_TEST_SEED_Q1_2026_DONE) === "done") return;
        const companyPool = companies.length > 0 ? companies.map((item) => normalizeCompanyName(item.name)).filter(Boolean) : ["인로크2", "인로크3"];
        const writerPool = photographers.length > 0 ? [...photographers, "작가미정"] : ["작가미정"];
        const placePool = ["강남구", "강동구", "광진구", "송파구", "마포구", "성동구", "서초구", "동대문구"];
        const pyeongPool = ["45평이하", "45평이상", "95평이상", "145평이상", ""];
        const compositionPool = ["사진만", "사진영상 둘다"];
        const paymentPool = ["미입금", "미입금", "미입금", "입금완료"];
        const startAt = new Date("2026-02-01T00:00:00").getTime();
        const endAt = new Date("2026-04-30T00:00:00").getTime();
        const dayRange = Math.floor((endAt - startAt) / 86400000) + 1;

        for (let i = 0; i < 50; i += 1) {
          const dayOffset = Math.floor(Math.random() * dayRange);
          const targetDate = new Date(startAt + dayOffset * 86400000);
          const date = `${targetDate.getFullYear()}-${String(targetDate.getMonth() + 1).padStart(2, "0")}-${String(targetDate.getDate()).padStart(2, "0")}`;
          const hour = String(10 + Math.floor(Math.random() * 8)).padStart(2, "0");
          const minute = Math.random() < 0.5 ? "00" : "30";
          const company = companyPool[Math.floor(Math.random() * companyPool.length)] || "인로크3";
          const writer = writerPool[Math.floor(Math.random() * writerPool.length)] || "작가미정";
          const paymentStatus = paymentPool[Math.floor(Math.random() * paymentPool.length)] || "미입금";
          const paymentDone = paymentStatus === "입금완료";
          const writerPhone = writer === "작가미정" ? "" : photographerPhones[writer] || "";
          const writerCarNumber = writer === "작가미정" ? "" : photographerCarNumbers[writer] || "";
          data.unshift({
            customerScheduleId: `seed-q1-2026-${Date.now()}-${i}-${Math.random().toString(36).slice(2, 7)}`,
            date,
            time: `${hour}:${minute}`,
            name: writer,
            writerPhone,
            writerCarNumber,
            company,
            place: placePool[Math.floor(Math.random() * placePool.length)],
            pyeong: pyeongPool[Math.floor(Math.random() * pyeongPool.length)],
            jointCode: "",
            doorCode: "",
            memo: "",
            composition: compositionPool[Math.floor(Math.random() * compositionPool.length)],
            paymentStatus,
            paymentPayer: paymentDone ? "테스트입금자" : "",
            paymentAmount: paymentDone ? "200000" : "",
            paymentDate: paymentDone ? `${String(targetDate.getMonth() + 1).padStart(2, "0")}-${String(targetDate.getDate()).padStart(2, "0")}` : "",
            couponUsed: false
          });
        }
        localStorage.setItem(STORAGE_TEST_SEED_Q1_2026_DONE, "done");
      }

        }));

      function buildCustomerAlertMessage(item) {
        const dateText = item.date || "-";
        const timeText = item.time || "-";
        const companyText = item.company || "업체미상";
        if (item.type === "admin_time_update") {
          return `${companyText} 업체 스케줄 시간을 ${dateText} ${timeText}(으)로 수정했습니다.`;
        }
        if (item.type === "new_company_schedule") {
          return `신규업체 ${companyText} 스케줄이 등록되었습니다. (${dateText} ${timeText})`;
        }
        if (item.type === "schedule_create") {
          return `${companyText} 업체가 새 스케줄을 등록했습니다. (${dateText} ${timeText})`;
        }
        if (item.type === "schedule_cancel") {
          return `${companyText} 업체가 스케줄을 취소했습니다. (${dateText} ${timeText})`;
        }
        if (item.type === "customer_signup") {
          return `${companyText} 업체가 고객 페이지에 회원가입했습니다.`;
        }

      function getWeekdayKo(dateText) {
        if (!/^\d{4}-\d{2}-\d{2}$/.test(dateText || "")) return "-";
        const names = ["일", "월", "화", "수", "목", "금", "토"];
        const parsed = new Date(`${dateText}T00:00:00`);
        if (Number.isNaN(parsed.getTime())) return "-";
        return names[parsed.getDay()];
      }

      function isWeekendDate(dateText) {
        if (!/^\d{4}-\d{2}-\d{2}$/.test(dateText || "")) return false;
        const parsed = new Date(`${dateText}T00:00:00`);
        if (Number.isNaN(parsed.getTime())) return false;
        const weekday = parsed.getDay();
        return weekday === 0 || weekday === 6;
      }

      function summarizeMemo(text) {
        const normalized = String(text || "").trim();
        if (!normalized) return "-";
        if (normalized.length <= 10) return normalized;
        return `${normalized.slice(0, 10)}...`;
      }

      function formatPlaceForDisplay(text) {
        const normalized = String(text || "-");
        const chunks = [];
        for (let idx = 0; idx < normalized.length; idx += 12) {
          chunks.push(normalized.slice(idx, idx + 12));
        }
        return chunks.map((chunk) => escapeHtml(chunk)).join("<br />");
      }

      function escapeCsvField(value) {
        const text = String(value ?? "");
        if (text.includes('"') || text.includes(",") || text.includes("\n")) {
          return `"${text.replaceAll('"', '""')}"`;
        }
        return text;
      }

      function parseCsvLine(line) {
        const values = [];
        let current = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i += 1) {
          const char = line[i];
          if (char === '"') {
            if (inQuotes && line[i + 1] === '"') {
              current += '"';
              i += 1;
            } else {
              inQuotes = !inQuotes;
            }
            continue;
          }
          if (char === "," && !inQuotes) {
            values.push(current);
            current = "";
            continue;
          }
          current += char;
        }
        values.push(current);
        return values;
      }

      function exportSchedulesToCsv() {
        const headers = [
          "date",
          "time",
          "name",
          "company",
          "place",
          "pyeong",
          "jointCode",
          "doorCode",
          "memo",
          "composition",
          "paymentStatus",
          "paymentPayer",
          "paymentAmount",
          "paymentDate",
          "couponUsed"
        ];
        const lines = [
          headers.join(","),
          ...data.map((item) =>
            headers
              .map((key) => escapeCsvField(item[key] ?? ""))
              .join(",")
          )
        ];
        const bom = "\uFEFF";
        const blob = new Blob([bom + lines.join("\n")], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        const now = new Date();
        const fileDate = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, "0")}${String(now.getDate()).padStart(2, "0")}`;
        link.href = url;
        link.download = `schedule_export_${fileDate}.csv`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }

      function importSchedulesFromCsvText(csvText) {
        const lines = String(csvText || "")
          .replace(/\r\n/g, "\n")
          .replace(/\r/g, "\n")
          .split("\n")
          .filter((line) => line.trim() !== "");
        if (lines.length < 2) {
          alert("업로드할 데이터가 없습니다.");
          return;
        }
        const header = parseCsvLine(lines[0]).map((col) => col.trim());
        const headerMap = new Map(header.map((name, idx) => [name, idx]));
        const required = ["date", "company", "place", "composition"];
        const missing = required.filter((key) => !headerMap.has(key));
        if (missing.length > 0) {
          alert(`CSV 형식이 맞지 않습니다. 누락 컬럼: ${missing.join(", ")}`);
          return;
        }

        let imported = 0;
        let skipped = 0;
        const nextItems = [];

        for (let i = 1; i < lines.length; i += 1) {
          const row = parseCsvLine(lines[i]);
          const get = (key) => row[headerMap.get(key)] ?? "";
          const date = String(get("date")).trim();
          const company = normalizeCompanyName(get("company"));
          const composition = String(get("composition")).trim() || "사진만";
          const place = String(get("place")).trim();

          if (!/^\d{4}-\d{2}-\d{2}$/.test(date) || !company || !place || !isRegisteredCompanyName(company)) {
            skipped += 1;
            continue;
          }
          const currentCount = getActiveScheduleCountByDate(date);
          const pendingCount = nextItems.filter((item) => item.date === date).length;
          const dailyLimit = getEffectiveDailyLimit(date);
          if (currentCount + pendingCount >= dailyLimit) {
            skipped += 1;
            continue;
          }

          nextItems.push({
            date,
            time: String(get("time")).trim() || "09:00",
            name: String(get("name")).trim() || "작가미정",
            company,
            place,
            pyeong: String(get("pyeong")).trim() || "",
            jointCode: String(get("jointCode")).trim() || "",
            doorCode: String(get("doorCode")).trim() || "",
            memo: String(get("memo")).trim() || "",
            composition,
            paymentStatus: String(get("paymentStatus")).trim() || "미입금",
            paymentPayer: String(get("paymentPayer")).trim() || "",
            paymentAmount: String(get("paymentAmount")).trim() || "",
            paymentDate: String(get("paymentDate")).trim() || "",
            couponUsed: String(get("couponUsed")).trim().toLowerCase() === "true"
          });
          imported += 1;
        }

        if (nextItems.length > 0) {
          data.unshift(...nextItems);
          renderList();
        }
        alert(`업로드 완료: ${imported}건 등록, ${skipped}건 건너뜀`);
      }

      function renderScheduleCalendar() {
        const firstDay = new Date(calendarViewYear, calendarViewMonth - 1, 1).getDay();
        const daysInMonth = new Date(calendarViewYear, calendarViewMonth, 0).getDate();
        const monthSchedules = data.filter((item) => {
          const date = new Date(item.date);
          return date.getFullYear() === calendarViewYear && date.getMonth() + 1 === calendarViewMonth;
        });
        calendarTitleEl.textContent = `${calendarViewYear}년 ${calendarViewMonth}월`;
        calendarMonthTotalEl.textContent = `이번 달 총 예약 ${monthSchedules.length}건`;
        const config = readStorageObject(STORAGE_LIMIT_CONFIG);
        bulkWeekdayLimitInputEl.value = String(Math.max(0, Number(config.weekdayLimit) || 8));
        bulkHolidayLimitInputEl.value = String(Math.max(0, Number(config.holidayLimit) || 4));

        const weekdays = ["일", "월", "화", "수", "목", "금", "토"]
          .map((day, idx) => `<div class="calendar-weekday ${idx === 0 || idx === 6 ? "weekend" : ""}">${day}</div>`)
          .join("");

        const cells = [];
        const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

        for (let i = 0; i < totalCells; i += 1) {
          const day = i - firstDay + 1;
          if (day < 1 || day > daysInMonth) {
            cells.push('<div class="calendar-day empty"></div>');
            continue;
          }
          const dateKey = `${calendarViewYear}-${String(calendarViewMonth).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
          const daySchedules = data
            .filter((item) => item.date === dateKey)
            .sort((a, b) => (a.time || "").localeCompare(b.time || ""));
          const dailyLimit = getEffectiveDailyLimit(dateKey);
          const baseLimit = getDailyLimitBase(dateKey);
          const deduction = getDayoffDeduction(dateKey);
          const companies = daySchedules
            .map(
              (item) => {
                const area = extractAreaLabel(item.place);
                return `<div class="calendar-company">${escapeHtml(area || "-")} ${escapeHtml(item.time || "-")}</div>`;
              }
            )
            .join("");
          const weekdayIndex = new Date(`${dateKey}T00:00:00`).getDay();
          const isWeekend = weekdayIndex === 0 || weekdayIndex === 6;
          const isHoliday = isHolidayDate(dateKey);
          const isRedDate = isWeekend || isHoliday;
          cells.push(`
            <div class="calendar-day">
              <div class="calendar-day-head">
                <span class="calendar-day-number ${isRedDate ? "weekend" : ""}">${day}일</span>
                <span class="calendar-day-count">${daySchedules.length}/${dailyLimit}건</span>
              </div>
              ${companies || '<div class="calendar-company">예약 없음</div>'}
            </div>
          `);
        }

        calendarGridEl.innerHTML = `${weekdays}${cells.join("")}`;
        renderDayoffRequestHistory();
      }

      function applyScheduleDatePreset(presetType) {
        if (presetType === "all") {
          monthFilterEl.value = "all";
          dayFilterEl.value = "all";
          currentScheduleDatePreset = "all";
          return;
        }
        const offsetDays = presetType === "tomorrow" ? 1 : 0;
        const target = new Date();
        target.setHours(0, 0, 0, 0);
        target.setDate(target.getDate() + offsetDays);
        yearFilterEl.value = String(target.getFullYear());
        monthFilterEl.value = String(target.getMonth() + 1);
        dayFilterEl.value = String(target.getDate());
        currentScheduleDatePreset = presetType;

      async function copyCurrentScheduleList() {
        if (latestScheduleCopyRows.length === 0) {
          alert("복사할 스케줄이 없습니다.");
          return;
        }

        const lines = [
          `[${latestScheduleCopyLabel}]`,
          `총 ${latestScheduleCopyRows.length}건`,
          ...latestScheduleCopyRows.map((item, idx) => {
            const companyPhone = getCompanyPhoneForDisplay(item.company, item);
            return `${idx + 1}. ${item.date || "-"} ${item.time || "-"} | 작가: ${item.name || "-"} | 업체: ${item.company || "-"} | 업체연락처: ${companyPhone || "-"} | 장소: ${item.place || "-"} | 평수: ${item.pyeong || "-"} | 촬영구성: ${item.composition || "-"} | 메모: ${item.memo || "-"}`;
          })
        ];
        const text = lines.join("\n");

        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
          } else {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            textarea.style.position = "fixed";
            textarea.style.left = "-9999px";
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);
          }
          alert("스케줄 내용이 복사되었습니다.");
        } catch (error) {
          alert("복사에 실패했습니다. 다시 시도해주세요.");
        }
      }

      function mergeAdminCompanyToCustomerAccount(companyIndex, selectedCustomerId = "") {
        const sourceCompany = companies[companyIndex];
        if (!sourceCompany) return;
        const sourceName = normalizeCompanyName(sourceCompany.name);
        if (!sourceName) return;

        if (!selectedCustomerId) {
          openCompanyMergeModal(companyIndex);
          return;
        }

        const users = readStorageArray(STORAGE_CUSTOMERS);
        if (users.length === 0) {
          alert("등록된 고객 계정이 없어 병합할 수 없습니다.");
          return;
        }

        const user = users.find((item) => String(item.id || "").trim().toLowerCase() === String(selectedCustomerId).toLowerCase());
        if (!user) {
          alert("해당 아이디를 찾지 못했습니다.");
          return;
        }

        const targetName = normalizeCompanyName(user.company);
        const targetPhone = String(user.phone || "").trim();
        if (!targetName) {
          alert("선택한 고객 계정의 업체명이 비어 있어 병합할 수 없습니다.");
          return;
        }

        const confirmed = confirm(
          `병합을 진행할까요?\n\n관리자 업체: ${sourceName}\n고객 계정: ${String(user.id || "").trim()} (${targetName})\n\n병합 후 업체명은 "${targetName}" 으로 통일되고, 해당 업체 스케줄은 이 고객 아이디에 연결됩니다.`
        );
        if (!confirmed) return;

        const sourceKey = sourceName.toLowerCase();
        const targetKey = targetName.toLowerCase();
        const targetCustomerId = String(user.id || "").trim();
        const targetCustomerPhone = targetPhone;
        const shouldRelink = (name) => {
          const key = normalizeCompanyName(name).toLowerCase();
          return key === sourceKey || key === targetKey;
        };
        const getScheduleDedupeKey = (item) =>
          [
            normalizeCompanyName(item?.company).toLowerCase(),
            String(item?.date || "").trim(),
            String(item?.time || "").trim(),
            normalizeCompanyName(item?.place).toLowerCase(),
            String(item?.pyeong || "").trim(),
            String(item?.composition || "").trim(),
            String(item?.memo || "").trim()
          ].join("|");
        const pickBetterScheduleRow = (current, next) => {
          if (!current) return next;
          const currentScore =
            (String(current?.customerScheduleId || "").trim() ? 1 : 0) +
            (String(current?.customerId || "").trim() ? 1 : 0) +
            (String(current?.writerPhone || "").trim() ? 1 : 0) +
            (String(current?.writerCarNumber || "").trim() ? 1 : 0);
          const nextScore =
            (String(next?.customerScheduleId || "").trim() ? 1 : 0) +
            (String(next?.customerId || "").trim() ? 1 : 0) +
            (String(next?.writerPhone || "").trim() ? 1 : 0) +
            (String(next?.writerCarNumber || "").trim() ? 1 : 0);
          return nextScore > currentScore ? next : current;
        };

        companies[companyIndex].name = targetName;
        if (targetPhone) companies[companyIndex].phone = targetPhone;
        for (let i = companies.length - 1; i >= 0; i -= 1) {
          if (i === companyIndex) continue;
          if (normalizeCompanyName(companies[i]?.name).toLowerCase() === targetKey) {
            companies.splice(i, 1);
            if (i < companyIndex) companyIndex -= 1;
          }
        }

        data.forEach((item) => {
          if (!shouldRelink(item?.company)) return;
          item.company = targetName;
          item.customerId = targetCustomerId;
          item.customerPhone = targetCustomerPhone;
        });
        onHoldPayments.forEach((item) => {
          if (shouldRelink(item?.company)) item.company = targetName;
        });
        refundPayments.forEach((item) => {
          if (shouldRelink(item?.company)) item.company = targetName;
        });

        if (sourceName !== targetName && couponPasses[sourceName] !== undefined) {
          const oldValue = Number(couponPasses[sourceName] || 0);
          const targetValue = Number(couponPasses[targetName] || 0);
          couponPasses[targetName] = Math.max(0, oldValue) + Math.max(0, targetValue);
          delete couponPasses[sourceName];
        }

        const customerCompanies = readStorageArray(STORAGE_CUSTOMER_COMPANIES);
        let hasTargetCompany = false;
        customerCompanies.forEach((item) => {
          if (!shouldRelink(item?.name)) return;
          item.name = targetName;
          if (targetPhone) item.phone = targetPhone;
          hasTargetCompany = true;
        });
        if (!hasTargetCompany) {
          customerCompanies.unshift({ name: targetName, phone: targetPhone || sourceCompany.phone || "-" });
        }
        const dedupedCustomerCompanies = [];
        const seenCompanyKeys = new Set();
        customerCompanies.forEach((item) => {
          const key = normalizeCompanyName(item?.name).toLowerCase();
          if (!key || seenCompanyKeys.has(key)) return;
          seenCompanyKeys.add(key);
          dedupedCustomerCompanies.push({
            name: normalizeCompanyName(item?.name),
            phone: String(item?.phone || "").trim() || "-"
          });
        });
        localStorage.setItem(STORAGE_CUSTOMER_COMPANIES, JSON.stringify(dedupedCustomerCompanies));

        const customerSchedules = readStorageArray(STORAGE_CUSTOMER_SCHEDULES);
        customerSchedules.forEach((item) => {
          if (!shouldRelink(item?.company)) return;
          item.company = targetName;
          item.customerId = targetCustomerId;
          item.customerPhone = targetCustomerPhone;
        });
        const dedupedCustomerSchedulesMap = new Map();
        customerSchedules.forEach((item) => {
          const key = getScheduleDedupeKey(item);
          if (!key) return;
          const current = dedupedCustomerSchedulesMap.get(key);
          dedupedCustomerSchedulesMap.set(key, pickBetterScheduleRow(current, item));
        });
        localStorage.setItem(STORAGE_CUSTOMER_SCHEDULES, JSON.stringify([...dedupedCustomerSchedulesMap.values()]));

        const adminSchedules = readStorageArray(STORAGE_ADMIN_SCHEDULES);
        adminSchedules.forEach((item) => {
          if (!shouldRelink(item?.company)) return;
          item.company = targetName;
          item.customerId = targetCustomerId;
          item.customerPhone = targetCustomerPhone;
        });
        const dedupedAdminSchedulesMap = new Map();
        adminSchedules.forEach((item) => {
          const key = getScheduleDedupeKey(item);
          if (!key) return;
          const current = dedupedAdminSchedulesMap.get(key);
          dedupedAdminSchedulesMap.set(key, pickBetterScheduleRow(current, item));
        });
        localStorage.setItem(STORAGE_ADMIN_SCHEDULES, JSON.stringify([...dedupedAdminSchedulesMap.values()]));

        const dedupedDataMap = new Map();
        data.forEach((item) => {
          const key = getScheduleDedupeKey(item);
          if (!key) return;
          const current = dedupedDataMap.get(key);
          dedupedDataMap.set(key, pickBetterScheduleRow(current, item));
        });
        data.splice(0, data.length, ...dedupedDataMap.values());

        saveAdminCompaniesToStorage();
        editingCompanyIndex = null;
        renderCompanies();
        renderCouponPassList();
        renderCustomerStatsDashboard();
        renderCustomerUpdateNotices();
        renderCustomerAlertHistory();
        renderList();
        closeCompanyMergeModal();
        alert(`병합 완료: ${sourceName} -> ${targetName} (${targetCustomerId})`);
      }

      function renderWriterHistory(writerName) {
        const targetName = String(writerName || "").trim();
        const normalizedWriter = targetName.toLowerCase();
        const writers = readStorageArray(STORAGE_WRITERS);
        const writerUser = writers.find((item) => String(item?.name || "").trim().toLowerCase() === normalizedWriter) || null;
        const excludedNameSet = new Set(getExcludedPhotographerNames().map((name) => String(name || "").trim().toLowerCase()));
        const isExcludedWriter = excludedNameSet.has(normalizedWriter);
        const writerId = String(writerUser?.id || "").trim();
        const writerPassword = String(writerUser?.password || "").trim();

        const rows = [...data, ...onHoldPayments, ...refundPayments]
          .filter((item) => String(item?.name || "").trim().toLowerCase() === normalizedWriter)
          .sort((a, b) => {
            const at = new Date(`${a.date || "1900-01-01"}T${a.time || "00:00"}:00`).getTime();
            const bt = new Date(`${b.date || "1900-01-01"}T${b.time || "00:00"}:00`).getTime();
            return bt - at;
          });

        const monthlyCounts = new Map();
        rows.forEach((item) => {
